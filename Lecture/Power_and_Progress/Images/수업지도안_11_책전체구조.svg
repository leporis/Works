<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <filter id="ds"><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.10"/></filter>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1976D2"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="700" rx="12" fill="#FAFAFA"/>

  <!-- 제목 영역 -->
  <rect x="0" y="0" width="900" height="78" rx="12" fill="#1976D2"/>
  <rect x="0" y="40" width="900" height="38" fill="#1976D2"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">『권력과 진보』 전체 구조 한눈에 보기</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" font-weight="400" fill="#BBDEFB">Power and Progress · Acemoglu &amp; Johnson · 프롤로그 + 11장 구조</text>

  <!-- ========== Part I: 핵심 이론 제시 (프롤로그+1~3장) ========== -->
  <text x="450" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#616161">PART I — 핵심 이론 제시 : "기술은 자동으로 모두를 이롭게 하지 않는다"</text>

  <!-- 프롤로그+1장 -->
  <rect x="50" y="118" width="250" height="72" rx="10" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="175" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#283593">프롤로그+1장 · 테크놀로지에 대한 통제</text>
  <text x="175" y="156" text-anchor="middle" font-size="11" fill="#5C6BC0">"기술 발전 = 진보"라는 신화 해체</text>
  <text x="175" y="174" text-anchor="middle" font-size="11" fill="#5C6BC0">생산성 밴드왜건과 비전 설정자 소개</text>

  <!-- 2장 -->
  <rect x="325" y="118" width="250" height="72" rx="10" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="450" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#283593">2장 · 운하의 비전</text>
  <text x="450" y="156" text-anchor="middle" font-size="11" fill="#5C6BC0">고대 농경부터 운하 건설까지</text>
  <text x="450" y="174" text-anchor="middle" font-size="11" fill="#5C6BC0">기술→잉여→불평등 반복 패턴</text>

  <!-- 3장 -->
  <rect x="600" y="118" width="250" height="72" rx="10" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="725" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#283593">3장 · 설득 권력</text>
  <text x="725" y="156" text-anchor="middle" font-size="11" fill="#5C6BC0">"이것은 진보다"라는 내러티브로</text>
  <text x="725" y="174" text-anchor="middle" font-size="11" fill="#5C6BC0">대중의 동의를 이끌어낸다</text>

  <!-- Part I → Part II 연결 -->
  <line x1="450" y1="190" x2="450" y2="210" stroke="#1976D2" stroke-width="2" marker-end="url(#ab)"/>

  <!-- ========== Part II: 역사적 검증 (4~7장) ========== -->
  <text x="450" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#616161">PART II — 역사적 검증 : "이 패턴은 천 년간 반복되었다"</text>

  <!-- 4장 -->
  <rect x="30" y="240" width="200" height="72" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5" filter="url(#ds)"/>
  <text x="130" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#004D40">4장 · 비참함의 육성</text>
  <text x="130" y="278" text-anchor="middle" font-size="10" fill="#00897B">산업혁명: GDP ↑ 임금 정체</text>
  <text x="130" y="294" text-anchor="middle" font-size="10" fill="#00897B">엥겔스의 일시정지 (80년)</text>

  <!-- 5장 -->
  <rect x="245" y="240" width="200" height="72" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5" filter="url(#ds)"/>
  <text x="345" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#004D40">5장 · 중간 정도의 혁명</text>
  <text x="345" y="278" text-anchor="middle" font-size="10" fill="#00897B">미국의 다른 경로</text>
  <text x="345" y="294" text-anchor="middle" font-size="10" fill="#00897B">조건에 따라 결과가 달라진다</text>

  <!-- 6장 -->
  <rect x="460" y="240" width="200" height="72" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5" filter="url(#ds)"/>
  <text x="560" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#004D40">6장 · 진보의 피해자</text>
  <text x="560" y="278" text-anchor="middle" font-size="10" fill="#00897B">기술 변화의 피해자들</text>
  <text x="560" y="294" text-anchor="middle" font-size="10" fill="#00897B">비용은 누가 지불하는가</text>

  <!-- 7장 -->
  <rect x="675" y="240" width="200" height="72" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5" filter="url(#ds)"/>
  <text x="775" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#004D40">7장 · 투쟁으로 점철된 경로</text>
  <text x="775" y="278" text-anchor="middle" font-size="10" fill="#00897B">조직화 → 참정권 → 복지</text>
  <text x="775" y="294" text-anchor="middle" font-size="10" fill="#00897B">→ 공유된 번영 (1945~75)</text>

  <!-- Part II → Part III 연결 -->
  <line x1="450" y1="312" x2="450" y2="332" stroke="#1976D2" stroke-width="2" marker-end="url(#ab)"/>

  <!-- ========== Part III: 디지털 시대 (8~10장) ========== -->
  <text x="450" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#616161">PART III — 디지털 시대 : "오늘날 같은 패턴이 반복되고 있다"</text>

  <!-- 8장 -->
  <rect x="50" y="362" width="250" height="72" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5" filter="url(#ds)"/>
  <text x="175" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="#4A148C">8장 · 디지털 피해</text>
  <text x="175" y="400" text-anchor="middle" font-size="10" fill="#7B1FA2">플랫폼 착취 · 감시 자본주의</text>
  <text x="175" y="416" text-anchor="middle" font-size="10" fill="#7B1FA2">데이터 독점 · 주의 경제</text>

  <!-- 9장 -->
  <rect x="325" y="362" width="250" height="72" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5" filter="url(#ds)"/>
  <text x="450" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="#4A148C">9장 · 인공 투쟁</text>
  <text x="450" y="400" text-anchor="middle" font-size="10" fill="#7B1FA2">자동화(대체) vs 보완(증강)</text>
  <text x="450" y="416" text-anchor="middle" font-size="10" fill="#7B1FA2">왜 기업은 대체를 선택하는가</text>

  <!-- 10장 -->
  <rect x="600" y="362" width="250" height="72" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5" filter="url(#ds)"/>
  <text x="725" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="#4A148C">10장 · 민주주의, 무너지다</text>
  <text x="725" y="400" text-anchor="middle" font-size="10" fill="#7B1FA2">알고리즘 → 극단화 → 분열</text>
  <text x="725" y="416" text-anchor="middle" font-size="10" fill="#7B1FA2">공론장 붕괴 · 감시 사회</text>

  <!-- Part III → Part IV 연결 -->
  <line x1="450" y1="434" x2="450" y2="454" stroke="#1976D2" stroke-width="2" marker-end="url(#ab)"/>

  <!-- ========== Part IV: 해법 (11장) ========== -->
  <text x="450" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#616161">PART IV — 해법 : "방향을 바꿀 수 있다"</text>

  <!-- 11장 (가로 넓게) -->
  <rect x="120" y="484" width="660" height="60" rx="12" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" filter="url(#ds)"/>
  <text x="450" y="510" text-anchor="middle" font-size="15" font-weight="700" fill="#1B5E20">11장 · 테크놀로지의 경로를 다시 잡기</text>
  <text x="450" y="530" text-anchor="middle" font-size="12" fill="#388E3C">내러티브 전환  →  대항 권력 형성  →  정책 변화  (환경운동의 성공 사례를 모델로)</text>

  <!-- ========== 하단: 핵심 논증 흐름 ========== -->
  <line x1="40" y1="560" x2="860" y2="560" stroke="#E0E0E0" stroke-width="1"/>
  <text x="450" y="582" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">책의 핵심 논증 흐름</text>

  <!-- 4단 흐름 -->
  <rect x="40" y="594" width="190" height="40" rx="8" fill="#5C6BC0" filter="url(#ds)"/>
  <text x="135" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">기술 ≠ 자동 진보</text>

  <text x="240" y="619" text-anchor="middle" font-size="16" fill="#1976D2">→</text>

  <rect x="252" y="594" width="190" height="40" rx="8" fill="#00897B" filter="url(#ds)"/>
  <text x="347" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">역사가 증명한다</text>

  <text x="452" y="619" text-anchor="middle" font-size="16" fill="#1976D2">→</text>

  <rect x="464" y="594" width="190" height="40" rx="8" fill="#7B1FA2" filter="url(#ds)"/>
  <text x="559" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">지금도 반복 중이다</text>

  <text x="664" y="619" text-anchor="middle" font-size="16" fill="#1976D2">→</text>

  <rect x="676" y="594" width="190" height="40" rx="8" fill="#388E3C" filter="url(#ds)"/>
  <text x="771" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">우리가 바꿀 수 있다</text>

  <!-- ========== 최하단: 핵심 질문 ========== -->
  <rect x="120" y="650" width="660" height="38" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="450" y="668" text-anchor="middle" font-size="12" font-weight="600" fill="#0D47A1">핵심 질문 :  "기술의 방향은 누가 정하는가?  그리고 그 방향은 바꿀 수 있는가?"</text>
  <text x="450" y="684" text-anchor="middle" font-size="11" fill="#1565C0">💡  이 책은 "Yes, 바꿀 수 있다. 단, 조건이 있다"고 답한다</text>

</svg>
