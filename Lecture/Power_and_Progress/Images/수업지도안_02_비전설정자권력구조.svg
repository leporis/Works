<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1976D2"/>
    </marker>
    <marker id="at" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00897B"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7B1FA2"/>
    </marker>
    <marker id="a6" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#616161"/>
    </marker>
    <marker id="ag2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2E7D32"/>
    </marker>
    <marker id="ao2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E65100"/>
    </marker>
    <filter id="ds"><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.10"/></filter>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="700" rx="12" fill="#FAFAFA"/>

  <!-- 제목 영역 -->
  <rect x="0" y="0" width="900" height="78" rx="12" fill="#1976D2"/>
  <rect x="0" y="40" width="900" height="38" fill="#1976D2"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">비전 설정자와 기술의 방향</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" font-weight="400" fill="#BBDEFB">『권력과 진보』 1장 · Vision Setter &amp; Technology Direction</text>

  <!-- ========== 1층: 비전 설정자 ========== -->
  <rect x="320" y="100" width="260" height="70" rx="12" fill="#0D47A1" stroke="#0D47A1" stroke-width="2" filter="url(#ds)"/>
  <text x="450" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">비전 설정자 (Vision Setter)</text>
  <text x="450" y="150" text-anchor="middle" font-size="12" fill="#BBDEFB">"기술이 이렇게 세상을 바꿀 것이다"</text>

  <!-- 분기 화살표 → 설득 / 강제 -->
  <line x1="390" y1="170" x2="280" y2="198" stroke="#00897B" stroke-width="2.5" marker-end="url(#at)"/>
  <line x1="510" y1="170" x2="620" y2="198" stroke="#7B1FA2" stroke-width="2.5" marker-end="url(#ap)"/>

  <!-- ========== 2층: 설득 권력 / 강제 권력 ========== -->
  <!-- 설득 권력 -->
  <rect x="150" y="202" width="220" height="64" rx="12" fill="#E0F2F1" stroke="#00897B" stroke-width="2" filter="url(#ds)"/>
  <text x="260" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#004D40">🗣️ 설득 권력</text>
  <text x="260" y="248" text-anchor="middle" font-size="11" fill="#00897B">내러티브 · 비전 · 상식화</text>

  <!-- 강제 권력 -->
  <rect x="530" y="202" width="220" height="64" rx="12" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" filter="url(#ds)"/>
  <text x="640" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#4A148C">⚖️ 강제 권력</text>
  <text x="640" y="248" text-anchor="middle" font-size="11" fill="#7B1FA2">법 · 제도 · 물리적 힘</text>

  <!-- 합류 화살표 → 대중의 동의 -->
  <line x1="310" y1="266" x2="390" y2="296" stroke="#00897B" stroke-width="2" marker-end="url(#a6)"/>
  <line x1="590" y1="266" x2="510" y2="296" stroke="#7B1FA2" stroke-width="2" marker-end="url(#a6)"/>

  <!-- ========== 3층: 대중의 동의 ========== -->
  <rect x="310" y="300" width="280" height="60" rx="12" fill="#FFF3E0" stroke="#FFA000" stroke-width="2" filter="url(#ds)"/>
  <text x="450" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">대중의 동의 · 순응</text>
  <text x="450" y="346" text-anchor="middle" font-size="11" fill="#F57C00">"기술 발전은 불가피하다, 적응해야 한다"</text>

  <!-- 화살표 → 기술 방향 결정 -->
  <line x1="450" y1="360" x2="450" y2="384" stroke="#616161" stroke-width="2.5" marker-end="url(#a6)"/>

  <!-- ========== 4층: 기술의 방향 결정 ========== -->
  <rect x="330" y="388" width="240" height="50" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#ds)"/>
  <text x="450" y="418" text-anchor="middle" font-size="14" font-weight="700" fill="#0D47A1">기술의 방향 결정</text>

  <!-- 분기 화살표 → 혜택 / 비용 -->
  <line x1="390" y1="438" x2="270" y2="466" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#ag2)"/>
  <line x1="510" y1="438" x2="630" y2="466" stroke="#E65100" stroke-width="2.5" marker-end="url(#ao2)"/>

  <!-- ========== 5층: 혜택 vs 비용 ========== -->
  <!-- 혜택 -->
  <rect x="140" y="470" width="230" height="58" rx="12" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" filter="url(#ds)"/>
  <text x="255" y="495" text-anchor="middle" font-size="14" font-weight="700" fill="#1B5E20">📈 혜택 → 비전 설정자</text>
  <text x="255" y="515" text-anchor="middle" font-size="11" fill="#388E3C">소수 엘리트에게 부 · 권력 집중</text>

  <!-- 비용 -->
  <rect x="530" y="470" width="230" height="58" rx="12" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#ds)"/>
  <text x="645" y="495" text-anchor="middle" font-size="14" font-weight="700" fill="#BF360C">📉 비용 → 다수의 시민</text>
  <text x="645" y="515" text-anchor="middle" font-size="11" fill="#E65100">노동자 · 약자의 삶 악화</text>

  <!-- ========== 하단: 시대별 비전 설정자 비교 ========== -->
  <line x1="60" y1="552" x2="840" y2="552" stroke="#E0E0E0" stroke-width="1"/>
  <text x="450" y="576" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">역사 속 비전 설정자 비교</text>

  <!-- 3열 카드 -->
  <!-- 고대 -->
  <rect x="60" y="590" width="240" height="60" rx="10" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="180" y="612" text-anchor="middle" font-size="13" font-weight="700" fill="#283593">🏛️ 고대</text>
  <text x="180" y="632" text-anchor="middle" font-size="11" fill="#3F51B5">왕 · 사제  →  "신의 뜻"</text>

  <!-- 산업혁명 -->
  <rect x="330" y="590" width="240" height="60" rx="10" fill="#E0F7FA" stroke="#0097A7" stroke-width="1.5" filter="url(#ds)"/>
  <text x="450" y="612" text-anchor="middle" font-size="13" font-weight="700" fill="#006064">🏭 산업혁명</text>
  <text x="450" y="632" text-anchor="middle" font-size="11" fill="#00838F">공장주 · 은행가  →  "자유 시장"</text>

  <!-- 오늘날 -->
  <rect x="600" y="590" width="240" height="60" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5" filter="url(#ds)"/>
  <text x="720" y="612" text-anchor="middle" font-size="13" font-weight="700" fill="#4A148C">💻 오늘날</text>
  <text x="720" y="632" text-anchor="middle" font-size="11" fill="#7B1FA2">빅테크 CEO  →  "혁신이 답"</text>

  <!-- ========== 최하단: 핵심 질문 ========== -->
  <rect x="60" y="665" width="780" height="24" rx="6" fill="none"/>
  <text x="450" y="683" text-anchor="middle" font-size="12" font-weight="500" fill="#1565C0">💡  오늘날 AI의 비전을 설정하는 사람은 누구인가?  교사는 AI 교육의 비전 설정에 어떤 역할을 할 수 있는가?</text>

</svg>