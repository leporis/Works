  <text x="56" y="388" font-size="10" font-weight="700" fill="#283593">잉여의 행방</text>
  <text x="56" y="406" font-size="13" fill="#3F51B5">거대 성당 건축</text>
  <line x1="56" y1="416" x2="284" y2="416" stroke="#C5CAE9" stroke-width="1"/>

