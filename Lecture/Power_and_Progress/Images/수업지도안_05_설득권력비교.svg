<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <filter id="ds"><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.10"/></filter>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="660" rx="12" fill="#FAFAFA"/>

  <!-- 제목 영역 -->
  <rect x="0" y="0" width="900" height="78" rx="12" fill="#1976D2"/>
  <rect x="0" y="40" width="900" height="38" fill="#1976D2"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">설득 권력의 작동 방식 — 시대별 비교</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" font-weight="400" fill="#BBDEFB">『권력과 진보』 3장 · Power to Persuade</text>

  <!-- ========== 3열 비교 카드 ========== -->
  <!-- 카드 폭 260, 간격 20, 시작 x=50, 330, 610 -->

  <!-- ===== 카드 1: 중세 교회 ===== -->
  <rect x="40" y="96" width="260" height="410" rx="12" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5" filter="url(#ds)"/>
  <!-- 헤더 -->
  <rect x="40" y="96" width="260" height="50" rx="12" fill="#3F51B5"/>
  <rect x="40" y="126" width="260" height="20" fill="#3F51B5"/>
  <text x="170" y="123" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">⛪ 중세 교회</text>
  <text x="170" y="142" text-anchor="middle" font-size="11" fill="#C5CAE9">11 ~ 14세기</text>

  <!-- 비전 설정자 -->
  <text x="56" y="172" font-size="10" font-weight="700" fill="#283593">비전 설정자</text>
  <text x="56" y="190" font-size="13" fill="#3F51B5">교황 · 주교 · 수도원장</text>
  <line x1="56" y1="200" x2="284" y2="200" stroke="#C5CAE9" stroke-width="1"/>

  <!-- 핵심 내러티브 -->
  <text x="56" y="220" font-size="10" font-weight="700" fill="#283593">핵심 내러티브</text>
  <rect x="56" y="228" width="220" height="36" rx="6" fill="#C5CAE9" opacity="0.4"/>
  <text x="166" y="250" text-anchor="middle" font-size="13" font-weight="600" fill="#1A237E">"이것은 신의 뜻이다"</text>
  <line x1="56" y1="272" x2="284" y2="272" stroke="#C5CAE9" stroke-width="1"/>

  <!-- 비판 차단 -->
  <text x="56" y="292" font-size="10" font-weight="700" fill="#283593">비판 차단 논리</text>
  <text x="56" y="310" font-size="13" fill="#3F51B5">"신성 모독" · "이단"</text>
  <line x1="56" y1="320" x2="284" y2="320" stroke="#C5CAE9" stroke-width="1"/>

  <!-- 피해자 -->
  <text x="56" y="340" font-size="10" font-weight="700" fill="#283593">피해자</text>
  <text x="56" y="358" font-size="13" fill="#3F51B5">농민 · 농노</text>
  <line x1="56" y1="368" x2="284" y2="368" stroke="#C5CAE9" stroke-width="1"/>

