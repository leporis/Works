<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <filter id="ds"><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.10"/></filter>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1976D2"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="640" rx="12" fill="#FAFAFA"/>

  <!-- 제목 영역 -->
  <rect x="0" y="0" width="900" height="78" rx="12" fill="#1976D2"/>
  <rect x="0" y="40" width="900" height="38" fill="#1976D2"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">대항 권력의 형성 과정 (Countervailing Power)</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" font-weight="400" fill="#BBDEFB">『권력과 진보』 6-7장 · 어떻게 밴드왜건을 다시 작동시켰는가</text>

  <!-- ========== 4단계 카드 ========== -->
  <!-- 카드 폭 180, 간격 화살표 포함, x= 50, 260, 470, 680 -->

  <!-- 단계 1: 조직화 -->
  <rect x="40" y="100" width="180" height="130" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#ds)"/>
  <rect x="40" y="100" width="180" height="42" rx="12" fill="#42A5F5"/>
  <rect x="40" y="122" width="180" height="20" fill="#42A5F5"/>
  <text x="130" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">1단계</text>
  <text x="130" y="166" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">조직화</text>
  <text x="130" y="186" text-anchor="middle" font-size="12" fill="#1565C0">노동조합 결성</text>
  <text x="130" y="204" text-anchor="middle" font-size="12" fill="#1565C0">집합적 목소리 형성</text>
  <text x="130" y="222" text-anchor="middle" font-size="11" fill="#42A5F5">🤝</text>

  <!-- 화살표 1→2 -->
  <line x1="220" y1="165" x2="248" y2="165" stroke="#1976D2" stroke-width="2.5" marker-end="url(#ab)"/>

  <!-- 단계 2: 참정권 확대 -->
  <rect x="255" y="100" width="180" height="130" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#ds)"/>
  <rect x="255" y="100" width="180" height="42" rx="12" fill="#1E88E5"/>
  <rect x="255" y="122" width="180" height="20" fill="#1E88E5"/>
  <text x="345" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">2단계</text>
  <text x="345" y="166" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">참정권 확대</text>
  <text x="345" y="186" text-anchor="middle" font-size="12" fill="#1565C0">보통선거권 획득</text>
  <text x="345" y="204" text-anchor="middle" font-size="12" fill="#1565C0">정치적 발언권 확보</text>
  <text x="345" y="222" text-anchor="middle" font-size="11" fill="#1E88E5">🗳️</text>

  <!-- 화살표 2→3 -->
  <line x1="435" y1="165" x2="463" y2="165" stroke="#1976D2" stroke-width="2.5" marker-end="url(#ab)"/>

  <!-- 단계 3: 복지국가 건설 -->
  <rect x="470" y="100" width="180" height="130" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#ds)"/>
  <rect x="470" y="100" width="180" height="42" rx="12" fill="#1565C0"/>
  <rect x="470" y="122" width="180" height="20" fill="#1565C0"/>
  <text x="560" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">3단계</text>
  <text x="560" y="166" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">복지국가 건설</text>
  <text x="560" y="186" text-anchor="middle" font-size="12" fill="#1565C0">사회보장제도 도입</text>
  <text x="560" y="204" text-anchor="middle" font-size="12" fill="#1565C0">소득 재분배 시작</text>
  <text x="560" y="222" text-anchor="middle" font-size="11" fill="#1565C0">🏥</text>

  <!-- 화살표 3→4 -->
  <line x1="650" y1="165" x2="678" y2="165" stroke="#1976D2" stroke-width="2.5" marker-end="url(#ab)"/>

  <!-- 단계 4: 공교육 확대 -->
  <rect x="685" y="100" width="180" height="130" rx="12" fill="#E3F2FD" stroke="#0D47A1" stroke-width="2" filter="url(#ds)"/>
  <rect x="685" y="100" width="180" height="42" rx="12" fill="#0D47A1"/>
  <rect x="685" y="122" width="180" height="20" fill="#0D47A1"/>
  <text x="775" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">4단계</text>
  <text x="775" y="166" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">공교육 확대</text>
  <text x="775" y="186" text-anchor="middle" font-size="12" fill="#1565C0">인적자본 투자</text>
  <text x="775" y="204" text-anchor="middle" font-size="12" fill="#1565C0">기회의 평등 추구</text>
  <text x="775" y="222" text-anchor="middle" font-size="11" fill="#0D47A1">🎓</text>

  <!-- ========== 역사 사례 (카드 하단) ========== -->
  <text x="450" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#616161">역사적 사례</text>

  <!-- 사례 1 -->
  <rect x="40" y="262" width="180" height="76" rx="8" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="130" y="282" text-anchor="middle" font-size="11" fill="#424242">· 차티스트 운동 (1838~)</text>
  <text x="130" y="298" text-anchor="middle" font-size="11" fill="#424242">· 결사금지법 폐지 (1824)</text>
  <text x="130" y="314" text-anchor="middle" font-size="11" fill="#424242">· 노동조합 합법화</text>
  <text x="130" y="330" text-anchor="middle" font-size="10" fill="#9E9E9E">영국 1820~1850년대</text>

  <!-- 사례 2 -->
  <rect x="255" y="262" width="180" height="76" rx="8" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="345" y="282" text-anchor="middle" font-size="11" fill="#424242">· 1832 선거법 개혁</text>
  <text x="345" y="298" text-anchor="middle" font-size="11" fill="#424242">· 1867 제2차 개혁</text>
  <text x="345" y="314" text-anchor="middle" font-size="11" fill="#424242">· 1918 여성 참정권</text>
  <text x="345" y="330" text-anchor="middle" font-size="10" fill="#9E9E9E">영국 1832~1918년</text>

  <!-- 사례 3 -->
  <rect x="470" y="262" width="180" height="76" rx="8" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="560" y="282" text-anchor="middle" font-size="11" fill="#424242">· NHS 설립 (영국 1948)</text>
  <text x="560" y="298" text-anchor="middle" font-size="11" fill="#424242">· 뉴딜 정책 (미국 1930s)</text>
  <text x="560" y="314" text-anchor="middle" font-size="11" fill="#424242">· 비스마르크 사회보험</text>
  <text x="560" y="330" text-anchor="middle" font-size="10" fill="#9E9E9E">영·미·독 19~20세기</text>

  <!-- 사례 4 -->
  <rect x="685" y="262" width="180" height="76" rx="8" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="775" y="282" text-anchor="middle" font-size="11" fill="#424242">· 의무교육법 (1870~)</text>
  <text x="775" y="298" text-anchor="middle" font-size="11" fill="#424242">· GI Bill (미국 1944)</text>
  <text x="775" y="314" text-anchor="middle" font-size="11" fill="#424242">· 공립학교 체계 구축</text>
  <text x="775" y="330" text-anchor="middle" font-size="10" fill="#9E9E9E">영·미 19~20세기</text>

  <!-- ========== 결과 바: 공유된 번영 ========== -->
  <rect x="40" y="356" width="825" height="50" rx="10" fill="#388E3C" filter="url(#ds)"/>
  <text x="452" y="378" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">결과 :  "엥겔스의 일시정지" 종료  →  공유된 번영의 시대 (1945 ~ 1975)</text>
  <text x="452" y="398" text-anchor="middle" font-size="11" fill="#C8E6C9">GDP 성장의 혜택이 처음으로 다수 노동자에게 돌아간 30년</text>

  <!-- ========== 하단: 무임승차 문제 극복 ========== -->
  <line x1="40" y1="422" x2="860" y2="422" stroke="#E0E0E0" stroke-width="1"/>
  <text x="450" y="444" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">집합 행동의 딜레마 : 왜 개인은 혼자서 움직이지 않는가?</text>

  <!-- 4가지 극복 요인 카드 -->
  <rect x="60" y="458" width="180" height="60" rx="10" fill="#FFF3E0" stroke="#FFA000" stroke-width="1.5" filter="url(#ds)"/>
  <text x="150" y="483" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">① 공유된 정체성</text>
  <text x="150" y="502" text-anchor="middle" font-size="11" fill="#F57C00">"우리는 같은 처지다"</text>

  <rect x="260" y="458" width="180" height="60" rx="10" fill="#FFF3E0" stroke="#FFA000" stroke-width="1.5" filter="url(#ds)"/>
  <text x="350" y="483" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">② 위기 의식</text>
  <text x="350" y="502" text-anchor="middle" font-size="11" fill="#F57C00">"지금 행동하지 않으면"</text>

  <rect x="460" y="458" width="180" height="60" rx="10" fill="#FFF3E0" stroke="#FFA000" stroke-width="1.5" filter="url(#ds)"/>
  <text x="550" y="483" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">③ 리더십</text>
  <text x="550" y="502" text-anchor="middle" font-size="11" fill="#F57C00">"방향을 제시하는 사람"</text>

  <rect x="660" y="458" width="180" height="60" rx="10" fill="#FFF3E0" stroke="#FFA000" stroke-width="1.5" filter="url(#ds)"/>
  <text x="750" y="483" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">④ 소규모 성공</text>
  <text x="750" y="502" text-anchor="middle" font-size="11" fill="#F57C00">"작은 승리가 동력이 됨"</text>

  <!-- ========== 하단: 오늘날 적용 ========== -->
  <rect x="60" y="536" width="780" height="44" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="450" y="556" text-anchor="middle" font-size="12" font-weight="600" fill="#4A148C">오늘날의 대항 권력 후보 :  디지털 노동조합 · 알고리즘 감사 시민단체 · 데이터 협동조합 · AI 윤리 연구자</text>
  <text x="450" y="574" text-anchor="middle" font-size="11" fill="#7B1FA2">노동 플랫폼 라이더, EU AI법, 미국 FTC 반독점 소송 …</text>

  <!-- ========== 최하단: 핵심 질문 ========== -->
  <rect x="100" y="596" width="700" height="32" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="450" y="617" text-anchor="middle" font-size="12" font-weight="500" fill="#0D47A1">💡  디지털 시대의 '대항 권력'은 어떤 형태여야 하는가?  교사는 어디에 서야 하는가?</text>

</svg>