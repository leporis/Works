  <text x="207" y="212" font-size="10" font-weight="700" fill="#004D40">기술</text>
  <text x="207" y="228" font-size="12" fill="#00897B">풍차 · 물레방아</text>
  <text x="207" y="244" font-size="12" fill="#00897B">삼포식 농법</text>
  <line x1="207" y1="252" x2="343" y2="252" stroke="#B2DFDB" stroke-width="1"/>
  <text x="207" y="270" font-size="10" font-weight="700" fill="#004D40">잉여</text>
  <text x="207" y="286" font-size="12" fill="#00897B">농산물 증산</text>
  <line x1="207" y1="296" x2="343" y2="296" stroke="#B2DFDB" stroke-width="1"/>
  <text x="207" y="314" font-size="10" font-weight="700" fill="#004D40">독점자</text>
  <text x="207" y="330" font-size="12" fill="#00897B">영주 · 교회</text>
  <line x1="207" y1="340" x2="343" y2="340" stroke="#B2DFDB" stroke-width="1"/>
  <text x="207" y="358" font-size="10" font-weight="700" fill="#004D40">결과</text>
