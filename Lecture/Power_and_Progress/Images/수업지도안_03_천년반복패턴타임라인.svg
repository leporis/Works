  <text x="32" y="212" font-size="10" font-weight="700" fill="#283593">기술</text>
  <text x="32" y="228" font-size="12" fill="#3F51B5">관개 시스템</text>
  <text x="32" y="244" font-size="12" fill="#3F51B5">농경 기술</text>
  <line x1="32" y1="252" x2="168" y2="252" stroke="#C5CAE9" stroke-width="1"/>
  <text x="32" y="270" font-size="10" font-weight="700" fill="#283593">잉여</text>
  <text x="32" y="286" font-size="12" fill="#3F51B5">식량 잉여 생산</text>
  <line x1="32" y1="296" x2="168" y2="296" stroke="#C5CAE9" stroke-width="1"/>
  <text x="32" y="314" font-size="10" font-weight="700" fill="#283593">독점자</text>
  <text x="32" y="330" font-size="12" fill="#3F51B5">신전 · 궁전</text>
  <line x1="32" y1="340" x2="168" y2="340" stroke="#C5CAE9" stroke-width="1"/>
  <text x="32" y="358" font-size="10" font-weight="700" fill="#283593">결과</text>
  <text x="32" y="374" font-size="11" fill="#5C6BC0">농민은 세금·공물로</text>
  <text x="32" y="390" font-size="11" fill="#5C6BC0">잉여 대부분 상납</text>

  <!-- ========== 카드 2: 중세 유럽 (x=195, w=160) ========== -->
  <rect x="195" y="152" width="160" height="270" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="195" y="152" width="160" height="40" rx="10" fill="#00897B"/>
  <rect x="195" y="172" width="160" height="20" fill="#00897B"/>
