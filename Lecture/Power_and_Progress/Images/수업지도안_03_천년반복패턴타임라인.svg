  <text x="382" y="390" font-size="11" fill="#E65100">노동자 임금 100년 정체</text>

  <!-- ========== 카드 4: 운하 건설 (x=545, w=160) ========== -->
  <rect x="545" y="152" width="160" height="270" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5" filter="url(#ds)"/>
