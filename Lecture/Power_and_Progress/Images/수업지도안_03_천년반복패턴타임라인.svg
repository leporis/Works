<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <filter id="ds"><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.10"/></filter>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="580" rx="12" fill="#FAFAFA"/>

  <!-- 제목 영역 -->
  <rect x="0" y="0" width="900" height="78" rx="12" fill="#1976D2"/>
  <rect x="0" y="40" width="900" height="38" fill="#1976D2"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">기술 → 잉여 → 불평등 : 천 년간 반복된 패턴</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" font-weight="400" fill="#BBDEFB">『권력과 진보』 전체 · 천 년간 반복된 역사적 패턴</text>

  <!-- ========== 타임라인 축 ========== -->
  <!-- 카드 배치: x=20,195,370,545,720  w=160  gap=15  center=100,275,450,625,800 -->
  <line x1="40" y1="120" x2="860" y2="120" stroke="#1976D2" stroke-width="3" stroke-linecap="round"/>

  <!-- 시대 마커 5개 (카드 중심 정렬) -->
  <circle cx="100" cy="120" r="8" fill="#1A237E" stroke="#fff" stroke-width="2"/>
  <circle cx="275" cy="120" r="8" fill="#004D40" stroke="#fff" stroke-width="2"/>
  <circle cx="450" cy="120" r="8" fill="#E65100" stroke="#fff" stroke-width="2"/>
  <circle cx="625" cy="120" r="8" fill="#4A148C" stroke="#fff" stroke-width="2"/>
  <circle cx="800" cy="120" r="8" fill="#0D47A1" stroke="#fff" stroke-width="2"/>

  <!-- 시대 라벨 -->
  <text x="100" y="107" text-anchor="middle" font-size="10" font-weight="500" fill="#757575">BC 3000~</text>
  <text x="275" y="107" text-anchor="middle" font-size="10" font-weight="500" fill="#757575">11~14세기</text>
  <text x="450" y="107" text-anchor="middle" font-size="10" font-weight="500" fill="#757575">18~19세기</text>
  <text x="625" y="107" text-anchor="middle" font-size="10" font-weight="500" fill="#757575">19세기 말</text>
  <text x="800" y="107" text-anchor="middle" font-size="10" font-weight="500" fill="#757575">21세기</text>

  <!-- 연결선 (마커 → 카드) -->
  <line x1="100" y1="128" x2="100" y2="150" stroke="#1A237E" stroke-width="1.5"/>
  <line x1="275" y1="128" x2="275" y2="150" stroke="#004D40" stroke-width="1.5"/>
  <line x1="450" y1="128" x2="450" y2="150" stroke="#E65100" stroke-width="1.5"/>
  <line x1="625" y1="128" x2="625" y2="150" stroke="#4A148C" stroke-width="1.5"/>
  <line x1="800" y1="128" x2="800" y2="150" stroke="#0D47A1" stroke-width="1.5"/>

  <!-- ========== 카드 1: 메소포타미아 (x=20, w=160) ========== -->
  <rect x="20" y="152" width="160" height="270" rx="10" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="20" y="152" width="160" height="40" rx="10" fill="#3F51B5"/>
  <rect x="20" y="172" width="160" height="20" fill="#3F51B5"/>
