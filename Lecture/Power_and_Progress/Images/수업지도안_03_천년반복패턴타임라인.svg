  <text x="207" y="390" font-size="11" fill="#00897B">농민 삶 변화 없음</text>

  <!-- ========== 카드 3: 산업혁명 (x=370, w=160) ========== -->
  <rect x="370" y="152" width="160" height="270" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" filter="url(#ds)"/>
