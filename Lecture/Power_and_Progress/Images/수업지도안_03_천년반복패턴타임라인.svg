  <text x="557" y="212" font-size="10" font-weight="700" fill="#4A148C">기술</text>
  <text x="557" y="228" font-size="12" fill="#7B1FA2">수에즈 · 파나마 운하</text>
  <text x="557" y="244" font-size="12" fill="#7B1FA2">토목 기술</text>
  <line x1="557" y1="252" x2="693" y2="252" stroke="#CE93D8" stroke-width="1"/>
  <text x="557" y="270" font-size="10" font-weight="700" fill="#4A148C">잉여</text>
  <text x="557" y="286" font-size="12" fill="#7B1FA2">무역 이익 · 통행료</text>
  <line x1="557" y1="296" x2="693" y2="296" stroke="#CE93D8" stroke-width="1"/>
  <text x="557" y="314" font-size="10" font-weight="700" fill="#4A148C">독점자</text>
  <text x="557" y="330" font-size="12" fill="#7B1FA2">레셉스 · 투자자</text>
  <line x1="557" y1="340" x2="693" y2="340" stroke="#CE93D8" stroke-width="1"/>
  <text x="557" y="358" font-size="10" font-weight="700" fill="#4A148C">결과</text>
  <text x="557" y="374" font-size="11" fill="#7B1FA2">2만 명 이상 사망</text>
  <text x="557" y="390" font-size="11" fill="#7B1FA2">비전 과잉 확신의 비극</text>

  <!-- ========== 카드 5: 디지털 혁명 (x=720, w=160) ========== -->
  <rect x="720" y="152" width="160" height="270" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="720" y="152" width="160" height="40" rx="10" fill="#1565C0"/>
  <rect x="720" y="172" width="160" height="20" fill="#1565C0"/>
  <text x="800" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">💻 디지털</text>
  <text x="732" y="212" font-size="10" font-weight="700" fill="#0D47A1">기술</text>
  <text x="732" y="228" font-size="12" fill="#1565C0">플랫폼 · AI</text>
  <text x="732" y="244" font-size="12" fill="#1565C0">소셜 미디어</text>
  <line x1="732" y1="252" x2="868" y2="252" stroke="#90CAF9" stroke-width="1"/>
  <text x="732" y="270" font-size="10" font-weight="700" fill="#0D47A1">잉여</text>
  <text x="732" y="286" font-size="12" fill="#1565C0">데이터 · 주의력</text>
  <line x1="732" y1="296" x2="868" y2="296" stroke="#90CAF9" stroke-width="1"/>
  <text x="732" y="314" font-size="10" font-weight="700" fill="#0D47A1">독점자</text>
  <text x="732" y="330" font-size="12" fill="#1565C0">빅테크 기업</text>
  <line x1="732" y1="340" x2="868" y2="340" stroke="#90CAF9" stroke-width="1"/>
  <text x="732" y="358" font-size="10" font-weight="700" fill="#0D47A1">결과</text>
  <text x="732" y="374" font-size="11" fill="#1565C0">상위 1% 부 집중</text>
  <text x="732" y="390" font-size="11" fill="#1565C0">감시 자본주의</text>

  <!-- ========== 반복 화살표 (각 카드 중심 정렬) ========== -->
  <text x="100" y="436" text-anchor="middle" font-size="18" fill="#1976D2">↓</text>
  <text x="275" y="436" text-anchor="middle" font-size="18" fill="#1976D2">↓</text>
  <text x="450" y="436" text-anchor="middle" font-size="18" fill="#1976D2">↓</text>
  <text x="625" y="436" text-anchor="middle" font-size="18" fill="#1976D2">↓</text>
  <text x="800" y="436" text-anchor="middle" font-size="18" fill="#1976D2">↓</text>

  <!-- ========== 공통 패턴 강조 박스 (카드 양끝 정렬: x=20, w=860) ========== -->
  <rect x="20" y="440" width="860" height="56" rx="10" fill="#0D47A1" filter="url(#ds)"/>
  <text x="450" y="464" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">공통 패턴 :  기술 혁신  →  잉여 생산  →  소수가 독점</text>
  <text x="450" y="484" text-anchor="middle" font-size="12" fill="#90CAF9">"기술이 바뀌어도, 불평등의 구조는 반복된다"</text>

  <!-- ========== 최하단: 핵심 질문 (카드 양끝 정렬: x=20, w=860) ========== -->
  <rect x="20" y="514" width="860" height="44" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="450" y="536" text-anchor="middle" font-size="13" font-weight="500" fill="#0D47A1">💡  디지털 시대의 '잉여'는 무엇이며, 누가 독점하고 있는가?</text>
  <text x="450" y="552" text-anchor="middle" font-size="11" fill="#1565C0">오늘날 '데이터'는 디지털 시대의 '식량 잉여'에 해당하는가?</text>

</svg>
