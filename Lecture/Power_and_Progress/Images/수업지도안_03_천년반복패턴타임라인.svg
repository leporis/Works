  <text x="382" y="212" font-size="10" font-weight="700" fill="#BF360C">기술</text>
  <text x="382" y="228" font-size="12" fill="#E65100">방적기 · 증기기관</text>
  <text x="382" y="244" font-size="12" fill="#E65100">공장 시스템</text>
  <line x1="382" y1="252" x2="518" y2="252" stroke="#FFCC80" stroke-width="1"/>
  <text x="382" y="270" font-size="10" font-weight="700" fill="#BF360C">잉여</text>
  <text x="382" y="286" font-size="12" fill="#E65100">공산품 대량 생산</text>
  <line x1="382" y1="296" x2="518" y2="296" stroke="#FFCC80" stroke-width="1"/>
  <text x="382" y="314" font-size="10" font-weight="700" fill="#BF360C">독점자</text>
  <text x="382" y="330" font-size="12" fill="#E65100">공장주 · 은행가</text>
  <line x1="382" y1="340" x2="518" y2="340" stroke="#FFCC80" stroke-width="1"/>
  <text x="382" y="358" font-size="10" font-weight="700" fill="#BF360C">결과</text>
