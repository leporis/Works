<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <filter id="ds"><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.10"/></filter>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E65100"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2E7D32"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1976D2"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="660" rx="12" fill="#FAFAFA"/>

  <!-- 제목 영역 -->
  <rect x="0" y="0" width="900" height="78" rx="12" fill="#1976D2"/>
  <rect x="0" y="40" width="900" height="38" fill="#1976D2"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">같은 AI, 두 갈래 길 — 자동화 vs 인간 보완</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" font-weight="400" fill="#BBDEFB">『권력과 진보』 9장 · Automation Bias</text>

  <!-- ========== 상단: AI 기술 도입 노드 ========== -->
  <rect x="340" y="98" width="220" height="52" rx="26" fill="#1976D2" stroke="#0D47A1" stroke-width="2" filter="url(#ds)"/>
  <text x="450" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">🤖 AI 기술 도입</text>

  <!-- 분기 화살표 -->
  <line x1="380" y1="150" x2="250" y2="188" stroke="#E65100" stroke-width="2.5" marker-end="url(#ao)"/>
  <line x1="520" y1="150" x2="650" y2="188" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#ag)"/>

  <!-- 분기점 라벨 -->
  <text x="300" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#E65100">경로 A</text>
  <text x="600" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32">경로 B</text>

  <!-- ========== 좌측: 자동화 (대체) ========== -->
  <rect x="80" y="194" width="280" height="240" rx="14" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#ds)"/>

  <!-- 헤더 -->
  <rect x="80" y="194" width="280" height="48" rx="14" fill="#E65100"/>
  <rect x="80" y="222" width="280" height="20" fill="#E65100"/>
  <text x="220" y="220" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">⚙️ 자동화 (대체)</text>
  <text x="220" y="238" text-anchor="middle" font-size="11" fill="#FFE0B2">Automation — 인간을 기계로 대체</text>

  <!-- 내용 -->
  <text x="100" y="268" font-size="10" font-weight="700" fill="#BF360C">방향</text>
  <text x="160" y="268" font-size="13" fill="#E65100">인간 → 기계</text>
  <line x1="100" y1="278" x2="340" y2="278" stroke="#FFCC80" stroke-width="1"/>

  <text x="100" y="296" font-size="10" font-weight="700" fill="#BF360C">목표</text>
  <text x="160" y="296" font-size="13" fill="#E65100">비용 절감 · 효율 극대화</text>
  <line x1="100" y1="306" x2="340" y2="306" stroke="#FFCC80" stroke-width="1"/>

  <text x="100" y="324" font-size="10" font-weight="700" fill="#BF360C">결과</text>
  <text x="160" y="324" font-size="13" fill="#E65100">일자리 감소 · 임금 하락</text>
  <line x1="100" y1="336" x2="340" y2="336" stroke="#FFCC80" stroke-width="1"/>

  <text x="100" y="356" font-size="10" font-weight="700" fill="#BF360C">사례</text>
  <text x="100" y="374" font-size="12" fill="#E65100">· 셀프 계산대 (캐셔 대체)</text>
  <text x="100" y="392" font-size="12" fill="#E65100">· 챗봇 고객센터 (상담원 대체)</text>
  <text x="100" y="410" font-size="12" fill="#E65100">· 무인 물류 창고 (작업자 대체)</text>

  <!-- 좌측 결과 노드 -->
  <line x1="220" y1="434" x2="220" y2="458" stroke="#E65100" stroke-width="2.5" marker-end="url(#ao)"/>
  <rect x="110" y="462" width="220" height="52" rx="10" fill="#E65100" filter="url(#ds)"/>
  <text x="220" y="486" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">📉 밴드왜건 끊김</text>
  <text x="220" y="504" text-anchor="middle" font-size="11" fill="#FFE0B2">불평등 심화 · 다수의 삶 악화</text>

  <!-- ========== 우측: 인간 보완 (증강) ========== -->
  <rect x="540" y="194" width="280" height="240" rx="14" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" filter="url(#ds)"/>

  <!-- 헤더 -->
  <rect x="540" y="194" width="280" height="48" rx="14" fill="#388E3C"/>
  <rect x="540" y="222" width="280" height="20" fill="#388E3C"/>
  <text x="680" y="220" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">🤝 인간 보완 (증강)</text>
  <text x="680" y="238" text-anchor="middle" font-size="11" fill="#C8E6C9">Augmentation — 인간의 역량을 강화</text>

  <!-- 내용 -->
  <text x="560" y="268" font-size="10" font-weight="700" fill="#1B5E20">방향</text>
  <text x="620" y="268" font-size="13" fill="#2E7D32">인간 + 기계</text>
  <line x1="560" y1="278" x2="800" y2="278" stroke="#A5D6A7" stroke-width="1"/>

  <text x="560" y="296" font-size="10" font-weight="700" fill="#1B5E20">목표</text>
  <text x="620" y="296" font-size="13" fill="#2E7D32">역량 강화 · 새 업무 창출</text>
  <line x1="560" y1="306" x2="800" y2="306" stroke="#A5D6A7" stroke-width="1"/>

  <text x="560" y="324" font-size="10" font-weight="700" fill="#1B5E20">결과</text>
  <text x="620" y="324" font-size="13" fill="#2E7D32">생산성 ↑ · 일자리 질 향상</text>
  <line x1="560" y1="336" x2="800" y2="336" stroke="#A5D6A7" stroke-width="1"/>

  <text x="560" y="356" font-size="10" font-weight="700" fill="#1B5E20">사례</text>
  <text x="560" y="374" font-size="12" fill="#2E7D32">· 수술 보조 로봇 (의사 역량 ↑)</text>
  <text x="560" y="392" font-size="12" fill="#2E7D32">· AI 진단 보조 (의료 접근성 ↑)</text>
  <text x="560" y="410" font-size="12" fill="#2E7D32">· 일본 도요타 (인간 중심 자동화)</text>

  <!-- 우측 결과 노드 -->
  <line x1="680" y1="434" x2="680" y2="458" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#ag)"/>
  <rect x="570" y="462" width="220" height="52" rx="10" fill="#388E3C" filter="url(#ds)"/>
  <text x="680" y="486" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">📈 밴드왜건 작동</text>
  <text x="680" y="504" text-anchor="middle" font-size="11" fill="#C8E6C9">공유된 번영 · 모두의 삶 개선</text>

  <!-- ========== 중앙 VS 표시 ========== -->
  <circle cx="450" cy="330" r="22" fill="#fff" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="450" y="336" text-anchor="middle" font-size="14" font-weight="700" fill="#757575">VS</text>

  <!-- ========== 하단: 자동화 편향의 이유 ========== -->
  <line x1="40" y1="530" x2="860" y2="530" stroke="#E0E0E0" stroke-width="1"/>
  <text x="450" y="552" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">왜 기업은 자동화(대체)에 편향되는가? — 자동화 편향(Automation Bias)의 3가지 이유</text>

  <!-- 이유 카드 1 -->
  <rect x="60" y="564" width="250" height="52" rx="10" fill="#FFF3E0" stroke="#FFA000" stroke-width="1.5" filter="url(#ds)"/>
  <text x="185" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">① 비용 절감이 즉시 보인다</text>
  <text x="185" y="604" text-anchor="middle" font-size="11" fill="#F57C00">인건비 삭감 → 분기 이익 상승</text>

  <!-- 이유 카드 2 -->
  <rect x="325" y="564" width="250" height="52" rx="10" fill="#FFF3E0" stroke="#FFA000" stroke-width="1.5" filter="url(#ds)"/>
  <text x="450" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">② 경영진 인센티브 구조</text>
  <text x="450" y="604" text-anchor="middle" font-size="11" fill="#F57C00">주가 상승 → 보너스 · 스톡옵션</text>

  <!-- 이유 카드 3 -->
  <rect x="590" y="564" width="250" height="52" rx="10" fill="#FFF3E0" stroke="#FFA000" stroke-width="1.5" filter="url(#ds)"/>
  <text x="715" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">③ 세금 체계의 왜곡</text>
  <text x="715" y="604" text-anchor="middle" font-size="11" fill="#F57C00">노동에는 세금, 기계에는 감면</text>

  <!-- ========== 최하단: 핵심 질문 ========== -->
  <rect x="100" y="628" width="700" height="24" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="450" y="645" text-anchor="middle" font-size="12" font-weight="500" fill="#0D47A1">💡  AI 교육에서 "교사를 대체하는 것"과 "교사를 보완하는 것"의 차이는 무엇인가?</text>

</svg>