<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#999" />
    </marker>
  </defs>

  <rect width="800" height="450" fill="#fff" />

  <!-- 왼쪽: 전통적 프로그래밍 -->
  <rect x="20" y="20" width="370" height="360" rx="15" fill="#F8F9FA" stroke="#1976D2" stroke-width="2" />
  <text x="205" y="55" font-family="Noto Sans CJK KR, sans-serif" font-size="18" font-weight="700" fill="#1976D2" text-anchor="middle">전통적 프로그래밍</text>

  <rect x="50" y="80" width="130" height="60" rx="8" fill="#E3F2FD" stroke="#1976D2" />
  <text x="115" y="105" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="700" text-anchor="middle">규칙</text>
  <text x="115" y="125" font-family="Noto Sans CJK KR, sans-serif" font-size="12" fill="#666" text-anchor="middle">(사람이 직접 작성)</text>

  <rect x="230" y="80" width="130" height="60" rx="8" fill="#E3F2FD" stroke="#1976D2" />
  <text x="295" y="105" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="700" text-anchor="middle">데이터</text>
  <text x="295" y="125" font-family="Noto Sans CJK KR, sans-serif" font-size="12" fill="#666" text-anchor="middle">(입력값)</text>

  <!-- 흐름 화살표: 규칙+데이터 → 컴퓨터 -->
  <path d="M115 140 L115 165 L195 165 L195 190" fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M295 140 L295 165 L215 165 L215 190" fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="140" y="190" width="130" height="60" rx="8" fill="#ECEFF1" stroke="#455A64" />
  <text x="205" y="215" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="700" text-anchor="middle">컴퓨터</text>
  <text x="205" y="235" font-family="Noto Sans CJK KR, sans-serif" font-size="12" fill="#666" text-anchor="middle">(명령 실행)</text>

  <!-- 컴퓨터 → 결과 -->
  <path d="M205 250 L205 280" fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="140" y="283" width="130" height="45" rx="8" fill="#fff" stroke="#1976D2" stroke-dasharray="4" />
  <text x="205" y="311" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="700" fill="#1976D2" text-anchor="middle">결과 (Answers)</text>

  <text x="205" y="356" font-family="Noto Sans CJK KR, sans-serif" font-size="13" font-style="italic" fill="#546E7A" text-anchor="middle">"이 사진은 고양이입니다."</text>

  <!-- 오른쪽: 기계학습 -->
  <rect x="410" y="20" width="370" height="360" rx="15" fill="#F1F8E9" stroke="#388E3C" stroke-width="2" />
  <text x="595" y="55" font-family="Noto Sans CJK KR, sans-serif" font-size="18" font-weight="700" fill="#388E3C" text-anchor="middle">기계학습 (ML)</text>

  <rect x="440" y="80" width="130" height="60" rx="8" fill="#E8F5E9" stroke="#388E3C" />
  <text x="505" y="105" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="700" text-anchor="middle">데이터</text>
  <text x="505" y="125" font-family="Noto Sans CJK KR, sans-serif" font-size="12" fill="#666" text-anchor="middle">(입력값)</text>

  <rect x="620" y="80" width="130" height="60" rx="8" fill="#FFF3E0" stroke="#EF6C00" />
  <text x="685" y="105" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="700" fill="#E65100" text-anchor="middle">정답</text>
  <text x="685" y="125" font-family="Noto Sans CJK KR, sans-serif" font-size="12" fill="#666" text-anchor="middle">(레이블/Labels)</text>

  <!-- 흐름 화살표: 데이터+정답 → 컴퓨터 -->
  <path d="M505 140 L505 165 L585 165 L585 190" fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M685 140 L685 165 L605 165 L605 190" fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="530" y="190" width="130" height="60" rx="8" fill="#fff" stroke="#388E3C" stroke-width="2" />
  <text x="595" y="215" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="700" text-anchor="middle">컴퓨터</text>
  <text x="595" y="235" font-family="Noto Sans CJK KR, sans-serif" font-size="12" fill="#388E3C" text-anchor="middle">(학습/Learning)</text>

  <!-- 컴퓨터 → 모델 -->
  <path d="M595 250 L595 280" fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="505" y="283" width="180" height="45" rx="8" fill="#388E3C" />
  <text x="595" y="311" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">모델 (학습된 규칙)</text>

  <text x="595" y="356" font-family="Noto Sans CJK KR, sans-serif" font-size="13" font-style="italic" fill="#2E7D32" text-anchor="middle">"스스로 특징을 파악하여 규칙 생성"</text>

  <!-- 하단 핵심 메시지 -->
  <rect x="50" y="400" width="700" height="40" rx="20" fill="#424242" />
  <text x="400" y="426" font-family="Noto Sans CJK KR, sans-serif" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">핵심: 규칙을 사람이 만드느냐 vs 데이터에서 컴퓨터가 찾아내느냐</text>
</svg>
