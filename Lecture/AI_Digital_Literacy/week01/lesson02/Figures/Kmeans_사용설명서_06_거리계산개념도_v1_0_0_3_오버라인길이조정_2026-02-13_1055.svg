<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
      .math { font-family: 'Noto Serif', 'Times New Roman', serif; }
      .math-var { font-family: 'Noto Serif', 'Times New Roman', serif; font-style: italic; }
    </style>
  </defs>

  <rect width="800" height="300" rx="12" fill="url(#bgGrad)"/>
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#333">📐 유클리드 거리 계산 개념도</text>
  <text x="400" y="46" text-anchor="middle" font-size="9" fill="#795548">K-Means에서 데이터 점과 중심점 사이 거리를 측정하는 방법</text>

  <!-- 좌측: 좌표 평면 시각화 -->
  <rect x="30" y="60" width="340" height="220" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <text x="200" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#E53935">📊 좌표 평면 위의 두 점</text>

  <!-- 축 -->
  <line x1="80" y1="240" x2="340" y2="240" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="100" x2="80" y2="240" stroke="#999" stroke-width="1"/>
  <text x="210" y="258" text-anchor="middle" font-size="8" fill="#666">X 좌표</text>
  <text x="60" y="170" text-anchor="middle" font-size="8" fill="#666" transform="rotate(-90, 60, 170)">Y 좌표</text>

  <!-- 눈금 -->
  <text x="80" y="254" text-anchor="middle" font-size="7" fill="#999">0</text>
  <text x="145" y="254" text-anchor="middle" font-size="7" fill="#999">2</text>
  <text x="210" y="254" text-anchor="middle" font-size="7" fill="#999">4</text>
  <text x="275" y="254" text-anchor="middle" font-size="7" fill="#999">6</text>
  <text x="340" y="254" text-anchor="middle" font-size="7" fill="#999">8</text>
  <text x="72" y="207" text-anchor="end" font-size="7" fill="#999">1</text>
  <text x="72" y="174" text-anchor="end" font-size="7" fill="#999">2</text>
  <text x="72" y="141" text-anchor="end" font-size="7" fill="#999">3</text>
  <text x="72" y="108" text-anchor="end" font-size="7" fill="#999">4</text>

  <!-- 점 P1 (데이터) -->
  <circle cx="145" cy="173" r="7" fill="#1976D2" stroke="#FFF" stroke-width="2"/>
  <text x="145" y="163" text-anchor="middle" font-size="8" font-weight="600" fill="#1976D2">P₁(2, 2)</text>
  <text x="145" y="190" text-anchor="middle" font-size="7" fill="#888">데이터 점</text>

  <!-- 점 P2 (중심점) -->
  <circle cx="275" cy="107" r="8" fill="#E53935" stroke="#FFF" stroke-width="2"/>
  <text x="296" y="100" font-size="8" font-weight="600" fill="#E53935">P₂(6, 4)</text>
  <text x="275" y="124" text-anchor="middle" font-size="7" fill="#888">중심점</text>

  <!-- 거리선 -->
  <line x1="145" y1="173" x2="275" y2="107" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="224" y="134" text-anchor="middle" font-size="9" font-weight="600" fill="#FF9800">d = ?</text>

  <!-- 직각삼각형 보조선 -->
  <line x1="145" y1="173" x2="275" y2="173" stroke="#CCC" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="275" y1="173" x2="275" y2="107" stroke="#CCC" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="267" y="165" width="8" height="8" fill="none" stroke="#CCC" stroke-width="1"/>

  <text x="210" y="186" text-anchor="middle" font-size="7" fill="#999">Δx = 6−2 = 4</text>
  <text x="295" y="145" font-size="7" fill="#999">Δy = 4−2 = 2</text>

  <!-- 우측: 수식 및 계산 -->
  <rect x="400" y="60" width="380" height="130" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="400" y="60" width="380" height="26" rx="10" fill="#FFF8E1"/>
  <rect x="400" y="80" width="380" height="6" fill="#FFF8E1"/>
  <text x="590" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#E65100">📐 유클리드 거리 수식</text>

  <!-- 1행: d(P₁, P₂) = √{(x₁−x₂)² + (y₁−y₂)²} -->
  <text x="415" y="108" font-size="13" font-weight="700" fill="#1976D2" class="math-var">
    <tspan>d</tspan><tspan font-style="normal">(</tspan><tspan>P</tspan><tspan font-size="9" dy="3">1</tspan><tspan dy="-3">, </tspan><tspan>P</tspan><tspan font-size="9" dy="3">2</tspan><tspan dy="-3" font-style="normal">)</tspan><tspan> = </tspan>
  </text>
  <text x="505" y="110" font-size="22" fill="#1976D2" class="math">√</text>
  <line x1="519" y1="93" x2="698" y2="93" stroke="#1976D2" stroke-width="1.8"/>
  <text x="610" y="108" text-anchor="middle" font-size="12" fill="#1976D2" class="math-var">
    <tspan font-style="normal">(</tspan><tspan>x</tspan><tspan font-size="8" dy="3">1</tspan><tspan dy="-3"> − </tspan><tspan>x</tspan><tspan font-size="8" dy="3">2</tspan><tspan dy="-3" font-style="normal">)</tspan><tspan font-size="9" dy="-5">2</tspan><tspan dy="5"> + </tspan><tspan font-style="normal">(</tspan><tspan>y</tspan><tspan font-size="8" dy="3">1</tspan><tspan dy="-3"> − </tspan><tspan>y</tspan><tspan font-size="8" dy="3">2</tspan><tspan dy="-3" font-style="normal">)</tspan><tspan font-size="9" dy="-5">2</tspan>
  </text>

  <!-- 2행: = √{(2−6)² + (2−4)²} -->
  <text x="490" y="136" font-size="12" fill="#555" class="math">= </text>
  <text x="505" y="138" font-size="20" fill="#555" class="math">√</text>
  <line x1="519" y1="123" x2="682" y2="123" stroke="#555" stroke-width="1.2"/>
  <text x="600" y="136" text-anchor="middle" font-size="11" fill="#555" class="math">
    <tspan font-style="normal">(2 − 6)</tspan><tspan font-size="8" dy="-4">2</tspan><tspan dy="4"> + </tspan><tspan font-style="normal">(2 − 4)</tspan><tspan font-size="8" dy="-4">2</tspan>
  </text>

  <!-- 3행: = √(16 + 4) = √20 ≈ 4.47 -->
  <text x="490" y="162" font-size="12" fill="#555" class="math">= </text>
  <text x="505" y="164" font-size="20" fill="#555" class="math">√</text>
  <line x1="519" y1="149" x2="588" y2="149" stroke="#555" stroke-width="1.2"/>
  <text x="554" y="162" text-anchor="middle" font-size="11" fill="#555" class="math">(16 + 4)</text>
  <text x="610" y="162" font-size="11" fill="#555" class="math"> = </text>
  <text x="635" y="164" font-size="20" fill="#555" class="math">√</text>
  <line x1="653" y1="149" x2="672" y2="149" stroke="#555" stroke-width="1.2"/>
  <text x="663" y="162" text-anchor="middle" font-size="11" fill="#555" class="math">20</text>
  <text x="684" y="162" font-size="11" fill="#555" class="math"> ≈ <tspan font-weight="700" fill="#E53935">4.47</tspan></text>

  <text x="590" y="180" text-anchor="middle" font-size="8" fill="#888">피타고라스 정리와 동일!</text>

  <!-- 우측 하단: K-Means에서의 활용 -->
  <rect x="400" y="200" width="380" height="84" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="400" y="200" width="380" height="24" rx="10" fill="#E8F5E9"/>
  <rect x="400" y="218" width="380" height="6" fill="#E8F5E9"/>
  <text x="590" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#2E7D32">🎯 K-Means에서의 활용</text>

  <text x="420" y="244" font-size="8" fill="#555">• 각 데이터 점에서 모든 중심점까지 거리 계산</text>
  <text x="420" y="260" font-size="8" fill="#555">• 가장 가까운 중심점의 클러스터에 할당</text>
  <text x="420" y="276" font-size="8" fill="#555">• Inertia = 모든 (데이터↔소속 중심점 거리)²의 합</text>
</svg>
