  <rect x="60" y="408" width="100" height="20" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="70" y="422" font-size="8" fill="#333">부리 길이</text>
  <text x="152" y="422" text-anchor="end" font-size="8" fill="#AAA">▼</text>
  <text x="180" y="418" font-size="8" fill="#555">Y축:</text>
  <rect x="200" y="408" width="100" height="20" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="210" y="422" font-size="8" fill="#333">날개 길이</text>
  <text x="292" y="422" text-anchor="end" font-size="8" fill="#AAA">▼</text>

  <!-- 결정 경계 영역 스케치 -->
  <rect x="330" y="400" width="430" height="78" rx="6" fill="#F0F4F8"/>
  <rect x="340" y="408" width="140" height="62" rx="4" fill="#C8E6C9" opacity="0.4"/>
  <rect x="484" y="408" width="130" height="62" rx="4" fill="#BBDEFB" opacity="0.4"/>
  <rect x="618" y="408" width="130" height="62" rx="4" fill="#E1BEE7" opacity="0.4"/>
  <text x="410" y="444" text-anchor="middle" font-size="8" font-weight="600" fill="#2E7D32">아델리</text>
  <text x="549" y="444" text-anchor="middle" font-size="8" font-weight="600" fill="#1565C0">턱끈</text>
  <text x="683" y="444" text-anchor="middle" font-size="8" font-weight="600" fill="#7B1FA2">젠투</text>

