  <circle cx="390" cy="445" r="3" fill="#2E7D32" opacity="0.6"/>
  <circle cx="420" cy="425" r="3" fill="#2E7D32" opacity="0.6"/>
  <circle cx="510" cy="435" r="3" fill="#1565C0" opacity="0.6"/>
  <circle cx="540" cy="450" r="3" fill="#1565C0" opacity="0.6"/>
  <circle cx="560" cy="420" r="3" fill="#1565C0" opacity="0.6"/>
  <circle cx="650" cy="440" r="3" fill="#7B1FA2" opacity="0.6"/>
  <circle cx="680" cy="425" r="3" fill="#7B1FA2" opacity="0.6"/>
  <circle cx="710" cy="450" r="3" fill="#7B1FA2" opacity="0.6"/>
</svg>
