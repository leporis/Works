<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFECB3"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.06"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="500" rx="12" fill="url(#bgGrad)"/>

  <!-- 헤더 -->
  <rect x="16" y="12" width="768" height="52" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="360" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1565C0">🐧 펭귄 의사결정트리 시뮬레이터</text>
  <rect x="570" y="23" width="62" height="20" rx="10" fill="#1565C0"/>
  <text x="601" y="37" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">v1.3.0.0</text>
  <!-- 데이터셋 선택 -->
  <rect x="650" y="22" width="120" height="22" rx="6" fill="#FFF" stroke="#BBDEFB" stroke-width="1"/>
  <text x="660" y="37" font-size="8" fill="#555">🐧 펭귄 데이터셋</text>
  <text x="762" y="37" text-anchor="end" font-size="8" fill="#AAA">▼</text>

  <!-- 모드 탭 -->
  <rect x="230" y="72" width="150" height="30" rx="15" fill="#1565C0" filter="url(#shadowLight)"/>
  <text x="305" y="91" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">🌿 학습 &amp; 분석</text>
  <rect x="390" y="72" width="130" height="30" rx="15" fill="#FFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadowLight)"/>
  <text x="455" y="91" text-anchor="middle" font-size="11" font-weight="500" fill="#888">🔍 추론 모드</text>

  <!-- 레이블 -->
