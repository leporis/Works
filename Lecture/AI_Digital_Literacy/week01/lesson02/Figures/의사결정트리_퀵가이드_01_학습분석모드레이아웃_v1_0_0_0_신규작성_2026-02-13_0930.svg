  <circle cx="100" cy="176" r="6" fill="#1565C0"/>
  <text x="100" y="196" text-anchor="middle" font-size="9" font-weight="600" fill="#1565C0">3</text>

  <!-- 최소 샘플 수 -->
  <text x="28" y="216" font-size="9" fill="#555">최소 샘플 수</text>
  <rect x="28" y="222" width="156" height="4" rx="2" fill="#E0E0E0"/>
