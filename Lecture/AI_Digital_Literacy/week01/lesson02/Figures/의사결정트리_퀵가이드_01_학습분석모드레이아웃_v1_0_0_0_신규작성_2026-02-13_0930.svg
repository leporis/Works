  <text x="750" y="262" text-anchor="end" font-size="9" font-weight="700" fill="#2E7D32">97.8%</text>
  <text x="610" y="280" font-size="9" fill="#555">테스트 정확도:</text>
  <text x="750" y="280" text-anchor="end" font-size="9" font-weight="700" fill="#1565C0">95.6%</text>

