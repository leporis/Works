  <!-- 루트 노드 -->
  <rect x="346" y="150" width="90" height="30" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="391" y="169" text-anchor="middle" font-size="7" font-weight="600" fill="#1565C0">부리길이 ≤ 42.3</text>
