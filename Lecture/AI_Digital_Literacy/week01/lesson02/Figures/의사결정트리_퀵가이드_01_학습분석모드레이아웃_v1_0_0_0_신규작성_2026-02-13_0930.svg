  <text x="28" y="268" font-size="9" fill="#555">사용할 특성</text>
  <text x="28" y="286" font-size="8" fill="#333">☑ 부리 길이</text>
  <text x="28" y="300" font-size="8" fill="#333">☑ 부리 깊이</text>
  <text x="28" y="314" font-size="8" fill="#333">☑ 날개 길이</text>
  <text x="28" y="328" font-size="8" fill="#333">☑ 체질량</text>

