  <rect x="206" y="118" width="370" height="240" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <text x="391" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#333">🌿 의사결정트리 시각화</text>

