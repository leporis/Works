  <rect x="16" y="118" width="180" height="240" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="16" y="118" width="180" height="32" rx="10" fill="#E3F2FD"/>
  <rect x="16" y="140" width="180" height="10" fill="#E3F2FD"/>
  <text x="106" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">⚙️ 트리 설정</text>

