<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFECB3"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.06"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="400" rx="12" fill="url(#bgGrad)"/>

  <!-- 헤더 -->
  <rect x="16" y="12" width="768" height="52" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#7B1FA2">🎯 KNN 분류 시뮬레이터</text>
  <rect x="600" y="23" width="62" height="20" rx="10" fill="#7B1FA2"/>
  <text x="631" y="37" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">v1.2.0.1</text>
  <text x="400" y="52" text-anchor="middle" font-size="9" fill="#795548">추론 모드 — 새 데이터 분류</text>

  <!-- 모드 탭 -->
  <rect x="250" y="72" width="130" height="30" rx="15" fill="#FFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadowLight)"/>
  <text x="315" y="91" text-anchor="middle" font-size="11" font-weight="500" fill="#888">🧠 학습 모드</text>
  <rect x="390" y="72" width="130" height="30" rx="15" fill="#7B1FA2" filter="url(#shadowLight)"/>
  <text x="455" y="91" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">🔮 추론 모드</text>

  <!-- 레이블 -->
  <rect x="16" y="98" width="180" height="16" rx="8" fill="#7B1FA2" opacity="0.9"/>
  <text x="106" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">① 입력값</text>
  <rect x="206" y="98" width="370" height="16" rx="8" fill="#FF5722" opacity="0.9"/>
  <text x="391" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">② 예측 시각화</text>
  <rect x="586" y="98" width="198" height="16" rx="8" fill="#2E7D32" opacity="0.9"/>
  <text x="685" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">③ 예측 결과</text>

  <!-- 좌측: 입력값 -->
  <rect x="16" y="118" width="180" height="270" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="16" y="118" width="180" height="32" rx="10" fill="#F3E5F5"/>
  <rect x="16" y="140" width="180" height="10" fill="#F3E5F5"/>
  <text x="106" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#7B1FA2">🔢 특성 입력</text>

  <!-- 특성1 슬라이더 -->
  <text x="28" y="170" font-size="9" fill="#555">특성 1 (X1)</text>
  <rect x="28" y="176" width="156" height="4" rx="2" fill="#E0E0E0"/>
  <circle cx="90" cy="178" r="6" fill="#7B1FA2"/>
  <text x="90" y="198" text-anchor="middle" font-size="9" font-weight="600" fill="#7B1FA2">3.5</text>

  <!-- 특성2 슬라이더 -->
  <text x="28" y="218" font-size="9" fill="#555">특성 2 (X2)</text>
  <rect x="28" y="224" width="156" height="4" rx="2" fill="#E0E0E0"/>
  <circle cx="120" cy="226" r="6" fill="#7B1FA2"/>
  <text x="120" y="246" text-anchor="middle" font-size="9" font-weight="600" fill="#7B1FA2">2.1</text>

  <!-- 입력 좌표 표시 -->
  <rect x="28" y="262" width="156" height="40" rx="6" fill="#F3E5F5"/>
  <text x="106" y="278" text-anchor="middle" font-size="9" font-weight="600" fill="#7B1FA2">입력 좌표</text>
  <text x="106" y="294" text-anchor="middle" font-size="8" fill="#555">(3.5, 2.1)</text>

  <!-- K값 표시 -->
  <rect x="28" y="312" width="156" height="36" rx="6" fill="#FFF8E1"/>
  <text x="106" y="328" text-anchor="middle" font-size="8" font-weight="600" fill="#E65100">K값</text>
  <text x="106" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">5</text>

  <!-- 중앙: 예측 시각화 -->
  <rect x="206" y="118" width="370" height="270" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <text x="391" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#333">📊 예측 시각화 (K 이웃 표시)</text>

  <!-- 기존 데이터 -->
  <circle cx="260" cy="220" r="4" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="280" cy="240" r="4" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="250" cy="250" r="4" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="350" cy="290" r="4" fill="#FF5722" opacity="0.5"/>
  <circle cx="370" cy="270" r="4" fill="#FF5722" opacity="0.5"/>
  <circle cx="340" cy="300" r="4" fill="#FF5722" opacity="0.5"/>
  <circle cx="460" cy="200" r="4" fill="#2E7D32" opacity="0.5"/>
  <circle cx="480" cy="220" r="4" fill="#2E7D32" opacity="0.5"/>
  <circle cx="470" cy="190" r="4" fill="#2E7D32" opacity="0.5"/>

  <!-- K 이웃 강조 (점선 원) -->
  <circle cx="340" cy="245" r="60" fill="none" stroke="#FFC107" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- 예측점 (노란별) -->
  <circle cx="340" cy="245" r="8" fill="#FFC107" stroke="#E65100" stroke-width="2"/>
  <text x="340" y="249" text-anchor="middle" font-size="8" font-weight="700" fill="#333">★</text>

  <!-- 이웃 연결선 -->
  <line x1="340" y1="245" x2="280" y2="240" stroke="#FFC107" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="340" y1="245" x2="350" y2="290" stroke="#FFC107" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="340" y1="245" x2="370" y2="270" stroke="#FFC107" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="340" y1="245" x2="260" y2="220" stroke="#FFC107" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="340" y1="245" x2="250" y2="250" stroke="#FFC107" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 범례 -->
  <circle cx="230" cy="365" r="5" fill="#7B1FA2"/>
  <text x="240" y="369" font-size="8" fill="#555">클래스 A</text>
  <circle cx="310" cy="365" r="5" fill="#FF5722"/>
  <text x="320" y="369" font-size="8" fill="#555">클래스 B</text>
  <circle cx="390" cy="365" r="5" fill="#2E7D32"/>
  <text x="400" y="369" font-size="8" fill="#555">클래스 C</text>
  <circle cx="470" cy="365" r="5" fill="#FFC107" stroke="#E65100" stroke-width="1"/>
  <text x="480" y="369" font-size="8" fill="#555">예측점</text>

  <!-- 우측: 예측 결과 -->
  <rect x="586" y="118" width="198" height="270" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="586" y="118" width="198" height="32" rx="10" fill="#E8F5E9"/>
  <rect x="586" y="140" width="198" height="10" fill="#E8F5E9"/>
  <text x="685" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#2E7D32">🎯 예측 결과</text>

  <!-- 분류 결과 -->
  <rect x="600" y="162" width="170" height="50" rx="8" fill="#F3E5F5"/>
  <text x="685" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#7B1FA2">분류 결과</text>
  <text x="685" y="202" text-anchor="middle" font-size="16" font-weight="700" fill="#7B1FA2">클래스 A</text>

  <!-- 이웃 정보 -->
  <rect x="600" y="222" width="170" height="90" rx="8" fill="#FFF8E1"/>
  <text x="685" y="240" text-anchor="middle" font-size="9" font-weight="600" fill="#E65100">5개 이웃 분석</text>
  <text x="610" y="258" font-size="8" fill="#555">🟣 클래스 A: 3개 (60%)</text>
  <text x="610" y="274" font-size="8" fill="#555">🔴 클래스 B: 2개 (40%)</text>
  <text x="610" y="290" font-size="8" fill="#555">🟢 클래스 C: 0개 (0%)</text>
  <text x="610" y="304" font-size="7" fill="#999">최근접 거리: 0.42</text>

  <!-- 전환 버튼 -->
  <rect x="608" y="324" width="168" height="28" rx="6" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="692" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#7B1FA2">🧠 학습 모드로 전환</text>
</svg>
