<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="500" rx="12" fill="url(#bgGrad)"/>
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#E53935">🎬 AI 사과 농장 이야기 — 전체 레이아웃</text>

  <!-- 무대 영역 -->
  <rect x="60" y="44" width="680" height="230" rx="10" fill="#FFFDE7" stroke="#E53935" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="44" width="680" height="26" rx="10" fill="#E53935" opacity="0.1"/>
  <text x="400" y="61" text-anchor="middle" font-size="10" font-weight="600" fill="#E53935">🎬 무대 영역 (Stage)</text>

  <!-- 장면 제목 -->
  <rect x="260" y="78" width="280" height="36" rx="8" fill="#FFF" filter="url(#shadow)"/>
  <text x="400" y="95" text-anchor="middle" font-size="10" font-weight="700" fill="#333">1장: 농장의 아침 🌅</text>
  <text x="400" y="108" text-anchor="middle" font-size="8" fill="#888">사과 수확의 시작</text>

  <!-- 일러스트 영역 -->
  <rect x="280" y="120" width="240" height="60" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="155" text-anchor="middle" font-size="9" fill="#43A047">🖼️ 일러스트 / SVG 다이어그램</text>

  <!-- 캐릭터 -->
  <text x="290" y="202" font-size="11" fill="#333">👨‍🌾 농부 김사과</text>
  <text x="440" y="202" font-size="11" fill="#333">🤖 AI 로봇 알파</text>

  <!-- 기술 뱃지 -->
  <rect x="310" y="210" width="56" height="18" rx="9" fill="#E3F2FD"/>
  <text x="338" y="223" text-anchor="middle" font-size="7" font-weight="600" fill="#1565C0">CNN</text>
  <rect x="370" y="210" width="56" height="18" rx="9" fill="#FFF8E1"/>
  <text x="398" y="223" text-anchor="middle" font-size="7" font-weight="600" fill="#E65100">지도학습</text>

  <!-- 레이블 뱃지 -->
  <rect x="30" y="50" width="24" height="16" rx="4" fill="#E53935"/>
  <text x="42" y="62" text-anchor="middle" font-size="8" font-weight="700" fill="#FFF">①</text>

  <!-- 내레이션 영역 -->
  <rect x="60" y="280" width="680" height="50" rx="10" fill="#FFF" stroke="#FF9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="302" font-size="9" fill="#E65100">📖 내레이터</text>
  <text x="200" y="302" font-size="9" fill="#333">"김사과 농부는 올해도 풍성한 수확을 기대하며..."</text>
  <text x="700" y="302" text-anchor="end" font-size="8" fill="#999">(3/9)</text>
  <rect x="30" y="286" width="24" height="16" rx="4" fill="#FF9800"/>
  <text x="42" y="298" text-anchor="middle" font-size="8" font-weight="700" fill="#FFF">②</text>

  <!-- 대사 이미지 영역 -->
  <rect x="60" y="340" width="680" height="70" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" stroke-dasharray="4,3" filter="url(#shadow)"/>
  <text x="400" y="380" text-anchor="middle" font-size="9" fill="#7B1FA2">🖼️ 대사 관련 SVG 이미지 (상황에 따라 표시)</text>
  <rect x="30" y="346" width="24" height="16" rx="4" fill="#7B1FA2"/>
  <text x="42" y="358" text-anchor="middle" font-size="8" font-weight="700" fill="#FFF">③</text>

  <!-- 컨트롤 바 -->
  <rect x="60" y="420" width="680" height="60" rx="10" fill="#FFF" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="426" width="24" height="16" rx="4" fill="#546E7A"/>
  <text x="42" y="438" text-anchor="middle" font-size="8" font-weight="700" fill="#FFF">④</text>

  <!-- 컨트롤 요소 -->
  <rect x="80" y="435" width="32" height="28" rx="6" fill="#E53935"/>
  <text x="96" y="453" text-anchor="middle" font-size="12" fill="#FFF">▶</text>
  <rect x="120" y="435" width="32" height="28" rx="6" fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>
  <text x="136" y="453" text-anchor="middle" font-size="12" fill="#888">🔊</text>

  <!-- 프로그레스 바 -->
  <rect x="164" y="444" width="300" height="10" rx="5" fill="#E0E0E0"/>
  <rect x="164" y="444" width="100" height="10" rx="5" fill="#E53935"/>
  <circle cx="264" cy="449" r="6" fill="#E53935" stroke="#FFF" stroke-width="1.5"/>
  <text x="180" y="468" font-size="7" fill="#888">프롤로그</text>
  <text x="430" y="468" font-size="7" fill="#888">0:15 / 0:30</text>

  <!-- 속도 조절 -->
  <rect x="490" y="438" width="70" height="22" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="525" y="453" text-anchor="middle" font-size="8" fill="#555">속도 보통 ▾</text>

  <!-- 장면 도트 -->
  <circle cx="590" cy="449" r="5" fill="#E53935"/>
  <circle cx="608" cy="449" r="5" fill="#E53935"/>
  <circle cx="626" cy="449" r="5" fill="#E53935"/>
  <circle cx="644" cy="449" r="5" fill="#E0E0E0"/>
  <circle cx="662" cy="449" r="5" fill="#E0E0E0"/>
  <circle cx="680" cy="449" r="5" fill="#E0E0E0"/>
  <circle cx="698" cy="449" r="5" fill="#E0E0E0"/>

  <!-- TTS 상태 -->
  <rect x="715" y="438" width="16" height="16" rx="8" fill="#4CAF50"/>
  <text x="720" y="462" font-size="7" fill="#888">준비됨</text>
</svg>
