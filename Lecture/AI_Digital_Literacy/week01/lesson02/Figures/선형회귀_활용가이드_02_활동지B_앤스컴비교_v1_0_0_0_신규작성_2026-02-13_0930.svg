<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="300" rx="12" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#333">📝 활동지 B: 앤스컴 데이터 탐구 — 같은 숫자, 다른 그림</text>
  <text x="400" y="40" text-anchor="middle" font-size="8" fill="#888">이름: ______________</text>

  <!-- 미션 박스 -->
  <rect x="30" y="50" width="740" height="22" rx="4" fill="#E3F2FD"/>
  <text x="400" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#1565C0">📋 미션: 4개 앤스컴 데이터를 차례로 로드하고, R²와 w를 기록한 뒤 산점도를 직접 그려보세요.</text>

  <!-- 테이블 헤더 -->
  <rect x="30" y="82" width="740" height="24" rx="0" fill="#1976D2"/>
  <text x="90" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">데이터셋</text>
  <text x="190" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">R²</text>
  <text x="268" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">w (기울기)</text>
  <text x="370" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">b (절편)</text>
  <text x="565" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">산점도 패턴 (직접 간단히 스케치)</text>

  <!-- 구분선들 -->
  <line x1="148" y1="82" x2="148" y2="262" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="228" y1="82" x2="228" y2="262" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="310" y1="82" x2="310" y2="262" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="428" y1="82" x2="428" y2="262" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Row 1: 앤스컴 1 -->
  <rect x="30" y="106" width="740" height="38" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="90" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1976D2">앤스컴 1</text>
  <rect x="160" y="114" width="50" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="240" y="114" width="50" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="340" y="114" width="66" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <!-- 스케치 영역 -->
  <rect x="438" y="110" width="322" height="30" rx="4" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8" stroke-dasharray="4,2"/>

  <!-- Row 2: 앤스컴 2 -->
  <rect x="30" y="144" width="740" height="38" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="90" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#1976D2">앤스컴 2</text>
  <rect x="160" y="152" width="50" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="240" y="152" width="50" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="340" y="152" width="66" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="438" y="148" width="322" height="30" rx="4" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8" stroke-dasharray="4,2"/>

  <!-- Row 3: 앤스컴 3 -->
  <rect x="30" y="182" width="740" height="38" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="90" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#1976D2">앤스컴 3</text>
  <rect x="160" y="190" width="50" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="240" y="190" width="50" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="340" y="190" width="66" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="438" y="186" width="322" height="30" rx="4" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8" stroke-dasharray="4,2"/>

  <!-- Row 4: 앤스컴 4 -->
  <rect x="30" y="220" width="740" height="38" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="90" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#1976D2">앤스컴 4</text>
  <rect x="160" y="228" width="50" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="240" y="228" width="50" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="340" y="228" width="66" height="20" rx="3" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
  <rect x="438" y="224" width="322" height="30" rx="4" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8" stroke-dasharray="4,2"/>

  <!-- 하단: 발견 -->
  <rect x="30" y="268" width="740" height="24" rx="4" fill="#FFF8E1"/>
  <text x="50" y="284" font-size="8" font-weight="600" fill="#E65100">⭐ 발견:</text>
  <text x="100" y="284" font-size="8" fill="#555">R²와 w가 거의 같은데, 산점도는 (같다 / 다르다). 이것이 의미하는 것은? ________________________</text>
</svg>
