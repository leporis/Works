  <text x="28" y="300" font-size="8" fill="#888">데이터: 60개 · 클래스: 3개</text>
  <rect x="28" y="308" width="156" height="48" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="28" y1="322" x2="184" y2="322" stroke="#E0E0E0" stroke-width="1"/>
  <text x="60" y="319" text-anchor="middle" font-size="7" font-weight="600" fill="#555">X1</text>
