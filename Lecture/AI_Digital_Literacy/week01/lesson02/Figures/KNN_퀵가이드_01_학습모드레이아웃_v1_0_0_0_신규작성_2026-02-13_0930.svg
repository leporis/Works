  <rect x="206" y="98" width="370" height="16" rx="8" fill="#FF5722" opacity="0.9"/>
  <text x="391" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">② 분류 시각화</text>
  <rect x="586" y="98" width="198" height="16" rx="8" fill="#2E7D32" opacity="0.9"/>
  <text x="685" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">③ 학습 설정</text>

