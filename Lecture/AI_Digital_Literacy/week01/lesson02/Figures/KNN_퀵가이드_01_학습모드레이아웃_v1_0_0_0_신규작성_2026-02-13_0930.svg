  <path d="M220,240 Q320,190 400,240 Q450,260 520,170" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M300,155 Q350,230 420,285" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 하단 중앙: 모델 성능 -->
  <rect x="206" y="304" width="370" height="94" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="206" y="290" width="370" height="16" rx="8" fill="#E65100" opacity="0.85"/>
  <text x="391" y="301" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">④ 모델 성능</text>
  <rect x="206" y="304" width="370" height="28" rx="10" fill="#F3E5F5"/>
  <rect x="206" y="322" width="370" height="10" fill="#F3E5F5"/>
  <text x="391" y="323" text-anchor="middle" font-size="11" font-weight="600" fill="#7B1FA2">📊 모델 성능</text>

  <text x="220" y="350" font-size="9" font-weight="600" fill="#333">정확도:</text>
  <text x="270" y="350" font-size="9" fill="#2E7D32">95.0%</text>
  <text x="220" y="368" font-size="9" font-weight="600" fill="#333">혼동 행렬:</text>
  <!-- 미니 혼동행렬 -->
  <rect x="296" y="340" width="22" height="16" rx="2" fill="#E8F5E9"/>
  <text x="307" y="352" text-anchor="middle" font-size="7" font-weight="600" fill="#2E7D32">10</text>
  <rect x="320" y="340" width="22" height="16" rx="2" fill="#FFEBEE"/>
  <text x="331" y="352" text-anchor="middle" font-size="7" fill="#C62828">0</text>
  <rect x="344" y="340" width="22" height="16" rx="2" fill="#FFEBEE"/>
  <text x="355" y="352" text-anchor="middle" font-size="7" fill="#C62828">1</text>
  <rect x="296" y="358" width="22" height="16" rx="2" fill="#FFEBEE"/>
  <text x="307" y="370" text-anchor="middle" font-size="7" fill="#C62828">0</text>
  <rect x="320" y="358" width="22" height="16" rx="2" fill="#E8F5E9"/>
  <text x="331" y="370" text-anchor="middle" font-size="7" font-weight="600" fill="#2E7D32">9</text>
  <rect x="344" y="358" width="22" height="16" rx="2" fill="#FFEBEE"/>
  <text x="355" y="370" text-anchor="middle" font-size="7" fill="#C62828">0</text>

  <text x="420" y="350" font-size="9" font-weight="600" fill="#333">K값:</text>
  <text x="445" y="350" font-size="9" fill="#7B1FA2">5</text>
  <text x="420" y="368" font-size="9" font-weight="600" fill="#333">거리:</text>
  <text x="450" y="368" font-size="9" fill="#7B1FA2">유클리드</text>

  <!-- 우측: 학습 설정 -->
  <rect x="586" y="118" width="198" height="280" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="586" y="118" width="198" height="32" rx="10" fill="#E8F5E9"/>
  <rect x="586" y="140" width="198" height="10" fill="#E8F5E9"/>
  <text x="685" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#2E7D32">⚙️ 학습 설정</text>

  <!-- K값 슬라이더 -->
  <text x="600" y="168" font-size="9" fill="#555">K값 (이웃 수)</text>
  <rect x="600" y="174" width="170" height="4" rx="2" fill="#E0E0E0"/>
  <circle cx="660" cy="176" r="6" fill="#7B1FA2"/>
  <text x="660" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#7B1FA2">5</text>

  <!-- 거리 측정 -->
  <text x="600" y="218" font-size="9" fill="#555">거리 측정 방식</text>
  <rect x="600" y="224" width="170" height="24" rx="4" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="610" y="240" font-size="9" fill="#333">유클리드</text>
  <text x="762" y="240" text-anchor="end" font-size="9" fill="#AAA">▼</text>

  <!-- 데이터 분할 -->
  <text x="600" y="270" font-size="9" fill="#555">🔀 데이터 분할 80:20</text>
  <rect x="600" y="278" width="136" height="10" rx="3" fill="#7B1FA2"/>
  <rect x="736" y="278" width="34" height="10" rx="3" fill="#FF5722"/>
  <text x="668" y="286" text-anchor="middle" font-size="7" font-weight="600" fill="#FFF">훈련</text>
  <text x="753" y="286" text-anchor="middle" font-size="7" font-weight="600" fill="#FFF">테스트</text>

