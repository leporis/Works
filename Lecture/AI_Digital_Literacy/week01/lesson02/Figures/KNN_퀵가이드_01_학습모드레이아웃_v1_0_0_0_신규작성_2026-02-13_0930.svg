  <circle cx="275" cy="215" r="4" fill="#7B1FA2" opacity="0.7"/>
  <circle cx="250" cy="225" r="4" fill="#7B1FA2" opacity="0.7"/>
  <circle cx="280" cy="190" r="4" fill="#7B1FA2" opacity="0.7"/>
  <circle cx="350" cy="260" r="4" fill="#FF5722" opacity="0.7"/>
  <circle cx="370" cy="245" r="4" fill="#FF5722" opacity="0.7"/>
  <circle cx="340" cy="270" r="4" fill="#FF5722" opacity="0.7"/>
  <circle cx="365" cy="275" r="4" fill="#FF5722" opacity="0.7"/>
  <circle cx="460" cy="180" r="4" fill="#2E7D32" opacity="0.7"/>
