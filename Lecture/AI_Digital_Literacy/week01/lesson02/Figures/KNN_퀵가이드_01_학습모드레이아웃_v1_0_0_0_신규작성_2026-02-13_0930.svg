  <rect x="16" y="118" width="180" height="280" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="16" y="118" width="180" height="32" rx="10" fill="#F3E5F5"/>
  <rect x="16" y="140" width="180" height="10" fill="#F3E5F5"/>
  <text x="106" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#7B1FA2">📋 데이터 설정</text>

