  <text x="692" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">⚡ 학습 실행</text>

  <rect x="608" y="352" width="168" height="26" rx="6" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="692" y="369" text-anchor="middle" font-size="10" fill="#888">🗑️ 초기화</text>
