  <rect x="28" y="188" width="70" height="22" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="63" y="203" text-anchor="middle" font-size="8" fill="#7B1FA2">🍎 과일</text>
  <rect x="104" y="188" width="70" height="22" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="139" y="203" text-anchor="middle" font-size="8" fill="#7B1FA2">🐧 동물</text>
  <rect x="28" y="216" width="70" height="22" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="63" y="231" text-anchor="middle" font-size="8" fill="#7B1FA2">🌸 꽃</text>
  <rect x="104" y="216" width="70" height="22" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
