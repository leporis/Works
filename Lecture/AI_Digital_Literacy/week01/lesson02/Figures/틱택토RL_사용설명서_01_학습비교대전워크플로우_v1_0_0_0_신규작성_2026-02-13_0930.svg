<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#666"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5C6BC0"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="400" rx="12" fill="url(#bgGrad)"/>
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#333">🤖 RL 틱택토 — 전체 사용 워크플로우</text>
  <text x="400" y="46" text-anchor="middle" font-size="9" fill="#795548">학습 → 에이전트 비교 → 사람 대전 → AI 대전까지의 흐름</text>

  <!-- Phase 1: 기본 학습 -->
  <rect x="20" y="62" width="180" height="130" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="20" y="62" width="180" height="26" rx="10" fill="#E8EAF6"/>
  <rect x="20" y="82" width="180" height="6" fill="#E8EAF6"/>
  <text x="110" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#5C6BC0">① 기본 학습</text>

  <text x="36" y="106" font-size="8" fill="#555">🔄 자기대국 선택</text>
  <text x="36" y="122" font-size="8" fill="#555">⚡ 속도: 1ms (최대)</text>
  <text x="36" y="138" font-size="8" fill="#555">▶️ 학습 시작</text>

  <rect x="36" y="148" width="148" height="30" rx="4" fill="#E8EAF6" opacity="0.5"/>
  <text x="110" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#5C6BC0">5,000판 → 20,000판 → 50,000판+</text>
  <text x="110" y="174" text-anchor="middle" font-size="6" fill="#888">🌱초기 → 📚학습 → 🏆숙련</text>

  <line x1="200" y1="127" x2="226" y2="127" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: 에이전트 비교 -->
  <rect x="228" y="62" width="180" height="130" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="228" y="62" width="180" height="26" rx="10" fill="#E0F2F1"/>
  <rect x="228" y="82" width="180" height="6" fill="#E0F2F1"/>
  <text x="318" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#26A69A">② 에이전트 비교</text>

  <text x="244" y="106" font-size="8" fill="#555">📤 모델 A 내보내기</text>
  <text x="244" y="122" font-size="8" fill="#555">🗑️ 초기화 → 파라미터 변경</text>
  <text x="244" y="138" font-size="8" fill="#555">동일 조건 학습 → 📤 모델 B</text>

  <rect x="244" y="148" width="148" height="30" rx="4" fill="#E0F2F1" opacity="0.5"/>
  <text x="318" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#26A69A">승률·강도·등급 비교 분석</text>
  <text x="318" y="174" text-anchor="middle" font-size="6" fill="#888">예: α=0.3 vs α=0.1</text>

  <line x1="408" y1="127" x2="434" y2="127" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: 사람 대전 -->
  <rect x="436" y="62" width="170" height="130" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="436" y="62" width="170" height="26" rx="10" fill="#FFF3E0"/>
  <rect x="436" y="82" width="170" height="6" fill="#FFF3E0"/>
  <text x="521" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#FF9800">③ 사람 대전</text>

  <text x="452" y="106" font-size="8" fill="#555">👤 사람 대전 진입</text>
  <text x="452" y="122" font-size="8" fill="#555">🔵X 또는 🔴O 선택</text>
  <text x="452" y="138" font-size="8" fill="#555">빈 칸 클릭으로 착수</text>

  <rect x="452" y="148" width="138" height="30" rx="4" fill="#FFF3E0" opacity="0.5"/>
  <text x="521" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#E65100">Q-값 히트맵으로</text>
  <text x="521" y="174" text-anchor="middle" font-size="6" fill="#888">AI 판단 근거 관찰</text>

  <line x1="606" y1="127" x2="632" y2="127" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: AI 대전 -->
  <rect x="634" y="62" width="146" height="130" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="634" y="62" width="146" height="26" rx="10" fill="#F3E5F5"/>
  <rect x="634" y="82" width="146" height="6" fill="#F3E5F5"/>
  <text x="707" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#7B1FA2">④ AI 대전</text>

  <text x="650" y="106" font-size="8" fill="#555">⚔️ AI vs AI</text>
  <text x="650" y="122" font-size="8" fill="#555">서로 다른 학습</text>
  <text x="650" y="138" font-size="8" fill="#555">에이전트 대결</text>

  <rect x="650" y="148" width="114" height="30" rx="4" fill="#F3E5F5" opacity="0.5"/>
  <text x="707" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#7B1FA2">실력 차이 관찰</text>
  <text x="707" y="174" text-anchor="middle" font-size="6" fill="#888">📋 보고서 비교</text>

  <!-- 하단: 상세 학습 워크플로우 -->
  <rect x="20" y="210" width="760" height="170" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <text x="400" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#333">📋 상세 기본 학습 워크플로우</text>

  <!-- 7 steps -->
  <rect x="36" y="248" width="94" height="56" rx="6" fill="#E8EAF6"/>
  <text x="83" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#5C6BC0">STEP 1</text>
  <text x="83" y="280" text-anchor="middle" font-size="7" fill="#555">페이지 열기</text>
  <text x="83" y="292" text-anchor="middle" font-size="6" fill="#888">자동 저장 로드</text>

  <line x1="130" y1="276" x2="142" y2="276" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="144" y="248" width="80" height="56" rx="6" fill="#E8EAF6"/>
  <text x="184" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#5C6BC0">STEP 2</text>
  <text x="184" y="280" text-anchor="middle" font-size="7" fill="#555">학습 방식</text>
  <text x="184" y="292" text-anchor="middle" font-size="6" fill="#888">🔄 자기대국</text>

  <line x1="224" y1="276" x2="236" y2="276" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="238" y="248" width="80" height="56" rx="6" fill="#E8EAF6"/>
  <text x="278" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#5C6BC0">STEP 3</text>
  <text x="278" y="280" text-anchor="middle" font-size="7" fill="#555">속도 설정</text>
  <text x="278" y="292" text-anchor="middle" font-size="6" fill="#888">1ms 최고속</text>

  <line x1="318" y1="276" x2="330" y2="276" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="332" y="248" width="80" height="56" rx="6" fill="#E0F2F1"/>
  <text x="372" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#26A69A">STEP 4</text>
  <text x="372" y="280" text-anchor="middle" font-size="7" fill="#555">▶️ 학습</text>
  <text x="372" y="292" text-anchor="middle" font-size="6" fill="#888">5,000판</text>

  <line x1="412" y1="276" x2="424" y2="276" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="426" y="248" width="80" height="56" rx="6" fill="#E0F2F1"/>
  <text x="466" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#26A69A">STEP 5</text>
  <text x="466" y="280" text-anchor="middle" font-size="7" fill="#555">차트 관찰</text>
  <text x="466" y="292" text-anchor="middle" font-size="6" fill="#888">20,000판</text>

  <line x1="506" y1="276" x2="518" y2="276" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="520" y="248" width="100" height="56" rx="6" fill="#FFF3E0"/>
  <text x="570" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#FF9800">STEP 6</text>
  <text x="570" y="280" text-anchor="middle" font-size="7" fill="#555">👤 사람 대전</text>
  <text x="570" y="292" text-anchor="middle" font-size="6" fill="#888">AI 실력 확인</text>

  <line x1="620" y1="276" x2="632" y2="276" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="634" y="248" width="132" height="56" rx="6" fill="#F3E5F5"/>
  <text x="700" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#7B1FA2">STEP 7</text>
  <text x="700" y="280" text-anchor="middle" font-size="7" fill="#555">🏆 50,000판+ 숙련</text>
  <text x="700" y="292" text-anchor="middle" font-size="6" fill="#888">최종 등급 확인</text>

  <!-- 하단 안내 -->
  <rect x="60" y="320" width="680" height="42" rx="8" fill="#FFF8E1" opacity="0.6"/>
  <text x="400" y="340" text-anchor="middle" font-size="8" fill="#795548">💡 학습 중 대시보드에서 승률·Q-상태 수·탐험률 변화를 실시간 관찰할 수 있습니다.</text>
  <text x="400" y="354" text-anchor="middle" font-size="7" fill="#999">💾 파일 내보내기/가져오기로 학습 결과를 저장하고 비교 실험에 활용하세요.</text>
</svg>
