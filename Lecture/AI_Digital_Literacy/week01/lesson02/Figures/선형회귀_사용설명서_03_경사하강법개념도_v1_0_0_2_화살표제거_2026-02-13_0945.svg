<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#666"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#1976D2"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="400" rx="12" fill="url(#bgGrad)"/>
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#333">📉 경사 하강법 (Gradient Descent) 개념도</text>
  <text x="400" y="46" text-anchor="middle" font-size="9" fill="#795548">손실 함수의 기울기를 따라 최솟값을 찾아가는 최적화 과정</text>

  <!-- 좌측: 손실 곡면 시각화 -->
  <rect x="30" y="60" width="340" height="230" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <text x="200" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#1976D2">📉 손실 함수 곡면</text>

  <!-- 손실 곡선 (U자형) -->
  <path d="M80,250 Q120,240 140,220 Q165,185 200,140 Q220,120 240,130 Q280,160 310,220 Q325,240 340,250" fill="none" stroke="#1976D2" stroke-width="2.5"/>

  <!-- 축 라벨 -->
  <line x1="70" y1="256" x2="350" y2="256" stroke="#999" stroke-width="1"/>
  <line x1="70" y1="100" x2="70" y2="256" stroke="#999" stroke-width="1"/>
  <text x="210" y="274" text-anchor="middle" font-size="8" fill="#666">가중치 (w)</text>
  <text x="50" y="178" text-anchor="middle" font-size="8" fill="#666" transform="rotate(-90, 50, 178)">MSE 손실</text>

  <!-- 경사 하강 경로: 점들 -->
  <circle cx="120" cy="232" r="5" fill="#F44336"/>
  <text x="120" y="224" text-anchor="middle" font-size="7" font-weight="600" fill="#F44336">시작</text>

  <circle cx="160" cy="192" r="4" fill="#FF9800"/>

  <circle cx="190" cy="148" r="4" fill="#FFC107"/>

  <circle cx="213" cy="128" r="6" fill="#4CAF50" stroke="#FFF" stroke-width="2"/>
  <text x="213" y="118" text-anchor="middle" font-size="7" font-weight="600" fill="#2E7D32">최솟값 ✓</text>

  <!-- 우측 상단: 수식 -->
  <rect x="400" y="60" width="380" height="130" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <text x="590" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#1976D2">📐 핵심 수식</text>

  <text x="420" y="104" font-size="9" font-weight="600" fill="#333">모델:</text>
  <text x="490" y="104" font-size="9" fill="#1976D2">ŷ = w × x̂ + b</text>

  <text x="420" y="124" font-size="9" font-weight="600" fill="#333">손실:</text>
  <text x="490" y="124" font-size="9" fill="#1976D2">MSE = (1/n) × Σ(ŷ − y)²</text>

  <text x="420" y="148" font-size="9" font-weight="600" fill="#333">기울기:</text>
  <text x="490" y="148" font-size="9" fill="#555">∂MSE/∂w = (1/n) × Σ(error × x̂)</text>

  <text x="420" y="168" font-size="9" font-weight="600" fill="#333">업데이트:</text>
  <text x="490" y="168" font-size="9" fill="#E53935">w ← w − lr × ∂MSE/∂w</text>
  <text x="490" y="182" font-size="9" fill="#E53935">b ← b − lr × ∂MSE/∂b</text>

  <!-- 우측 하단: 학습률 영향 비교 -->
  <rect x="400" y="200" width="380" height="90" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <text x="590" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#FF9800">⚙️ 학습률(lr)에 따른 차이</text>

  <!-- 작은 학습률 -->
  <rect x="416" y="234" width="110" height="44" rx="6" fill="#E3F2FD"/>
  <text x="471" y="250" text-anchor="middle" font-size="8" font-weight="600" fill="#1565C0">lr = 0.001 (작음)</text>
  <text x="471" y="264" text-anchor="middle" font-size="7" fill="#555">느리게 수렴 🐌</text>
  <text x="471" y="274" text-anchor="middle" font-size="6" fill="#999">안정적이지만 오래 걸림</text>

  <!-- 적절한 학습률 -->
  <rect x="536" y="234" width="110" height="44" rx="6" fill="#E8F5E9"/>
  <text x="591" y="250" text-anchor="middle" font-size="8" font-weight="600" fill="#2E7D32">lr = 0.01 (적절)</text>
  <text x="591" y="264" text-anchor="middle" font-size="7" fill="#555">빠르게 수렴 ✅</text>
  <text x="591" y="274" text-anchor="middle" font-size="6" fill="#999">효율적인 학습</text>

  <!-- 큰 학습률 -->
  <rect x="656" y="234" width="110" height="44" rx="6" fill="#FFEBEE"/>
  <text x="711" y="250" text-anchor="middle" font-size="8" font-weight="600" fill="#C62828">lr = 0.1 (큼)</text>
  <text x="711" y="264" text-anchor="middle" font-size="7" fill="#555">발산 위험 💥</text>
  <text x="711" y="274" text-anchor="middle" font-size="6" fill="#999">손실이 튀어오름</text>

  <!-- 하단: 역정규화 -->
  <rect x="30" y="302" width="740" height="80" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <text x="400" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#333">🔄 역정규화 — 학습 결과를 원래 스케일로 변환</text>

  <text x="60" y="348" font-size="9" fill="#555">정규화 학습:</text>
  <text x="160" y="348" font-size="9" fill="#1976D2">x̂ = (x − μx) / σx,  ŷ = (y − μy) / σy</text>

  <text x="60" y="370" font-size="9" fill="#555">역변환:</text>
  <text x="160" y="370" font-size="9" fill="#E53935" font-weight="600">wReal = w × σy / σx</text>
  <text x="400" y="370" font-size="9" fill="#E53935" font-weight="600">bReal = b × σy + μy − wReal × μx</text>
</svg>
