<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#666"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="300" rx="12" fill="url(#bgGrad)"/>
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#333">🎨 K-Means — 추론 모드 워크플로우</text>
  <text x="400" y="46" text-anchor="middle" font-size="9" fill="#795548">학습 완료 후 새 데이터의 클러스터 할당</text>
  <rect x="75" y="70" width="140" height="80" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="75" y="70" width="140" height="24" rx="10" fill="#2E7D32" opacity="0.15"/>
  <rect x="75" y="86" width="140" height="8" fill="#2E7D32" opacity="0.15"/>
  <text x="145" y="87" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">STEP 1</text>
  <text x="145" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#333">① 학습 확인</text>
  <text x="145" y="128" text-anchor="middle" font-size="7" fill="#888">결과 테이블</text>
  <text x="145" y="141" text-anchor="middle" font-size="7" fill="#888">✅ 수렴 확인</text>
  <line x1="217" y1="110" x2="243" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="245" y="70" width="140" height="80" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="245" y="70" width="140" height="24" rx="10" fill="#E53935" opacity="0.15"/>
  <rect x="245" y="86" width="140" height="8" fill="#E53935" opacity="0.15"/>
  <text x="315" y="87" text-anchor="middle" font-size="9" font-weight="600" fill="#E53935">STEP 2</text>
  <text x="315" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#333">② 모드 전환</text>
  <text x="315" y="128" text-anchor="middle" font-size="7" fill="#888">🔮 추론 모드</text>
  <text x="315" y="141" text-anchor="middle" font-size="7" fill="#888">탭 클릭</text>
  <line x1="387" y1="110" x2="413" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="415" y="70" width="140" height="80" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="415" y="70" width="140" height="24" rx="10" fill="#E53935" opacity="0.15"/>
  <rect x="415" y="86" width="140" height="8" fill="#E53935" opacity="0.15"/>
  <text x="485" y="87" text-anchor="middle" font-size="9" font-weight="600" fill="#E53935">STEP 3</text>
  <text x="485" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#333">③ 좌표 입력</text>
  <text x="485" y="128" text-anchor="middle" font-size="7" fill="#888">X, Y 좌표</text>
  <text x="485" y="141" text-anchor="middle" font-size="7" fill="#888">슬라이더 조절</text>
  <line x1="557" y1="110" x2="583" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="585" y="70" width="140" height="80" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="585" y="70" width="140" height="24" rx="10" fill="#1976D2" opacity="0.15"/>
  <rect x="585" y="86" width="140" height="8" fill="#1976D2" opacity="0.15"/>
  <text x="655" y="87" text-anchor="middle" font-size="9" font-weight="600" fill="#1976D2">STEP 4</text>
  <text x="655" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#333">④ 결과 확인</text>
  <text x="655" y="128" text-anchor="middle" font-size="7" fill="#888">할당 클러스터</text>
  <text x="655" y="141" text-anchor="middle" font-size="7" fill="#888">거리, 중심점</text>
  <rect x="60" y="240" width="680" height="40" rx="8" fill="#FFF8E1" opacity="0.6"/>
  <text x="400" y="265" text-anchor="middle" font-size="8" fill="#795548">💡 각 단계를 순서대로 수행하며, 결과를 확인한 후 다음 단계로 진행합니다.</text>
</svg>
