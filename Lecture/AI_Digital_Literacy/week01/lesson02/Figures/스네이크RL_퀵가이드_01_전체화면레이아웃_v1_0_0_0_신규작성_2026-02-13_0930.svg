<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#1B2327"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#37474F"/>
      <stop offset="100%" style="stop-color:#455A64"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#bgGrad)"/>

  <!-- 헤더 -->
  <rect x="16" y="12" width="768" height="52" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="300" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#4CAF50">🐍 스네이크 강화학습 시뮬레이터</text>
  <rect x="490" y="20" width="70" height="22" rx="6" fill="#4CAF50"/>
  <text x="525" y="35" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">Q-Learning</text>
  <!-- 상단 통계 -->
  <text x="580" y="28" font-size="7" fill="#90A4AE">에피소드: 0</text>
  <text x="580" y="40" font-size="7" fill="#90A4AE">최고점수: 0</text>
  <text x="670" y="28" font-size="7" fill="#90A4AE">평균보상: 0.0</text>
  <text x="670" y="40" font-size="7" fill="#90A4AE">ε: 1.00</text>

  <!-- 모드 탭 -->
  <rect x="200" y="72" width="120" height="28" rx="14" fill="#4CAF50" filter="url(#shadowLight)"/>
  <text x="260" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#FFF">🧠 AI 학습</text>
  <rect x="326" y="72" width="120" height="28" rx="14" fill="#37474F" stroke="#546E7A" stroke-width="1"/>
  <text x="386" y="90" text-anchor="middle" font-size="10" font-weight="500" fill="#90A4AE">🎮 직접 플레이</text>
  <rect x="452" y="72" width="100" height="28" rx="14" fill="#37474F" stroke="#546E7A" stroke-width="1"/>
  <text x="502" y="90" text-anchor="middle" font-size="10" font-weight="500" fill="#90A4AE">🤖 AI 시연</text>

  <!-- 레이블 -->
  <rect x="16" y="98" width="180" height="16" rx="8" fill="#4CAF50" opacity="0.9"/>
  <text x="106" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">① 학습 파라미터</text>
  <rect x="206" y="98" width="370" height="16" rx="8" fill="#FF9800" opacity="0.9"/>
  <text x="391" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">② 게임 영역</text>
  <rect x="586" y="98" width="198" height="16" rx="8" fill="#2196F3" opacity="0.9"/>
  <text x="685" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">③ 학습 성적</text>

  <!-- 좌측: 학습 파라미터 -->
  <rect x="16" y="118" width="180" height="320" rx="10" fill="#37474F" filter="url(#shadow)"/>
  <rect x="16" y="118" width="180" height="30" rx="10" fill="#455A64"/>
  <rect x="16" y="138" width="180" height="10" fill="#455A64"/>
  <text x="106" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#4CAF50">⚙️ 학습 파라미터</text>

  <!-- α 슬라이더 -->
  <text x="28" y="164" font-size="8" fill="#90A4AE">α (학습률)</text>
  <rect x="28" y="170" width="156" height="3" rx="1.5" fill="#546E7A"/>
  <circle cx="68" cy="171.5" r="5" fill="#4CAF50"/>
  <text x="160" y="165" text-anchor="end" font-size="8" font-weight="600" fill="#4CAF50">0.10</text>

  <!-- γ 슬라이더 -->
  <text x="28" y="194" font-size="8" fill="#90A4AE">γ (할인율)</text>
  <rect x="28" y="200" width="156" height="3" rx="1.5" fill="#546E7A"/>
  <circle cx="148" cy="201.5" r="5" fill="#4CAF50"/>
  <text x="160" y="195" text-anchor="end" font-size="8" font-weight="600" fill="#4CAF50">0.95</text>

  <!-- ε 슬라이더 -->
  <text x="28" y="224" font-size="8" fill="#90A4AE">ε (탐험률)</text>
  <rect x="28" y="230" width="156" height="3" rx="1.5" fill="#546E7A"/>
  <circle cx="170" cy="231.5" r="5" fill="#FF9800"/>
  <text x="160" y="225" text-anchor="end" font-size="8" font-weight="600" fill="#FF9800">1.00</text>

  <!-- 맵 설정 -->
  <text x="28" y="258" font-size="9" font-weight="600" fill="#B0BEC5">🗺️ 맵 설정</text>
  <text x="28" y="274" font-size="8" fill="#90A4AE">크기: 20×20</text>

  <!-- 보상 설정 -->
  <text x="28" y="298" font-size="9" font-weight="600" fill="#B0BEC5">🎁 보상 설정</text>
  <text x="28" y="314" font-size="8" fill="#4CAF50">먹이: +10</text>
  <text x="28" y="328" font-size="8" fill="#E53935">충돌: -10</text>
  <text x="28" y="342" font-size="8" fill="#90A4AE">접근: +1</text>
  <text x="28" y="356" font-size="8" fill="#90A4AE">멀어짐: -1</text>

  <!-- 제어 버튼 -->
  <rect x="28" y="370" width="156" height="28" rx="6" fill="#4CAF50"/>
  <text x="106" y="388" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF">▶ 학습 시작</text>
  <rect x="28" y="404" width="74" height="22" rx="4" fill="#546E7A"/>
  <text x="65" y="419" text-anchor="middle" font-size="8" fill="#B0BEC5">🔄 초기화</text>
  <rect x="110" y="404" width="74" height="22" rx="4" fill="#546E7A"/>
  <text x="147" y="419" text-anchor="middle" font-size="8" fill="#B0BEC5">⏸ 일시정지</text>

  <!-- 중앙: 게임 영역 -->
  <rect x="206" y="118" width="370" height="320" rx="10" fill="#37474F" filter="url(#shadow)"/>

  <!-- 게임 그리드 -->
  <rect x="240" y="132" width="300" height="260" rx="6" fill="#1B2327" stroke="#455A64" stroke-width="1"/>
  <!-- 뱀 -->
  <rect x="340" y="250" width="14" height="14" rx="2" fill="#4CAF50"/>
  <rect x="326" y="250" width="14" height="14" rx="2" fill="#66BB6A"/>
  <rect x="312" y="250" width="14" height="14" rx="2" fill="#81C784"/>
  <!-- 먹이 -->
  <circle cx="420" cy="190" r="6" fill="#E53935"/>
  <!-- 그리드 라인 (일부) -->
  <line x1="240" y1="160" x2="540" y2="160" stroke="#263238" stroke-width="0.3"/>
  <line x1="240" y1="190" x2="540" y2="190" stroke="#263238" stroke-width="0.3"/>
  <line x1="240" y1="220" x2="540" y2="220" stroke="#263238" stroke-width="0.3"/>
  <line x1="240" y1="250" x2="540" y2="250" stroke="#263238" stroke-width="0.3"/>
  <line x1="300" y1="132" x2="300" y2="392" stroke="#263238" stroke-width="0.3"/>
  <line x1="360" y1="132" x2="360" y2="392" stroke="#263238" stroke-width="0.3"/>
  <line x1="420" y1="132" x2="420" y2="392" stroke="#263238" stroke-width="0.3"/>
  <line x1="480" y1="132" x2="480" y2="392" stroke="#263238" stroke-width="0.3"/>

  <!-- 속도 조절 -->
  <text x="260" y="410" font-size="8" fill="#90A4AE">⏩ 속도:</text>
  <rect x="302" y="402" width="80" height="8" rx="3" fill="#546E7A"/>
  <rect x="302" y="402" width="30" height="8" rx="3" fill="#FF9800"/>
  <text x="390" y="410" font-size="8" fill="#FF9800">15fps</text>
  <text x="440" y="410" font-size="7" fill="#78909C">점수:0  길이:3  스텝:0</text>

  <!-- 우측: 학습 성적 -->
  <rect x="586" y="118" width="198" height="320" rx="10" fill="#37474F" filter="url(#shadow)"/>
  <rect x="586" y="118" width="198" height="28" rx="10" fill="#455A64"/>
  <rect x="586" y="136" width="198" height="10" fill="#455A64"/>
  <text x="685" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#2196F3">📈 학습 성적표</text>

  <!-- 성장 단계 -->
  <rect x="600" y="152" width="170" height="22" rx="4" fill="#263238"/>
  <text x="610" y="167" font-size="7" fill="#4CAF50">🥚 미학습</text>
  <text x="650" y="167" font-size="7" fill="#78909C">→ 🐣 → 🐥 → 🐦 → 🦅</text>

  <!-- 성적 카드들 -->
  <rect x="600" y="180" width="170" height="52" rx="6" fill="#263238"/>
  <text x="610" y="196" font-size="8" font-weight="600" fill="#B0BEC5">최근 50회 평균</text>
  <text x="610" y="212" font-size="7" fill="#90A4AE">점수: 0.0</text>
  <text x="700" y="212" font-size="7" fill="#90A4AE">보상: 0.0</text>
  <text x="610" y="226" font-size="7" fill="#90A4AE">생존: 0스텝</text>
  <text x="700" y="226" font-size="7" fill="#90A4AE">Q크기: 0</text>

  <!-- 보상 추이 차트 -->
  <rect x="600" y="240" width="170" height="64" rx="6" fill="#263238"/>
  <text x="685" y="256" text-anchor="middle" font-size="8" font-weight="600" fill="#FF9800">📊 보상 추이</text>
  <polyline points="610,290 625,288 640,285 655,280 670,282 685,275 700,272 715,268 730,265 745,260 760,255" fill="none" stroke="#FF9800" stroke-width="1.5"/>

  <!-- 점수 추이 차트 -->
  <rect x="600" y="310" width="170" height="60" rx="6" fill="#263238"/>
  <text x="685" y="326" text-anchor="middle" font-size="8" font-weight="600" fill="#4CAF50">🏆 점수 추이</text>
  <polyline points="610,356 625,354 640,350 655,346 670,348 685,340 700,335 715,330 730,325 745,318 760,312" fill="none" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- Q-값 히트맵 -->
  <rect x="600" y="376" width="170" height="54" rx="6" fill="#263238"/>
  <text x="685" y="392" text-anchor="middle" font-size="8" font-weight="600" fill="#2196F3">🧩 Q-값 히트맵</text>
  <rect x="650" y="400" width="20" height="20" rx="2" fill="#1B5E20" opacity="0.7"/>
  <text x="660" y="414" text-anchor="middle" font-size="7" fill="#FFF">⬆️</text>
  <rect x="630" y="400" width="20" height="20" rx="2" fill="#4CAF50" opacity="0.5"/>
  <text x="640" y="414" text-anchor="middle" font-size="7" fill="#FFF">⬅️</text>
  <rect x="670" y="400" width="20" height="20" rx="2" fill="#C8E6C9" opacity="0.5"/>
  <text x="680" y="414" text-anchor="middle" font-size="7" fill="#333">➡️</text>
  <rect x="650" y="420" width="20" height="6" rx="1" fill="#FFCDD2" opacity="0.5"/>
  <text x="660" y="425" text-anchor="middle" font-size="5" fill="#333">⬇️</text>
</svg>
