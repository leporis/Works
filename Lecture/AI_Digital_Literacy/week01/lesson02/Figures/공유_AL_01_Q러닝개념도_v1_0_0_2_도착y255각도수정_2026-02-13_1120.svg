<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#666"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4CAF50"/>
    </marker>
    <marker id="arrowSW" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="157">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#666"/>
    </marker>
    <marker id="arrowGreenNW" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="202">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4CAF50"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="400" rx="12" fill="url(#bgGrad)"/>

  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#333">🧠 Q-Learning 알고리즘 개념도</text>
  <text x="400" y="48" text-anchor="middle" font-size="10" fill="#795548">강화학습의 핵심 — 상태-행동-보상 루프</text>

  <!-- 메인 루프 -->
  <!-- 상태(S) -->
  <rect x="60" y="100" width="140" height="70" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">상태 (S)</text>
  <text x="130" y="148" text-anchor="middle" font-size="8" fill="#555">현재 환경 정보</text>
  <text x="130" y="160" text-anchor="middle" font-size="7" fill="#999">예: 뱀 위치, 먹이 방향</text>

  <!-- 행동(A) -->
  <rect x="330" y="100" width="140" height="70" rx="12" fill="#FFF8E1" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">행동 (A)</text>
  <text x="400" y="148" text-anchor="middle" font-size="8" fill="#555">에이전트의 선택</text>
  <text x="400" y="160" text-anchor="middle" font-size="7" fill="#999">예: ↑↓←→ 이동</text>

  <!-- 보상(R) -->
  <rect x="600" y="100" width="140" height="70" rx="12" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32">보상 (R)</text>
  <text x="670" y="148" text-anchor="middle" font-size="8" fill="#555">환경의 피드백</text>
  <text x="670" y="160" text-anchor="middle" font-size="7" fill="#999">예: 먹이+10, 충돌-10</text>

  <!-- 새 상태(S') -->
  <rect x="330" y="220" width="140" height="70" rx="12" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#7B1FA2">새 상태 (S')</text>
  <text x="400" y="268" text-anchor="middle" font-size="8" fill="#555">변화된 환경</text>
  <text x="400" y="280" text-anchor="middle" font-size="7" fill="#999">예: 이동 후 새 위치</text>

  <!-- 화살표들 -->
  <line x1="200" y1="135" x2="325" y2="135" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="262" y="126" text-anchor="middle" font-size="8" font-weight="600" fill="#666">Q(s,a) 기반 선택</text>
  <line x1="470" y1="135" x2="595" y2="135" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="532" y="126" text-anchor="middle" font-size="8" font-weight="600" fill="#666">환경 반응</text>
  <line x1="670" y1="170" x2="470" y2="255" stroke="#666" stroke-width="2" marker-end="url(#arrowSW)"/>
  <line x1="330" y1="255" x2="130" y2="175" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowGreenNW)" stroke-dasharray="6,3"/>
  <text x="200" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#4CAF50">다시 시작 (루프)</text>

  <!-- Q-값 업데이트 수식 -->
  <rect x="80" y="310" width="640" height="80" rx="12" fill="#FFF" filter="url(#shadow)"/>
  <text x="400" y="334" text-anchor="middle" font-size="11" font-weight="700" fill="#333">📐 Q-값 업데이트 수식</text>
  <text x="400" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">Q(s, a) ← Q(s, a) + α × [ r + γ × max Q(s', a') − Q(s, a) ]</text>
  <text x="190" y="378" text-anchor="middle" font-size="8" fill="#999">α: 학습률 (얼마나 빨리 배울지)</text>
  <text x="400" y="378" text-anchor="middle" font-size="8" fill="#999">γ: 할인율 (미래 보상 중요도)</text>
  <text x="600" y="378" text-anchor="middle" font-size="8" fill="#999">ε: 탐험률 (새로운 시도 확률)</text>

  <!-- ε-greedy 비교 -->
  <rect x="80" y="215" width="120" height="70" rx="8" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
  <text x="140" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#E53935">🎲 탐험</text>
  <text x="140" y="252" text-anchor="middle" font-size="8" fill="#555">ε 확률로</text>
  <text x="140" y="266" text-anchor="middle" font-size="8" fill="#555">랜덤 행동 선택</text>
  <text x="140" y="278" text-anchor="middle" font-size="7" fill="#999">→ 새로운 경험</text>

  <rect x="600" y="215" width="120" height="70" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="660" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">⭐ 활용</text>
  <text x="660" y="252" text-anchor="middle" font-size="8" fill="#555">(1-ε) 확률로</text>
  <text x="660" y="266" text-anchor="middle" font-size="8" fill="#555">최적 행동 선택</text>
  <text x="660" y="278" text-anchor="middle" font-size="7" fill="#999">→ 현재 최선</text>

  <text x="400" y="210" text-anchor="middle" font-size="9" font-weight="600" fill="#795548">ε-greedy 전략</text>
</svg>
