  <text x="136" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">① 대전 정보</text>
  <rect x="266" y="98" width="240" height="16" rx="8" fill="#26A69A" opacity="0.9"/>
  <text x="386" y="109" text-anchor="middle" font-size="8" font-weight="600" fill="#FFF">② 게임 보드</text>
