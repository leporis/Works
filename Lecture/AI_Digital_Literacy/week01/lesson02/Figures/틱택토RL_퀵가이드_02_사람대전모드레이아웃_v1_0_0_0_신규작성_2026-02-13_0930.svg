  <text x="371" y="85" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">👤 사람 대전</text>
  <rect x="432" y="68" width="100" height="26" rx="13" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="482" y="85" text-anchor="middle" font-size="9" font-weight="500" fill="#888">⚔️ AI 대전</text>

  <!-- 레이블 -->
