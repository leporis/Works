    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="400" rx="12" fill="url(#bgGrad)"/>

  <rect x="16" y="12" width="768" height="48" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="300" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#5C6BC0">🤖 RL 틱택토 시뮬레이터 — 사람 대전 모드</text>
  <rect x="540" y="24" width="62" height="20" rx="10" fill="#5C6BC0"/>
  <text x="571" y="38" text-anchor="middle" font-size="9" font-weight="600" fill="#FFF">v3.0.0.0</text>

  <!-- 모드 탭 -->
  <rect x="200" y="68" width="110" height="26" rx="13" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
