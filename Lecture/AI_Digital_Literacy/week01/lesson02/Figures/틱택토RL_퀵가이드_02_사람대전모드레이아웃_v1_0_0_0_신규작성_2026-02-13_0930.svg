  <text x="560" y="182" font-size="8" fill="#1565C0">X</text>
  <text x="600" y="182" font-size="8" fill="#555">(0,0)</text>
  <text x="660" y="182" font-size="8" fill="#555">0.85</text>
  <text x="720" y="182" font-size="8" fill="#555">48%</text>

  <text x="530" y="198" font-size="8" fill="#555">2</text>
  <text x="560" y="198" font-size="8" fill="#E53935">O</text>
  <text x="600" y="198" font-size="8" fill="#555">(0,2)</text>
  <text x="660" y="198" font-size="8" fill="#555">—</text>
  <text x="720" y="198" font-size="8" fill="#555">—</text>

  <text x="530" y="214" font-size="8" fill="#555">3</text>
  <text x="560" y="214" font-size="8" fill="#1565C0">X</text>
  <text x="600" y="214" font-size="8" fill="#555">(1,1)</text>
  <text x="660" y="214" font-size="8" fill="#555">0.92</text>
  <text x="720" y="214" font-size="8" fill="#555">52%</text>

  <text x="530" y="230" font-size="8" fill="#555">4</text>
  <text x="560" y="230" font-size="8" fill="#E53935">O</text>
  <text x="600" y="230" font-size="8" fill="#555">(2,0)</text>
  <text x="660" y="230" font-size="8" fill="#555">—</text>
  <text x="720" y="230" font-size="8" fill="#555">—</text>

  <text x="530" y="246" font-size="8" fill="#5C6BC0">...</text>

