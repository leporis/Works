  <rect x="566" y="295" width="35" height="28" rx="3" fill="#BDBDBD"/>
  <text x="583" y="313" text-anchor="middle" font-size="7" fill="#FFF">—</text>
  <rect x="605" y="295" width="35" height="28" rx="3" fill="#5C6BC0" opacity="0.6"/>
  <text x="622" y="313" text-anchor="middle" font-size="7" fill="#FFF">0.72</text>
  <rect x="644" y="295" width="35" height="28" rx="3" fill="#BDBDBD"/>
  <text x="661" y="313" text-anchor="middle" font-size="7" fill="#FFF">—</text>
  <rect x="566" y="327" width="35" height="28" rx="3" fill="#5C6BC0" opacity="0.4"/>
  <text x="583" y="345" text-anchor="middle" font-size="7" fill="#FFF">0.55</text>
  <rect x="605" y="327" width="35" height="28" rx="3" fill="#BDBDBD"/>
  <text x="622" y="345" text-anchor="middle" font-size="7" fill="#FFF">—</text>
  <rect x="644" y="327" width="35" height="28" rx="3" fill="#5C6BC0" opacity="0.8"/>
  <text x="661" y="345" text-anchor="middle" font-size="7" fill="#FFF">0.88</text>
