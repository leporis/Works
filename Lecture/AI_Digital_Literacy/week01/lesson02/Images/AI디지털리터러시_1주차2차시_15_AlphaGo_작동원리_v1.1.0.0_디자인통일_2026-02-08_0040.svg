<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="780" height="580" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <rect x="12" y="12" width="776" height="60" fill="url(#titleGradient)"/>
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1976D2" text-anchor="middle">AlphaGo 작동 원리</text>
  <line x1="10" y1="72" x2="790" y2="72" stroke="#333" stroke-width="2"/>
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="180" height="220" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="10"/>
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1976D2" text-anchor="middle">1단계</text>
    <text x="90" y="60" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">데이터 학습</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="14" fill="#333">· 수백만 개의</text>
    <text x="30" y="120" font-family="Arial, sans-serif" font-size="14" fill="#333">프로 기보 학습</text>
    <text x="20" y="150" font-family="Arial, sans-serif" font-size="14" fill="#333">→ 인간 프로의</text>
    <text x="30" y="170" font-family="Arial, sans-serif" font-size="14" fill="#333">수를 모방</text>
    <line x1="190" y1="110" x2="220" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="230" y="0" width="180" height="220" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="10"/>
    <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF9800" text-anchor="middle">2단계</text>
    <text x="320" y="60" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">자기 대국</text>
    <text x="250" y="100" font-family="Arial, sans-serif" font-size="14" fill="#333">· 스스로와</text>
    <text x="260" y="120" font-family="Arial, sans-serif" font-size="14" fill="#333">수백만 번 대국</text>
    <text x="250" y="150" font-family="Arial, sans-serif" font-size="14" fill="#333">→ 강화학습으로</text>
    <text x="260" y="170" font-family="Arial, sans-serif" font-size="14" fill="#333">실력 향상</text>
    <line x1="420" y1="110" x2="450" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="460" y="0" width="180" height="220" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="10"/>
    <text x="550" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9C27B0" text-anchor="middle">3단계</text>
    <text x="550" y="60" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">최종 AlphaGo</text>
    <text x="480" y="100" font-family="Arial, sans-serif" font-size="14" fill="#333">· 인간의 직관 +</text>
    <text x="490" y="120" font-family="Arial, sans-serif" font-size="14" fill="#333">자체 학습 결합</text>
    <text x="480" y="150" font-family="Arial, sans-serif" font-size="14" fill="#333">→ 세계 최강의</text>
    <text x="490" y="170" font-family="Arial, sans-serif" font-size="14" fill="#333">바둑 실력</text>
  </g>
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="640" height="180" fill="#F5F5F5" stroke="#1976D2" stroke-width="2" rx="10"/>
    <text x="320" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1976D2" text-anchor="middle">핵심 기술: 딥러닝 + 강화학습</text>
    <g transform="translate(50, 50)">
      <rect x="0" y="0" width="250" height="110" fill="#ffffff" stroke="#1976D2" stroke-width="2" rx="5"/>
      <text x="125" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">정책 신경망</text>
      <text x="125" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">(Policy Network)</text>
      <text x="125" y="65" font-family="Arial, sans-serif" font-size="14" fill="#1976D2" text-anchor="middle" font-style="italic">"어디에 둘까?"</text>
      <text x="10" y="90" font-family="Arial, sans-serif" font-size="13" fill="#333">· 바둑판 분석 / 다음 수 예측</text>
    </g>
    <g transform="translate(340, 50)">
      <rect x="0" y="0" width="250" height="110" fill="#ffffff" stroke="#1976D2" stroke-width="2" rx="5"/>
      <text x="125" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">가치 신경망</text>
      <text x="125" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">(Value Network)</text>
      <text x="125" y="65" font-family="Arial, sans-serif" font-size="14" fill="#1976D2" text-anchor="middle" font-style="italic">"이길 수 있나?"</text>
      <text x="10" y="90" font-family="Arial, sans-serif" font-size="13" fill="#333">· 현재 국면 평가 / 승률 예측</text>
    </g>
  </g>
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="640" height="40" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
    <text x="320" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">결과: 이세돌 9단을 4:1로 격파 (2016년 3월)</text>
  </g>
</svg>
