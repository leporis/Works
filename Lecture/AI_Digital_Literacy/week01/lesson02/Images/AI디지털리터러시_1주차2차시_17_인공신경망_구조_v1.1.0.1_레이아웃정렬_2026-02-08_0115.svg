<svg width="800" height="650" viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 외곽 박스 -->
  <rect x="10" y="10" width="780" height="558" fill="#ffffff" stroke="#333" stroke-width="2"/>

  <!-- 제목 영역 -->
  <rect x="12" y="12" width="776" height="60" fill="url(#titleGradient)"/>
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1976D2" text-anchor="middle">인공신경망 (딥러닝) 구조</text>
  <line x1="10" y1="72" x2="790" y2="72" stroke="#333" stroke-width="2"/>

  <!-- 층 라벨: y=120 (콘텐츠 상단 y=72에서 48px 간격) -->
  <g transform="translate(50, 120)" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">
    <text x="60" y="0" font-weight="bold">입력층</text>
    <text x="60" y="25" font-size="14">(Input Layer)</text>
    <text x="240" y="0" font-weight="bold">은닉층 1</text>
    <text x="240" y="25" font-size="14">(Hidden Layer 1)</text>
    <text x="420" y="0" font-weight="bold">은닉층 2</text>
    <text x="420" y="25" font-size="14">(Hidden Layer 2)</text>
    <text x="600" y="0" font-weight="bold">출력층</text>
    <text x="600" y="25" font-size="14">(Output Layer)</text>
  </g>

  <!-- 노드 그룹: translate(50, 157) — 라벨 하단(y=145)에서 22px 간격 (기존 65의 1/3) -->
  <g transform="translate(50, 157)">
    <!-- 입력층 4개 -->
    <circle cx="60" cy="50" r="20" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <circle cx="60" cy="120" r="20" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <circle cx="60" cy="190" r="20" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <circle cx="60" cy="260" r="20" fill="#4CAF50" stroke="#333" stroke-width="2"/>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">X₁</text>
    <text x="20" y="125" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">X₂</text>
    <text x="20" y="195" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">X₃</text>
    <text x="20" y="265" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">X₄</text>

    <!-- 은닉층 1: 5개 -->
    <circle cx="240" cy="30" r="20" fill="#9C27B0" stroke="#333" stroke-width="2"/>
    <circle cx="240" cy="100" r="20" fill="#9C27B0" stroke="#333" stroke-width="2"/>
    <circle cx="240" cy="170" r="20" fill="#9C27B0" stroke="#333" stroke-width="2"/>
    <circle cx="240" cy="240" r="20" fill="#9C27B0" stroke="#333" stroke-width="2"/>
    <circle cx="240" cy="310" r="20" fill="#9C27B0" stroke="#333" stroke-width="2"/>

    <!-- 은닉층 2: 5개 -->
    <circle cx="420" cy="30" r="20" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <circle cx="420" cy="100" r="20" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <circle cx="420" cy="170" r="20" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <circle cx="420" cy="240" r="20" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <circle cx="420" cy="310" r="20" fill="#FF9800" stroke="#333" stroke-width="2"/>

    <!-- 출력층: 2개 -->
    <circle cx="600" cy="100" r="20" fill="#1976D2" stroke="#333" stroke-width="2"/>
    <circle cx="600" cy="240" r="20" fill="#1976D2" stroke="#333" stroke-width="2"/>
    <text x="660" y="105" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">고양이</text>
    <text x="660" y="245" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">개</text>

    <!-- 연결선: 입력→은닉1 -->
    <g stroke="#ccc" stroke-width="1">
      <line x1="80" y1="50" x2="220" y2="30"/> <line x1="80" y1="50" x2="220" y2="100"/> <line x1="80" y1="50" x2="220" y2="170"/> <line x1="80" y1="50" x2="220" y2="240"/> <line x1="80" y1="50" x2="220" y2="310"/>
      <line x1="80" y1="120" x2="220" y2="30"/> <line x1="80" y1="120" x2="220" y2="100"/> <line x1="80" y1="120" x2="220" y2="170"/> <line x1="80" y1="120" x2="220" y2="240"/> <line x1="80" y1="120" x2="220" y2="310"/>
      <line x1="80" y1="190" x2="220" y2="30"/> <line x1="80" y1="190" x2="220" y2="100"/> <line x1="80" y1="190" x2="220" y2="170"/> <line x1="80" y1="190" x2="220" y2="240"/> <line x1="80" y1="190" x2="220" y2="310"/>
      <line x1="80" y1="260" x2="220" y2="30"/> <line x1="80" y1="260" x2="220" y2="100"/> <line x1="80" y1="260" x2="220" y2="170"/> <line x1="80" y1="260" x2="220" y2="240"/> <line x1="80" y1="260" x2="220" y2="310"/>
    </g>
    <!-- 연결선: 은닉1→은닉2 -->
    <g stroke="#ccc" stroke-width="1">
      <line x1="260" y1="30" x2="400" y2="30"/> <line x1="260" y1="30" x2="400" y2="100"/> <line x1="260" y1="30" x2="400" y2="170"/> <line x1="260" y1="30" x2="400" y2="240"/> <line x1="260" y1="30" x2="400" y2="310"/>
      <line x1="260" y1="100" x2="400" y2="30"/> <line x1="260" y1="100" x2="400" y2="100"/> <line x1="260" y1="100" x2="400" y2="170"/> <line x1="260" y1="100" x2="400" y2="240"/> <line x1="260" y1="100" x2="400" y2="310"/>
      <line x1="260" y1="170" x2="400" y2="30"/> <line x1="260" y1="170" x2="400" y2="100"/> <line x1="260" y1="170" x2="400" y2="170"/> <line x1="260" y1="170" x2="400" y2="240"/> <line x1="260" y1="170" x2="400" y2="310"/>
      <line x1="260" y1="240" x2="400" y2="30"/> <line x1="260" y1="240" x2="400" y2="100"/> <line x1="260" y1="240" x2="400" y2="170"/> <line x1="260" y1="240" x2="400" y2="240"/> <line x1="260" y1="240" x2="400" y2="310"/>
      <line x1="260" y1="310" x2="400" y2="30"/> <line x1="260" y1="310" x2="400" y2="100"/> <line x1="260" y1="310" x2="400" y2="170"/> <line x1="260" y1="310" x2="400" y2="240"/> <line x1="260" y1="310" x2="400" y2="310"/>
    </g>
    <!-- 연결선: 은닉2→출력 -->
    <g stroke="#ccc" stroke-width="1">
      <line x1="440" y1="30" x2="580" y2="100"/> <line x1="440" y1="30" x2="580" y2="240"/>
      <line x1="440" y1="100" x2="580" y2="100"/> <line x1="440" y1="100" x2="580" y2="240"/>
      <line x1="440" y1="170" x2="580" y2="100"/> <line x1="440" y1="170" x2="580" y2="240"/>
      <line x1="440" y1="240" x2="580" y2="100"/> <line x1="440" y1="240" x2="580" y2="240"/>
      <line x1="440" y1="310" x2="580" y2="100"/> <line x1="440" y1="310" x2="580" y2="240"/>
    </g>
  </g>

  <!-- 범례: 하단 텍스트(y=520) ~ 박스 하단(y=568) = 48px 간격 -->
  <g transform="translate(50, 498)" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">
    <rect x="40" y="-12" width="30" height="16" fill="#4CAF50" stroke="none" rx="3"/>
    <text x="60" y="22">4개 노드</text>

    <rect x="220" y="-12" width="30" height="16" fill="#9C27B0" stroke="none" rx="3"/>
    <text x="240" y="22">5개 노드</text>

    <rect x="400" y="-12" width="30" height="16" fill="#FF9800" stroke="none" rx="3"/>
    <text x="420" y="22">5개 노드</text>

    <rect x="580" y="-12" width="30" height="16" fill="#1976D2" stroke="none" rx="3"/>
    <text x="600" y="22">2개 노드</text>
  </g>

  <!-- 설명 박스: 외곽 박스 바깥 아래 -->
  <g transform="translate(50, 580)">
    <rect x="0" y="0" width="700" height="55" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="10"/>
    <text x="350" y="23" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1976D2" text-anchor="middle">각 층이 데이터의 복잡한 패턴을 자동으로 학습</text>
    <text x="350" y="45" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1976D2" text-anchor="middle">층이 깊을수록(Deep) 더 복잡한 특징 추출 가능</text>
  </g>
</svg>
