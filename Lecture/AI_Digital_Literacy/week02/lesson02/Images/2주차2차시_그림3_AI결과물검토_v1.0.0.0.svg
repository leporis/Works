<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="900" height="520" fill="#F5F7FA"/>
  
  <!-- 제목 -->
  <text x="450" y="45" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="28" font-weight="bold" fill="#1A237E">✅ AI 결과물 검토 체크리스트</text>
  
  <!-- 왼쪽: 검토 항목 -->
  <g filter="url(#shadow3)">
    <rect x="40" y="80" width="400" height="400" rx="15" fill="white"/>
    <rect x="40" y="80" width="400" height="50" rx="15" fill="url(#headerGrad)"/>
    <rect x="40" y="115" width="400" height="15" fill="url(#headerGrad)"/>
    <text x="240" y="113" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="bold" fill="white">📋 확인 항목</text>
  </g>
  
  <!-- 체크 항목들 -->
  <!-- 항목 1 -->
  <rect x="60" y="150" width="360" height="50" rx="8" fill="#E8F5E9"/>
  <circle cx="90" cy="175" r="15" fill="#43A047"/>
  <text x="90" y="181" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" fill="white">✓</text>
  <text x="120" y="170" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">완성도</text>
  <text x="120" y="188" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#455A64">요청한 내용이 모두 포함되어 있는가?</text>
  
  <!-- 항목 2 -->
  <rect x="60" y="210" width="360" height="50" rx="8" fill="#E3F2FD"/>
  <circle cx="90" cy="235" r="15" fill="#1976D2"/>
  <text x="90" y="241" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" fill="white">✓</text>
  <text x="120" y="230" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">정확성</text>
  <text x="120" y="248" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#455A64">내용에 오류가 없는가? (특히 교과 내용)</text>
  
  <!-- 항목 3 -->
  <rect x="60" y="270" width="360" height="50" rx="8" fill="#FFF3E0"/>
  <circle cx="90" cy="295" r="15" fill="#FB8C00"/>
  <text x="90" y="301" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" fill="white">✓</text>
  <text x="120" y="290" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="#EF6C00">형식</text>
  <text x="120" y="308" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#455A64">요청한 형식대로 작성되었는가?</text>
  
  <!-- 항목 4 -->
  <rect x="60" y="330" width="360" height="50" rx="8" fill="#F3E5F5"/>
  <circle cx="90" cy="355" r="15" fill="#7B1FA2"/>
  <text x="90" y="361" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" fill="white">✓</text>
  <text x="120" y="350" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="#6A1B9A">적절성</text>
  <text x="120" y="368" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#455A64">대상 학년에 맞는 수준인가?</text>
  
  <!-- 항목 5 -->
  <rect x="60" y="390" width="360" height="50" rx="8" fill="#E0F2F1"/>
  <circle cx="90" cy="415" r="15" fill="#00897B"/>
  <text x="90" y="421" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" fill="white">✓</text>
  <text x="120" y="410" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="#00695C">활용성</text>
  <text x="120" y="428" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#455A64">실제 수업에 바로 쓸 수 있는가?</text>
  
  <!-- 오른쪽: AI 한계 경고 -->
  <g filter="url(#shadow3)">
    <rect x="460" y="80" width="400" height="400" rx="15" fill="white"/>
    <rect x="460" y="80" width="400" height="50" rx="15" fill="#E53935"/>
    <rect x="460" y="115" width="400" height="15" fill="#E53935"/>
    <text x="660" y="113" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="bold" fill="white">⚠️ AI 결과물의 한계</text>
  </g>
  
  <!-- 한계 항목들 -->
  <!-- 한계 1 -->
  <g>
    <rect x="480" y="150" width="360" height="45" rx="8" fill="#FFEBEE"/>
    <text x="500" y="178" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#C62828">🚨</text>
    <text x="530" y="170" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#C62828">교과 내용 오류 가능</text>
    <text x="530" y="188" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#455A64">→ 반드시 팩트체크!</text>
  </g>
  
  <!-- 한계 2 -->
  <g>
    <rect x="480" y="205" width="360" height="45" rx="8" fill="#FFEBEE"/>
    <text x="500" y="233" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#C62828">🚨</text>
    <text x="530" y="225" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#C62828">최신 정보 미반영</text>
    <text x="530" y="243" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#455A64">→ 날짜, 정책 직접 확인</text>
  </g>
  
  <!-- 한계 3 -->
  <g>
    <rect x="480" y="260" width="360" height="45" rx="8" fill="#FFEBEE"/>
    <text x="500" y="288" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#C62828">🚨</text>
    <text x="530" y="280" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#C62828">학교 실정과 다름</text>
    <text x="530" y="298" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#455A64">→ 우리 학교에 맞게 수정</text>
  </g>
  
  <!-- 한계 4 -->
  <g>
    <rect x="480" y="315" width="360" height="45" rx="8" fill="#FFEBEE"/>
    <text x="500" y="343" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#C62828">🚨</text>
    <text x="530" y="335" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#C62828">기계적인 표현</text>
    <text x="530" y="353" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#455A64">→ 자연스럽게 다듬기</text>
  </g>
  
  <!-- 한계 5 -->
  <g>
    <rect x="480" y="370" width="360" height="45" rx="8" fill="#FFEBEE"/>
    <text x="500" y="398" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#C62828">🚨</text>
    <text x="530" y="390" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#C62828">환각 (Hallucination)</text>
    <text x="530" y="408" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#455A64">→ 의심스러운 내용 확인</text>
  </g>
  
  <!-- 하단 메시지 -->
  <rect x="480" y="425" width="360" height="45" rx="8" fill="#1976D2"/>
  <text x="660" y="453" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="white">💡 AI는 초안 작성 도우미!</text>
  <text x="660" y="467" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="white">최종 검토와 수정은 교사의 몫</text>
</svg>
