<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFBFF"/>
      <stop offset="100%" style="stop-color:#EEF2FF"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976D2"/>
    </marker>
    <linearGradient id="blueHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="420" fill="url(#bgGrad2)" rx="12"/>

  <!-- 제목 -->
  <rect x="200" y="12" width="400" height="42" fill="url(#blueHeader)" rx="8"/>
  <text x="400" y="40" font-family="'Noto Sans CJK KR', sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF">LLM의 작동 원리: 다음 단어 예측</text>

  <!-- 단어 체인 영역 -->
  <rect x="20" y="68" width="760" height="180" fill="#FFFFFF" stroke="#BBDEFB" stroke-width="1.5" rx="10" filter="url(#shadow2)"/>

  <!-- 단어 1: 오늘 -->
  <rect x="45" y="85" width="80" height="40" fill="#1976D2" rx="20"/>
  <text x="85" y="110" font-family="'Noto Sans CJK KR', sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#FFFFFF">오늘</text>
  <line x1="130" y1="105" x2="160" y2="105" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- 단어 2: 날씨가 -->
  <rect x="165" y="85" width="90" height="40" fill="#1976D2" rx="20"/>
  <text x="210" y="110" font-family="'Noto Sans CJK KR', sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#FFFFFF">날씨가</text>
  <line x1="260" y1="105" x2="290" y2="105" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- 단어 3: 정말 -->
  <rect x="295" y="85" width="80" height="40" fill="#1976D2" rx="20"/>
  <text x="335" y="110" font-family="'Noto Sans CJK KR', sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#FFFFFF">정말</text>
  <line x1="380" y1="105" x2="410" y2="105" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- 단어 4: 좋아서 -->
  <rect x="415" y="85" width="90" height="40" fill="#1976D2" rx="20"/>
  <text x="460" y="110" font-family="'Noto Sans CJK KR', sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#FFFFFF">좋아서</text>
  <line x1="510" y1="105" x2="540" y2="105" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- 단어 5: 산책을 -->
  <rect x="545" y="85" width="90" height="40" fill="#1976D2" rx="20"/>
  <text x="590" y="110" font-family="'Noto Sans CJK KR', sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#FFFFFF">산책을</text>
  <line x1="640" y1="105" x2="670" y2="105" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- 단어 6: ... -->
  <rect x="675" y="85" width="80" height="40" fill="#90CAF9" rx="20" stroke="#1976D2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="715" y="110" font-family="'Noto Sans CJK KR', sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#1565C0">···</text>

  <!-- 확률 카드들 -->
  <!-- 카드 1: "날씨가" 예측 -->
  <line x1="85" y1="130" x2="85" y2="145" stroke="#CFD8DC" stroke-width="1.5"/>
  <rect x="45" y="148" width="80" height="82" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1" rx="6"/>
  <text x="85" y="166" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" text-anchor="middle" fill="#78909C" font-weight="600">예측 확률</text>
  <text x="55" y="183" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#37474F">날씨 </text>
  <rect x="85" y="175" width="33" height="10" fill="#1976D2" rx="2" opacity="0.8"/>
  <text x="55" y="198" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#78909C">기분 </text>
  <rect x="85" y="190" width="14" height="10" fill="#90CAF9" rx="2"/>
  <text x="55" y="213" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#78909C">하늘 </text>
  <rect x="85" y="205" width="8" height="10" fill="#BBDEFB" rx="2"/>

  <!-- 카드 2: "정말" 예측 -->
  <line x1="210" y1="130" x2="210" y2="145" stroke="#CFD8DC" stroke-width="1.5"/>
  <rect x="170" y="148" width="80" height="82" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1" rx="6"/>
  <text x="210" y="166" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" text-anchor="middle" fill="#78909C" font-weight="600">예측 확률</text>
  <text x="180" y="183" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#37474F">정말 </text>
  <rect x="210" y="175" width="30" height="10" fill="#1976D2" rx="2" opacity="0.8"/>
  <text x="180" y="198" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#78909C">매우 </text>
  <rect x="210" y="190" width="18" height="10" fill="#90CAF9" rx="2"/>
  <text x="180" y="213" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#78909C">너무 </text>
  <rect x="210" y="205" width="10" height="10" fill="#BBDEFB" rx="2"/>

  <!-- 카드 3: "좋아서" 예측 -->
  <line x1="335" y1="130" x2="335" y2="145" stroke="#CFD8DC" stroke-width="1.5"/>
  <rect x="295" y="148" width="80" height="82" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1" rx="6"/>
  <text x="335" y="166" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" text-anchor="middle" fill="#78909C" font-weight="600">예측 확률</text>
  <text x="305" y="183" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#37474F">좋아 </text>
  <rect x="335" y="175" width="26" height="10" fill="#1976D2" rx="2" opacity="0.8"/>
  <text x="305" y="198" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#78909C">나빠 </text>
  <rect x="335" y="190" width="16" height="10" fill="#90CAF9" rx="2"/>
  <text x="305" y="213" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#78909C">추워 </text>
  <rect x="335" y="205" width="10" height="10" fill="#BBDEFB" rx="2"/>

  <!-- 카드 4: "산책을" 예측 -->
  <line x1="460" y1="130" x2="460" y2="145" stroke="#CFD8DC" stroke-width="1.5"/>
  <rect x="420" y="148" width="80" height="82" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1" rx="6"/>
  <text x="460" y="166" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" text-anchor="middle" fill="#78909C" font-weight="600">예측 확률</text>
  <text x="430" y="183" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#37474F">산책 </text>
  <rect x="460" y="175" width="22" height="10" fill="#1976D2" rx="2" opacity="0.8"/>
  <text x="430" y="198" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#78909C">집에 </text>
  <rect x="460" y="190" width="16" height="10" fill="#90CAF9" rx="2"/>
  <text x="430" y="213" font-family="'Noto Sans CJK KR', sans-serif" font-size="10" fill="#78909C">공부 </text>
  <rect x="460" y="205" width="8" height="10" fill="#BBDEFB" rx="2"/>

  <!-- 비유 설명 영역 -->
  <rect x="20" y="265" width="760" height="60" fill="#FFFFFF" stroke="#BBDEFB" stroke-width="1.5" rx="10" filter="url(#shadow2)"/>
  <circle cx="55" cy="295" r="18" fill="#E3F2FD"/>
  <text x="55" y="301" font-family="'Noto Sans CJK KR', sans-serif" font-size="18" text-anchor="middle" fill="#1976D2" font-weight="700">!</text>
  <text x="85" y="291" font-family="'Noto Sans CJK KR', sans-serif" font-size="14" fill="#1976D2" font-weight="700">비유</text>
  <text x="120" y="291" font-family="'Noto Sans CJK KR', sans-serif" font-size="14" fill="#37474F">세상의 모든 책을 읽은 사람이 자연스럽게 다음 말을 이어가는 것</text>
  <text x="85" y="313" font-family="'Noto Sans CJK KR', sans-serif" font-size="12" fill="#78909C">실제로 "이해"하는 것이 아니라 "패턴"을 활용하는 것 → 때때로 틀릴 수 있음 (환각 현상)</text>

  <!-- 핵심 요약 3박스 -->
  <rect x="20" y="342" width="245" height="65" fill="#FFFFFF" stroke="#BBDEFB" stroke-width="1.5" rx="10" filter="url(#shadow2)"/>
  <circle cx="48" cy="363" r="14" fill="#1976D2"/>
  <text x="48" y="368" font-family="'Noto Sans CJK KR', sans-serif" font-size="12" text-anchor="middle" fill="#FFFFFF" font-weight="700">1</text>
  <text x="70" y="367" font-family="'Noto Sans CJK KR', sans-serif" font-size="13" fill="#37474F" font-weight="600">대규모 텍스트로 학습</text>
  <text x="70" y="388" font-family="'Noto Sans CJK KR', sans-serif" font-size="11" fill="#78909C">수십억 개의 문장 패턴 학습</text>

  <rect x="278" y="342" width="245" height="65" fill="#FFFFFF" stroke="#BBDEFB" stroke-width="1.5" rx="10" filter="url(#shadow2)"/>
  <circle cx="306" cy="363" r="14" fill="#1976D2"/>
  <text x="306" y="368" font-family="'Noto Sans CJK KR', sans-serif" font-size="12" text-anchor="middle" fill="#FFFFFF" font-weight="700">2</text>
  <text x="328" y="367" font-family="'Noto Sans CJK KR', sans-serif" font-size="13" fill="#37474F" font-weight="600">다음 단어 예측</text>
  <text x="328" y="388" font-family="'Noto Sans CJK KR', sans-serif" font-size="11" fill="#78909C">확률이 높은 단어를 선택</text>

  <rect x="536" y="342" width="245" height="65" fill="#FFFFFF" stroke="#BBDEFB" stroke-width="1.5" rx="10" filter="url(#shadow2)"/>
  <circle cx="564" cy="363" r="14" fill="#1976D2"/>
  <text x="564" y="368" font-family="'Noto Sans CJK KR', sans-serif" font-size="12" text-anchor="middle" fill="#FFFFFF" font-weight="700">3</text>
  <text x="586" y="367" font-family="'Noto Sans CJK KR', sans-serif" font-size="13" fill="#37474F" font-weight="600">반복하여 문장 생성</text>
  <text x="586" y="388" font-family="'Noto Sans CJK KR', sans-serif" font-size="11" fill="#78909C">한 단어씩 이어붙여 완성</text>
</svg>
