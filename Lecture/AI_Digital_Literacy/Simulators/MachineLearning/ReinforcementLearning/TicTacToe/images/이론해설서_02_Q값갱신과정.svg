<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowFwd" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arrowBack" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="800" height="370" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Noto Sans KR" font-size="17" font-weight="700" fill="#1a1a2e">Q-값 역방향 갱신 과정</text>
  <text x="400" y="47" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#888">Backward Q-value Update (X가 승리한 예시)</text>

  <!-- ===== FORWARD: Game Progress (top section) ===== -->
  <text x="40" y="72" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#555">▶ 게임 진행 (정방향)</text>

  <!-- Move 1 -->
  <g transform="translate(55, 82)">
    <rect width="100" height="95" rx="8" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadowSm)"/>
    <text x="50" y="16" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#2980b9">1수째</text>
    <!-- mini board -->
    <g transform="translate(20, 24)">
      <rect x="0" y="0" width="18" height="18" rx="2" fill="#D6EAF8" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="0" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="0" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="0" y="20" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="20" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="20" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="0" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <text x="9" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#2980b9">X</text>
    </g>
    <text x="50" y="90" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#888">X → 좌상</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="130" x2="195" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arrowFwd)"/>

  <!-- Move 2 -->
  <g transform="translate(200, 82)">
    <rect width="100" height="95" rx="8" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadowSm)"/>
    <text x="50" y="16" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#c0392b">O 응수</text>
    <g transform="translate(20, 24)">
      <rect x="0" y="0" width="18" height="18" rx="2" fill="#D6EAF8" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="0" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="0" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="0" y="20" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="20" width="18" height="18" rx="2" fill="#FADBD8" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="20" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="0" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <text x="9" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#2980b9">X</text>
      <text x="29" y="33" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#c0392b">O</text>
    </g>
    <text x="50" y="90" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#888">O → 중앙</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="305" y1="130" x2="340" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arrowFwd)"/>

  <!-- Move 3 (X's 2nd) -->
  <g transform="translate(345, 82)">
    <rect width="100" height="95" rx="8" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadowSm)"/>
    <text x="50" y="16" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#2980b9">2수째</text>
    <g transform="translate(20, 24)">
      <rect x="0" y="0" width="18" height="18" rx="2" fill="#D6EAF8" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="0" width="18" height="18" rx="2" fill="#D6EAF8" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="0" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="0" y="20" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="20" width="18" height="18" rx="2" fill="#FADBD8" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="20" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="0" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <text x="9" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#2980b9">X</text>
      <text x="29" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#2980b9">X</text>
      <text x="29" y="33" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#c0392b">O</text>
    </g>
    <text x="50" y="90" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#888">X → 상단</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="130" x2="485" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arrowFwd)"/>
  <text x="468" y="124" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#888">…</text>

  <!-- Move 5 (X's 3rd = winning) -->
  <g transform="translate(490, 82)">
    <rect width="100" height="95" rx="8" fill="white" stroke="#27ae60" stroke-width="2" filter="url(#shadowSm)"/>
    <text x="50" y="16" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#27ae60">3수째 ✓</text>
    <g transform="translate(20, 24)">
      <rect x="0" y="0" width="18" height="18" rx="2" fill="#A9DFBF" stroke="#27ae60" stroke-width="1"/>
      <rect x="20" y="0" width="18" height="18" rx="2" fill="#A9DFBF" stroke="#27ae60" stroke-width="1"/>
      <rect x="40" y="0" width="18" height="18" rx="2" fill="#A9DFBF" stroke="#27ae60" stroke-width="1"/>
      <rect x="0" y="20" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="20" width="18" height="18" rx="2" fill="#FADBD8" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="20" width="18" height="18" rx="2" fill="#FADBD8" stroke="#bbb" stroke-width="0.5"/>
      <rect x="0" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="20" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <rect x="40" y="40" width="18" height="18" rx="2" fill="#f5f5f5" stroke="#bbb" stroke-width="0.5"/>
      <text x="9" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#2980b9">X</text>
      <text x="29" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#2980b9">X</text>
      <text x="49" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#2980b9">X</text>
      <text x="29" y="33" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#c0392b">O</text>
      <text x="49" y="33" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#c0392b">O</text>
    </g>
    <text x="50" y="90" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#27ae60">X → 우상 (3목!)</text>
  </g>

  <!-- Result badge -->
  <g transform="translate(620, 100)">
    <rect width="120" height="60" rx="10" fill="#27ae60" filter="url(#shadow)"/>
    <text x="60" y="24" text-anchor="middle" font-family="Noto Sans KR" font-size="20" fill="white">🏆</text>
    <text x="60" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="12" font-weight="700" fill="white">X 승리!</text>
    <text x="60" y="55" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="rgba(255,255,255,0.9)">+1.0</text>
  </g>

  <!-- ===== BACKWARD UPDATE (bottom section) ===== -->
  <text x="40" y="205" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#e74c3c">◀ 보상 역전파 (역방향 갱신)</text>

  <!-- Backward arrow spanning full width -->
  <line x1="630" y1="218" x2="100" y2="218" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBack)"/>

  <!-- Update cards: Move 3 -->
  <g transform="translate(500, 230)">
    <rect width="150" height="80" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#shadowSm)"/>
    <rect width="150" height="22" rx="8" fill="#27ae60"/>
    <rect x="0" y="10" width="150" height="12" fill="#27ae60"/>
    <text x="75" y="16" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="white">3수째 (마지막)</text>
    <text x="75" y="42" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#27ae60">reward = +1.00</text>
    <text x="75" y="58" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#555">Q += 0.3 × (1.00 - Q)</text>
    <text x="75" y="72" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#888">최종 보상 그대로</text>
  </g>

  <!-- Update cards: Move 2 -->
  <g transform="translate(290, 230)">
    <rect width="150" height="80" rx="8" fill="white" stroke="#e67e22" stroke-width="1.5" filter="url(#shadowSm)"/>
    <rect width="150" height="22" rx="8" fill="#e67e22"/>
    <rect x="0" y="10" width="150" height="12" fill="#e67e22"/>
    <text x="75" y="16" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="white">2수째</text>
    <text x="75" y="42" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#e67e22">reward = +0.89</text>
    <text x="75" y="58" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#555">= -0.01 + 0.9 × 1.00</text>
    <text x="75" y="72" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#888">γ로 할인 + 단계 패널티</text>
  </g>

  <!-- Update cards: Move 1 -->
  <g transform="translate(80, 230)">
    <rect width="150" height="80" rx="8" fill="white" stroke="#f39c12" stroke-width="1.5" filter="url(#shadowSm)"/>
    <rect width="150" height="22" rx="8" fill="#f39c12"/>
    <rect x="0" y="10" width="150" height="12" fill="#f39c12"/>
    <text x="75" y="16" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="white">1수째 (첫 수)</text>
    <text x="75" y="42" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#f39c12">reward = +0.80</text>
    <text x="75" y="58" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#555">= -0.01 + 0.9 × 0.89</text>
    <text x="75" y="72" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#888">멀수록 보상이 줄어듦</text>
  </g>

  <!-- Formula box -->
  <rect x="180" y="325" width="440" height="32" rx="8" fill="#1a1a2e" opacity="0.06"/>
  <text x="400" y="346" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#1a1a2e">Q(s, a) ← Q(s, a) + α × (reward − Q(s, a))    α=0.3, γ=0.9</text>

  <!-- Bottom caption -->
  <text x="400" y="364" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#999">그림 2. Q-값 역방향 갱신 과정 — 승리 보상이 마지막 수에서 첫 수로 전파되는 과정</text>
</svg>
