<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <rect x="150" y="8" width="500" height="32" rx="6" fill="#3E2723"/>
  <text x="400" y="30" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">🔢 다중 변수 선택 및 가중치 조절 (v1.2.0)</text>
  
  <!-- 단계 표시 -->
  <circle cx="145" cy="62" r="14" fill="#E53935"/>
  <text x="145" y="67" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">1</text>
  <text x="165" y="67" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">변수 선택</text>
  
  <circle cx="395" cy="62" r="14" fill="#43A047"/>
  <text x="395" y="67" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">2</text>
  <text x="415" y="67" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">가중치 조절</text>
  
  <circle cx="650" cy="62" r="14" fill="#1565C0"/>
  <text x="650" y="67" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">3</text>
  <text x="670" y="67" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">정규화 계산</text>
  
  <!-- ===== 좌측: 변수 선택 (x:25, w:235) ===== -->
  <rect x="25" y="85" width="235" height="320" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  
  <!-- 독립변수 선택 -->
  <text x="45" y="108" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">📊 독립변수(X) 선택</text>
  <rect x="35" y="118" width="215" height="130" rx="8" fill="#FAFAFA" stroke="#FFCCBC"/>
  
  <!-- 체크박스 목록 -->
  <rect x="48" y="130" width="16" height="16" rx="3" fill="#43A047"/>
  <polyline points="52,138 56,142 64,134" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="72" y="143" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">부리길이 (mm)</text>
  <rect x="165" y="130" width="75" height="18" rx="3" fill="#E8F5E9"/>
  <text x="202" y="143" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#2E7D32">34 ~ 46</text>
  
  <rect x="48" y="155" width="16" height="16" rx="3" fill="#43A047"/>
  <polyline points="52,163 56,167 64,159" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="72" y="168" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">부리깊이 (mm)</text>
  <rect x="165" y="155" width="75" height="18" rx="3" fill="#E8F5E9"/>
  <text x="202" y="168" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#2E7D32">17 ~ 22</text>
  
  <rect x="48" y="180" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#BCAAA4"/>
  <text x="72" y="193" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">날개길이 (mm)</text>
  <rect x="165" y="180" width="75" height="18" rx="3" fill="#FFF3E0"/>
  <text x="202" y="193" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">180 ~ 230</text>
  
  <rect x="48" y="205" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#BCAAA4"/>
  <text x="72" y="218" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#C62828">체중 (g) ← 종속변수</text>
  <rect x="165" y="205" width="75" height="18" rx="3" fill="#FFEBEE"/>
  <text x="202" y="218" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#C62828">3200~4675</text>
  
  <!-- 종속변수 선택 -->
  <text x="45" y="268" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">📈 종속변수(Y) 선택</text>
  <rect x="35" y="278" width="215" height="40" rx="8" fill="#FFEBEE" stroke="#E53935"/>
  <text x="55" y="303" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#C62828">🎯 체중 (g)</text>
  <text x="235" y="303" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#C62828">▼</text>
  
  <!-- 힌트 -->
  <rect x="35" y="328" width="215" height="68" rx="8" fill="#E3F2FD"/>
  <text x="142" y="348" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#1565C0">💡 독립변수: 예측에 사용할 입력값</text>
  <text x="142" y="364" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#1565C0">💡 종속변수: 예측하고자 하는 결과값</text>
  <text x="142" y="380" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#1565C0">☑️ 체크된 변수만 학습에 사용됨</text>
  
  <!-- ===== 중앙: 가중치 슬라이더 (x:275, w:235) ===== -->
  <rect x="275" y="85" width="235" height="320" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  
  <text x="295" y="108" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">⚖️ 변수별 가중치</text>
  <rect x="285" y="118" width="215" height="175" rx="8" fill="#E8F5E9" stroke="#43A047"/>
  
  <!-- 슬라이더 1 -->
  <text x="300" y="145" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">부리길이</text>
  <rect x="300" y="153" width="145" height="8" rx="4" fill="#C8E6C9"/>
  <rect x="300" y="153" width="72" height="8" rx="4" fill="#43A047"/>
  <circle cx="372" cy="157" r="7" fill="#43A047" stroke="#FFFFFF" stroke-width="2"/>
  <text x="465" y="162" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#43A047">50%</text>
  
  <!-- 슬라이더 2 -->
  <text x="300" y="190" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">부리깊이</text>
  <rect x="300" y="198" width="145" height="8" rx="4" fill="#C8E6C9"/>
  <rect x="300" y="198" width="72" height="8" rx="4" fill="#43A047"/>
  <circle cx="372" cy="202" r="7" fill="#43A047" stroke="#FFFFFF" stroke-width="2"/>
  <text x="465" y="207" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#43A047">50%</text>
  
  <!-- 합계 표시 -->
  <line x1="300" y1="225" x2="485" y2="225" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="300" y="248" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#2E7D32">가중치 합계</text>
  <text x="465" y="248" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="#43A047">100%</text>
  
  <!-- 조합 공식 -->
  <rect x="295" y="260" width="200" height="28" rx="5" fill="#FFFFFF"/>
  <text x="395" y="279" text-anchor="middle" font-family="Noto Sans KR, monospace" font-size="10" font-weight="600" fill="#E53935">X = 50%×부리길이 + 50%×부리깊이</text>
  
  <!-- 적용 버튼 -->
  <rect x="300" y="305" width="185" height="36" rx="8" fill="#43A047" filter="url(#shadow)"/>
  <text x="392" y="329" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">🔄 가중치 적용</text>
  
  <!-- 설명 -->
  <rect x="285" y="352" width="215" height="45" rx="8" fill="#FFF3E0"/>
  <text x="392" y="373" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">💡 한 슬라이더 조절 시</text>
  <text x="392" y="388" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">나머지가 자동으로 비례 조정됨</text>
  
  <!-- ===== 우측: 정규화 설명 (x:525, w:250) ===== -->
  <rect x="525" y="85" width="250" height="320" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  
  <text x="545" y="108" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">📐 정규화 (0~100 변환)</text>
  
  <!-- 정규화 공식 -->
  <rect x="535" y="118" width="230" height="50" rx="8" fill="#E3F2FD"/>
  <text x="650" y="140" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#1565C0">정규화 공식</text>
  <text x="650" y="158" text-anchor="middle" font-family="Noto Sans KR, monospace" font-size="10" font-weight="600" fill="#1565C0">(값 - 최소) / (최대 - 최소) × 100</text>
  
  <!-- 예시 1 -->
  <rect x="535" y="178" width="230" height="65" rx="8" fill="#FAFAFA"/>
  <text x="550" y="198" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#5D4037">예시: 부리길이 40mm</text>
  <text x="550" y="216" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">범위: 34mm ~ 46mm</text>
  <rect x="545" y="225" width="210" height="22" rx="4" fill="#E3F2FD"/>
  <text x="650" y="240" text-anchor="middle" font-family="Noto Sans KR, monospace" font-size="9" font-weight="600" fill="#E53935">(40 - 34) / (46 - 34) × 100 = 50점</text>
  
  <!-- 예시 2 -->
  <rect x="535" y="253" width="230" height="65" rx="8" fill="#FAFAFA"/>
  <text x="550" y="273" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#5D4037">예시: 부리깊이 19.5mm</text>
  <text x="550" y="291" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">범위: 17mm ~ 22mm</text>
  <rect x="545" y="300" width="210" height="22" rx="4" fill="#E3F2FD"/>
  <text x="650" y="315" text-anchor="middle" font-family="Noto Sans KR, monospace" font-size="9" font-weight="600" fill="#E53935">(19.5 - 17) / (22 - 17) × 100 = 50점</text>
  
  <!-- 최종 계산 -->
  <rect x="535" y="328" width="230" height="68" rx="8" fill="#FFF3E0" stroke="#E53935"/>
  <text x="650" y="350" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#E53935">🎯 최종 조합점수 (X)</text>
  <text x="650" y="370" text-anchor="middle" font-family="Noto Sans KR, monospace" font-size="10" fill="#5D4037">50% × 50점 + 50% × 50점</text>
  <text x="650" y="388" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="#E53935">= 50.0점</text>
</svg>
