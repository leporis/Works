<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <rect x="250" y="8" width="300" height="32" rx="6" fill="#3E2723"/>
  <text x="400" y="30" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">📈 선형 관계란?</text>
  
  <!-- 부제목 -->
  <text x="400" y="55" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">두 변수 X와 Y 사이에 직선 형태의 관계가 있을 때</text>
  
  <!-- ===== 좌측: 산점도 + 회귀선 (x:25, w:410) ===== -->
  <rect x="25" y="70" width="410" height="310" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="230" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#5D4037">주택 면적과 가격의 관계</text>
  
  <!-- 좌표축 -->
  <line x1="80" y1="115" x2="80" y2="340" stroke="#5D4037" stroke-width="2"/>
  <line x1="80" y1="340" x2="400" y2="340" stroke="#5D4037" stroke-width="2"/>
  
  <!-- 축 화살표 -->
  <polygon points="80,115 75,125 85,125" fill="#5D4037"/>
  <polygon points="400,340 390,335 390,345" fill="#5D4037"/>
  
  <!-- 축 레이블 -->
  <text x="70" y="112" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#5D4037">Y</text>
  <text x="55" y="135" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">가격</text>
  <text x="55" y="150" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(만원)</text>
  <text x="408" y="345" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#5D4037">X</text>
  <text x="390" y="365" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">면적 (㎡)</text>
  
  <!-- Y축 눈금 -->
  <line x1="75" y1="320" x2="80" y2="320" stroke="#5D4037"/>
  <text x="70" y="324" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">500</text>
  <line x1="75" y1="280" x2="80" y2="280" stroke="#5D4037"/>
  <text x="70" y="284" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">1000</text>
  <line x1="75" y1="240" x2="80" y2="240" stroke="#5D4037"/>
  <text x="70" y="244" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">1500</text>
  <line x1="75" y1="200" x2="80" y2="200" stroke="#5D4037"/>
  <text x="70" y="204" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">2000</text>
  <line x1="75" y1="160" x2="80" y2="160" stroke="#5D4037"/>
  <text x="70" y="164" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">2500</text>
  
  <!-- X축 눈금 -->
  <line x1="130" y1="340" x2="130" y2="345" stroke="#5D4037"/>
  <text x="130" y="358" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">30</text>
  <line x1="180" y1="340" x2="180" y2="345" stroke="#5D4037"/>
  <text x="180" y="358" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">50</text>
  <line x1="230" y1="340" x2="230" y2="345" stroke="#5D4037"/>
  <text x="230" y="358" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">70</text>
  <line x1="280" y1="340" x2="280" y2="345" stroke="#5D4037"/>
  <text x="280" y="358" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">90</text>
  <line x1="330" y1="340" x2="330" y2="345" stroke="#5D4037"/>
  <text x="330" y="358" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">110</text>
  <line x1="380" y1="340" x2="380" y2="345" stroke="#5D4037"/>
  <text x="380" y="358" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">130</text>
  
  <!-- 데이터 점들 -->
  <circle cx="105" cy="315" r="6" fill="#43A047" opacity="0.7"/>
  <circle cx="125" cy="300" r="6" fill="#66BB6A" opacity="0.7"/>
  <circle cx="148" cy="285" r="6" fill="#8BC34A" opacity="0.7"/>
  <circle cx="170" cy="268" r="6" fill="#CDDC39" opacity="0.7"/>
  <circle cx="195" cy="250" r="6" fill="#FDD835" opacity="0.7"/>
  <circle cx="220" cy="232" r="6" fill="#FFC107" opacity="0.7"/>
  <circle cx="250" cy="212" r="6" fill="#FFB300" opacity="0.7"/>
  <circle cx="280" cy="192" r="6" fill="#FFA000" opacity="0.7"/>
  <circle cx="310" cy="172" r="6" fill="#FF8F00" opacity="0.7"/>
  <circle cx="340" cy="155" r="6" fill="#FF7043" opacity="0.7"/>
  <circle cx="365" cy="140" r="6" fill="#E53935" opacity="0.7"/>
  <circle cx="385" cy="128" r="6" fill="#C62828" opacity="0.7"/>
  
  <!-- 회귀선 -->
  <line x1="90" y1="328" x2="395" y2="120" stroke="#E53935" stroke-width="3"/>
  
  <!-- 회귀선 라벨 -->
  <rect x="305" y="105" width="110" height="26" rx="5" fill="#E53935"/>
  <text x="360" y="123" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF">회귀선 (예측선)</text>
  
  <!-- ===== 우측: 설명 ===== -->
  <!-- 핵심 개념 (y:70, h:135) -->
  <rect x="450" y="70" width="325" height="135" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="612" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#5D4037">💡 핵심 개념</text>
  
  <circle cx="475" cy="125" r="8" fill="#43A047"/>
  <text x="492" y="130" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">데이터 점: 실제 관측값</text>
  
  <line x1="467" y1="158" x2="497" y2="158" stroke="#E53935" stroke-width="3"/>
  <text x="510" y="163" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">회귀선: 데이터 패턴을 나타내는 직선</text>
  
  <text x="475" y="192" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• 점들이 직선 형태로 분포 → 선형 관계</text>
  
  <!-- 회귀식 설명 (y:215, h:165) -->
  <rect x="450" y="215" width="325" height="165" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="612" y="240" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#5D4037">📐 회귀식</text>
  
  <rect x="480" y="252" width="265" height="42" rx="8" fill="#FFEBEE"/>
  <text x="612" y="280" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="700" fill="#E53935">Y = w × X + b</text>
  
  <text x="480" y="315" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• <tspan font-weight="700" fill="#E53935">Y</tspan> : 예측하려는 값 (종속 변수) - 가격</text>
  <text x="480" y="335" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• <tspan font-weight="700" fill="#E53935">X</tspan> : 알고 있는 값 (독립 변수) - 면적</text>
  <text x="480" y="355" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• <tspan font-weight="700" fill="#E53935">w</tspan> : 기울기,  <tspan font-weight="700" fill="#E53935">b</tspan> : 절편 (Y축과 만나는 점)</text>
  <text x="480" y="375" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• X가 증가하면 Y도 증가 → 양의 상관관계</text>
</svg>
