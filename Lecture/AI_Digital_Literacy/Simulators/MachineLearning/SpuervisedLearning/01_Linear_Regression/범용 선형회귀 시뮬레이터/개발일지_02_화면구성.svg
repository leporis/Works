<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
    <style>
      text { font-family: 'Noto Sans CJK KR', sans-serif; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 상단 제목 바 -->
  <rect x="16" y="12" width="768" height="50" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="32" y="36" font-size="14" font-weight="700" fill="#E53935">선형 회귀 학습 시뮬레이터  v2.0.0.0</text>
  <text x="32" y="52" font-size="9" fill="#8D6E63">데이터의 패턴을 찾아 Y = wX + b 관계를 학습해보세요!</text>

  <!-- 모드 탭 -->
  <rect x="16" y="68" width="768" height="28" rx="6" fill="white" filter="url(#shadowSm)"/>
  <rect x="28" y="72" width="90" height="20" rx="5" fill="#E53935"/>
  <text x="73" y="86" font-size="10" font-weight="600" fill="white" text-anchor="middle">학습 모드</text>
  <rect x="124" y="72" width="90" height="20" rx="5" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.6"/>
  <text x="169" y="86" font-size="10" font-weight="500" fill="#8D6E63" text-anchor="middle">추론 모드</text>

  <!-- ===== 좌측 사이드바 (240px) ===== -->
  <rect x="16" y="102" width="185" height="360" rx="10" fill="url(#sideGrad)" filter="url(#shadow)"/>
  <text x="28" y="120" font-size="10" font-weight="600" fill="#5D4037">좌 사이드바 (240px)</text>

  <!-- 데이터 탭 -->
  <rect x="28" y="128" width="160" height="54" rx="6" fill="white" filter="url(#shadowSm)"/>
  <rect x="36" y="133" width="46" height="14" rx="3" fill="#E53935"/>
  <text x="59" y="143" font-size="7" fill="white" text-anchor="middle">데이터셋</text>
  <rect x="86" y="133" width="32" height="14" rx="3" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.5"/>
  <text x="102" y="143" font-size="7" fill="#8D6E63" text-anchor="middle">CSV</text>
  <rect x="122" y="133" width="32" height="14" rx="3" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.5"/>
  <text x="138" y="143" font-size="7" fill="#8D6E63" text-anchor="middle">직접</text>
  <rect x="36" y="152" width="144" height="14" rx="3" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.5"/>
  <text x="44" y="162" font-size="7.5" fill="#8D6E63">보스턴 주택가격 (506건) &#x25BC;</text>
  <text x="36" y="178" font-size="7" fill="#BCAAA4">27종 내장 + 4종 랜덤</text>

  <!-- X/Y 변수 -->
  <rect x="28" y="190" width="160" height="50" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="205" font-size="9" font-weight="600" fill="#5D4037">변수 선택</text>
  <rect x="36" y="212" width="68" height="13" rx="2.5" fill="#E8F5E9" stroke="#43A047" stroke-width="0.5"/>
  <text x="42" y="222" font-size="7.5" fill="#2E7D32">X: RM (체크)</text>
  <rect x="110" y="212" width="68" height="13" rx="2.5" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.5"/>
  <text x="116" y="222" font-size="7.5" fill="#1565C0">Y: MEDV &#x25BC;</text>
  <text x="36" y="236" font-size="7" fill="#BCAAA4">가중치 슬라이더 (다중 X)</text>

  <!-- 범주형 필터 -->
  <rect x="28" y="248" width="160" height="50" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="263" font-size="9" font-weight="600" fill="#5D4037">범주형 필터</text>
  <rect x="36" y="270" width="38" height="13" rx="6.5" fill="#1E88E5"/>
  <text x="55" y="280" font-size="7" fill="white" text-anchor="middle">setosa</text>
  <rect x="78" y="270" width="50" height="13" rx="6.5" fill="#1E88E5"/>
  <text x="103" y="280" font-size="7" fill="white" text-anchor="middle">versicolor</text>
  <rect x="132" y="270" width="44" height="13" rx="6.5" fill="#E0E0E0"/>
  <text x="154" y="280" font-size="7" fill="#757575" text-anchor="middle">virginica</text>
  <text x="36" y="294" font-size="7" fill="#BCAAA4">칩 UI + 건수 요약</text>

  <!-- 데이터 테이블 -->
  <rect x="28" y="306" width="160" height="50" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="321" font-size="9" font-weight="600" fill="#5D4037">데이터 테이블</text>
  <rect x="36" y="328" width="144" height="11" rx="2" fill="#FFF3E0"/>
  <text x="58" y="337" font-size="7" fill="#5D4037" text-anchor="middle">X</text>
  <text x="100" y="337" font-size="7" fill="#5D4037" text-anchor="middle">Y</text>
  <text x="145" y="337" font-size="7" fill="#5D4037" text-anchor="middle">분할</text>
  <text x="58" y="351" font-size="7" fill="#8D6E63" text-anchor="middle">6.5</text>
  <text x="100" y="351" font-size="7" fill="#8D6E63" text-anchor="middle">296</text>
  <text x="145" y="351" font-size="7" fill="#1E88E5" text-anchor="middle">훈련</text>

  <!-- ===== 중앙 차트 영역 ===== -->
  <rect x="210" y="102" width="372" height="360" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="222" y="120" font-size="10" font-weight="600" fill="#5D4037">차트 영역 (flex: 1fr)</text>

  <!-- 필터 배너 -->
  <rect x="222" y="126" width="348" height="18" rx="4" fill="#FFF3E0" stroke="#FF5722" stroke-width="0.6"/>
  <text x="396" y="138" font-size="8" font-weight="500" fill="#FF5722" text-anchor="middle">필터 적용 중: 품종 = setosa (50/150건)</text>

  <!-- 손실 그래프 -->
  <rect x="222" y="150" width="168" height="110" rx="6" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.5"/>
  <text x="306" y="166" font-size="9" font-weight="600" fill="#5D4037" text-anchor="middle">손실 그래프</text>
  <text x="306" y="177" font-size="7" fill="#8D6E63" text-anchor="middle">(훈련/테스트 MSE)</text>
  <polyline points="240,246 258,230 276,218 294,210 312,206 330,204 348,203 370,202" fill="none" stroke="#E53935" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="240,250 258,236 276,226 294,218 312,214 330,213 348,212 370,211" fill="none" stroke="#1E88E5" stroke-width="1" stroke-dasharray="3,2" stroke-linecap="round"/>
  <line x1="238" y1="182" x2="238" y2="252" stroke="#BCAAA4" stroke-width="0.5"/>
  <line x1="238" y1="252" x2="378" y2="252" stroke="#BCAAA4" stroke-width="0.5"/>

  <!-- 산점도 -->
  <rect x="398" y="150" width="172" height="110" rx="6" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.5"/>
  <text x="484" y="166" font-size="9" font-weight="600" fill="#5D4037" text-anchor="middle">산점도</text>
  <text x="484" y="177" font-size="7" fill="#8D6E63" text-anchor="middle">(회귀선 + 오차선)</text>
  <circle cx="420" cy="240" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="435" cy="230" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="450" cy="222" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="468" cy="212" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="485" cy="202" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="502" cy="194" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="520" cy="186" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="540" cy="196" r="2" fill="#FF5722" opacity="0.4"/>
  <circle cx="555" cy="182" r="2" fill="#FF5722" opacity="0.4"/>
  <line x1="416" y1="244" x2="558" y2="178" stroke="#E53935" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="468" y1="212" x2="468" y2="220" stroke="#FFC107" stroke-width="0.8" stroke-dasharray="2,1" opacity="0.6"/>
  <line x1="502" y1="194" x2="502" y2="202" stroke="#FFC107" stroke-width="0.8" stroke-dasharray="2,1" opacity="0.6"/>

  <!-- 학습 결과 패널 -->
  <rect x="222" y="268" width="348" height="70" rx="6" fill="white" stroke="#FFCCBC" stroke-width="0.6"/>
  <text x="236" y="284" font-size="9" font-weight="600" fill="#5D4037">학습 결과 패널</text>
  <rect x="232" y="290" width="328" height="13" rx="2" fill="#FFF3E0"/>
  <text x="268" y="300" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">에포크</text>
  <text x="332" y="300" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">훈련 MSE</text>
  <text x="400" y="300" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">테스트 MSE</text>
  <text x="462" y="300" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">R²</text>
  <text x="522" y="300" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">상태</text>
  <text x="268" y="316" font-size="8" fill="#3E2723" text-anchor="middle">500</text>
  <text x="332" y="316" font-size="8" fill="#3E2723" text-anchor="middle">22.34</text>
  <text x="400" y="316" font-size="8" fill="#3E2723" text-anchor="middle">24.87</text>
  <text x="462" y="316" font-size="8" fill="#43A047" font-weight="600" text-anchor="middle">0.74</text>
  <text x="522" y="316" font-size="8" fill="#FFC107" text-anchor="middle">보통</text>

  <!-- 오차선 + 재생 -->
  <rect x="232" y="328" width="155" height="22" rx="4" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.4"/>
  <text x="309" y="343" font-size="7.5" fill="#5D4037" text-anchor="middle">오차선 표시</text>
  <rect x="395" y="328" width="165" height="22" rx="4" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.4"/>
  <text x="477" y="343" font-size="7.5" fill="#5D4037" text-anchor="middle">학습 과정 재생</text>

  <!-- ===== 우측 사이드바 (260px) ===== -->
  <rect x="590" y="102" width="194" height="360" rx="10" fill="url(#sideGrad)" filter="url(#shadow)"/>
  <text x="602" y="120" font-size="10" font-weight="600" fill="#5D4037">우 사이드바 (260px)</text>

  <!-- 학습률 -->
  <rect x="602" y="128" width="170" height="48" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="612" y="143" font-size="9" font-weight="600" fill="#5D4037">학습률 (Learning Rate)</text>
  <text x="757" y="143" font-size="8" fill="#E53935" font-weight="600" text-anchor="end">0.01</text>
  <rect x="612" y="150" width="150" height="5" rx="2.5" fill="#F5F5F5"/>
  <rect x="612" y="150" width="55" height="5" rx="2.5" fill="#E53935" opacity="0.3"/>
  <circle cx="667" cy="152.5" r="4.5" fill="#E53935"/>
  <text x="612" y="170" font-size="6.5" fill="#BCAAA4">0.001</text>
  <text x="762" y="170" font-size="6.5" fill="#BCAAA4" text-anchor="end">0.1</text>

  <!-- 에포크 -->
  <rect x="602" y="184" width="170" height="48" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="612" y="199" font-size="9" font-weight="600" fill="#5D4037">에포크 (Epochs)</text>
  <text x="757" y="199" font-size="8" fill="#E53935" font-weight="600" text-anchor="end">500</text>
  <rect x="612" y="206" width="150" height="5" rx="2.5" fill="#F5F5F5"/>
  <rect x="612" y="206" width="50" height="5" rx="2.5" fill="#E53935" opacity="0.3"/>
  <circle cx="662" cy="208.5" r="4.5" fill="#E53935"/>
  <text x="612" y="226" font-size="6.5" fill="#BCAAA4">100</text>
  <text x="762" y="226" font-size="6.5" fill="#BCAAA4" text-anchor="end">2,000</text>

  <!-- 분할 바 -->
  <rect x="602" y="240" width="170" height="32" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="612" y="255" font-size="9" font-weight="600" fill="#5D4037">훈련/테스트 분할</text>
  <rect x="612" y="260" width="150" height="8" rx="4" fill="#FFCCBC"/>
  <rect x="612" y="260" width="120" height="8" rx="4" fill="#1E88E5" opacity="0.7"/>
  <text x="672" y="267" font-size="6" fill="white" font-weight="600" text-anchor="middle">훈련 80%</text>
  <text x="747" y="267" font-size="6" fill="#5D4037" text-anchor="middle">20%</text>

  <!-- 학습 실행 -->
  <rect x="602" y="280" width="170" height="30" rx="7" fill="#E53935" filter="url(#shadowSm)"/>
  <text x="687" y="300" font-size="11" font-weight="700" fill="white" text-anchor="middle">학습 실행</text>

  <!-- 재분할 -->
  <rect x="602" y="318" width="170" height="24" rx="5" fill="white" stroke="#FFCCBC" stroke-width="0.7"/>
  <text x="687" y="334" font-size="9.5" font-weight="500" fill="#5D4037" text-anchor="middle">재분할 &amp; 재학습</text>

  <!-- 하단 푸터 -->
  <rect x="16" y="470" width="768" height="22" rx="4" fill="white" opacity="0.7"/>
  <text x="400" y="485" font-size="8.5" fill="#8D6E63" text-anchor="middle">grid: 240px | 1fr | 260px  ·  max-width: 1400px  ·  개발: Claude (Anthropic)</text>
</svg>
