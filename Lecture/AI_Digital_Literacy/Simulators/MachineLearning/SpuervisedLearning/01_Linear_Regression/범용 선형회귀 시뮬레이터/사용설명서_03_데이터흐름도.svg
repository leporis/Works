<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 436">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="cardData" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="cardFilter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFECB3"/>
    </linearGradient>
    <linearGradient id="cardVar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="cardSplit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="cardTrain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC"/>
      <stop offset="100%" style="stop-color:#F8BBD0"/>
    </linearGradient>
    <linearGradient id="cardViz" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="cardResult" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F2F1"/>
      <stop offset="100%" style="stop-color:#B2DFDB"/>
    </linearGradient>
    <linearGradient id="cardInfer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#E1BEE7"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E53935"/>
    </marker>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="3" refY="6" orient="auto">
      <polygon points="0 0, 6 0, 3 6" fill="#E53935"/>
    </marker>
    <style>
      
      text { font-family: 'Noto Sans CJK KR', sans-serif; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="436" fill="url(#bgGrad)" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="30" font-size="15" font-weight="700" fill="#E53935" text-anchor="middle">데이터 흐름도 — 선형 회귀 시뮬레이터 v2.0.0.0</text>

  <!-- ===== 상단 5카드 ===== -->

  <!-- 1. 데이터 입력 -->
  <rect x="22" y="68" width="130" height="130" rx="8" fill="url(#cardData)" filter="url(#shadow)"/>
  <rect x="22" y="68" width="130" height="28" rx="8" fill="#FF8F00" opacity="0.15"/>
  <text x="87" y="87" font-size="12" font-weight="700" fill="#E65100" text-anchor="middle">데이터 입력</text>
  <line x1="32" y1="100" x2="142" y2="100" stroke="#FFCC80" stroke-width="0.6"/>
  <text x="38" y="116" font-size="9" fill="#5D4037">· 내장 데이터셋 (27종)</text>
  <text x="38" y="131" font-size="9" fill="#5D4037">· CSV 업로드</text>
  <text x="38" y="146" font-size="9" fill="#5D4037">· 직접 입력</text>
  <text x="38" y="161" font-size="9" fill="#5D4037">· 랜덤 생성</text>
  <text x="38" y="179" font-size="8" fill="#8D6E63">5~506건</text>

  <!-- 화살표 1→2 -->
  <line x1="155" y1="133" x2="175" y2="133" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. 필터 적용 -->
  <rect x="178" y="68" width="130" height="130" rx="8" fill="url(#cardFilter)" filter="url(#shadow)"/>
  <rect x="178" y="68" width="130" height="28" rx="8" fill="#FF6F00" opacity="0.12"/>
  <text x="243" y="87" font-size="12" font-weight="700" fill="#E65100" text-anchor="middle">필터 적용</text>
  <line x1="188" y1="100" x2="298" y2="100" stroke="#FFCC80" stroke-width="0.6"/>
  <text x="194" y="116" font-size="9" fill="#5D4037">· 범주형 칩 토글</text>
  <text x="194" y="131" font-size="9" fill="#5D4037">· AND 결합</text>
  <text x="194" y="146" font-size="9" fill="#5D4037">· 소표본 경고</text>
  <text x="194" y="161" font-size="9" fill="#5D4037">· 3건 이하 → 잠금</text>
  <text x="194" y="179" font-size="8" fill="#8D6E63">9종 데이터셋 지원</text>

  <!-- 화살표 2→3 -->
  <line x1="311" y1="133" x2="331" y2="133" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. 변수 선택 -->
  <rect x="334" y="68" width="130" height="130" rx="8" fill="url(#cardVar)" filter="url(#shadow)"/>
  <rect x="334" y="68" width="130" height="28" rx="8" fill="#2E7D32" opacity="0.1"/>
  <text x="399" y="87" font-size="12" font-weight="700" fill="#2E7D32" text-anchor="middle">변수 선택</text>
  <line x1="344" y1="100" x2="454" y2="100" stroke="#A5D6A7" stroke-width="0.6"/>
  <text x="350" y="116" font-size="9" fill="#5D4037">· X 변수 (체크박스)</text>
  <text x="350" y="131" font-size="9" fill="#5D4037">· Y 변수 (드롭다운)</text>
  <text x="350" y="146" font-size="9" fill="#5D4037">· 다중 X 가중치</text>
  <text x="350" y="161" font-size="9" fill="#5D4037">· 합산 X 생성</text>
  <text x="350" y="179" font-size="8" fill="#8D6E63">가중치 슬라이더</text>

  <!-- 화살표 3→4 -->
  <line x1="467" y1="133" x2="487" y2="133" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. 데이터 분할 -->
  <rect x="490" y="68" width="130" height="130" rx="8" fill="url(#cardSplit)" filter="url(#shadow)"/>
  <rect x="490" y="68" width="130" height="28" rx="8" fill="#1565C0" opacity="0.1"/>
  <text x="555" y="87" font-size="12" font-weight="700" fill="#1565C0" text-anchor="middle">분할 (80:20)</text>
  <line x1="500" y1="100" x2="610" y2="100" stroke="#90CAF9" stroke-width="0.6"/>
  <text x="506" y="116" font-size="9" fill="#5D4037">· 훈련 세트 80%</text>
  <text x="506" y="131" font-size="9" fill="#5D4037">· 테스트 세트 20%</text>
  <text x="506" y="146" font-size="9" fill="#5D4037">· 랜덤 셔플</text>
  <text x="506" y="161" font-size="9" fill="#5D4037">· 재분할 가능</text>
  <text x="506" y="179" font-size="8" fill="#8D6E63">최소 5건 필요</text>

  <!-- 화살표 4→5 -->
  <line x1="623" y1="133" x2="643" y2="133" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. 학습 -->
  <rect x="646" y="68" width="130" height="130" rx="8" fill="url(#cardTrain)" filter="url(#shadow)"/>
  <rect x="646" y="68" width="130" height="28" rx="8" fill="#C62828" opacity="0.1"/>
  <text x="711" y="87" font-size="12" font-weight="700" fill="#C62828" text-anchor="middle">학습 (GD)</text>
  <line x1="656" y1="100" x2="766" y2="100" stroke="#EF9A9A" stroke-width="0.6"/>
  <text x="662" y="116" font-size="9" fill="#5D4037">· 경사 하강법</text>
  <text x="662" y="131" font-size="9" fill="#5D4037">· w, b 최적화</text>
  <text x="662" y="146" font-size="9" fill="#5D4037">· 학습률 조절</text>
  <text x="662" y="161" font-size="9" fill="#5D4037">· 에포크 반복</text>
  <text x="662" y="179" font-size="8" fill="#8D6E63">MSE 최소화 목표</text>

  <!-- ===== 꺾이는 화살표 (5 → 6) ===== -->

  <!-- ===== 하단 3카드 ===== -->

  <!-- 6. 시각화 -->
  <rect x="178" y="264" width="175" height="130" rx="8" fill="url(#cardViz)" filter="url(#shadow)"/>
  <rect x="178" y="264" width="175" height="28" rx="8" fill="#283593" opacity="0.1"/>
  <text x="265" y="283" font-size="12" font-weight="700" fill="#283593" text-anchor="middle">시각화</text>
  <line x1="188" y1="296" x2="343" y2="296" stroke="#9FA8DA" stroke-width="0.6"/>
  <text x="194" y="312" font-size="9" fill="#5D4037">· 산점도 (훈련/테스트 점)</text>
  <text x="194" y="327" font-size="9" fill="#5D4037">· 손실 곡선 (훈련/테스트 MSE)</text>
  <text x="194" y="342" font-size="9" fill="#5D4037">· 회귀선 (빨간 직선)</text>
  <text x="194" y="357" font-size="9" fill="#5D4037">· 오차선 (노란 점선)</text>
  <text x="194" y="372" font-size="9" fill="#5D4037">· ▶ 학습 과정 재생</text>

  <!-- 화살표 6→7 -->
  <line x1="356" y1="329" x2="396" y2="329" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. 결과 평가 -->
  <rect x="400" y="264" width="175" height="130" rx="8" fill="url(#cardResult)" filter="url(#shadow)"/>
  <rect x="400" y="264" width="175" height="28" rx="8" fill="#00695C" opacity="0.1"/>
  <text x="487" y="283" font-size="12" font-weight="700" fill="#00695C" text-anchor="middle">결과 평가</text>
  <line x1="410" y1="296" x2="565" y2="296" stroke="#80CBC4" stroke-width="0.6"/>
  <text x="416" y="312" font-size="9" fill="#5D4037">· R² (결정 계수)</text>
  <text x="416" y="327" font-size="9" fill="#5D4037">· 훈련 MSE / 테스트 MSE</text>
  <text x="416" y="342" font-size="9" fill="#5D4037">· 상태 판정 (✅⚠❌)</text>
  <text x="416" y="357" font-size="9" fill="#5D4037">· 과적합 감지</text>
  <text x="416" y="372" font-size="9" fill="#5D4037">· 수식: Y = wX + b</text>

  <!-- 화살표 7→8 -->
  <line x1="578" y1="329" x2="618" y2="329" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8. 추론 -->
  <rect x="622" y="264" width="155" height="130" rx="8" fill="url(#cardInfer)" filter="url(#shadow)"/>
  <rect x="622" y="264" width="155" height="28" rx="8" fill="#6A1B9A" opacity="0.1"/>
  <text x="699" y="283" font-size="12" font-weight="700" fill="#6A1B9A" text-anchor="middle">추론</text>
  <line x1="632" y1="296" x2="767" y2="296" stroke="#CE93D8" stroke-width="0.6"/>
  <text x="638" y="312" font-size="9" fill="#5D4037">· X 값 슬라이더 입력</text>
  <text x="638" y="327" font-size="9" fill="#5D4037">· Y 예측값 표시</text>
  <text x="638" y="342" font-size="9" fill="#5D4037">· 가이드선 시각화</text>
  <text x="638" y="357" font-size="9" fill="#5D4037">· 노란 예측점 표시</text>
  <text x="638" y="372" font-size="9" fill="#5D4037">· 수식 계산 과정</text>

  <!-- 5→6 연결선: 5번 하단 → 중간(y=215) → 좌(x=131) → 아래(y=313) → 우(시각화 박스) -->
  <polyline points="711,198 711,231 131,231 131,329 178,329" fill="none" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 단계 번호 뱃지 -->
  <circle cx="87" cy="58" r="8" fill="#E53935" opacity="0.9"/>
  <text x="87" y="62" font-size="8" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="243" cy="58" r="8" fill="#E53935" opacity="0.9"/>
  <text x="243" y="62" font-size="8" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="399" cy="58" r="8" fill="#E53935" opacity="0.9"/>
  <text x="399" y="62" font-size="8" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="555" cy="58" r="8" fill="#E53935" opacity="0.9"/>
  <text x="555" y="62" font-size="8" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="711" cy="58" r="8" fill="#E53935" opacity="0.9"/>
  <text x="711" y="62" font-size="8" font-weight="700" fill="white" text-anchor="middle">5</text>
  <circle cx="265" cy="254" r="8" fill="#E53935" opacity="0.9"/>
  <text x="265" y="258" font-size="8" font-weight="700" fill="white" text-anchor="middle">6</text>
  <circle cx="487" cy="254" r="8" fill="#E53935" opacity="0.9"/>
  <text x="487" y="258" font-size="8" font-weight="700" fill="white" text-anchor="middle">7</text>
  <circle cx="699" cy="254" r="8" fill="#E53935" opacity="0.9"/>
  <text x="699" y="258" font-size="8" font-weight="700" fill="white" text-anchor="middle">8</text>

  <!-- 하단 범례 -->
  <rect x="22" y="408" width="756" height="20" rx="4" fill="white" opacity="0.6"/>
  <text x="400" y="422" font-size="8.5" fill="#8D6E63" text-anchor="middle">데이터 입력 → 필터 → 변수 선택 → 분할 → 학습 → 시각화 → 결과 평가 → 추론  ·  재분할로 4~8단계 반복 가능</text>
</svg>
