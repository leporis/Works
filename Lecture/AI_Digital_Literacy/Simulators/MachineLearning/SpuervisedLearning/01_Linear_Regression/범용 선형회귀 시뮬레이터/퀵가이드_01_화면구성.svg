<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
    <style>
      text { font-family: 'Noto Sans CJK KR', sans-serif; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- 상단 제목 바 -->
  <rect x="16" y="12" width="768" height="40" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="32" y="38" font-size="14" font-weight="700" fill="#E53935">선형 회귀 학습 시뮬레이터  v2.0.0.0</text>

  <!-- [1] 모드 탭 -->
  <rect x="16" y="58" width="768" height="30" rx="6" fill="white" filter="url(#shadowSm)"/>
  <rect x="28" y="63" width="90" height="20" rx="5" fill="#E53935"/>
  <text x="73" y="77" font-size="10" font-weight="600" fill="white" text-anchor="middle">학습 모드</text>
  <rect x="124" y="63" width="90" height="20" rx="5" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.6"/>
  <text x="169" y="77" font-size="10" font-weight="500" fill="#8D6E63" text-anchor="middle">추론 모드</text>

  <!-- [1] 번호 -->
  <circle cx="760" cy="73" r="12" fill="#E53935"/>
  <text x="760" y="77" font-size="10" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="738" y="77" font-size="9" font-weight="600" fill="#E53935" text-anchor="end">모드 탭</text>

  <!-- ===== 3열 본체 ===== -->

  <!-- [2] 좌측 사이드바 -->
  <rect x="16" y="94" width="185" height="268" rx="10" fill="#FFF8F0" filter="url(#shadow)"/>
  <circle cx="36" cy="108" r="12" fill="#1E88E5"/>
  <text x="36" y="112" font-size="10" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="54" y="112" font-size="11" font-weight="600" fill="#1E88E5">좌측 사이드바</text>

  <!-- 좌측 항목들 -->
  <rect x="28" y="124" width="160" height="28" rx="5" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="142" font-size="9.5" fill="#5D4037">데이터셋 드롭다운</text>

  <rect x="28" y="158" width="160" height="28" rx="5" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="176" font-size="9.5" fill="#5D4037">X/Y 변수 + 가중치</text>

  <rect x="28" y="192" width="160" height="28" rx="5" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="210" font-size="9.5" fill="#5D4037">범주형 필터</text>
  <rect x="135" y="198" width="40" height="14" rx="7" fill="#1E88E5" opacity="0.6"/>
  <text x="155" y="209" font-size="7" fill="white" text-anchor="middle">칩 UI</text>

  <rect x="28" y="226" width="160" height="28" rx="5" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="244" font-size="9.5" fill="#5D4037">데이터 테이블</text>

  <!-- [3] 우측 사이드바 -->
  <rect x="590" y="94" width="194" height="268" rx="10" fill="#FFF8F0" filter="url(#shadow)"/>
  <circle cx="610" cy="108" r="12" fill="#43A047"/>
  <text x="610" y="112" font-size="10" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="628" y="112" font-size="11" font-weight="600" fill="#43A047">우측 사이드바</text>

  <!-- 우측 항목들 -->
  <rect x="602" y="124" width="170" height="28" rx="5" fill="white" filter="url(#shadowSm)"/>
  <text x="612" y="142" font-size="9.5" fill="#5D4037">학습률 슬라이더</text>

  <rect x="602" y="158" width="170" height="28" rx="5" fill="white" filter="url(#shadowSm)"/>
  <text x="612" y="176" font-size="9.5" fill="#5D4037">에포크 슬라이더</text>

  <rect x="602" y="192" width="170" height="30" rx="7" fill="#E53935"/>
  <text x="687" y="212" font-size="11" font-weight="700" fill="white" text-anchor="middle">학습 실행</text>

  <rect x="602" y="228" width="170" height="24" rx="5" fill="white" stroke="#FFCCBC" stroke-width="0.7"/>
  <text x="687" y="244" font-size="9.5" font-weight="500" fill="#5D4037" text-anchor="middle">재분할 &amp; 재학습</text>

  <!-- [4] 중앙 차트 영역 -->
  <rect x="210" y="94" width="372" height="268" rx="10" fill="white" filter="url(#shadow)"/>
  <circle cx="230" cy="108" r="12" fill="#FF5722"/>
  <text x="230" y="112" font-size="10" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="248" y="112" font-size="11" font-weight="600" fill="#FF5722">차트 영역</text>

  <!-- 필터 배너 -->
  <rect x="222" y="122" width="348" height="18" rx="4" fill="#FFF3E0" stroke="#FF5722" stroke-width="0.6"/>
  <text x="396" y="134" font-size="8" font-weight="500" fill="#FF5722" text-anchor="middle">필터 배너 (필터 적용 시 표시)</text>

  <!-- 2개 차트 -->
  <rect x="222" y="146" width="168" height="100" rx="6" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.5"/>
  <text x="306" y="165" font-size="10" font-weight="600" fill="#5D4037" text-anchor="middle">손실 그래프</text>
  <polyline points="240,230 260,215 280,200 300,192 320,188 340,186 370,185" fill="none" stroke="#E53935" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="240,234 260,220 280,208 300,200 320,196 340,195 370,194" fill="none" stroke="#1E88E5" stroke-width="1" stroke-dasharray="3,2" stroke-linecap="round"/>
  <text x="306" y="244" font-size="7" fill="#8D6E63" text-anchor="middle">훈련 MSE / 테스트 MSE</text>

  <rect x="398" y="146" width="172" height="100" rx="6" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.5"/>
  <text x="484" y="165" font-size="10" font-weight="600" fill="#5D4037" text-anchor="middle">산점도</text>
  <!-- 산점도 점 + 회귀선 -->
  <circle cx="418" cy="228" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="432" cy="218" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="448" cy="210" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="465" cy="198" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="480" cy="192" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="498" cy="182" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="515" cy="175" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="535" cy="178" r="2" fill="#FF5722" opacity="0.4"/>
  <circle cx="550" cy="170" r="2" fill="#FF5722" opacity="0.4"/>
  <line x1="415" y1="232" x2="555" y2="166" stroke="#E53935" stroke-width="1.8" stroke-linecap="round"/>
  <text x="484" y="244" font-size="7" fill="#8D6E63" text-anchor="middle">훈련 + 테스트 + 회귀선</text>

  <!-- 결과 패널 -->
  <rect x="222" y="254" width="348" height="48" rx="6" fill="white" stroke="#FFCCBC" stroke-width="0.5"/>
  <text x="236" y="272" font-size="9.5" font-weight="600" fill="#5D4037">학습 결과 패널</text>
  <text x="236" y="290" font-size="8.5" fill="#8D6E63">에포크 | 훈련 MSE | 테스트 MSE | R² | 상태 판정</text>

  <!-- 결과 패널 하단: 오차선 + 재생 -->
  <rect x="222" y="306" width="168" height="22" rx="4" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.4"/>
  <text x="306" y="321" font-size="8" fill="#5D4037" text-anchor="middle">오차선 표시</text>
  <rect x="398" y="306" width="172" height="22" rx="4" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.4"/>
  <text x="484" y="321" font-size="8" fill="#5D4037" text-anchor="middle">학습 과정 재생</text>

  <!-- 하단 요약 바 -->
  <rect x="16" y="372" width="768" height="20" rx="4" fill="white" opacity="0.7"/>
  <text x="400" y="386" font-size="8.5" fill="#8D6E63" text-anchor="middle">[1] 모드 탭  ·  [2] 좌측: 데이터·변수·필터  ·  [3] 우측: 하이퍼파라미터·실행  ·  [4] 중앙: 차트·결과·재생</text>
</svg>
