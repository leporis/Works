  <text x="270" y="288.5" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">에포크</text>
  <text x="334" y="288.5" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">훈련 MSE</text>
  <text x="404" y="288.5" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">테스트 MSE</text>
  <text x="468" y="288.5" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">R²</text>
  <text x="524" y="288.5" font-size="7.5" font-weight="600" fill="#5D4037" text-anchor="middle">상태</text>

  <text x="270" y="304" font-size="8" fill="#3E2723" text-anchor="middle">500</text>
  <text x="334" y="304" font-size="8" fill="#3E2723" text-anchor="middle">22.34</text>
  <text x="404" y="304" font-size="8" fill="#3E2723" text-anchor="middle">24.87</text>
  <text x="468" y="304" font-size="8" fill="#43A047" font-weight="600" text-anchor="middle">0.74</text>
  <text x="524" y="304" font-size="8" fill="#FFC107" text-anchor="middle">△ 보통</text>

  <!-- 오차선 + 재생 컨트롤 영역 -->
  <rect x="232" y="316" width="155" height="30" rx="4" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.4"/>
  <text x="240" y="328" font-size="7.5" font-weight="500" fill="#5D4037">☑ 오차선 표시</text>
  <text x="240" y="340" font-size="6.5" fill="#8D6E63">· 오차선 = 실제값과 예측값의 차이</text>

  <rect x="395" y="316" width="165" height="30" rx="4" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.4"/>
  <text x="403" y="328" font-size="7.5" font-weight="500" fill="#5D4037">학습 과정 재생</text>
  <rect x="403" y="333" width="26" height="10" rx="2" fill="#E53935"/>
  <text x="416" y="341" font-size="6" fill="white" text-anchor="middle">▶</text>
  <rect x="433" y="333" width="20" height="10" rx="2" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.4"/>
  <text x="443" y="341" font-size="6" fill="#8D6E63" text-anchor="middle">⏸</text>
  <rect x="457" y="333" width="20" height="10" rx="2" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.4"/>
  <text x="467" y="341" font-size="6" fill="#8D6E63" text-anchor="middle">⏹</text>
  <text x="485" y="341" font-size="6" fill="#8D6E63">속도 ━●━</text>

  <!-- [2] 우측 사이드바 (260px 비율) -->
  <rect x="590" y="64" width="194" height="400" rx="10" fill="url(#sidebarGrad)" filter="url(#shadow)"/>

  <!-- 번호 원 [2] -->
  <circle cx="610" cy="78" r="10" fill="#E53935"/>
  <text x="610" y="82" font-size="10" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="624" y="82" font-size="10" font-weight="600" fill="#3E2723">우측 사이드바</text>

  <!-- 학습률 -->
  <rect x="602" y="94" width="170" height="56" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="612" y="109" font-size="9" font-weight="600" fill="#5D4037">학습률 (Learning Rate)</text>
  <text x="757" y="109" font-size="8" fill="#E53935" font-weight="600" text-anchor="end">0.01</text>
  <rect x="612" y="116" width="150" height="6" rx="3" fill="#F5F5F5"/>
  <rect x="612" y="116" width="55" height="6" rx="3" fill="#E53935" opacity="0.3"/>
  <circle cx="667" cy="119" r="5" fill="#E53935"/>
  <text x="612" y="140" font-size="6.5" fill="#8D6E63">0.001</text>
  <text x="762" y="140" font-size="6.5" fill="#8D6E63" text-anchor="end">0.1</text>

  <!-- 에포크 -->
  <rect x="602" y="158" width="170" height="56" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="612" y="173" font-size="9" font-weight="600" fill="#5D4037">에포크 (Epochs)</text>
  <text x="757" y="173" font-size="8" fill="#E53935" font-weight="600" text-anchor="end">500</text>
  <rect x="612" y="180" width="150" height="6" rx="3" fill="#F5F5F5"/>
  <rect x="612" y="180" width="50" height="6" rx="3" fill="#E53935" opacity="0.3"/>
  <circle cx="662" cy="183" r="5" fill="#E53935"/>
  <text x="612" y="204" font-size="6.5" fill="#8D6E63">100</text>
  <text x="762" y="204" font-size="6.5" fill="#8D6E63" text-anchor="end">2,000</text>

  <!-- 훈련/테스트 분할 바 -->
  <rect x="602" y="222" width="170" height="36" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="612" y="237" font-size="9" font-weight="600" fill="#5D4037">훈련/테스트 분할</text>
  <rect x="612" y="242" width="150" height="10" rx="4" fill="#FFCCBC"/>
  <rect x="612" y="242" width="120" height="10" rx="4" fill="#1E88E5" opacity="0.7"/>
  <text x="672" y="250" font-size="6.5" fill="white" font-weight="600" text-anchor="middle">훈련 80%</text>
  <text x="747" y="250" font-size="6" fill="#5D4037" text-anchor="middle">20%</text>

  <!-- 학습 실행 버튼 -->
  <rect x="602" y="268" width="170" height="34" rx="8" fill="#E53935" filter="url(#shadowSm)"/>
  <text x="687" y="290" font-size="12" font-weight="700" fill="white" text-anchor="middle">학습 실행</text>

  <!-- 재분할 버튼 -->
  <rect x="602" y="310" width="170" height="28" rx="6" fill="white" stroke="#FFCCBC" stroke-width="0.8"/>
  <text x="687" y="328" font-size="10" font-weight="500" fill="#5D4037" text-anchor="middle">재분할 &amp; 재학습</text>

  <!-- 하단 범례 바 -->
  <rect x="16" y="452" width="768" height="20" rx="4" fill="white" opacity="0.7"/>
  <text x="400" y="466" font-size="8" fill="#8D6E63" text-anchor="middle">[1] 좌측: 데이터 선택·필터·테이블  ·  [2] 우측: 하이퍼파라미터·학습 실행  ·  [3] 중앙: 차트·결과 패널·재생</text>
</svg>
