  <line x1="462" y1="195" x2="462" y2="202" stroke="#FFC107" stroke-width="0.8" stroke-dasharray="2,1" opacity="0.7"/>
  <line x1="500" y1="168" x2="500" y2="176" stroke="#FFC107" stroke-width="0.8" stroke-dasharray="2,1" opacity="0.7"/>
  <text x="484" y="244" font-size="6.5" fill="#8D6E63" text-anchor="middle">X (면적)</text>

  <!-- 범례 -->
  <circle cx="420" cy="130" r="2" fill="#1E88E5"/>
  <text x="426" y="133" font-size="6" fill="#8D6E63">훈련</text>
  <circle cx="450" cy="130" r="2" fill="#FF5722" opacity="0.5"/>
  <text x="456" y="133" font-size="6" fill="#8D6E63">테스트</text>
  <line x1="478" y1="130" x2="490" y2="130" stroke="#E53935" stroke-width="1.5"/>
  <text x="494" y="133" font-size="6" fill="#8D6E63">회귀선</text>

  <!-- 학습 결과 패널 -->
  <rect x="222" y="254" width="348" height="100" rx="6" fill="white" stroke="#FFCCBC" stroke-width="0.6"/>
  <text x="236" y="270" font-size="9" font-weight="600" fill="#5D4037">학습 결과</text>

