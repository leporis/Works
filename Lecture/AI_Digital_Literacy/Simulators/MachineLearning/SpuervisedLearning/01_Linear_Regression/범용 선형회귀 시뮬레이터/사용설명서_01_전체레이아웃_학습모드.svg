<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
    <!-- 번호 원 마커 -->
    <style>
      
      text { font-family: 'Noto Sans CJK KR', sans-serif; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="480" fill="url(#bgGrad)" rx="12"/>

  <!-- 상단 제목 바 -->
  <rect x="16" y="12" width="768" height="44" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="32" y="40" font-size="15" font-weight="700" fill="#E53935">선형 회귀 학습 시뮬레이터</text>
  <text x="260" y="40" font-size="10.5" font-weight="400" fill="#8D6E63">v2.0.0.0</text>

  <!-- 모드 탭 -->
  <rect x="320" y="20" width="100" height="28" rx="6" fill="#E53935"/>
  <text x="370" y="39" font-size="11" font-weight="600" fill="white" text-anchor="middle">학습 모드</text>
  <rect x="426" y="20" width="100" height="28" rx="6" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.8"/>
  <text x="476" y="39" font-size="11" font-weight="500" fill="#8D6E63" text-anchor="middle">추론 모드</text>

  <!-- ===== 3열 레이아웃 ===== -->

  <!-- [1] 좌측 사이드바 (240px 비율) -->
  <rect x="16" y="64" width="185" height="400" rx="10" fill="url(#sidebarGrad)" filter="url(#shadow)"/>

  <!-- 번호 원 [1] -->
  <circle cx="36" cy="78" r="10" fill="#E53935"/>
  <text x="36" y="82" font-size="10" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="50" y="82" font-size="10" font-weight="600" fill="#3E2723">좌측 사이드바</text>

  <!-- 데이터셋 드롭다운 -->
  <rect x="28" y="94" width="160" height="38" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="109" font-size="9" font-weight="600" fill="#5D4037">데이터셋</text>
  <rect x="36" y="115" width="144" height="14" rx="3" fill="#F5F5F5" stroke="#BCAAA4" stroke-width="0.6"/>
  <text x="44" y="125" font-size="8" fill="#8D6E63">보스턴 주택가격 ▼</text>

  <!-- X/Y 변수 선택 -->
  <rect x="28" y="140" width="160" height="54" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="155" font-size="9" font-weight="600" fill="#5D4037">변수 선택</text>
  <rect x="36" y="161" width="68" height="13" rx="2.5" fill="#E8F5E9" stroke="#43A047" stroke-width="0.5"/>
  <text x="42" y="170.5" font-size="7.5" fill="#2E7D32">☑ X: 면적</text>
  <rect x="110" y="161" width="68" height="13" rx="2.5" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.5"/>
  <text x="116" y="170.5" font-size="7.5" fill="#1565C0">Y: 가격 ▼</text>
  <rect x="36" y="178" width="144" height="10" rx="2" fill="#F5F5F5"/>
  <text x="42" y="186" font-size="7" fill="#8D6E63">가중치 ━━━●━━━━━</text>

  <!-- 범주형 필터 -->
  <rect x="28" y="202" width="160" height="48" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="217" font-size="9" font-weight="600" fill="#5D4037">범주형 필터</text>
  <rect x="36" y="224" width="38" height="14" rx="7" fill="#1E88E5"/>
  <text x="55" y="234" font-size="7" fill="white" text-anchor="middle">setosa</text>
  <rect x="78" y="224" width="50" height="14" rx="7" fill="#1E88E5"/>
  <text x="103" y="234" font-size="7" fill="white" text-anchor="middle">versicolor</text>
  <rect x="132" y="224" width="46" height="14" rx="7" fill="#E0E0E0"/>
  <text x="155" y="234" font-size="7" fill="#757575" text-anchor="middle">virginica</text>

  <!-- 데이터 테이블 -->
  <rect x="28" y="258" width="160" height="86" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="38" y="273" font-size="9" font-weight="600" fill="#5D4037">데이터 테이블</text>
  <!-- 테이블 헤더 -->
  <rect x="36" y="280" width="144" height="12" rx="2" fill="#FFF3E0"/>
  <text x="62" y="289" font-size="7" fill="#5D4037" text-anchor="middle">X</text>
  <text x="108" y="289" font-size="7" fill="#5D4037" text-anchor="middle">Y</text>
  <text x="146" y="289" font-size="7" fill="#5D4037" text-anchor="middle">분할</text>
  <!-- 행들 -->
  <line x1="36" y1="294" x2="180" y2="294" stroke="#FFCCBC" stroke-width="0.4"/>
  <text x="62" y="303" font-size="7" fill="#8D6E63" text-anchor="middle">6.5</text>
  <text x="108" y="303" font-size="7" fill="#8D6E63" text-anchor="middle">296</text>
  <text x="146" y="303" font-size="7" fill="#1E88E5" text-anchor="middle">훈련</text>
  <line x1="36" y1="307" x2="180" y2="307" stroke="#FFCCBC" stroke-width="0.3"/>
  <text x="62" y="316" font-size="7" fill="#8D6E63" text-anchor="middle">7.2</text>
  <text x="108" y="316" font-size="7" fill="#8D6E63" text-anchor="middle">312</text>
  <text x="146" y="316" font-size="7" fill="#FF5722" text-anchor="middle">테스트</text>
  <line x1="36" y1="320" x2="180" y2="320" stroke="#FFCCBC" stroke-width="0.3"/>
  <text x="108" y="334" font-size="7" fill="#BCAAA4" text-anchor="middle">⋮</text>

  <!-- 데이터 건수 배지 -->
  <rect x="28" y="348" width="160" height="22" rx="6" fill="white" filter="url(#shadowSm)"/>
  <text x="108" y="363" font-size="8" fill="#5D4037" text-anchor="middle">전체 506건 · 훈련 404 · 테스트 102</text>

  <!-- [3] 중앙 차트 영역 -->
  <rect x="210" y="64" width="372" height="400" rx="10" fill="white" filter="url(#shadow)"/>

  <!-- 번호 원 [3] -->
  <circle cx="230" cy="78" r="10" fill="#E53935"/>
  <text x="230" y="82" font-size="10" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="244" y="82" font-size="10" font-weight="600" fill="#3E2723">중앙 차트 영역</text>

  <!-- 필터 배너 (주황) -->
  <rect x="222" y="92" width="348" height="18" rx="4" fill="#FFF3E0" stroke="#FF5722" stroke-width="0.6"/>
  <text x="396" y="104" font-size="8" font-weight="500" fill="#FF5722" text-anchor="middle">필터 적용 중: 품종 = setosa, versicolor (102건)</text>

  <!-- 손실 그래프 -->
  <rect x="222" y="116" width="168" height="130" rx="6" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.5"/>
  <text x="306" y="131" font-size="9" font-weight="600" fill="#5D4037" text-anchor="middle">손실 그래프</text>
  <!-- 미니 손실 곡선 -->
  <polyline points="240,230 260,210 280,190 300,180 320,176 340,174 360,173 375,172" fill="none" stroke="#E53935" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="240,234 260,216 280,198 300,188 320,184 340,183 360,182 375,181" fill="none" stroke="#1E88E5" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round"/>
  <!-- 축 -->
  <line x1="238" y1="138" x2="238" y2="236" stroke="#BCAAA4" stroke-width="0.5"/>
  <line x1="238" y1="236" x2="378" y2="236" stroke="#BCAAA4" stroke-width="0.5"/>
  <text x="234" y="190" font-size="6.5" fill="#8D6E63" text-anchor="end" transform="rotate(-90 234 190)">Loss</text>
  <text x="308" y="244" font-size="6.5" fill="#8D6E63" text-anchor="middle">Epoch</text>

  <!-- 산점도 -->
  <rect x="398" y="116" width="172" height="130" rx="6" fill="#FAFAFA" stroke="#FFCCBC" stroke-width="0.5"/>
  <text x="484" y="131" font-size="9" font-weight="600" fill="#5D4037" text-anchor="middle">X vs Y</text>
  <!-- 축 -->
  <line x1="416" y1="138" x2="416" y2="236" stroke="#BCAAA4" stroke-width="0.5"/>
  <line x1="416" y1="236" x2="556" y2="236" stroke="#BCAAA4" stroke-width="0.5"/>
  <!-- 데이터 점 -->
  <circle cx="430" cy="220" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="442" cy="210" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="455" cy="205" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="462" cy="195" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="475" cy="188" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="488" cy="175" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="500" cy="168" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="510" cy="162" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="522" cy="155" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <circle cx="535" cy="148" r="2.5" fill="#1E88E5" opacity="0.6"/>
  <!-- 테스트 데이터 점 -->
  <circle cx="448" cy="215" r="2" fill="#FF5722" opacity="0.4"/>
  <circle cx="480" cy="182" r="2" fill="#FF5722" opacity="0.4"/>
  <circle cx="515" cy="158" r="2" fill="#FF5722" opacity="0.4"/>
  <!-- 회귀선 -->
  <line x1="425" y1="226" x2="545" y2="142" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
