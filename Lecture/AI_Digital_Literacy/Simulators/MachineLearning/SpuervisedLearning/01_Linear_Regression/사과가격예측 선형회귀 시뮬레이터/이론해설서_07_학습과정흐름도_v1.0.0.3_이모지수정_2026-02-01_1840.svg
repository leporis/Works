<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="900" height="600" fill="#FFFBF5"/>
  
  <!-- 제목 -->
  <text x="450" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#1565C0">선형 회귀 학습 과정</text>
  
  <!-- 1. 데이터 준비 (녹색) -->
  <rect x="30" y="80" width="160" height="100" rx="12" fill="white" stroke="#43A047" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="50" cy="100" r="16" fill="#43A047"/>
  <text x="50" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text>
  <text x="110" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#2E7D32">데이터 준비</text>
  <text x="110" y="130" text-anchor="middle" font-size="12" fill="#5D4037">당도, 무게 →</text>
  <text x="110" y="148" text-anchor="middle" font-size="12" fill="#5D4037">품질 점수</text>
  <text x="110" y="168" text-anchor="middle" font-size="11" fill="#8D6E63">(X, Y) 데이터셋</text>
  
  <!-- 화살표 1→2 -->
  <path d="M190 130 L230 130" stroke="#43A047" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#43A047"/>
    </marker>
  </defs>
  
  <!-- 2. 가중치 초기화 (파랑) -->
  <rect x="240" y="80" width="160" height="100" rx="12" fill="white" stroke="#1976D2" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="260" cy="100" r="16" fill="#1976D2"/>
  <text x="260" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="white">2</text>
  <text x="320" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#1565C0">가중치 초기화</text>
  <text x="320" y="135" text-anchor="middle" font-size="13" fill="#5D4037" font-family="'JetBrains Mono', monospace">w = 0</text>
  <text x="320" y="155" text-anchor="middle" font-size="13" fill="#5D4037" font-family="'JetBrains Mono', monospace">b = 0</text>
  <text x="320" y="172" text-anchor="middle" font-size="11" fill="#8D6E63">랜덤 또는 0으로</text>
  
  <!-- 화살표 2→3 -->
  <path d="M400 130 L440 130" stroke="#1976D2" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976D2"/>
    </marker>
  </defs>
  
  <!-- 3. 예측 계산 (보라) -->
  <rect x="450" y="80" width="160" height="100" rx="12" fill="white" stroke="#7B1FA2" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="470" cy="100" r="16" fill="#7B1FA2"/>
  <text x="470" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="white">3</text>
  <text x="530" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#6A1B9A">예측 계산</text>
  <text x="530" y="135" text-anchor="middle" font-size="13" fill="#5D4037" font-family="'JetBrains Mono', monospace">ŷ = w×x + b</text>
  <text x="530" y="158" text-anchor="middle" font-size="11" fill="#8D6E63">현재 가중치로</text>
  <text x="530" y="172" text-anchor="middle" font-size="11" fill="#8D6E63">가격 예측</text>
  
  <!-- 화살표 3→4 -->
  <path d="M610 130 L650 130" stroke="#7B1FA2" stroke-width="3" fill="none" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7B1FA2"/>
    </marker>
  </defs>
  
  <!-- 4. 손실 계산 (주황) -->
  <rect x="660" y="80" width="200" height="100" rx="12" fill="white" stroke="#F57C00" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="680" cy="100" r="16" fill="#F57C00"/>
  <text x="680" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="white">4</text>
  <text x="760" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#E65100">손실 계산</text>
  <text x="760" y="135" text-anchor="middle" font-size="13" fill="#5D4037" font-family="'JetBrains Mono', monospace">MSE = Σ(y-ŷ)²/n</text>
  <text x="760" y="158" text-anchor="middle" font-size="11" fill="#8D6E63">실제값과 예측값</text>
  <text x="760" y="172" text-anchor="middle" font-size="11" fill="#8D6E63">차이 측정</text>
  
  <!-- 화살표 4→5 (아래로) -->
  <path d="M760 180 L760 230" stroke="#F57C00" stroke-width="3" fill="none" marker-end="url(#arrowOrange)"/>
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="3" refY="9" orient="auto">
      <path d="M0,0 L6,0 L3,9 z" fill="#F57C00"/>
    </marker>
  </defs>
  
  <!-- 반복! 표시 -->
  <rect x="540" y="200" width="70" height="30" rx="15" fill="#FFC107"/>
  <text x="575" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#5D4037">반복!</text>
  
  <!-- 5. 기울기 계산 (주황) -->
  <rect x="660" y="240" width="200" height="100" rx="12" fill="white" stroke="#F57C00" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="680" cy="260" r="16" fill="#F57C00"/>
  <text x="680" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="white">5</text>
  <text x="760" y="265" text-anchor="middle" font-size="16" font-weight="600" fill="#E65100">기울기 계산</text>
  <text x="760" y="295" text-anchor="middle" font-size="12" fill="#5D4037" font-family="'JetBrains Mono', monospace">∇w = ∂MSE/∂w</text>
  <text x="760" y="315" text-anchor="middle" font-size="12" fill="#5D4037" font-family="'JetBrains Mono', monospace">∇b = ∂MSE/∂b</text>
  <text x="760" y="332" text-anchor="middle" font-size="11" fill="#8D6E63">손실 감소 방향</text>
  
  <!-- 화살표 5→6 -->
  <path d="M660 290 L490 290" stroke="#FFC107" stroke-width="3" fill="none" marker-end="url(#arrowYellow)"/>
  <defs>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M9,0 L9,6 L0,3 z" fill="#FFC107"/>
    </marker>
  </defs>
  
  <!-- 6. 가중치 업데이트 (노랑) -->
  <rect x="290" y="240" width="200" height="100" rx="12" fill="white" stroke="#FFC107" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="310" cy="260" r="16" fill="#FFC107"/>
  <text x="310" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="#5D4037">6</text>
  <text x="390" y="265" text-anchor="middle" font-size="16" font-weight="600" fill="#F9A825">가중치 업데이트</text>
  <text x="390" y="295" text-anchor="middle" font-size="12" fill="#5D4037" font-family="'JetBrains Mono', monospace">w = w - η×∇w</text>
  <text x="390" y="315" text-anchor="middle" font-size="12" fill="#5D4037" font-family="'JetBrains Mono', monospace">b = b - η×∇b</text>
  <text x="390" y="332" text-anchor="middle" font-size="11" fill="#8D6E63">학습률만큼 이동</text>
  
  <!-- 화살표 6→3 (위로, 반복) -->
  <path d="M390 240 L390 200 L530 200 L530 180" stroke="#FFC107" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  
  <!-- 에포크 종료 표시 -->
  <rect x="140" y="275" width="90" height="30" rx="15" fill="#1976D2"/>
  <text x="185" y="295" text-anchor="middle" font-size="12" font-weight="500" fill="white">에포크 종료</text>
  
  <!-- 화살표 6→7 -->
  <path d="M290 290 L190 290" stroke="#1976D2" stroke-width="3" fill="none" marker-end="url(#arrowBlue2)"/>
  <defs>
    <marker id="arrowBlue2" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M9,0 L9,6 L0,3 z" fill="#1976D2"/>
    </marker>
  </defs>
  
  <!-- 7. 학습 완료 (녹색) -->
  <rect x="30" y="320" width="160" height="110" rx="12" fill="white" stroke="#43A047" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="50" cy="340" r="16" fill="#43A047"/>
  <text x="50" y="346" text-anchor="middle" font-size="14" font-weight="700" fill="white">7</text>
  <text x="110" y="345" text-anchor="middle" font-size="16" font-weight="600" fill="#2E7D32">학습 완료!</text>
  <text x="110" y="372" text-anchor="middle" font-size="11" fill="#8D6E63">최적의 w, b 획득</text>
  <text x="110" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#1565C0" font-family="'JetBrains Mono', monospace">가격 = w×품질 + b</text>
  <text x="110" y="418" text-anchor="middle" font-size="11" fill="#43A047">예측 준비 완료!</text>
  
  <!-- 하단 요약 박스 -->
  <rect x="30" y="460" width="840" height="120" rx="12" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="450" y="490" text-anchor="middle" font-size="18" font-weight="700" fill="#2E7D32">학습 과정 요약</text>
  
  <text x="60" y="520" font-size="13" fill="#5D4037">① 데이터 준비 (품질→가격)</text>
  <text x="320" y="520" font-size="13" fill="#5D4037">② 가중치 초기화 (w=0, b=0)</text>
  <text x="600" y="520" font-size="13" fill="#5D4037">③ 현재 가중치로 예측</text>
  
  <text x="60" y="545" font-size="13" fill="#5D4037">④ 손실(MSE) 계산</text>
  <text x="320" y="545" font-size="13" fill="#5D4037">⑤ 기울기 계산 (방향 파악)</text>
  <text x="600" y="545" font-size="13" fill="#5D4037">⑥ 가중치 업데이트</text>
  
  <text x="450" y="570" text-anchor="middle" font-size="14" font-weight="600" fill="#1565C0">⑦ ③~⑥ 반복 → 손실이 충분히 작아지면 완료!</text>
</svg>
