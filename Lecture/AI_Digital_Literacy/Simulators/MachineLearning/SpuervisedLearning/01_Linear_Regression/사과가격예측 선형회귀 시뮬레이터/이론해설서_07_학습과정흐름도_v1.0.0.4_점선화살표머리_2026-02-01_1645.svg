<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 850">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#E53935"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#888888"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="1400" height="850" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="700" y="55" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="32" font-weight="700" fill="#C62828">📊 선형 회귀 학습 과정</text>
  
  <!-- ========== 1단계: 데이터 준비 (녹색) ========== -->
  <g filter="url(#shadow)">
    <rect x="50" y="100" width="240" height="160" rx="16" fill="white" stroke="#43A047" stroke-width="4"/>
    <circle cx="80" cy="125" r="22" fill="#43A047"/>
    <text x="80" y="132" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="white">1</text>
    <text x="185" y="130" text-anchor="middle" font-family="Noto Sans KR" font-size="18" font-weight="600" fill="#3E2723">데이터 준비</text>
    <text x="170" y="175" text-anchor="middle" font-family="Noto Sans KR" font-size="14" fill="#43A047">당도, 무게 →</text>
    <text x="170" y="200" text-anchor="middle" font-family="Noto Sans KR" font-size="14" fill="#43A047">품질 점수</text>
    <text x="170" y="235" text-anchor="middle" font-family="Noto Sans KR" font-size="12" fill="#8D6E63">(X, Y) 데이터셋</text>
  </g>
  
  <!-- 화살표 1→2 -->
  <line x1="290" y1="180" x2="345" y2="180" stroke="#E53935" stroke-width="4" marker-end="url(#arrowRed)"/>
  
  <!-- ========== 2단계: 가중치 초기화 (파랑) - 수정됨 ========== -->
  <g filter="url(#shadow)">
    <rect x="355" y="100" width="240" height="160" rx="16" fill="white" stroke="#1976D2" stroke-width="4"/>
    <circle cx="385" cy="125" r="22" fill="#1976D2"/>
    <text x="385" y="132" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="white">2</text>
    <text x="500" y="130" text-anchor="middle" font-family="Noto Sans KR" font-size="18" font-weight="600" fill="#3E2723">가중치 초기화</text>
    <!-- 수정: w = 0 → w = 랜덤(작은 값) -->
    <text x="475" y="175" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#1976D2">w = 랜덤(작은 값)</text>
    <text x="475" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#1976D2">b = 0</text>
    <text x="475" y="235" text-anchor="middle" font-family="Noto Sans KR" font-size="12" fill="#8D6E63">랜덤 또는 0으로</text>
  </g>
  
  <!-- 화살표 2→3 -->
  <line x1="595" y1="180" x2="650" y2="180" stroke="#E53935" stroke-width="4" marker-end="url(#arrowRed)"/>
  
  <!-- ========== 3단계: 예측 계산 (보라) ========== -->
  <g filter="url(#shadow)">
    <rect x="660" y="100" width="240" height="160" rx="16" fill="white" stroke="#9C27B0" stroke-width="4"/>
    <circle cx="690" cy="125" r="22" fill="#9C27B0"/>
    <text x="690" y="132" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="white">3</text>
    <text x="805" y="130" text-anchor="middle" font-family="Noto Sans KR" font-size="18" font-weight="600" fill="#3E2723">예측 계산</text>
    <text x="780" y="180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#9C27B0">ŷ = w×x + b</text>
    <text x="780" y="220" text-anchor="middle" font-family="Noto Sans KR" font-size="12" fill="#8D6E63">현재 가중치로</text>
    <text x="780" y="240" text-anchor="middle" font-family="Noto Sans KR" font-size="12" fill="#8D6E63">가격 예측</text>
  </g>
  
  <!-- 화살표 3→4 -->
  <line x1="900" y1="180" x2="955" y2="180" stroke="#E53935" stroke-width="4" marker-end="url(#arrowRed)"/>
  
  <!-- ========== 4단계: 손실 계산 (빨강) ========== -->
  <g filter="url(#shadow)">
    <rect x="965" y="100" width="240" height="160" rx="16" fill="white" stroke="#E53935" stroke-width="4"/>
    <circle cx="995" cy="125" r="22" fill="#E53935"/>
    <text x="995" y="132" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="white">4</text>
    <text x="1110" y="130" text-anchor="middle" font-family="Noto Sans KR" font-size="18" font-weight="600" fill="#3E2723">손실 계산</text>
    <text x="1085" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" fill="#E53935">MSE = Σ(y-ŷ)²/n</text>
    <text x="1085" y="215" text-anchor="middle" font-family="Noto Sans KR" font-size="12" fill="#C62828">실제값과 예측값</text>
    <text x="1085" y="235" text-anchor="middle" font-family="Noto Sans KR" font-size="12" fill="#C62828">차이 측정</text>
  </g>
  
  <!-- 화살표 4→5 (아래로) -->
  <line x1="1085" y1="260" x2="1085" y2="340" stroke="#E53935" stroke-width="4" marker-end="url(#arrowRed)"/>
  
  <!-- ========== 반복 화살표 (6→3) ========== -->
  <path d="M 780 350 L 780 300 L 780 270" stroke="#E53935" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <rect x="820" y="290" width="60" height="28" rx="6" fill="#FFF3E0" stroke="#E53935" stroke-width="2"/>
  <text x="850" y="310" text-anchor="middle" font-family="Noto Sans KR" font-size="14" font-weight="600" fill="#E53935">반복!</text>
  
  <!-- ========== 5단계: 기울기 계산 (빨강) ========== -->
  <g filter="url(#shadow)">
    <rect x="965" y="350" width="240" height="160" rx="16" fill="white" stroke="#E53935" stroke-width="4"/>
    <circle cx="995" cy="375" r="22" fill="#E53935"/>
    <text x="995" y="382" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="white">5</text>
    <text x="1110" y="380" text-anchor="middle" font-family="Noto Sans KR" font-size="18" font-weight="600" fill="#3E2723">기울기 계산</text>
    <text x="1085" y="425" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#E53935">∇w = ∂MSE/∂w</text>
    <text x="1085" y="455" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#E53935">∇b = ∂MSE/∂b</text>
    <text x="1085" y="495" text-anchor="middle" font-family="Noto Sans KR" font-size="12" fill="#8D6E63">손실 감소 방향</text>
  </g>
  
  <!-- 화살표 5→6 (왼쪽으로) -->
  <line x1="965" y1="430" x2="905" y2="430" stroke="#E53935" stroke-width="4" marker-end="url(#arrowRed)"/>
  
  <!-- ========== 6단계: 가중치 업데이트 (노랑) ========== -->
  <g filter="url(#shadow)">
    <rect x="660" y="350" width="240" height="160" rx="16" fill="white" stroke="#FFC107" stroke-width="4"/>
    <circle cx="690" cy="375" r="22" fill="#FFC107"/>
    <text x="690" y="382" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="#3E2723">6</text>
    <text x="815" y="380" text-anchor="middle" font-family="Noto Sans KR" font-size="18" font-weight="600" fill="#3E2723">가중치 업데이트</text>
    <text x="780" y="425" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#F57C00">w = w - η×∇w</text>
    <text x="780" y="455" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#F57C00">b = b - η×∇b</text>
    <text x="780" y="495" text-anchor="middle" font-family="Noto Sans KR" font-size="12" fill="#8D6E63">학습률만큼 이동</text>
  </g>
  
  <!-- 화살표 6→7 (왼쪽으로) + 에포크 종료 -->
  <line x1="660" y1="430" x2="540" y2="430" stroke="#888888" stroke-width="4" marker-end="url(#arrowGray)"/>
  <rect x="545" y="455" width="100" height="26" rx="6" fill="#FFF3E0" stroke="#888888" stroke-width="1"/>
  <text x="595" y="474" text-anchor="middle" font-family="Noto Sans KR" font-size="13" fill="#666666">에포크 종료</text>
  
  <!-- ========== 7단계: 학습 완료 (녹색) ========== -->
  <g filter="url(#shadow)">
    <rect x="290" y="350" width="240" height="160" rx="16" fill="white" stroke="#43A047" stroke-width="4"/>
    <circle cx="320" cy="375" r="22" fill="#43A047"/>
    <text x="320" y="382" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="white">7</text>
    <text x="435" y="380" text-anchor="middle" font-family="Noto Sans KR" font-size="18" font-weight="600" fill="#3E2723">학습 완료!</text>
    <text x="410" y="420" text-anchor="middle" font-family="Noto Sans KR" font-size="14" fill="#43A047">최적의 w, b 획득</text>
    <text x="410" y="455" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600" fill="#43A047">가격 = w×품질 + b</text>
    <text x="410" y="495" text-anchor="middle" font-family="Noto Sans KR" font-size="13" fill="#E53935">예측 준비 완료!</text>
  </g>
  
  <!-- ========== 하단 요약 박스 ========== -->
  <g filter="url(#shadow)">
    <rect x="100" y="560" width="1200" height="200" rx="20" fill="white" stroke="#FFCCBC" stroke-width="3"/>
    <rect x="100" y="560" width="1200" height="55" rx="20" fill="#FFF3E0"/>
    <rect x="100" y="595" width="1200" height="20" fill="#FFF3E0"/>
    <text x="700" y="600" text-anchor="middle" font-family="Noto Sans KR" font-size="24" font-weight="700" fill="#C62828">📋 학습 과정 요약</text>
    
    <!-- 요약 내용 - 3열 배치 -->
    <!-- 1행 -->
    <text x="200" y="660" text-anchor="start" font-family="Noto Sans KR" font-size="16" fill="#5D4037">① 데이터 준비 (품질→가격)</text>
    <!-- 수정: w=0 → w=랜덤 -->
    <text x="550" y="660" text-anchor="start" font-family="Noto Sans KR" font-size="16" fill="#5D4037">② 가중치 초기화 (w=랜덤, b=0)</text>
    <text x="950" y="660" text-anchor="start" font-family="Noto Sans KR" font-size="16" fill="#5D4037">③ 현재 가중치로 예측</text>
    
    <!-- 2행 -->
    <text x="200" y="700" text-anchor="start" font-family="Noto Sans KR" font-size="16" fill="#5D4037">④ 손실(MSE) 계산</text>
    <text x="550" y="700" text-anchor="start" font-family="Noto Sans KR" font-size="16" fill="#5D4037">⑤ 기울기 계산 (방향 파악)</text>
    <text x="950" y="700" text-anchor="start" font-family="Noto Sans KR" font-size="16" fill="#5D4037">⑥ 가중치 업데이트</text>
    
    <!-- 마지막 줄 강조 -->
    <text x="700" y="750" text-anchor="middle" font-family="Noto Sans KR" font-size="18" font-weight="600" fill="#E53935">⑦ ③~⑥ 반복 → 손실이 충분히 작아지면 완료!</text>
  </g>
</svg>