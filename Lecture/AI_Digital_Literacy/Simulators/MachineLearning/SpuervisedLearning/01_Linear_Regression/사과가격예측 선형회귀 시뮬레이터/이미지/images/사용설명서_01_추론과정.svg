<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9C27B0"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#9C27B0">🔮 추론 과정 (새 사과 가격 예측)</text>
  
  <!-- Step 1: 입력 -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="170" height="140" rx="12" fill="white" stroke="#FFC107" stroke-width="2"/>
    <rect x="30" y="70" width="170" height="35" rx="12" fill="#FFC107"/>
    <text x="115" y="94" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">① 새 사과 입력</text>
    
    <text x="115" y="125" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">🍯 당도: 15 Brix</text>
    <text x="115" y="150" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">⚖️ 무게: 280g</text>
    
    <rect x="50" y="165" width="130" height="35" rx="6" fill="#FFF8E1"/>
    <text x="115" y="188" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#8D6E63">슬라이더로 조절</text>
  </g>
  
  <!-- 화살표 1→2 -->
  <line x1="200" y1="140" x2="230" y2="140" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: 품질 계산 -->
  <g filter="url(#shadow)">
    <rect x="240" y="70" width="170" height="140" rx="12" fill="white" stroke="#43A047" stroke-width="2"/>
    <rect x="240" y="70" width="170" height="35" rx="12" fill="#43A047"/>
    <text x="325" y="94" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="white">② 품질 점수 계산</text>
    
    <text x="325" y="122" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">당도점수: (15-10)/8×50</text>
    <text x="325" y="140" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#43A047">= 31.25점</text>
    
    <text x="325" y="162" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">무게점수: (280-150)/200×50</text>
    <text x="325" y="180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#43A047">= 32.5점</text>
    
    <rect x="260" y="180" width="130" height="20" rx="4" fill="#E8F5E9"/>
    <text x="325" y="194" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#2E7D32">총 63.75점</text>
  </g>
  
  <!-- 화살표 2→3 -->
  <line x1="410" y1="140" x2="440" y2="140" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: 회귀식 적용 -->
  <g filter="url(#shadow)">
    <rect x="450" y="70" width="170" height="140" rx="12" fill="white" stroke="#9C27B0" stroke-width="2"/>
    <rect x="450" y="70" width="170" height="35" rx="12" fill="#9C27B0"/>
    <text x="535" y="94" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="white">③ 회귀식 적용</text>
    
    <text x="535" y="125" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">학습된 회귀식:</text>
    <text x="535" y="148" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#9C27B0">가격 = 30×품질 + 1000</text>
    
    <line x1="470" y1="165" x2="600" y2="165" stroke="#E1BEE7" stroke-width="1"/>
    
    <text x="535" y="180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5D4037">= 30 × 63.75 + 1000</text>
    <text x="535" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#9C27B0">= 2,912.5원</text>
  </g>
  
  <!-- 화살표 3→4 -->
  <line x1="620" y1="140" x2="650" y2="140" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: 결과 -->
  <g filter="url(#shadow)">
    <rect x="660" y="70" width="110" height="140" rx="12" fill="#9C27B0"/>
    <text x="715" y="105" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="white">④ 예측 결과</text>
    
    <rect x="675" y="120" width="80" height="70" rx="8" fill="white"/>
    <text x="715" y="145" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">예측 가격</text>
    <text x="715" y="175" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#9C27B0">2,913원</text>
  </g>
  
  <!-- 하단: 시각화 설명 -->
  <g filter="url(#shadow)">
    <rect x="30" y="240" width="740" height="140" rx="12" fill="white"/>
    <text x="400" y="270" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="#3E2723">📈 추론 시각화 (시뮬레이터 화면)</text>
    
    <!-- 미니 그래프 -->
    <rect x="60" y="285" width="280" height="80" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- 축 -->
    <line x1="90" y1="350" x2="320" y2="350" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="90" y1="350" x2="90" y2="295" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 데이터 점들 (흐리게) -->
    <circle cx="120" cy="340" r="3" fill="#BDBDBD" opacity="0.5"/>
    <circle cx="150" cy="330" r="3" fill="#BDBDBD" opacity="0.5"/>
    <circle cx="180" cy="320" r="3" fill="#BDBDBD" opacity="0.5"/>
    <circle cx="210" cy="315" r="3" fill="#BDBDBD" opacity="0.5"/>
    <circle cx="240" cy="310" r="3" fill="#BDBDBD" opacity="0.5"/>
    <circle cx="270" cy="305" r="3" fill="#BDBDBD" opacity="0.5"/>
    <circle cx="300" cy="300" r="3" fill="#BDBDBD" opacity="0.5"/>
    
    <!-- 회귀선 -->
    <line x1="100" y1="345" x2="310" y2="295" stroke="#E53935" stroke-width="2"/>
    
    <!-- 수직선 (품질→회귀선) -->
    <line x1="220" y1="350" x2="220" y2="312" stroke="#FFC107" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- 수평선 (회귀선→가격) -->
    <line x1="220" y1="312" x2="90" y2="312" stroke="#FFC107" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- 예측점 -->
    <circle cx="220" cy="312" r="8" fill="#FFC107" stroke="#FF9800" stroke-width="2"/>
    
    <!-- 레이블 -->
    <text x="220" y="365" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">품질 63.75</text>
    <text x="70" y="315" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">2,913</text>
    
    <!-- 설명 박스들 -->
    <rect x="370" y="290" width="180" height="45" rx="6" fill="#FFF3E0"/>
    <text x="460" y="308" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">📍 수직 점선</text>
    <text x="460" y="325" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">품질 점수 → 회귀선</text>
    
    <rect x="560" y="290" width="180" height="45" rx="6" fill="#E3F2FD"/>
    <text x="650" y="308" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">📍 수평 점선</text>
    <text x="650" y="325" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">회귀선 → 가격 축</text>
    
    <rect x="460" y="345" width="180" height="30" rx="6" fill="#FCE4EC"/>
    <text x="550" y="365" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#C62828">🟡 노란 점 = 예측 위치</text>
  </g>
</svg>
