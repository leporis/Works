<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5D4037"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#FFC107">📊 데이터 생성 패널</text>
  
  <!-- 왼쪽: 실제 패널 UI -->
  <g filter="url(#shadow)">
    <rect x="50" y="60" width="240" height="340" rx="16" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <rect x="50" y="60" width="240" height="45" rx="16" fill="#FFC107"/>
    <rect x="50" y="90" width="240" height="15" fill="#FFC107"/>
    <text x="170" y="92" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" font-weight="600" fill="#3E2723">📊 데이터 생성</text>
    
    <!-- 데이터 개수 -->
    <text x="70" y="135" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="500" fill="#5D4037">데이터 개수</text>
    <rect x="70" y="145" width="200" height="10" rx="5" fill="#FFF3E0"/>
    <circle cx="150" cy="150" r="10" fill="#E53935"/>
    <g>
      <text x="70" y="170" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">5</text>
      <text x="265" y="170" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">100</text>
      <text x="170" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#E53935">30개</text>
    </g>
    
    <!-- 노이즈 수준 -->
    <text x="70" y="200" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="500" fill="#5D4037">노이즈 수준</text>
    <rect x="70" y="210" width="200" height="30" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
    <text x="170" y="230" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">10% (보통) ▼</text>
    
    <!-- 버튼들 -->
    <rect x="70" y="260" width="110" height="35" rx="8" fill="#E53935"/>
    <text x="125" y="283" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="500" fill="white">✨ 데이터 생성</text>
    
    <rect x="190" y="260" width="80" height="35" rx="8" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <text x="230" y="283" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">🗑️ 초기화</text>
    
    <!-- 품질 공식 -->
    <rect x="70" y="310" width="200" height="40" rx="8" fill="#E3F2FD"/>
    <text x="170" y="327" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#1976D2">📐 품질 점수 계산식</text>
    <text x="170" y="343" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1565C0">품질 = 당도(50%) + 무게(50%)</text>
    
    <!-- 데이터 테이블 미리보기 -->
    <rect x="70" y="360" width="200" height="30" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
    <text x="80" y="378" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63"># 🍯당도 ⚖️무게 ⭐품질 💰가격</text>
  </g>
  
  <!-- 오른쪽: 설명 박스들 -->
  <!-- 데이터 개수 설명 -->
  <line x1="295" y1="150" x2="340" y2="150" stroke="#5D4037" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="350" y="70" width="200" height="80" rx="10" fill="white" stroke="#FFC107" stroke-width="2"/>
    <circle cx="370" cy="90" r="12" fill="#FFC107"/>
    <text x="370" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#3E2723">1</text>
    <text x="395" y="95" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">데이터 개수</text>
    <text x="365" y="118" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• 범위: 5 ~ 100개</text>
    <text x="365" y="135" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• 권장: 20~50개</text>
  </g>
  
  <!-- 노이즈 설명 -->
  <line x1="295" y1="225" x2="340" y2="210" stroke="#5D4037" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="350" y="165" width="200" height="95" rx="10" fill="white" stroke="#FFC107" stroke-width="2"/>
    <circle cx="370" cy="185" r="12" fill="#FFC107"/>
    <text x="370" y="190" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#3E2723">2</text>
    <text x="395" y="190" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">노이즈 수준</text>
    <text x="365" y="213" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• 5%: 데이터 깔끔</text>
    <text x="365" y="230" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• 10%: 현실적 (권장)</text>
    <text x="365" y="247" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• 20%: 불확실성 높음</text>
  </g>
  
  <!-- 버튼 설명 -->
  <line x1="295" y1="277" x2="340" y2="305" stroke="#5D4037" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="350" y="275" width="200" height="80" rx="10" fill="white" stroke="#E53935" stroke-width="2"/>
    <circle cx="370" cy="295" r="12" fill="#E53935"/>
    <text x="370" y="300" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="white">3</text>
    <text x="395" y="300" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">버튼</text>
    <text x="365" y="323" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• ✨ 생성: 새 데이터 생성</text>
    <text x="365" y="340" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">• 🗑️ 초기화: 전체 리셋</text>
  </g>
  
  <!-- 노이즈 시각적 비교 -->
  <g filter="url(#shadow)">
    <rect x="570" y="70" width="200" height="290" rx="12" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <text x="670" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">📊 노이즈 수준 비교</text>
    
    <!-- 5% 노이즈 -->
    <text x="590" y="125" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#43A047">5% (낮음)</text>
    <rect x="590" y="130" width="160" height="50" rx="4" fill="#FAFAFA"/>
    <line x1="600" y1="165" x2="740" y2="165" stroke="#BCAAA4" stroke-width="0.5"/>
    <line x1="600" y1="165" x2="600" y2="135" stroke="#BCAAA4" stroke-width="0.5"/>
    <line x1="610" y1="162" x2="730" y2="138" stroke="#E53935" stroke-width="1.5"/>
    <circle cx="620" cy="160" r="2" fill="#43A047"/><circle cx="640" cy="157" r="2" fill="#43A047"/>
    <circle cx="660" cy="152" r="2" fill="#43A047"/><circle cx="680" cy="148" r="2" fill="#43A047"/>
    <circle cx="700" cy="143" r="2" fill="#43A047"/><circle cx="720" cy="140" r="2" fill="#43A047"/>
    
    <!-- 10% 노이즈 -->
    <text x="590" y="200" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#FFC107">10% (보통)</text>
    <rect x="590" y="205" width="160" height="50" rx="4" fill="#FAFAFA"/>
    <line x1="600" y1="240" x2="740" y2="240" stroke="#BCAAA4" stroke-width="0.5"/>
    <line x1="600" y1="240" x2="600" y2="210" stroke="#BCAAA4" stroke-width="0.5"/>
    <line x1="610" y1="237" x2="730" y2="213" stroke="#E53935" stroke-width="1.5"/>
    <circle cx="620" cy="238" r="2" fill="#FFC107"/><circle cx="640" cy="228" r="2" fill="#FFC107"/>
    <circle cx="660" cy="230" r="2" fill="#FFC107"/><circle cx="680" cy="220" r="2" fill="#FFC107"/>
    <circle cx="700" cy="222" r="2" fill="#FFC107"/><circle cx="720" cy="215" r="2" fill="#FFC107"/>
    
    <!-- 20% 노이즈 -->
    <text x="590" y="275" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#E53935">20% (높음)</text>
    <rect x="590" y="280" width="160" height="50" rx="4" fill="#FAFAFA"/>
    <line x1="600" y1="315" x2="740" y2="315" stroke="#BCAAA4" stroke-width="0.5"/>
    <line x1="600" y1="315" x2="600" y2="285" stroke="#BCAAA4" stroke-width="0.5"/>
    <line x1="610" y1="312" x2="730" y2="288" stroke="#E53935" stroke-width="1.5"/>
    <circle cx="620" cy="318" r="2" fill="#E53935"/><circle cx="640" cy="298" r="2" fill="#E53935"/>
    <circle cx="660" cy="308" r="2" fill="#E53935"/><circle cx="680" cy="290" r="2" fill="#E53935"/>
    <circle cx="700" cy="305" r="2" fill="#E53935"/><circle cx="720" cy="288" r="2" fill="#E53935"/>
    
    <text x="670" y="350" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">노이즈 ↑ → 산포 ↑ → R² ↓</text>
  </g>
  
  <!-- 하단 팁 -->
  <rect x="100" y="385" width="600" height="25" rx="6" fill="#FFF8E1"/>
  <text x="400" y="403" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#F57F17">💡 팁: 처음에는 노이즈 10%, 데이터 30개로 시작하세요!</text>
</svg>
