<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5D4037"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#43A047">⚙️ 학습 설정 패널</text>
  
  <!-- 왼쪽: 실제 패널 UI -->
  <g filter="url(#shadow)">
    <rect x="50" y="60" width="240" height="280" rx="16" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <rect x="50" y="60" width="240" height="45" rx="16" fill="#43A047"/>
    <rect x="50" y="90" width="240" height="15" fill="#43A047"/>
    <text x="170" y="92" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" font-weight="600" fill="white">⚙️ 학습 설정</text>
    
    <!-- 학습률 -->
    <text x="70" y="135" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="500" fill="#5D4037">학습률 (Learning Rate)</text>
    <rect x="70" y="145" width="200" height="10" rx="5" fill="#FFF3E0"/>
    <circle cx="145" cy="150" r="10" fill="#E53935"/>
    <g>
      <text x="70" y="170" font-family="JetBrains Mono, monospace" font-size="9" fill="#8D6E63">0.001</text>
      <text x="265" y="170" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#8D6E63">0.1</text>
      <text x="170" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#E53935">0.01</text>
    </g>
    
    <!-- 에포크 -->
    <text x="70" y="205" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="500" fill="#5D4037">에포크 (Epochs)</text>
    <rect x="70" y="215" width="200" height="10" rx="5" fill="#FFF3E0"/>
    <circle cx="145" cy="220" r="10" fill="#E53935"/>
    <g>
      <text x="70" y="240" font-family="JetBrains Mono, monospace" font-size="9" fill="#8D6E63">100</text>
      <text x="265" y="240" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#8D6E63">2000</text>
      <text x="170" y="240" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#E53935">500회</text>
    </g>
    
    <!-- 학습 버튼 -->
    <rect x="70" y="270" width="200" height="50" rx="10" fill="#43A047"/>
    <text x="170" y="302" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" font-weight="600" fill="white">⚡ 학습 실행</text>
  </g>
  
  <!-- 오른쪽: 설명 박스들 -->
  <!-- 학습률 설명 -->
  <line x1="295" y1="150" x2="340" y2="120" stroke="#5D4037" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="350" y="55" width="210" height="130" rx="10" fill="white" stroke="#E53935" stroke-width="2"/>
    <circle cx="370" cy="78" r="12" fill="#E53935"/>
    <text x="370" y="83" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="white">1</text>
    <text x="395" y="83" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">학습률</text>
    
    <text x="365" y="108" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">가중치 업데이트 크기 결정</text>
    
    <line x1="365" y1="118" x2="545" y2="118" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="365" y="138" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#43A047">• 0.001~0.01: 안정적, 느림</text>
    <text x="365" y="155" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#FFC107">• 0.01~0.05: 권장 범위</text>
    <text x="365" y="172" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#E53935">• 0.05~0.1: 빠름, 발산 위험</text>
  </g>
  
  <!-- 에포크 설명 -->
  <line x1="295" y1="220" x2="340" y2="235" stroke="#5D4037" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="350" y="195" width="210" height="110" rx="10" fill="white" stroke="#2196F3" stroke-width="2"/>
    <circle cx="370" cy="218" r="12" fill="#2196F3"/>
    <text x="370" y="223" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="white">2</text>
    <text x="395" y="223" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">에포크</text>
    
    <text x="365" y="248" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">전체 데이터로 학습하는 횟수</text>
    
    <line x1="365" y1="258" x2="545" y2="258" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="365" y="278" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 100~300: 빠른 테스트용</text>
    <text x="365" y="295" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#2196F3">• 500: 권장 (기본값)</text>
  </g>
  
  <!-- 학습 버튼 설명 -->
  <line x1="295" y1="295" x2="340" y2="330" stroke="#5D4037" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="350" y="315" width="210" height="65" rx="10" fill="white" stroke="#43A047" stroke-width="2"/>
    <circle cx="370" cy="338" r="12" fill="#43A047"/>
    <text x="370" y="343" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="white">3</text>
    <text x="395" y="343" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">학습 실행</text>
    
    <text x="365" y="368" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">클릭 → 빠르게 학습 완료 → 결과 표시</text>
  </g>
  
  <!-- 오른쪽 끝: 학습률 시각적 비교 -->
  <g filter="url(#shadow)">
    <rect x="580" y="55" width="190" height="290" rx="12" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <text x="675" y="80" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#3E2723">📉 학습률에 따른 손실</text>
    
    <!-- 작은 학습률 -->
    <text x="600" y="105" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#43A047">작음 (0.001)</text>
    <rect x="600" y="110" width="150" height="50" rx="4" fill="#FAFAFA"/>
    <path d="M 610 150 Q 640 145, 670 130 Q 700 120, 740 115" fill="none" stroke="#43A047" stroke-width="2"/>
    <text x="675" y="168" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">느리지만 안정</text>
    
    <!-- 적절한 학습률 -->
    <text x="600" y="195" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#2196F3">적절 (0.01)</text>
    <rect x="600" y="200" width="150" height="50" rx="4" fill="#FAFAFA"/>
    <path d="M 610 240 Q 640 215, 680 210 Q 710 208, 740 208" fill="none" stroke="#2196F3" stroke-width="2"/>
    <text x="675" y="258" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#1976D2">⭐ 빠르고 안정</text>
    
    <!-- 큰 학습률 -->
    <text x="600" y="285" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#E53935">큼 (0.1)</text>
    <rect x="600" y="290" width="150" height="50" rx="4" fill="#FAFAFA"/>
    <path d="M 610 310 Q 640 340, 670 305 Q 700 330, 740 315" fill="none" stroke="#E53935" stroke-width="2"/>
    <text x="675" y="348" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828">불안정/발산 위험</text>
  </g>
  
  <!-- 하단 팁 (학습 버튼 설명 하단 380 + 간격 15 = 395) -->
  <rect x="100" y="390" width="600" height="25" rx="6" fill="#E8F5E9"/>
  <text x="400" y="408" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#2E7D32">💡 팁: 학습률 0.01, 에포크 500으로 시작한 후 조절하세요!</text>
</svg>
