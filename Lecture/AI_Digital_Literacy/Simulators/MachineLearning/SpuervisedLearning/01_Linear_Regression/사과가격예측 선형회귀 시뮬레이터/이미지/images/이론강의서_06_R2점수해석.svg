<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="r2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E53935"/>
      <stop offset="50%" style="stop-color:#FFC107"/>
      <stop offset="80%" style="stop-color:#43A047"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#E53935">📊 R² 점수 (결정 계수) 해석</text>
  
  <!-- 공식 박스 -->
  <g filter="url(#shadow)">
    <rect x="200" y="55" width="400" height="50" rx="12" fill="white" stroke="#1976D2" stroke-width="2"/>
    <text x="400" y="87" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#1976D2">R² = 1 - (잔차제곱합 / 총제곱합)</text>
  </g>
  
  <!-- R² 게이지 바 -->
  <g filter="url(#shadow)">
    <rect x="50" y="125" width="700" height="60" rx="12" fill="white"/>
    
    <!-- 게이지 바 배경 -->
    <rect x="70" y="145" width="560" height="25" rx="8" fill="url(#r2Grad)"/>
    
    <!-- 구간 표시 -->
    <line x1="70" y1="175" x2="70" y2="185" stroke="#3E2723" stroke-width="2"/>
    <text x="70" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#3E2723">0</text>
    
    <line x1="350" y1="175" x2="350" y2="185" stroke="#3E2723" stroke-width="2"/>
    <text x="350" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#3E2723">0.5</text>
    
    <line x1="518" y1="175" x2="518" y2="185" stroke="#3E2723" stroke-width="2"/>
    <text x="518" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#3E2723">0.8</text>
    
    <line x1="630" y1="175" x2="630" y2="185" stroke="#3E2723" stroke-width="2"/>
    <text x="630" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#3E2723">1.0</text>
    
    <!-- 구간 레이블 -->
    <text x="210" y="162" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="white">부족</text>
    <text x="434" y="162" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="white">보통</text>
    <text x="574" y="162" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="white">양호</text>
    
    <!-- 의미 표시 -->
    <text x="680" y="145" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">나쁨</text>
    <text x="680" y="175" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">좋음</text>
    <path d="M 675 150 L 675 170" fill="none" stroke="#8D6E63" stroke-width="1" marker-end="url(#arrowSmall)"/>
  </g>
  
  <!-- 3가지 케이스 시각화 -->
  <!-- R² = 0.3 (부족) -->
  <g filter="url(#shadow)">
    <rect x="50" y="220" width="220" height="200" rx="12" fill="white" stroke="#E53935" stroke-width="2"/>
    <rect x="50" y="220" width="220" height="35" rx="12" fill="#E53935"/>
    <text x="160" y="244" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="white">❌ R² = 0.3 (부족)</text>
    
    <!-- 산점도 -->
    <rect x="70" y="265" width="180" height="100" rx="6" fill="#FFEBEE"/>
    <line x1="85" y1="350" x2="235" y2="350" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="85" y1="350" x2="85" y2="280" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 흩어진 데이터 -->
    <circle cx="100" cy="290" r="4" fill="#E53935" opacity="0.6"/>
    <circle cx="120" cy="340" r="4" fill="#E53935" opacity="0.6"/>
    <circle cx="140" cy="300" r="4" fill="#E53935" opacity="0.6"/>
    <circle cx="160" cy="345" r="4" fill="#E53935" opacity="0.6"/>
    <circle cx="180" cy="295" r="4" fill="#E53935" opacity="0.6"/>
    <circle cx="200" cy="335" r="4" fill="#E53935" opacity="0.6"/>
    <circle cx="220" cy="310" r="4" fill="#E53935" opacity="0.6"/>
    
    <!-- 회귀선 -->
    <line x1="90" y1="330" x2="230" y2="300" stroke="#E53935" stroke-width="2"/>
    
    <text x="160" y="390" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">데이터가 많이 흩어짐</text>
    <text x="160" y="408" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#C62828" font-weight="600">예측 신뢰도 낮음</text>
  </g>
  
  <!-- R² = 0.7 (보통) -->
  <g filter="url(#shadow)">
    <rect x="290" y="220" width="220" height="200" rx="12" fill="white" stroke="#FFC107" stroke-width="2"/>
    <rect x="290" y="220" width="220" height="35" rx="12" fill="#FFC107"/>
    <text x="400" y="244" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">⚠️ R² = 0.7 (보통)</text>
    
    <!-- 산점도 -->
    <rect x="310" y="265" width="180" height="100" rx="6" fill="#FFF8E1"/>
    <line x1="325" y1="350" x2="475" y2="350" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="325" y1="350" x2="325" y2="280" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 중간 정도 흩어진 데이터 -->
    <circle cx="340" cy="335" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="360" cy="325" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="380" cy="310" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="400" cy="315" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="420" cy="300" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="440" cy="295" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="460" cy="285" r="4" fill="#FFC107" opacity="0.8"/>
    
    <!-- 회귀선 -->
    <line x1="330" y1="340" x2="470" y2="280" stroke="#FF9800" stroke-width="2"/>
    
    <text x="400" y="390" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">어느 정도 패턴이 보임</text>
    <text x="400" y="408" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#F57C00" font-weight="600">개선 여지 있음</text>
  </g>
  
  <!-- R² = 0.95 (양호) -->
  <g filter="url(#shadow)">
    <rect x="530" y="220" width="220" height="200" rx="12" fill="white" stroke="#43A047" stroke-width="3"/>
    <rect x="530" y="220" width="220" height="35" rx="12" fill="#43A047"/>
    <text x="640" y="244" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="white">✅ R² = 0.95 (양호)</text>
    
    <!-- 산점도 -->
    <rect x="550" y="265" width="180" height="100" rx="6" fill="#E8F5E9"/>
    <line x1="565" y1="350" x2="715" y2="350" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="565" y1="350" x2="565" y2="280" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 회귀선 주변에 모인 데이터 -->
    <circle cx="580" cy="338" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="600" cy="325" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="620" cy="315" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="640" cy="305" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="660" cy="295" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="680" cy="288" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="700" cy="280" r="4" fill="#43A047" opacity="0.8"/>
    
    <!-- 회귀선 -->
    <line x1="570" y1="340" x2="710" y2="278" stroke="#2E7D32" stroke-width="2"/>
    
    <text x="640" y="390" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">데이터가 선에 가까움</text>
    <text x="640" y="408" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#2E7D32" font-weight="600">예측 신뢰도 높음!</text>
  </g>
  
  <!-- 하단 핵심 메시지 -->
  <rect x="150" y="430" width="500" height="30" rx="8" fill="#E3F2FD"/>
  <text x="400" y="450" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" fill="#1565C0">💡 R² = 모델이 데이터 변동의 몇 %를 설명하는가?</text>
</svg>
