<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#E53935">📅 1차시 수업 흐름 (45분)</text>
  <text x="400" y="55" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#8D6E63">선형 회귀 개념 이해 및 시뮬레이터 탐색</text>
  
  <!-- 타임라인 바 -->
  <rect x="50" y="85" width="700" height="12" rx="6" fill="#E0E0E0"/>
  
  <!-- 시간 구간 표시: 5분-10분-15분-10분-5분 = 45분 -->
  <rect x="50" y="85" width="78" height="12" rx="6" fill="#FFC107"/>
  <rect x="128" y="85" width="156" height="12" fill="#43A047"/>
  <rect x="284" y="85" width="233" height="12" fill="#2196F3"/>
  <rect x="517" y="85" width="156" height="12" fill="#9C27B0"/>
  <rect x="673" y="85" width="77" height="12" rx="6" fill="#FF5722"/>
  
  <!-- 시간 레이블 -->
  <text x="50" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">0분</text>
  <text x="128" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">5분</text>
  <text x="284" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">15분</text>
  <text x="517" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">30분</text>
  <text x="673" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">40분</text>
  <text x="750" y="112" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">45분</text>
  
  <!-- 1단계: 도입 -->
  <g filter="url(#shadow)">
    <rect x="30" y="130" width="140" height="130" rx="12" fill="white" stroke="#FFC107" stroke-width="2"/>
    <rect x="30" y="130" width="140" height="35" rx="12" fill="#FFC107"/>
    <rect x="30" y="155" width="140" height="10" fill="#FFC107"/>
    <text x="100" y="155" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">① 도입</text>
    <text x="100" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#F57F17">5분</text>
    
    <text x="45" y="200" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 동기유발: 사과 판매</text>
    <text x="45" y="218" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• "가격은 어떻게</text>
    <text x="50" y="234" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">정해질까요?"</text>
    <text x="45" y="250" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 학습목표 안내</text>
  </g>
  
  <!-- 2단계: 개념설명 -->
  <g filter="url(#shadow)">
    <rect x="180" y="130" width="140" height="130" rx="12" fill="white" stroke="#43A047" stroke-width="2"/>
    <rect x="180" y="130" width="140" height="35" rx="12" fill="#43A047"/>
    <rect x="180" y="155" width="140" height="10" fill="#43A047"/>
    <text x="250" y="155" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="white">② 개념설명</text>
    <text x="250" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#2E7D32">10분</text>
    
    <text x="195" y="200" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 선형 관계란?</text>
    <text x="195" y="218" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 회귀선 의미</text>
    <text x="195" y="234" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• y = wx + b 공식</text>
    <text x="195" y="250" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 품질 점수 계산법</text>
  </g>
  
  <!-- 3단계: 시뮬레이터 탐색 (수정됨) -->
  <g filter="url(#shadow)">
    <rect x="330" y="130" width="155" height="130" rx="12" fill="white" stroke="#2196F3" stroke-width="2"/>
    <rect x="330" y="130" width="155" height="35" rx="12" fill="#2196F3"/>
    <rect x="330" y="155" width="155" height="10" fill="#2196F3"/>
    <text x="407" y="155" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="white">③ 시뮬레이터 탐색</text>
    <text x="407" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#1976D2">15분</text>
    
    <text x="345" y="200" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• UI 구성 안내</text>
    <text x="345" y="218" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 데이터 생성 패널</text>
    <text x="345" y="234" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 학습 설정 패널</text>
    <text x="345" y="250" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 결과 패널 설명</text>
  </g>
  
  <!-- 4단계: 첫 학습 체험 (수정됨) -->
  <g filter="url(#shadow)">
    <rect x="495" y="130" width="140" height="130" rx="12" fill="white" stroke="#9C27B0" stroke-width="2"/>
    <rect x="495" y="130" width="140" height="35" rx="12" fill="#9C27B0"/>
    <rect x="495" y="155" width="140" height="10" fill="#9C27B0"/>
    <text x="565" y="155" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="white">④ 첫 학습 체험</text>
    <text x="565" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#7B1FA2">10분</text>
    
    <text x="510" y="200" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 데이터 생성해보기</text>
    <text x="510" y="218" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 학습 실행해보기</text>
    <text x="510" y="234" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 손실 그래프 관찰</text>
    <text x="510" y="250" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 회귀선 변화 확인</text>
  </g>
  
  <!-- 5단계: 정리 -->
  <g filter="url(#shadow)">
    <rect x="645" y="130" width="125" height="130" rx="12" fill="white" stroke="#FF5722" stroke-width="2"/>
    <rect x="645" y="130" width="125" height="35" rx="12" fill="#FF5722"/>
    <rect x="645" y="155" width="125" height="10" fill="#FF5722"/>
    <text x="707" y="155" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="white">⑤ 정리</text>
    <text x="707" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#E64A19">5분</text>
    
    <text x="657" y="200" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 핵심 개념 정리</text>
    <text x="657" y="218" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• Q&amp;A</text>
    <text x="657" y="236" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 다음 차시 예고</text>
  </g>
  
  <!-- 하단 핵심 포인트 (박스 높이 확장: 110→120) -->
  <g filter="url(#shadow)">
    <rect x="50" y="280" width="700" height="120" rx="12" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <text x="400" y="305" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#E53935">🎯 1차시 핵심 포인트</text>
    
    <!-- 원 위치 더 아래로: cy=330→345 -->
    <circle cx="120" cy="345" r="25" fill="#FFF3E0" stroke="#FFC107" stroke-width="2"/>
    <text x="120" y="350" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#F57F17">개념</text>
    <text x="120" y="383" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">선형 관계</text>
    
    <circle cx="280" cy="345" r="25" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
    <text x="280" y="350" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#2E7D32">이해</text>
    <text x="280" y="383" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">y=wx+b</text>
    
    <circle cx="440" cy="345" r="25" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
    <text x="440" y="350" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#1976D2">탐색</text>
    <text x="440" y="383" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">UI 익히기</text>
    
    <circle cx="600" cy="345" r="25" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
    <text x="600" y="350" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#7B1FA2">체험</text>
    <text x="600" y="383" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">첫 학습</text>
    
    <!-- 화살표 연결 (y 위치 조정) -->
    <line x1="145" y1="345" x2="253" y2="345" stroke="#BCAAA4" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="305" y1="345" x2="413" y2="345" stroke="#BCAAA4" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="465" y1="345" x2="573" y2="345" stroke="#BCAAA4" stroke-width="2" stroke-dasharray="4,2"/>
  </g>
</svg>
