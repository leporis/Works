<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="480" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#E53935">🧠 학습 모드 화면 구성</text>
  
  <!-- 전체 레이아웃 프레임 -->
  <rect x="40" y="55" width="720" height="360" rx="12" fill="white" stroke="#BCAAA4" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- 헤더 영역 -->
  <rect x="50" y="65" width="700" height="40" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
  <text x="400" y="92" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="#E53935">🍎 사과 가격 예측 시뮬레이터</text>
  <rect x="660" y="75" width="70" height="22" rx="11" fill="#E53935"/>
  <text x="695" y="90" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white">v1.2.4.1</text>
  
  <!-- 모드 탭 영역 -->
  <rect x="280" y="115" width="95" height="28" rx="6" fill="#E53935"/>
  <text x="327" y="134" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="white">🧠 학습 모드</text>
  <rect x="385" y="115" width="95" height="28" rx="6" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="432" y="134" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">🔮 추론 모드</text>
  
  <!-- 왼쪽 패널 (데이터 생성) -->
  <g filter="url(#shadow)">
    <rect x="55" y="155" width="140" height="180" rx="10" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <rect x="55" y="155" width="140" height="30" rx="10" fill="#FFC107"/>
    <rect x="55" y="175" width="140" height="10" fill="#FFC107"/>
    <text x="125" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#3E2723">📊 데이터 생성</text>
    
    <!-- 슬라이더 표현 -->
    <text x="70" y="205" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">데이터 개수</text>
    <rect x="70" y="210" width="110" height="6" rx="3" fill="#FFF3E0"/>
    <circle cx="110" cy="213" r="6" fill="#E53935"/>
    
    <text x="70" y="240" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">노이즈 수준</text>
    <rect x="70" y="245" width="110" height="18" rx="4" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
    <text x="125" y="258" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">10% (보통)</text>
    
    <!-- 버튼들 -->
    <rect x="68" y="275" width="58" height="22" rx="5" fill="#E53935"/>
    <text x="97" y="290" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="white">✨ 생성</text>
    <rect x="130" y="275" width="50" height="22" rx="5" fill="white" stroke="#FFCCBC" stroke-width="1"/>
    <text x="155" y="290" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">🗑️</text>
    
    <!-- 품질 공식: 패널 y=155, height=180, 하단=335, 하단박스 하단=325 → 간격 10px -->
    <rect x="63" y="303" width="124" height="22" rx="4" fill="#E3F2FD"/>
    <text x="125" y="318" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="7" fill="#1976D2">📐 품질 = 당도 + 무게</text>
  </g>
  
  <!-- 중앙 차트 영역 -->
  <g filter="url(#shadow)">
    <!-- 손실 그래프 -->
    <rect x="205" y="155" width="185" height="120" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <text x="297" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#3E2723">📉 손실 그래프 (MSE)</text>
    <!-- 손실 곡선 미니 -->
    <path d="M 225 260 Q 260 200, 310 240 Q 340 250, 370 245" fill="none" stroke="#E53935" stroke-width="2"/>
    <text x="297" y="270" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">에포크 →</text>
    
    <!-- 산점도 -->
    <rect x="400" y="155" width="185" height="120" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <text x="492" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#3E2723">📈 품질 vs 가격</text>
    <!-- 산점도 미니 -->
    <line x1="420" y1="260" x2="565" y2="260" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="420" y1="260" x2="420" y2="185" stroke="#BCAAA4" stroke-width="1"/>
    <!-- 데이터 점들 -->
    <circle cx="440" cy="250" r="2" fill="#43A047" opacity="0.7"/>
    <circle cx="460" cy="240" r="2" fill="#66BB6A" opacity="0.7"/>
    <circle cx="480" cy="225" r="2" fill="#FFC107" opacity="0.7"/>
    <circle cx="500" cy="215" r="2" fill="#FF9800" opacity="0.7"/>
    <circle cx="520" cy="205" r="2" fill="#E53935" opacity="0.7"/>
    <circle cx="540" cy="195" r="2" fill="#C62828" opacity="0.7"/>
    <!-- 회귀선 -->
    <line x1="430" y1="255" x2="555" y2="190" stroke="#E53935" stroke-width="2"/>
    <text x="492" y="270" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">품질 →</text>
  </g>
  
  <!-- 오른쪽 패널 (학습 설정) -->
  <g filter="url(#shadow)">
    <rect x="600" y="155" width="145" height="180" rx="10" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <rect x="600" y="155" width="145" height="30" rx="10" fill="#43A047"/>
    <rect x="600" y="175" width="145" height="10" fill="#43A047"/>
    <text x="672" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="white">⚙️ 학습 설정</text>
    
    <!-- 학습률 -->
    <text x="615" y="205" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">학습률</text>
    <rect x="615" y="210" width="115" height="6" rx="3" fill="#FFF3E0"/>
    <circle cx="670" cy="213" r="6" fill="#E53935"/>
    <text x="720" y="215" font-family="JetBrains Mono, monospace" font-size="8" fill="#E53935">0.01</text>
    
    <!-- 에포크 -->
    <text x="615" y="240" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">에포크</text>
    <rect x="615" y="245" width="115" height="6" rx="3" fill="#FFF3E0"/>
    <circle cx="670" cy="248" r="6" fill="#E53935"/>
    <text x="720" y="250" font-family="JetBrains Mono, monospace" font-size="8" fill="#E53935">500</text>
    
    <!-- 학습 버튼 -->
    <rect x="615" y="280" width="115" height="32" rx="6" fill="#43A047"/>
    <text x="672" y="301" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="white">⚡ 학습 실행</text>
  </g>
  
  <!-- 하단 결과 패널 (학습 후 표시) -->
  <g filter="url(#shadow)">
    <rect x="55" y="345" width="690" height="60" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="400" y="368" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">⬇️ 학습 완료 후 표시 ⬇️</text>
    
    <!-- 3열 구조 힌트 -->
    <rect x="70" y="378" width="140" height="18" rx="4" fill="#FFF3E0"/>
    <text x="140" y="391" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">📊 학습 결과</text>
    
    <rect x="330" y="378" width="140" height="18" rx="4" fill="#FFF3E0"/>
    <text x="400" y="391" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">📏 오차 분석</text>
    
    <rect x="590" y="378" width="140" height="18" rx="4" fill="#FFF3E0"/>
    <text x="660" y="391" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">📽️ 재생 컨트롤</text>
  </g>
  
  <!-- 레이블 (크기 표시) -->
  <text x="125" y="425" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#E53935">240px</text>
  <text x="400" y="425" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#E53935">가변 (중앙 차트)</text>
  <text x="672" y="425" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#E53935">260px</text>
  
  <!-- 하단 설명 -->
  <rect x="100" y="445" width="600" height="25" rx="6" fill="#E3F2FD"/>
  <text x="400" y="463" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1976D2">💡 3열 그리드 레이아웃: 왼쪽(데이터) + 중앙(차트) + 오른쪽(설정)</text>
</svg>
