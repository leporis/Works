<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="40" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="24" font-weight="700" fill="#E53935">📏 손실 함수와 오차선</text>
  
  <!-- 그래프 영역 -->
  <rect x="60" y="70" width="380" height="320" rx="12" fill="white" filter="url(#shadow)"/>
  
  <!-- 축 -->
  <line x1="100" y1="350" x2="410" y2="350" stroke="#3E2723" stroke-width="2"/>
  <line x1="100" y1="350" x2="100" y2="100" stroke="#3E2723" stroke-width="2"/>
  
  <!-- 축 레이블 -->
  <text x="255" y="385" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" fill="#5D4037">품질 점수</text>
  <text x="60" y="225" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" fill="#5D4037" transform="rotate(-90 60 225)">가격</text>
  
  <!-- 회귀선 -->
  <line x1="110" y1="320" x2="400" y2="120" stroke="#E53935" stroke-width="3"/>
  
  <!-- 데이터 포인트들과 오차선 -->
  <!-- 포인트 1 - 작은 오차 (녹색) -->
  <line x1="150" y1="290" x2="150" y2="305" stroke="#43A047" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="150" cy="305" r="5" fill="#43A047"/>
  <circle cx="150" cy="290" r="3" fill="#E53935"/>
  
  <!-- 포인트 2 - 중간 오차 (노랑) -->
  <line x1="200" y1="255" x2="200" y2="230" stroke="#FFC107" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="200" cy="230" r="5" fill="#FFC107"/>
  <circle cx="200" cy="255" r="3" fill="#E53935"/>
  
  <!-- 포인트 3 - 큰 오차 (빨강) -->
  <line x1="250" y1="220" x2="250" y2="260" stroke="#E53935" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="250" cy="260" r="5" fill="#E53935" opacity="0.7"/>
  <circle cx="250" cy="220" r="3" fill="#E53935"/>
  
  <!-- 포인트 4 - 작은 오차 -->
  <line x1="300" y1="185" x2="300" y2="175" stroke="#43A047" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="300" cy="175" r="5" fill="#43A047"/>
  <circle cx="300" cy="185" r="3" fill="#E53935"/>
  
  <!-- 포인트 5 - 중간 오차 -->
  <line x1="350" y1="150" x2="350" y2="180" stroke="#FFC107" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="350" cy="180" r="5" fill="#FFC107"/>
  <circle cx="350" cy="150" r="3" fill="#E53935"/>
  
  <!-- 범례 -->
  <rect x="280" y="80" width="140" height="80" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="350" y="98" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#3E2723">오차 크기</text>
  <circle cx="300" cy="115" r="4" fill="#43A047"/>
  <text x="315" y="119" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">작음</text>
  <circle cx="300" cy="133" r="4" fill="#FFC107"/>
  <text x="315" y="137" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">중간</text>
  <circle cx="300" cy="151" r="4" fill="#E53935"/>
  <text x="315" y="155" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">큼</text>
  <line x1="370" y1="115" x2="390" y2="115" stroke="#666" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="365" y="137" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">오차선</text>
  
  <!-- 오차 설명 화살표 -->
  <path d="M 265 260 Q 290 280 315 270" fill="none" stroke="#C62828" stroke-width="1.5"/>
  <text x="300" y="295" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#C62828">오차 = 실제값 - 예측값</text>
  
  <!-- MSE 공식 박스: y=70, height=150, 하단=220, 마지막 텍스트 y=210 → 간격 10px -->
  <g filter="url(#shadow)">
    <rect x="470" y="70" width="300" height="150" rx="16" fill="white" stroke="#E53935" stroke-width="2"/>
    <rect x="470" y="70" width="300" height="45" rx="16" fill="#E53935"/>
    <text x="620" y="100" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" font-weight="600" fill="white">📊 MSE (평균 제곱 오차)</text>
    
    <!-- 공식 -->
    <text x="620" y="140" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" fill="#3E2723">MSE = (1/n) × Σ(오차)²</text>
    
    <line x1="490" y1="160" x2="750" y2="160" stroke="#FFCCBC" stroke-width="1"/>
    
    <text x="620" y="185" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">= 모든 오차를 제곱해서 평균</text>
    <text x="620" y="210" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#8D6E63">→ 값이 작을수록 좋은 모델!</text>
  </g>
  
  <!-- 손실 그래프 예시 -->
  <g filter="url(#shadow)">
    <rect x="470" y="250" width="300" height="150" rx="16" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <text x="620" y="275" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="#3E2723">📉 손실 그래프</text>
    
    <!-- 미니 그래프 -->
    <line x1="500" y1="370" x2="740" y2="370" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="500" y1="370" x2="500" y2="290" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 손실 곡선 -->
    <path d="M 510 300 Q 550 310 580 340 Q 620 360 740 365" fill="none" stroke="#E53935" stroke-width="3"/>
    
    <!-- 레이블 -->
    <text x="620" y="390" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">에포크</text>
    <text x="485" y="330" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63" transform="rotate(-90 485 330)">MSE</text>
    
    <!-- 설명 -->
    <text x="650" y="320" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#43A047">학습이 진행되면</text>
    <text x="650" y="335" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#43A047">손실이 감소! ↓</text>
  </g>
  
  <!-- 하단 핵심 메시지 -->
  <rect x="60" y="420" width="680" height="60" rx="12" fill="#FCE4EC"/>
  <text x="400" y="448" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="600" fill="#C62828">🎯 학습의 목표 = MSE를 최소화하는 w와 b 찾기!</text>
  <text x="400" y="468" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">→ 오차선 길이의 총합을 줄이는 것 = 회귀선을 데이터에 맞추는 것</text>
</svg>
