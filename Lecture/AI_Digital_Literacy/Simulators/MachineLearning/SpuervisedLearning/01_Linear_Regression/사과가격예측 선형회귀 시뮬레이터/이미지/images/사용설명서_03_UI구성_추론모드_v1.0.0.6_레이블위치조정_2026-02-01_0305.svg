<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#9C27B0">🔮 추론 모드 화면 구성</text>
  
  <!-- 전체 레이아웃 프레임 -->
  <rect x="40" y="55" width="720" height="330" rx="12" fill="white" stroke="#BCAAA4" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- 헤더 영역 -->
  <rect x="50" y="65" width="700" height="40" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
  <text x="400" y="92" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="#E53935">🍎 사과 가격 예측 시뮬레이터</text>
  <rect x="660" y="75" width="70" height="22" rx="11" fill="#E53935"/>
  <text x="695" y="90" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white">v1.2.4.1</text>
  
  <!-- 모드 탭 영역 -->
  <rect x="280" y="115" width="95" height="28" rx="6" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="327" y="134" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">🧠 학습 모드</text>
  <rect x="385" y="115" width="95" height="28" rx="6" fill="#9C27B0"/>
  <text x="432" y="134" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="white">🔮 추론 모드</text>
  
  <!-- 왼쪽 패널 (예측 입력) -->
  <g filter="url(#shadow)">
    <rect x="55" y="155" width="140" height="210" rx="10" fill="white" stroke="#E1BEE7" stroke-width="2"/>
    <rect x="55" y="155" width="140" height="30" rx="10" fill="#9C27B0"/>
    <rect x="55" y="175" width="140" height="10" fill="#9C27B0"/>
    <text x="125" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="white">🎯 예측 입력</text>
    
    <!-- 당도 슬라이더 -->
    <text x="70" y="205" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">🍯 당도 (Brix)</text>
    <rect x="70" y="212" width="110" height="6" rx="3" fill="#FFF3E0"/>
    <circle cx="95" cy="215" r="6" fill="#E53935"/>
    <text x="158" y="218" font-family="JetBrains Mono, monospace" font-size="8" fill="#E53935">14.0</text>
    
    <!-- 무게 슬라이더 -->
    <text x="70" y="240" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">⚖️ 무게 (g)</text>
    <rect x="70" y="247" width="110" height="6" rx="3" fill="#FFF3E0"/>
    <circle cx="95" cy="250" r="6" fill="#E53935"/>
    <text x="158" y="253" font-family="JetBrains Mono, monospace" font-size="8" fill="#E53935">250</text>
    
    <!-- 품질 점수 계산 -->
    <rect x="63" y="270" width="124" height="85" rx="6" fill="#F3E5F5"/>
    <text x="125" y="288" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="500" fill="#7B1FA2">⭐ 품질 점수 계산</text>
    
    <text x="75" y="308" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">🍯 당도 점수</text>
    <text x="165" y="308" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#9C27B0">25.0점</text>
    
    <text x="75" y="324" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#5D4037">⚖️ 무게 점수</text>
    <text x="165" y="324" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#9C27B0">25.0점</text>
    
    <line x1="75" y1="332" x2="165" y2="332" stroke="#CE93D8" stroke-width="1"/>
    <text x="75" y="348" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="600" fill="#7B1FA2">⭐ 총 품질</text>
    <text x="165" y="348" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#9C27B0">50.0점</text>
  </g>
  
  <!-- 중앙 차트 영역 (큰 예측 시각화) -->
  <g filter="url(#shadow)">
    <rect x="205" y="155" width="380" height="210" rx="10" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <text x="395" y="178" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="500" fill="#3E2723">📈 예측 시각화</text>
    <text x="395" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8D6E63">가격 = 30.5 × 품질 + 985</text>
    
    <!-- 큰 산점도 -->
    <rect x="230" y="210" width="330" height="140" rx="6" fill="#FAFAFA"/>
    <line x1="260" y1="335" x2="540" y2="335" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="260" y1="335" x2="260" y2="220" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 축 레이블 -->
    <text x="480" y="350" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">품질 점수</text>
    <text x="245" y="250" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037" transform="rotate(-90 245 250)">가격</text>
    
    <!-- 데이터 점들 (흐리게) -->
    <circle cx="290" cy="320" r="2" fill="#BDBDBD" opacity="0.4"/>
    <circle cx="320" cy="305" r="2" fill="#BDBDBD" opacity="0.4"/>
    <circle cx="350" cy="290" r="2" fill="#BDBDBD" opacity="0.4"/>
    <circle cx="380" cy="275" r="2" fill="#BDBDBD" opacity="0.4"/>
    <circle cx="410" cy="260" r="2" fill="#BDBDBD" opacity="0.4"/>
    <circle cx="440" cy="250" r="2" fill="#BDBDBD" opacity="0.4"/>
    <circle cx="470" cy="240" r="2" fill="#BDBDBD" opacity="0.4"/>
    <circle cx="500" cy="230" r="2" fill="#BDBDBD" opacity="0.4"/>
    
    <!-- 회귀선 -->
    <line x1="275" y1="325" x2="525" y2="225" stroke="#E53935" stroke-width="2"/>
    
    <!-- 수직선 (품질→회귀선): 회귀선 y = 325 - 0.4*(x-275), x=380일때 y=283 -->
    <line x1="380" y1="335" x2="380" y2="283" stroke="#FFC107" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- 수평선 (회귀선→가격) -->
    <line x1="380" y1="283" x2="260" y2="283" stroke="#FFC107" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- 예측점 (크기 축소: r=10→6) -->
    <circle cx="380" cy="283" r="6" fill="#FFC107" stroke="#FF9800" stroke-width="2"/>
    
    <!-- 레이블 -->
    <text x="380" y="358" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#FF9800">50.0</text>
    <text x="248" y="281" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#FF9800">2,510</text>
  </g>
  
  <!-- 오른쪽 패널 (예측 결과) -->
  <g filter="url(#shadow)">
    <rect x="600" y="155" width="145" height="210" rx="10" fill="white" stroke="#E1BEE7" stroke-width="2"/>
    <rect x="600" y="155" width="145" height="30" rx="10" fill="#9C27B0"/>
    <rect x="600" y="175" width="145" height="10" fill="#9C27B0"/>
    <text x="672" y="175" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="white">💰 예측 결과</text>
    
    <!-- 예측 가격 박스 -->
    <rect x="615" y="195" width="115" height="60" rx="8" fill="linear-gradient(135deg, #9C27B0, #7B1FA2)"/>
    <rect x="615" y="195" width="115" height="60" rx="8" fill="#9C27B0"/>
    <text x="672" y="218" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">예측 가격</text>
    <text x="672" y="245" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" fill="white">2,510원</text>
    
    <!-- 추론 과정 -->
    <rect x="615" y="265" width="115" height="85" rx="6" fill="#FFF3E0"/>
    <text x="672" y="283" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="500" fill="#5D4037">📝 추론 과정</text>
    
    <text x="625" y="302" font-family="Noto Sans KR, sans-serif" font-size="7" fill="#8D6E63">🏷️ 기본 가격</text>
    <text x="720" y="302" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#5D4037">985원</text>
    
    <text x="625" y="318" font-family="Noto Sans KR, sans-serif" font-size="7" fill="#8D6E63">⭐ 품질 기여</text>
    <text x="720" y="318" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#43A047">+1,525원</text>
    
    <line x1="625" y1="326" x2="720" y2="326" stroke="#FFCCBC" stroke-width="1"/>
    <text x="625" y="340" font-family="Noto Sans KR, sans-serif" font-size="8" font-weight="600" fill="#E53935">💰 최종 가격</text>
    <text x="720" y="340" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#E53935">2,510원</text>
  </g>
  
  <!-- 레이블 (크기 표시) -->
  <text x="125" y="400" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#9C27B0">240px</text>
  <text x="395" y="400" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#9C27B0">가변 (예측 시각화)</text>
  <text x="672" y="400" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#9C27B0">260px</text>
  
  <!-- 하단 설명 -->
  <rect x="100" y="415" width="600" height="25" rx="6" fill="#F3E5F5"/>
  <text x="400" y="433" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#7B1FA2">💡 슬라이더 조절 → 즉시 자동 추론 → 차트에 예측점 표시</text>
</svg>
