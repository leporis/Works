<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E53935"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#E53935">🔄 선형 회귀 학습 과정</text>
  
  <!-- Step 1: 데이터 준비 -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="140" height="100" rx="12" fill="white" stroke="#43A047" stroke-width="2"/>
    <circle cx="50" cy="90" r="15" fill="#43A047"/>
    <text x="50" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="white">1</text>
    <text x="100" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">데이터 준비</text>
    <text x="100" y="125" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">당도, 무게 →</text>
    <text x="100" y="142" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">품질 점수</text>
    <text x="100" y="160" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(X, Y) 데이터셋</text>
  </g>
  
  <!-- 화살표 1→2 -->
  <line x1="170" y1="120" x2="195" y2="120" stroke="#E53935" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: 초기화 -->
  <g filter="url(#shadow)">
    <rect x="205" y="70" width="140" height="100" rx="12" fill="white" stroke="#1976D2" stroke-width="2"/>
    <circle cx="225" cy="90" r="15" fill="#1976D2"/>
    <text x="225" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="white">2</text>
    <text x="275" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">가중치 초기화</text>
    <text x="275" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5D4037">w = 0</text>
    <text x="275" y="145" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5D4037">b = 0</text>
    <text x="275" y="162" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">랜덤 또는 0으로</text>
  </g>
  
  <!-- 화살표 2→3 -->
  <line x1="345" y1="120" x2="370" y2="120" stroke="#E53935" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: 예측 -->
  <g filter="url(#shadow)">
    <rect x="380" y="70" width="140" height="100" rx="12" fill="white" stroke="#9C27B0" stroke-width="2"/>
    <circle cx="400" cy="90" r="15" fill="#9C27B0"/>
    <text x="400" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="white">3</text>
    <text x="450" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">예측 계산</text>
    <text x="450" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5D4037">ŷ = w×x + b</text>
    <text x="450" y="155" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">현재 가중치로</text>
    <text x="450" y="168" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">가격 예측</text>
  </g>
  
  <!-- 화살표 3→4 -->
  <line x1="520" y1="120" x2="545" y2="120" stroke="#E53935" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: 손실 계산 -->
  <g filter="url(#shadow)">
    <rect x="555" y="70" width="140" height="100" rx="12" fill="white" stroke="#E53935" stroke-width="2"/>
    <circle cx="575" cy="90" r="15" fill="#E53935"/>
    <text x="575" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="white">4</text>
    <text x="625" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">손실 계산</text>
    <text x="625" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5D4037">MSE = Σ(y-ŷ)²/n</text>
    <text x="625" y="150" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">실제값과 예측값</text>
    <text x="625" y="163" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">차이 측정</text>
  </g>
  
  <!-- 화살표 4→5 (아래로) -->
  <path d="M 625 170 L 625 200 L 625 220" fill="none" stroke="#E53935" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: 기울기 계산 -->
  <g filter="url(#shadow)">
    <rect x="555" y="230" width="140" height="100" rx="12" fill="white" stroke="#FF5722" stroke-width="2"/>
    <circle cx="575" cy="250" r="15" fill="#FF5722"/>
    <text x="575" y="255" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="white">5</text>
    <text x="625" y="255" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">기울기 계산</text>
    <text x="625" y="285" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5D4037">∇w = ∂MSE/∂w</text>
    <text x="625" y="305" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5D4037">∇b = ∂MSE/∂b</text>
    <text x="625" y="320" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">손실 감소 방향</text>
  </g>
  
  <!-- 화살표 5→6 (왼쪽으로) -->
  <line x1="555" y1="280" x2="520" y2="280" stroke="#E53935" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 6: 가중치 업데이트 -->
  <g filter="url(#shadow)">
    <rect x="380" y="230" width="140" height="100" rx="12" fill="white" stroke="#FFC107" stroke-width="2"/>
    <circle cx="400" cy="250" r="15" fill="#FFC107"/>
    <text x="400" y="255" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="#3E2723">6</text>
    <text x="450" y="255" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">가중치 업데이트</text>
    <text x="450" y="285" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5D4037">w = w - η×∇w</text>
    <text x="450" y="305" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5D4037">b = b - η×∇b</text>
    <text x="450" y="320" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">학습률만큼 이동</text>
  </g>
  
  <!-- 반복 화살표 (6→3) -->
  <path d="M 380 280 L 320 280 L 320 155 L 380 155" fill="none" stroke="#E53935" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <rect x="290" y="200" width="60" height="25" rx="6" fill="#FCE4EC"/>
  <text x="320" y="217" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#C62828">반복!</text>
  
  <!-- Step 7: 완료 -->
  <g filter="url(#shadow)">
    <rect x="30" y="230" width="140" height="100" rx="12" fill="white" stroke="#2E7D32" stroke-width="3"/>
    <circle cx="50" cy="250" r="15" fill="#2E7D32"/>
    <text x="50" y="255" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="white">7</text>
    <text x="100" y="255" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">학습 완료!</text>
    <text x="100" y="285" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">최적의 w, b 획득</text>
    <text x="100" y="305" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#2E7D32" font-weight="600">가격 = w×품질 + b</text>
    <text x="100" y="320" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">예측 준비 완료!</text>
  </g>
  
  <!-- 화살표 6→7 (완료로) -->
  <path d="M 380 310 L 200 310 L 200 280 L 170 280" fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="220" y="295" width="80" height="25" rx="6" fill="#E8F5E9"/>
  <text x="260" y="312" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#2E7D32">에포크 종료</text>
  
  <!-- 하단 요약 -->
  <rect x="30" y="360" width="740" height="120" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="400" y="390" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#E53935">📋 학습 과정 요약</text>
  
  <text x="80" y="420" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">① 데이터 준비 (품질→가격)</text>
  <text x="280" y="420" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">② 가중치 초기화 (w=0, b=0)</text>
  <text x="500" y="420" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">③ 현재 가중치로 예측</text>
  
  <text x="80" y="445" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">④ 손실(MSE) 계산</text>
  <text x="280" y="445" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">⑤ 기울기 계산 (방향 파악)</text>
  <text x="500" y="445" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">⑥ 가중치 업데이트</text>
  
  <text x="400" y="470" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#E53935">⑦ ③~⑥ 반복 → 손실이 충분히 작아지면 완료!</text>
</svg>
