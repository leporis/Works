<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#E53935">🔬 탐구 활동: 노이즈 수준 실험</text>
  <text x="400" y="58" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">"데이터의 불확실성이 예측에 미치는 영향"</text>
  
  <!-- 3개 실험 조건 비교 -->
  <!-- 노이즈 5% -->
  <g filter="url(#shadow)">
    <rect x="35" y="80" width="230" height="280" rx="14" fill="white" stroke="#43A047" stroke-width="2"/>
    <rect x="35" y="80" width="230" height="40" rx="14" fill="#43A047"/>
    <rect x="35" y="108" width="230" height="12" fill="#43A047"/>
    <text x="150" y="107" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="white">🟢 노이즈 5% (낮음)</text>
    
    <!-- 산점도 시각화 -->
    <rect x="50" y="130" width="200" height="120" rx="8" fill="#F5FFF5"/>
    <line x1="60" y1="240" x2="240" y2="240" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="60" y1="240" x2="60" y2="140" stroke="#BCAAA4" stroke-width="1"/>
    <!-- 데이터 점들 - 회귀선에 가까움 -->
    <circle cx="80" cy="225" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="100" cy="218" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="120" cy="208" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="140" cy="195" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="160" cy="185" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="180" cy="172" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="200" cy="162" r="4" fill="#43A047" opacity="0.8"/>
    <circle cx="220" cy="152" r="4" fill="#43A047" opacity="0.8"/>
    <!-- 회귀선 -->
    <line x1="70" y1="230" x2="230" y2="148" stroke="#E53935" stroke-width="2.5"/>
    
    <!-- 결과 -->
    <rect x="50" y="260" width="200" height="90" rx="8" fill="#E8F5E9"/>
    <text x="150" y="282" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#2E7D32">📊 예상 결과</text>
    <text x="150" y="302" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#3E2723">R² 점수: 0.95 ~ 0.99</text>
    <text x="150" y="320" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#3E2723">손실(MSE): 매우 낮음</text>
    <text x="150" y="340" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#43A047" font-weight="600">✅ 예측 정확도 높음</text>
  </g>
  
  <!-- 노이즈 10% -->
  <g filter="url(#shadow)">
    <rect x="285" y="80" width="230" height="280" rx="14" fill="white" stroke="#FFC107" stroke-width="2"/>
    <rect x="285" y="80" width="230" height="40" rx="14" fill="#FFC107"/>
    <rect x="285" y="108" width="230" height="12" fill="#FFC107"/>
    <text x="400" y="107" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#3E2723">🟡 노이즈 10% (보통)</text>
    
    <!-- 산점도 시각화 -->
    <rect x="300" y="130" width="200" height="120" rx="8" fill="#FFFEF5"/>
    <line x1="310" y1="240" x2="490" y2="240" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="310" y1="240" x2="310" y2="140" stroke="#BCAAA4" stroke-width="1"/>
    <!-- 데이터 점들 - 약간 퍼짐 -->
    <circle cx="330" cy="228" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="350" cy="212" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="370" cy="218" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="390" cy="190" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="410" cy="182" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="430" cy="175" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="450" cy="158" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="470" cy="165" r="4" fill="#FFC107" opacity="0.8"/>
    <!-- 회귀선 -->
    <line x1="320" y1="230" x2="480" y2="152" stroke="#E53935" stroke-width="2.5"/>
    
    <!-- 결과 -->
    <rect x="300" y="260" width="200" height="90" rx="8" fill="#FFF8E1"/>
    <text x="400" y="282" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#F57F17">📊 예상 결과</text>
    <text x="400" y="302" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#3E2723">R² 점수: 0.80 ~ 0.92</text>
    <text x="400" y="320" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#3E2723">손실(MSE): 보통</text>
    <text x="400" y="340" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#FF9800" font-weight="600">⚠️ 예측 정확도 양호</text>
  </g>
  
  <!-- 노이즈 20% -->
  <g filter="url(#shadow)">
    <rect x="535" y="80" width="230" height="280" rx="14" fill="white" stroke="#E53935" stroke-width="2"/>
    <rect x="535" y="80" width="230" height="40" rx="14" fill="#E53935"/>
    <rect x="535" y="108" width="230" height="12" fill="#E53935"/>
    <text x="650" y="107" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="white">🔴 노이즈 20% (높음)</text>
    
    <!-- 산점도 시각화 -->
    <rect x="550" y="130" width="200" height="120" rx="8" fill="#FFF5F5"/>
    <line x1="560" y1="240" x2="740" y2="240" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="560" y1="240" x2="560" y2="140" stroke="#BCAAA4" stroke-width="1"/>
    <!-- 데이터 점들 - 많이 퍼짐 -->
    <circle cx="580" cy="220" r="4" fill="#E53935" opacity="0.8"/>
    <circle cx="600" cy="235" r="4" fill="#E53935" opacity="0.8"/>
    <circle cx="620" cy="195" r="4" fill="#E53935" opacity="0.8"/>
    <circle cx="640" cy="210" r="4" fill="#E53935" opacity="0.8"/>
    <circle cx="660" cy="165" r="4" fill="#E53935" opacity="0.8"/>
    <circle cx="680" cy="190" r="4" fill="#E53935" opacity="0.8"/>
    <circle cx="700" cy="145" r="4" fill="#E53935" opacity="0.8"/>
    <circle cx="720" cy="175" r="4" fill="#E53935" opacity="0.8"/>
    <!-- 회귀선 -->
    <line x1="570" y1="228" x2="730" y2="155" stroke="#E53935" stroke-width="2.5"/>
    
    <!-- 결과 -->
    <rect x="550" y="260" width="200" height="90" rx="8" fill="#FFEBEE"/>
    <text x="650" y="282" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#C62828">📊 예상 결과</text>
    <text x="650" y="302" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#3E2723">R² 점수: 0.50 ~ 0.75</text>
    <text x="650" y="320" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#3E2723">손실(MSE): 높음</text>
    <text x="650" y="340" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#E53935" font-weight="600">❌ 예측 정확도 낮음</text>
  </g>
  
  <!-- 실험 절차 -->
  <g filter="url(#shadow)">
    <rect x="35" y="375" width="730" height="55" rx="10" fill="white" stroke="#FFCCBC" stroke-width="1.5"/>
    <text x="400" y="395" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#E53935">📋 실험 절차</text>
    <text x="400" y="418" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#3E2723">① 노이즈 5% 선택 → 데이터 30개 생성 → 학습 실행 → R² 기록</text>
    <text x="400" y="435" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#3E2723">② 노이즈 10%, 20%로 반복 → 결과 비교 → 토론</text>
  </g>
  
  <!-- 핵심 질문 -->
  <rect x="35" y="445" width="730" height="45" rx="10" fill="#E3F2FD"/>
  <text x="400" y="465" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#1565C0">💡 핵심 탐구 질문</text>
  <text x="400" y="483" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1565C0">"실제 세계의 데이터에는 왜 노이즈가 있을까요? AI는 노이즈를 어떻게 처리해야 할까요?"</text>
</svg>
