<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#9C27B0">📅 2차시 수업 흐름 (45분)</text>
  <text x="400" y="55" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#8D6E63">심화 탐구 및 예측 실습</text>
  
  <!-- 타임라인 바 -->
  <rect x="50" y="85" width="700" height="12" rx="6" fill="#E0E0E0"/>
  
  <!-- 시간 구간 표시: 5분-20분-10분-5분-5분 = 45분 -->
  <rect x="50" y="85" width="78" height="12" rx="6" fill="#FF5722"/>
  <rect x="128" y="85" width="311" height="12" fill="#E53935"/>
  <rect x="439" y="85" width="156" height="12" fill="#2196F3"/>
  <rect x="595" y="85" width="78" height="12" fill="#43A047"/>
  <rect x="673" y="85" width="77" height="12" rx="6" fill="#FFC107"/>
  
  <!-- 시간 레이블 -->
  <text x="50" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">0분</text>
  <text x="128" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">5분</text>
  <text x="439" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">25분</text>
  <text x="595" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">35분</text>
  <text x="673" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">40분</text>
  <text x="750" y="112" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#5D4037">45분</text>
  
  <!-- 1단계: 복습 -->
  <g filter="url(#shadow)">
    <rect x="30" y="130" width="120" height="120" rx="12" fill="white" stroke="#FF5722" stroke-width="2"/>
    <rect x="30" y="130" width="120" height="32" rx="12" fill="#FF5722"/>
    <rect x="30" y="152" width="120" height="10" fill="#FF5722"/>
    <text x="90" y="152" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="white">① 복습</text>
    <text x="90" y="172" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#E64A19">5분</text>
    
    <text x="43" y="195" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 1차시 핵심 정리</text>
    <text x="43" y="211" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 선형 회귀 공식</text>
    <text x="43" y="227" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 오늘의 학습목표</text>
  </g>
  
  <!-- 2단계: 탐구 활동 (수정됨: 20분으로 통합) -->
  <g filter="url(#shadow)">
    <rect x="160" y="130" width="195" height="120" rx="12" fill="white" stroke="#E53935" stroke-width="2"/>
    <rect x="160" y="130" width="195" height="32" rx="12" fill="#E53935"/>
    <rect x="160" y="152" width="195" height="10" fill="#E53935"/>
    <text x="257" y="152" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="white">② 탐구 활동</text>
    <text x="257" y="172" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#C62828">20분</text>
    
    <text x="173" y="195" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 학습률 실험</text>
    <text x="178" y="208" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">- 0.001 vs 0.01 vs 0.1</text>
    <text x="173" y="221" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 오차선 분석</text>
    <text x="173" y="240" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 노이즈 실험 (5/10/20%)</text>
  </g>
  
  <!-- 3단계: 예측 실습 (신규 추가) -->
  <g filter="url(#shadow)">
    <rect x="365" y="130" width="140" height="120" rx="12" fill="white" stroke="#2196F3" stroke-width="2"/>
    <rect x="365" y="130" width="140" height="32" rx="12" fill="#2196F3"/>
    <rect x="365" y="152" width="140" height="10" fill="#2196F3"/>
    <text x="435" y="152" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="white">③ 예측 실습</text>
    <text x="435" y="172" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#1976D2">10분</text>
    
    <text x="378" y="195" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 추론 모드 활용</text>
    <text x="378" y="211" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 당도/무게 입력</text>
    <text x="378" y="227" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 가격 예측 체험</text>
  </g>
  
  <!-- 4단계: 토론 (발표→토론으로 수정) -->
  <g filter="url(#shadow)">
    <rect x="515" y="130" width="120" height="120" rx="12" fill="white" stroke="#43A047" stroke-width="2"/>
    <rect x="515" y="130" width="120" height="32" rx="12" fill="#43A047"/>
    <rect x="515" y="152" width="120" height="10" fill="#43A047"/>
    <text x="575" y="152" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="white">④ 토론</text>
    <text x="575" y="172" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#2E7D32">5분</text>
    
    <text x="528" y="195" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 실험 결과 공유</text>
    <text x="528" y="211" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 발견한 패턴</text>
    <text x="528" y="227" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• AI 모델의 한계</text>
  </g>
  
  <!-- 5단계: 정리 -->
  <g filter="url(#shadow)">
    <rect x="645" y="130" width="125" height="120" rx="12" fill="white" stroke="#FFC107" stroke-width="2"/>
    <rect x="645" y="130" width="125" height="32" rx="12" fill="#FFC107"/>
    <rect x="645" y="152" width="125" height="10" fill="#FFC107"/>
    <text x="707" y="152" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">⑤ 정리</text>
    <text x="707" y="172" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#F57F17">5분</text>
    
    <text x="658" y="195" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 핵심 발견 정리</text>
    <text x="658" y="211" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• AI 학습의 특성</text>
    <text x="658" y="227" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">• 성찰 활동</text>
  </g>
  
  <!-- 하단 탐구 질문 박스 -->
  <g filter="url(#shadow)">
    <rect x="50" y="270" width="700" height="110" rx="12" fill="white" stroke="#9C27B0" stroke-width="2"/>
    <text x="400" y="295" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#9C27B0">💡 2차시 핵심 탐구 질문</text>
    
    <g>
      <circle cx="100" cy="332" r="22" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
      <text x="100" y="337" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#E53935">Q1</text>
      <text x="100" y="365" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">학습률이 크면?</text>
    </g>
    
    <g>
      <circle cx="260" cy="332" r="22" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
      <text x="260" y="337" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#2196F3">Q2</text>
      <text x="260" y="365" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">노이즈가 많으면?</text>
    </g>
    
    <g>
      <circle cx="420" cy="332" r="22" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
      <text x="420" y="337" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#9C27B0">Q3</text>
      <text x="420" y="365" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">AI는 항상 맞나?</text>
    </g>
    
    <g>
      <circle cx="580" cy="332" r="22" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
      <text x="580" y="337" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#43A047">Q4</text>
      <text x="580" y="365" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">좋은 모델이란?</text>
    </g>
    
    <g>
      <circle cx="700" cy="332" r="22" fill="#FFF8E1" stroke="#FFC107" stroke-width="2"/>
      <text x="700" y="337" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" fill="#F57F17">Q5</text>
      <text x="700" y="365" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">어디에 활용?</text>
    </g>
  </g>
</svg>
