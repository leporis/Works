<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF3E0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#43A047"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#E53935"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9C27B0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF9800"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <rect x="250" y="15" width="400" height="50" rx="12" fill="#E53935" filter="url(#shadow)"/>
  <text x="450" y="48" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">🔄 경사하강법 학습 과정</text>
  
  <!-- ========== 단계 1: 데이터 준비 ========== -->
  <rect x="30" y="100" width="160" height="100" rx="12" fill="white" stroke="#43A047" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="55" cy="115" r="18" fill="#43A047"/>
  <text x="55" y="121" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">1</text>
  <text x="110" y="130" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#43A047" font-weight="bold">데이터 준비</text>
  <line x1="45" y1="145" x2="175" y2="145" stroke="#43A047" stroke-width="1"/>
  <text x="110" y="165" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333" text-anchor="middle">입력(X), 출력(Y)</text>
  <text x="110" y="185" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333" text-anchor="middle">데이터셋 로드</text>
  
  <!-- 화살표 1→2 -->
  <path d="M 190 150 L 230 150" stroke="#43A047" stroke-width="3" marker-end="url(#arrowGreen)"/>
  
  <!-- ========== 단계 2: 가중치 초기화 ========== -->
  <rect x="245" y="100" width="160" height="100" rx="12" fill="white" stroke="#2196F3" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="270" cy="115" r="18" fill="#2196F3"/>
  <text x="270" y="121" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">2</text>
  <text x="325" y="130" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#2196F3" font-weight="bold">가중치 초기화</text>
  <line x1="260" y1="145" x2="390" y2="145" stroke="#2196F3" stroke-width="1"/>
  <text x="325" y="165" font-family="'JetBrains Mono', monospace" font-size="12" fill="#333" text-anchor="middle">w = 0</text>
  <text x="325" y="185" font-family="'JetBrains Mono', monospace" font-size="12" fill="#333" text-anchor="middle">b = 0</text>
  
  <!-- 화살표 2→3 -->
  <path d="M 405 150 L 445 150" stroke="#2196F3" stroke-width="3" marker-end="url(#arrowBlue)"/>
  
  <!-- ========== 단계 3: 예측 계산 ========== -->
  <rect x="460" y="100" width="160" height="100" rx="12" fill="white" stroke="#9C27B0" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="485" cy="115" r="18" fill="#9C27B0"/>
  <text x="485" y="121" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">3</text>
  <text x="540" y="130" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#9C27B0" font-weight="bold">예측 계산</text>
  <line x1="475" y1="145" x2="605" y2="145" stroke="#9C27B0" stroke-width="1"/>
  <text x="540" y="170" font-family="'JetBrains Mono', monospace" font-size="13" fill="#333" text-anchor="middle">ŷ = w×x + b</text>
  <text x="540" y="190" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#666" text-anchor="middle">현재 가중치로 예측</text>
  
  <!-- 화살표 3→4 -->
  <path d="M 620 150 L 660 150" stroke="#9C27B0" stroke-width="3" marker-end="url(#arrowPurple)"/>
  
  <!-- ========== 단계 4: 손실 계산 ========== -->
  <rect x="675" y="100" width="190" height="100" rx="12" fill="white" stroke="#E53935" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="700" cy="115" r="18" fill="#E53935"/>
  <text x="700" y="121" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">4</text>
  <text x="770" y="130" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#E53935" font-weight="bold">손실 계산</text>
  <line x1="690" y1="145" x2="850" y2="145" stroke="#E53935" stroke-width="1"/>
  <text x="770" y="170" font-family="'JetBrains Mono', monospace" font-size="12" fill="#333" text-anchor="middle">MSE = Σ(y-ŷ)²/n</text>
  <text x="770" y="190" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#666" text-anchor="middle">실제값과 예측값 차이</text>
  
  <!-- 화살표 4→5 (아래로) -->
  <path d="M 770 200 L 770 240" stroke="#E53935" stroke-width="3" marker-end="url(#arrowRed)"/>
  
  <!-- ========== 단계 5: 기울기 계산 ========== -->
  <rect x="675" y="255" width="190" height="110" rx="12" fill="white" stroke="#FF9800" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="700" cy="270" r="18" fill="#FF9800"/>
  <text x="700" y="276" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">5</text>
  <text x="770" y="285" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#FF9800" font-weight="bold">기울기 계산</text>
  <line x1="690" y1="300" x2="850" y2="300" stroke="#FF9800" stroke-width="1"/>
  <text x="770" y="325" font-family="'JetBrains Mono', monospace" font-size="11" fill="#333" text-anchor="middle">∇w = ∂MSE/∂w</text>
  <text x="770" y="345" font-family="'JetBrains Mono', monospace" font-size="11" fill="#333" text-anchor="middle">∇b = ∂MSE/∂b</text>
  
  <!-- 화살표 5→6 (왼쪽으로) -->
  <path d="M 675 310 L 635 310" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowOrange)"/>
  
  <!-- ========== 단계 6: 가중치 업데이트 ========== -->
  <rect x="390" y="255" width="230" height="110" rx="12" fill="white" stroke="#FFC107" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="415" cy="270" r="18" fill="#FFC107"/>
  <text x="415" y="276" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">6</text>
  <text x="505" y="285" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#E65100" font-weight="bold">가중치 업데이트</text>
  <line x1="405" y1="300" x2="605" y2="300" stroke="#FFC107" stroke-width="1"/>
  <text x="505" y="325" font-family="'JetBrains Mono', monospace" font-size="12" fill="#333" text-anchor="middle">w = w - η×∇w</text>
  <text x="505" y="345" font-family="'JetBrains Mono', monospace" font-size="12" fill="#333" text-anchor="middle">b = b - η×∇b</text>
  
  <!-- 반복 화살표 (6→3) -->
  <path d="M 505 255 Q 505 220 540 200" stroke="#E53935" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  
  <!-- 반복 표시 -->
  <rect x="445" y="210" width="60" height="25" rx="6" fill="#E53935"/>
  <text x="475" y="228" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">반복!</text>
  
  <!-- ========== 단계 7: 학습 완료 ========== -->
  <rect x="30" y="255" width="180" height="110" rx="12" fill="white" stroke="#43A047" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="55" cy="270" r="18" fill="#43A047"/>
  <text x="55" y="276" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">7</text>
  <text x="120" y="285" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#43A047" font-weight="bold">학습 완료!</text>
  <line x1="45" y1="300" x2="195" y2="300" stroke="#43A047" stroke-width="1"/>
  <text x="120" y="325" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333" text-anchor="middle">최적의 w, b 획득</text>
  <text x="120" y="345" font-family="'JetBrains Mono', monospace" font-size="11" fill="#E53935" text-anchor="middle" font-weight="bold">가격 = w×품질 + b</text>
  
  <!-- 종료 조건 화살표 (6→7) -->
  <path d="M 390 310 L 240 310 L 240 310 L 210 310" stroke="#43A047" stroke-width="3" marker-end="url(#arrowGreen)"/>
  
  <!-- 종료 조건 표시 -->
  <rect x="240" y="290" width="100" height="40" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
  <text x="290" y="307" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">에포크 종료</text>
  <text x="290" y="322" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">또는 수렴</text>
  
  <!-- ========== 하단 요약 ========== -->
  <rect x="30" y="400" width="840" height="180" rx="12" fill="white" stroke="#5D4037" stroke-width="2" filter="url(#shadow)"/>
  
  <text x="450" y="430" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="bold" fill="#5D4037" text-anchor="middle">📝 학습 과정 요약</text>
  <line x1="80" y1="445" x2="820" y2="445" stroke="#5D4037" stroke-width="1"/>
  
  <!-- 요약 내용 -->
  <circle cx="80" cy="475" r="14" fill="#43A047"/>
  <text x="80" y="480" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle">1</text>
  <text x="100" y="480" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">데이터 준비 (품질→가격)</text>
  
  <circle cx="280" cy="475" r="14" fill="#2196F3"/>
  <text x="280" y="480" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle">2</text>
  <text x="300" y="480" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">가중치 초기화 (w=0, b=0)</text>
  
  <circle cx="500" cy="475" r="14" fill="#9C27B0"/>
  <text x="500" y="480" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle">3</text>
  <text x="520" y="480" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">현재 가중치로 예측</text>
  
  <circle cx="700" cy="475" r="14" fill="#E53935"/>
  <text x="700" y="480" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle">4</text>
  <text x="720" y="480" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">손실(MSE) 계산</text>
  
  <circle cx="80" cy="515" r="14" fill="#FF9800"/>
  <text x="80" y="520" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle">5</text>
  <text x="100" y="520" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">기울기 계산 (방향 파악)</text>
  
  <circle cx="280" cy="515" r="14" fill="#FFC107"/>
  <text x="280" y="520" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle">6</text>
  <text x="300" y="520" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">가중치 업데이트</text>
  
  <circle cx="500" cy="515" r="14" fill="#43A047"/>
  <text x="500" y="520" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle">7</text>
  <text x="520" y="520" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">③~⑥ 반복 → 손실이 충분히 작아지면 완료!</text>
  
  <!-- 핵심 공식 -->
  <rect x="100" y="545" width="700" height="30" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="450" y="566" font-family="'JetBrains Mono', monospace" font-size="14" fill="#E65100" text-anchor="middle" font-weight="bold">핵심: w = w - η × ∇w,  b = b - η × ∇b  (기울기 반대 방향으로 이동!)</text>
</svg>
