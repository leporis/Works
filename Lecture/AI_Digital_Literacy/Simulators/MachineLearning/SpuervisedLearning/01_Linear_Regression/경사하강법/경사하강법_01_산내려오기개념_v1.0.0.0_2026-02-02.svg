<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8E23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5016;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="500" fill="url(#skyGrad)"/>
  
  <!-- 제목 -->
  <rect x="200" y="15" width="400" height="45" rx="10" fill="#E53935" filter="url(#shadow)"/>
  <text x="400" y="47" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">🏔️ 경사하강법: 산에서 내려오기</text>
  
  <!-- 산 모양 (손실 함수) -->
  <path d="M 50 450 Q 200 150 400 350 Q 550 450 600 250 Q 700 100 750 450 Z" 
        fill="url(#mountainGrad)" stroke="#1B3D0A" stroke-width="3"/>
  
  <!-- 골짜기 표시 (최솟값) -->
  <ellipse cx="400" cy="355" rx="30" ry="8" fill="#FFD700" opacity="0.7"/>
  <text x="400" y="390" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">⭐ 최솟값</text>
  
  <!-- 경로 점들 -->
  <!-- 시작점 -->
  <circle cx="650" cy="180" r="15" fill="#E53935" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <text x="650" y="185" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">1</text>
  
  <!-- 중간점 1 -->
  <circle cx="580" cy="260" r="12" fill="#FF5722" stroke="white" stroke-width="2"/>
  <text x="580" y="264" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">2</text>
  
  <!-- 중간점 2 -->
  <circle cx="520" cy="310" r="12" fill="#FF9800" stroke="white" stroke-width="2"/>
  <text x="520" y="314" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">3</text>
  
  <!-- 중간점 3 -->
  <circle cx="460" cy="340" r="12" fill="#FFC107" stroke="white" stroke-width="2"/>
  <text x="460" y="344" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">4</text>
  
  <!-- 도착점 -->
  <circle cx="400" cy="350" r="15" fill="#43A047" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <text x="400" y="355" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">5</text>
  
  <!-- 경로 화살표 -->
  <path d="M 635 190 Q 610 220 590 250" stroke="#E53935" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <path d="M 568 268 Q 550 285 530 302" stroke="#FF5722" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <path d="M 508 318 Q 490 325 470 335" stroke="#FF9800" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <path d="M 448 345 Q 430 348 415 350" stroke="#FFC107" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  
  <!-- 왼쪽 설명 박스 -->
  <rect x="30" y="80" width="200" height="180" rx="10" fill="white" stroke="#E53935" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="105" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#E53935" text-anchor="middle" font-weight="bold">📌 핵심 원리</text>
  <line x1="50" y1="115" x2="210" y2="115" stroke="#E53935" stroke-width="1"/>
  
  <text x="45" y="140" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">1. 현재 위치의 경사 측정</text>
  <text x="45" y="165" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">2. 가장 가파른 내리막 찾기</text>
  <text x="45" y="190" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">3. 그 방향으로 한 걸음</text>
  <text x="45" y="215" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">4. 평평해질 때까지 반복</text>
  <text x="45" y="245" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#666" font-style="italic">→ 결국 최솟값에 도달!</text>
  
  <!-- 오른쪽 대응 박스 -->
  <rect x="570" y="380" width="210" height="110" rx="10" fill="white" stroke="#43A047" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="405" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#43A047" text-anchor="middle" font-weight="bold">🔄 머신러닝 대응</text>
  <line x1="590" y1="415" x2="760" y2="415" stroke="#43A047" stroke-width="1"/>
  
  <text x="585" y="440" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">산의 고도 → 손실(Loss)</text>
  <text x="585" y="460" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">경사 → 기울기(Gradient)</text>
  <text x="585" y="480" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">걸음 크기 → 학습률(η)</text>
  
  <!-- 축 레이블 -->
  <text x="400" y="470" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#333" text-anchor="middle">파라미터 (w)</text>
  <text x="25" y="280" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#333" text-anchor="middle" transform="rotate(-90, 25, 280)">손실 (Loss)</text>
</svg>
