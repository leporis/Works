<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="900" height="650" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <rect x="200" y="15" width="500" height="50" rx="12" fill="#1565C0" filter="url(#shadow)"/>
  <text x="450" y="48" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">📐 기울기(Gradient) 계산 원리</text>
  
  <!-- ========== 섹션 1: 손실 함수 ========== -->
  <rect x="30" y="85" width="410" height="130" rx="10" fill="white" stroke="#E53935" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="85" width="410" height="35" rx="10" fill="#E53935"/>
  <text x="235" y="110" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">📉 1단계: 손실 함수 (MSE)</text>
  
  <text x="50" y="150" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#333">예측값과 실제값의 차이를 측정</text>
  
  <rect x="70" y="165" width="350" height="35" rx="6" fill="#FFEBEE"/>
  <text x="245" y="190" font-family="'JetBrains Mono', monospace" font-size="16" fill="#C62828" text-anchor="middle" font-weight="bold">MSE = (1/n) × Σ(yᵢ - ŷᵢ)²</text>
  
  <!-- ========== 섹션 2: 예측 모델 ========== -->
  <rect x="460" y="85" width="410" height="130" rx="10" fill="white" stroke="#9C27B0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="460" y="85" width="410" height="35" rx="10" fill="#9C27B0"/>
  <text x="665" y="110" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">🔮 선형 회귀 모델</text>
  
  <text x="480" y="150" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#333">예측값 ŷ의 정의</text>
  
  <rect x="500" y="165" width="350" height="35" rx="6" fill="#F3E5F5"/>
  <text x="675" y="190" font-family="'JetBrains Mono', monospace" font-size="16" fill="#7B1FA2" text-anchor="middle" font-weight="bold">ŷᵢ = w × xᵢ + b</text>
  
  <!-- ========== 섹션 3: 손실 함수 전개 ========== -->
  <rect x="30" y="235" width="840" height="120" rx="10" fill="white" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="235" width="840" height="35" rx="10" fill="#FF9800"/>
  <text x="450" y="260" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">📝 2단계: 손실 함수 전개</text>
  
  <text x="50" y="295" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#333">ŷᵢ를 대입하여 전개:</text>
  
  <rect x="70" y="305" width="780" height="35" rx="6" fill="#FFF3E0"/>
  <text x="450" y="330" font-family="'JetBrains Mono', monospace" font-size="15" fill="#E65100" text-anchor="middle" font-weight="bold">MSE = (1/n) × Σ(yᵢ - (w × xᵢ + b))²</text>
  
  <!-- ========== 섹션 4: w에 대한 편미분 ========== -->
  <rect x="30" y="375" width="410" height="170" rx="10" fill="white" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="375" width="410" height="35" rx="10" fill="#2196F3"/>
  <text x="235" y="400" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">🧮 3단계: w에 대한 기울기 (∇w)</text>
  
  <text x="50" y="435" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">연쇄 법칙(Chain Rule) 적용:</text>
  
  <text x="50" y="460" font-family="'JetBrains Mono', monospace" font-size="12" fill="#1565C0">∂MSE/∂w = (1/n) × Σ 2(yᵢ-(w×xᵢ+b)) × (-xᵢ)</text>
  
  <text x="50" y="490" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">정리하면:</text>
  
  <rect x="60" y="500" width="360" height="35" rx="6" fill="#E3F2FD"/>
  <text x="240" y="525" font-family="'JetBrains Mono', monospace" font-size="15" fill="#1565C0" text-anchor="middle" font-weight="bold">∇w = (2/n) × Σ(ŷᵢ - yᵢ) × xᵢ</text>
  
  <!-- ========== 섹션 5: b에 대한 편미분 ========== -->
  <rect x="460" y="375" width="410" height="170" rx="10" fill="white" stroke="#43A047" stroke-width="2" filter="url(#shadow)"/>
  <rect x="460" y="375" width="410" height="35" rx="10" fill="#43A047"/>
  <text x="665" y="400" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">🧮 4단계: b에 대한 기울기 (∇b)</text>
  
  <text x="480" y="435" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">연쇄 법칙(Chain Rule) 적용:</text>
  
  <text x="480" y="460" font-family="'JetBrains Mono', monospace" font-size="12" fill="#2E7D32">∂MSE/∂b = (1/n) × Σ 2(yᵢ-(w×xᵢ+b)) × (-1)</text>
  
  <text x="480" y="490" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333">정리하면:</text>
  
  <rect x="490" y="500" width="360" height="35" rx="6" fill="#E8F5E9"/>
  <text x="670" y="525" font-family="'JetBrains Mono', monospace" font-size="15" fill="#2E7D32" text-anchor="middle" font-weight="bold">∇b = (2/n) × Σ(ŷᵢ - yᵢ)</text>
  
  <!-- ========== 섹션 6: 업데이트 규칙 ========== -->
  <rect x="150" y="565" width="600" height="70" rx="12" fill="white" stroke="#E53935" stroke-width="3" filter="url(#shadow)"/>
  <rect x="150" y="565" width="600" height="30" rx="10" fill="#E53935"/>
  <text x="450" y="587" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">⚡ 5단계: 파라미터 업데이트</text>
  
  <rect x="180" y="600" width="220" height="28" rx="6" fill="#FFEBEE"/>
  <text x="290" y="620" font-family="'JetBrains Mono', monospace" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">w ← w - η × ∇w</text>
  
  <rect x="500" y="600" width="220" height="28" rx="6" fill="#FFEBEE"/>
  <text x="610" y="620" font-family="'JetBrains Mono', monospace" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">b ← b - η × ∇b</text>
  
  <!-- 핵심 포인트 표시 -->
  <rect x="720" y="565" width="150" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="795" y="590" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#E65100" text-anchor="middle" font-weight="bold">💡 핵심 포인트</text>
  <text x="795" y="612" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#333" text-anchor="middle">기울기 반대 방향</text>
  <text x="795" y="627" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#333" text-anchor="middle">= 손실 감소 방향!</text>
</svg>
