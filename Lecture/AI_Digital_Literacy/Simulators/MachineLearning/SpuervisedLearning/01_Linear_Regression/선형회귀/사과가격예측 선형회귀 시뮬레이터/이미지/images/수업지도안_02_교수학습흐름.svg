<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="580" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="20" font-weight="700" fill="#E53935">📋 교수·학습 흐름 (90분)</text>
  <text x="400" y="52" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">1차시(45분): 개념 학습 + 시연 | 2차시(45분): 탐구 활동 + 토론</text>
  
  <!-- 1차시 헤더 -->
  <rect x="30" y="68" width="365" height="28" rx="8" fill="#E53935" filter="url(#shadow)"/>
  <text x="212" y="87" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="white">🧠 1차시: 개념 이해 및 시연 (45분)</text>
  
  <!-- 2차시 헤더 -->
  <rect x="405" y="68" width="365" height="28" rx="8" fill="#43A047" filter="url(#shadow)"/>
  <text x="587" y="87" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="white">🔬 2차시: 탐구 활동 및 토론 (45분)</text>
  
  <!-- ========== 1차시 단계들 ========== -->
  <!-- 도입: 동기유발 5분 + 학습목표 5분 = 10분 -->
  <g filter="url(#shadow)">
    <rect x="30" y="105" width="365" height="78" rx="10" fill="white" stroke="#FFCCBC" stroke-width="1.5"/>
    <rect x="30" y="105" width="55" height="78" rx="10" fill="#FFC107"/>
    <rect x="73" y="105" width="12" height="78" fill="#FFC107"/>
    <text x="57" y="138" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#3E2723">도입</text>
    <text x="57" y="158" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#3E2723">10분</text>
    
    <text x="100" y="125" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#E53935">🎯 동기 유발 (5분)</text>
    <text x="100" y="143" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• "AI는 어떻게 가격을 예측할까?"</text>
    <text x="100" y="160" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#E53935">🎯 학습 목표 제시 (5분)</text>
    <text x="100" y="177" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 오늘의 학습 목표 안내</text>
  </g>
  
  <!-- 전개: UI안내 10분 + 첫학습시연 15분 + 회귀식해석 5분 = 30분 -->
  <g filter="url(#shadow)">
    <rect x="30" y="190" width="365" height="135" rx="10" fill="white" stroke="#FFCCBC" stroke-width="1.5"/>
    <rect x="30" y="190" width="55" height="135" rx="10" fill="#E53935"/>
    <rect x="73" y="190" width="12" height="135" fill="#E53935"/>
    <text x="57" y="250" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="white">전개</text>
    <text x="57" y="270" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="white">30분</text>
    
    <text x="100" y="210" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#E53935">🖥️ 시뮬레이터 UI 안내 (10분)</text>
    <text x="100" y="228" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 화면 구성, 패널별 기능 설명</text>
    <text x="100" y="248" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#E53935">🧠 첫 학습 시연 (15분)</text>
    <text x="100" y="266" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 데이터 생성 → 학습 실행 → 결과 확인</text>
    <text x="100" y="282" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 손실 그래프, 회귀선 변화 관찰</text>
    <text x="100" y="302" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#E53935">📈 회귀식 해석 안내 (5분)</text>
    <text x="100" y="320" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• y=wx+b 의미, 예측 과정 설명</text>
  </g>
  
  <!-- 정리: 5분 -->
  <g filter="url(#shadow)">
    <rect x="30" y="332" width="365" height="58" rx="10" fill="white" stroke="#FFCCBC" stroke-width="1.5"/>
    <rect x="30" y="332" width="55" height="58" rx="10" fill="#1976D2"/>
    <rect x="73" y="332" width="12" height="58" fill="#1976D2"/>
    <text x="57" y="358" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="white">정리</text>
    <text x="57" y="378" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="white">5분</text>
    
    <text x="100" y="355" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#1976D2">📝 핵심 정리</text>
    <text x="100" y="373" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 핵심 개념 요약, Q&amp;A, 다음 차시 예고</text>
  </g>
  
  <!-- ========== 2차시 단계들 ========== -->
  <!-- 도입: 복습 퀴즈 5분 -->
  <g filter="url(#shadow)">
    <rect x="405" y="105" width="365" height="58" rx="10" fill="white" stroke="#FFCCBC" stroke-width="1.5"/>
    <rect x="405" y="105" width="55" height="58" rx="10" fill="#FFC107"/>
    <rect x="448" y="105" width="12" height="58" fill="#FFC107"/>
    <text x="432" y="130" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#3E2723">도입</text>
    <text x="432" y="150" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#3E2723">5분</text>
    
    <text x="475" y="128" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#FFC107">🔄 복습 퀴즈</text>
    <text x="475" y="148" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 1차시 핵심 개념 확인</text>
  </g>
  
  <!-- 전개: 탐구1(10분) + 탐구2(8분) + 탐구3(7분) + 토론(10분) = 35분 -->
  <g filter="url(#shadow)">
    <rect x="405" y="170" width="365" height="175" rx="10" fill="white" stroke="#FFCCBC" stroke-width="1.5"/>
    <rect x="405" y="170" width="55" height="175" rx="10" fill="#43A047"/>
    <rect x="448" y="170" width="12" height="175" fill="#43A047"/>
    <text x="432" y="250" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="white">전개</text>
    <text x="432" y="270" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="white">35분</text>
    
    <text x="475" y="190" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#43A047">🔬 탐구1: 학습률 실험 (10분)</text>
    <text x="475" y="208" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 0.001 vs 0.01 vs 0.1 비교</text>
    
    <text x="475" y="228" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#43A047">📏 탐구2: 오차선 분석 (8분)</text>
    <text x="475" y="246" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 잔차 관찰, 색상 변화 해석</text>
    
    <text x="475" y="266" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#43A047">🔮 탐구3: 예측 실습 (7분)</text>
    <text x="475" y="284" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 추론 모드로 가격 예측 체험</text>
    
    <text x="475" y="304" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#43A047">💬 모둠 토론 (10분)</text>
    <text x="475" y="322" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 실험 결과 공유, AI 한계 토론</text>
    <text x="475" y="340" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">→ 활동지 기록</text>
  </g>
  
  <!-- 정리: 5분 -->
  <g filter="url(#shadow)">
    <rect x="405" y="352" width="365" height="58" rx="10" fill="white" stroke="#FFCCBC" stroke-width="1.5"/>
    <rect x="405" y="352" width="55" height="58" rx="10" fill="#9C27B0"/>
    <rect x="448" y="352" width="12" height="58" fill="#9C27B0"/>
    <text x="432" y="378" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="white">정리</text>
    <text x="432" y="398" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="white">5분</text>
    
    <text x="475" y="375" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#9C27B0">📝 전체 학습 정리</text>
    <text x="475" y="395" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#3E2723">• 핵심 개념 요약, 성찰 일지 작성</text>
  </g>
  
  <!-- 시간 총합 표시 -->
  <g filter="url(#shadow)">
    <rect x="30" y="420" width="365" height="35" rx="8" fill="#FFEBEE"/>
    <text x="212" y="443" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#C62828">⏱️ 1차시: 10(도입)+30(전개)+5(정리) = 45분</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="405" y="420" width="365" height="35" rx="8" fill="#E8F5E9"/>
    <text x="587" y="443" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#2E7D32">⏱️ 2차시: 5(도입)+35(전개)+5(정리) = 45분</text>
  </g>
  
  <!-- 화살표들 -->
  <polygon points="212,410 207,417 217,417" fill="#E53935"/>
  <polygon points="587,410 582,417 592,417" fill="#43A047"/>
  
  <!-- 타임라인 바 -->
  <rect x="30" y="470" width="740" height="20" rx="5" fill="#FFF3E0" stroke="#FFCCBC" stroke-width="1"/>
  <rect x="30" y="470" width="367" height="20" rx="5" fill="#FFCCBC"/>
  <text x="212" y="484" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="600" fill="#5D4037">1차시 (0~45분)</text>
  <text x="587" y="484" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="600" fill="#5D4037">2차시 (46~90분)</text>
  <line x1="400" y1="470" x2="400" y2="490" stroke="#E53935" stroke-width="2"/>
  
  <!-- 하단 요약 -->
  <g filter="url(#shadow)">
    <rect x="30" y="505" width="740" height="60" rx="10" fill="white" stroke="#E53935" stroke-width="2"/>
    <text x="400" y="530" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="#E53935">📌 수업 설계 핵심</text>
    <text x="200" y="552" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">1차시: 개념 → 시뮬레이터 탐색 → 첫 학습</text>
    <text x="600" y="552" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">2차시: 탐구 활동 → 예측 실습 → 토론</text>
  </g>
</svg>
