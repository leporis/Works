<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E53935"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="1000" height="700" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="500" y="45" text-anchor="middle" font-family="Noto Sans KR" font-size="24" font-weight="700" fill="#E53935">📊 선형 회귀 학습 과정</text>
  
  <!-- 1. 데이터 준비 (녹색) -->
  <g filter="url(#shadow)">
    <rect x="40" y="80" width="160" height="110" rx="12" fill="white" stroke="#43A047" stroke-width="3"/>
    <circle cx="60" cy="100" r="16" fill="#43A047"/>
    <text x="60" y="106" text-anchor="middle" font-family="Noto Sans KR" font-size="14" font-weight="700" fill="white">1</text>
    <text x="120" y="105" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="600" fill="#3E2723">데이터 준비</text>
    <text x="120" y="140" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">당도, 무게 →</text>
    <text x="120" y="158" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">품질 점수</text>
    <text x="120" y="178" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#8D6E63">(X, Y) 데이터셋</text>
  </g>
  
  <!-- 화살표 1→2 -->
  <line x1="200" y1="135" x2="240" y2="135" stroke="#E53935" stroke-width="3" marker-end="url(#arrowRed)"/>
  
  <!-- 2. 가중치 초기화 (파랑) -->
  <g filter="url(#shadow)">
    <rect x="250" y="80" width="160" height="110" rx="12" fill="white" stroke="#1976D2" stroke-width="3"/>
    <circle cx="270" cy="100" r="16" fill="#1976D2"/>
    <text x="270" y="106" text-anchor="middle" font-family="Noto Sans KR" font-size="14" font-weight="700" fill="white">2</text>
    <text x="330" y="105" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="600" fill="#3E2723">가중치 초기화</text>
    <text x="330" y="140" text-anchor="middle" font-family="JetBrains Mono" font-size="12" fill="#1976D2">w = 랜덤(작은 값)</text>
    <text x="330" y="160" text-anchor="middle" font-family="JetBrains Mono" font-size="12" fill="#1976D2">b = 0</text>
    <text x="330" y="178" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#8D6E63">-0.05 ~ 0.05 범위</text>
  </g>
  
  <!-- 화살표 2→3 -->
  <line x1="410" y1="135" x2="450" y2="135" stroke="#E53935" stroke-width="3" marker-end="url(#arrowRed)"/>
  
  <!-- 3. 예측 계산 (보라) -->
  <g filter="url(#shadow)">
    <rect x="460" y="80" width="160" height="110" rx="12" fill="white" stroke="#9C27B0" stroke-width="3"/>
    <circle cx="480" cy="100" r="16" fill="#9C27B0"/>
    <text x="480" y="106" text-anchor="middle" font-family="Noto Sans KR" font-size="14" font-weight="700" fill="white">3</text>
    <text x="540" y="105" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="600" fill="#3E2723">예측 계산</text>
    <text x="540" y="140" text-anchor="middle" font-family="JetBrains Mono" font-size="12" fill="#9C27B0">ŷ = w×x + b</text>
    <text x="540" y="165" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">현재 가중치로</text>
    <text x="540" y="182" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">가격 예측</text>
  </g>
  
  <!-- 화살표 3→4 -->
  <line x1="620" y1="135" x2="660" y2="135" stroke="#E53935" stroke-width="3" marker-end="url(#arrowRed)"/>
  
  <!-- 4. 손실 계산 (빨강) -->
  <g filter="url(#shadow)">
    <rect x="670" y="80" width="160" height="110" rx="12" fill="white" stroke="#E53935" stroke-width="3"/>
    <circle cx="690" cy="100" r="16" fill="#E53935"/>
    <text x="690" y="106" text-anchor="middle" font-family="Noto Sans KR" font-size="14" font-weight="700" fill="white">4</text>
    <text x="750" y="105" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="600" fill="#3E2723">손실 계산</text>
    <text x="750" y="140" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#E53935">MSE = Σ(y-ŷ)²/n</text>
    <text x="750" y="165" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">실제값과 예측값</text>
    <text x="750" y="182" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">차이 측정</text>
  </g>
  
  <!-- 화살표 4→5 -->
  <line x1="750" y1="190" x2="750" y2="250" stroke="#E53935" stroke-width="3" marker-end="url(#arrowRed)"/>
  
  <!-- 5. 기울기 계산 (빨강) -->
  <g filter="url(#shadow)">
    <rect x="670" y="260" width="160" height="110" rx="12" fill="white" stroke="#E53935" stroke-width="3"/>
    <circle cx="690" cy="280" r="16" fill="#E53935"/>
    <text x="690" y="286" text-anchor="middle" font-family="Noto Sans KR" font-size="14" font-weight="700" fill="white">5</text>
    <text x="750" y="285" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="600" fill="#3E2723">기울기 계산</text>
    <text x="750" y="318" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#E53935">∇w = ∂MSE/∂w</text>
    <text x="750" y="340" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#E53935">∇b = ∂MSE/∂b</text>
    <text x="750" y="362" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">손실 감소 방향</text>
  </g>
  
  <!-- 화살표 5→6 -->
  <line x1="670" y1="315" x2="620" y2="315" stroke="#E53935" stroke-width="3" marker-end="url(#arrowRed)"/>
  
  <!-- 6. 가중치 업데이트 (노랑) -->
  <g filter="url(#shadow)">
    <rect x="460" y="260" width="160" height="110" rx="12" fill="white" stroke="#FFC107" stroke-width="3"/>
    <circle cx="480" cy="280" r="16" fill="#FFC107"/>
    <text x="480" y="286" text-anchor="middle" font-family="Noto Sans KR" font-size="14" font-weight="700" fill="#3E2723">6</text>
    <text x="540" y="285" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="600" fill="#3E2723">가중치 업데이트</text>
    <text x="540" y="318" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#E65100">w = w - η×∇w</text>
    <text x="540" y="340" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#E65100">b = b - η×∇b</text>
    <text x="540" y="362" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">학습률만큼 이동</text>
  </g>
  
  <!-- 반복 화살표 (6→3) -->
  <path d="M 460 315 Q 400 315 400 200 Q 400 135 450 135" fill="none" stroke="#E53935" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <rect x="360" y="210" width="50" height="24" rx="4" fill="#FFF3E0" stroke="#E53935" stroke-width="1"/>
  <text x="385" y="226" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="600" fill="#E53935">반복!</text>
  
  <!-- 에포크 종료 화살표 (6→7) -->
  <line x1="460" y1="315" x2="350" y2="315" stroke="#43A047" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="365" y="295" width="80" height="20" rx="4" fill="#E8F5E9"/>
  <text x="405" y="309" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#43A047">에포크 종료</text>
  
  <!-- 7. 학습 완료 (녹색) -->
  <g filter="url(#shadow)">
    <rect x="40" y="260" width="160" height="110" rx="12" fill="white" stroke="#43A047" stroke-width="3"/>
    <circle cx="60" cy="280" r="16" fill="#43A047"/>
    <text x="60" y="286" text-anchor="middle" font-family="Noto Sans KR" font-size="14" font-weight="700" fill="white">7</text>
    <text x="120" y="285" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="600" fill="#3E2723">학습 완료!</text>
    <text x="120" y="315" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#5D4037">최적의 w, b 획득</text>
    <text x="120" y="340" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#43A047">가격 = w×품질 + b</text>
    <text x="120" y="362" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#8D6E63">예측 준비 완료!</text>
  </g>
  
  <!-- 하단 요약 박스 -->
  <g filter="url(#shadow)">
    <rect x="40" y="420" width="920" height="160" rx="16" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <rect x="40" y="420" width="920" height="45" rx="16" fill="#FFF3E0"/>
    <text x="500" y="450" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="600" fill="#E53935">📋 학습 과정 요약</text>
    
    <!-- 요약 내용 -->
    <text x="80" y="495" font-family="Noto Sans KR" font-size="12" fill="#5D4037">① 데이터 준비 (품질→가격)</text>
    <text x="360" y="495" font-family="Noto Sans KR" font-size="12" fill="#5D4037">② 가중치 초기화 (w=랜덤, b=0)</text>
    <text x="670" y="495" font-family="Noto Sans KR" font-size="12" fill="#5D4037">③ 현재 가중치로 예측</text>
    
    <text x="80" y="525" font-family="Noto Sans KR" font-size="12" fill="#5D4037">④ 손실(MSE) 계산</text>
    <text x="360" y="525" font-family="Noto Sans KR" font-size="12" fill="#5D4037">⑤ 기울기 계산 (방향 파악)</text>
    <text x="670" y="525" font-family="Noto Sans KR" font-size="12" fill="#5D4037">⑥ 가중치 업데이트</text>
    
    <text x="500" y="560" text-anchor="middle" font-family="Noto Sans KR" font-size="13" font-weight="600" fill="#E53935">⑦ ③~⑥ 반복 → 손실이 충분히 작아지면 완료!</text>
  </g>
</svg>