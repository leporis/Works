<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#E53935">⚙️ 학습률(Learning Rate)에 따른 학습 결과</text>
  
  <!-- ===== 학습률 너무 작음 ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="230" height="280" rx="12" fill="white" stroke="#1976D2" stroke-width="2"/>
    
    <!-- 헤더 -->
    <rect x="30" y="60" width="230" height="40" rx="12" fill="#1976D2"/>
    <text x="145" y="87" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="white">η = 0.001 (너무 작음)</text>
    
    <!-- 손실 그래프 -->
    <rect x="50" y="115" width="190" height="120" rx="8" fill="#E3F2FD"/>
    <line x1="70" y1="220" x2="220" y2="220" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="70" y1="220" x2="70" y2="130" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 매우 느린 수렴 곡선 -->
    <path d="M 75 140 Q 100 145 130 160 Q 160 175 190 190 Q 210 200 220 205" fill="none" stroke="#1976D2" stroke-width="3"/>
    
    <text x="145" y="145" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">손실</text>
    <text x="195" y="235" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">에포크</text>
    
    <!-- 설명 -->
    <text x="145" y="260" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#1976D2" font-weight="600">⏰ 수렴이 매우 느림</text>
    <text x="145" y="280" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">보폭이 너무 작아서</text>
    <text x="145" y="298" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">시간이 오래 걸림</text>
    
    <!-- 이모지 -->
    <text x="145" y="330" text-anchor="middle" font-size="24">🐢</text>
  </g>
  
  <!-- ===== 학습률 적절 ===== -->
  <g filter="url(#shadow)">
    <rect x="285" y="60" width="230" height="280" rx="12" fill="white" stroke="#43A047" stroke-width="3"/>
    
    <!-- 헤더 -->
    <rect x="285" y="60" width="230" height="40" rx="12" fill="#43A047"/>
    <text x="400" y="87" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="white">η = 0.01 (적절) ✓</text>
    
    <!-- 손실 그래프 -->
    <rect x="305" y="115" width="190" height="120" rx="8" fill="#E8F5E9"/>
    <line x1="325" y1="220" x2="475" y2="220" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="325" y1="220" x2="325" y2="130" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 안정적 수렴 곡선 -->
    <path d="M 330 140 Q 360 180 400 200 Q 440 210 475 212" fill="none" stroke="#43A047" stroke-width="3"/>
    
    <text x="400" y="145" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">손실</text>
    <text x="450" y="235" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">에포크</text>
    
    <!-- 설명 -->
    <text x="400" y="260" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#43A047" font-weight="600">✅ 빠르고 안정적 수렴</text>
    <text x="400" y="280" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">적절한 보폭으로</text>
    <text x="400" y="298" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">효율적으로 학습!</text>
    
    <!-- 이모지 -->
    <text x="400" y="330" text-anchor="middle" font-size="24">🎯</text>
  </g>
  
  <!-- ===== 학습률 너무 큼 ===== -->
  <g filter="url(#shadow)">
    <rect x="540" y="60" width="230" height="280" rx="12" fill="white" stroke="#E53935" stroke-width="2"/>
    
    <!-- 헤더 -->
    <rect x="540" y="60" width="230" height="40" rx="12" fill="#E53935"/>
    <text x="655" y="87" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="white">η = 0.1 (너무 큼)</text>
    
    <!-- 손실 그래프 -->
    <rect x="560" y="115" width="190" height="120" rx="8" fill="#FFEBEE"/>
    <line x1="580" y1="220" x2="730" y2="220" stroke="#BCAAA4" stroke-width="1"/>
    <line x1="580" y1="220" x2="580" y2="130" stroke="#BCAAA4" stroke-width="1"/>
    
    <!-- 발산/진동 곡선 -->
    <path d="M 585 180 L 610 150 L 635 200 L 660 135 L 685 210 L 710 125 L 730 220" fill="none" stroke="#E53935" stroke-width="3"/>
    
    <text x="655" y="145" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">손실</text>
    <text x="705" y="235" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">에포크</text>
    
    <!-- 설명 -->
    <text x="655" y="260" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#E53935" font-weight="600">💥 발산 또는 진동</text>
    <text x="655" y="280" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">보폭이 너무 커서</text>
    <text x="655" y="298" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">최저점을 넘어감</text>
    
    <!-- 이모지 -->
    <text x="655" y="330" text-anchor="middle" font-size="24">💨</text>
  </g>
  
  <!-- 하단 비유 설명 -->
  <rect x="30" y="360" width="740" height="75" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="400" y="390" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="#3E2723">🚶 학습률 = 산을 내려가는 "보폭"</text>
  <text x="195" y="418" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#1976D2">보폭 작음 → 안전하지만 느림</text>
  <text x="400" y="418" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#43A047" font-weight="600">적당한 보폭 → 빠르고 안전!</text>
  <text x="605" y="418" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#E53935">보폭 큼 → 넘어지거나 헤맴</text>
</svg>
