<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5D4037"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#E53935">🔬 탐구활동: 학습률 실험</text>
  <text x="400" y="52" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#8D6E63">"학습률을 바꾸면 어떤 일이 일어날까요?"</text>
  
  <!-- 실험 절차 (좌측) -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="200" height="200" rx="12" fill="white" stroke="#E53935" stroke-width="2"/>
    <rect x="30" y="70" width="200" height="35" rx="12" fill="#E53935"/>
    <rect x="30" y="95" width="200" height="10" fill="#E53935"/>
    <text x="130" y="95" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="white">📋 실험 절차</text>
    
    <text x="45" y="125" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#E53935">Step 1</text>
    <text x="45" y="143" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">데이터 30개 생성 (노이즈 10%)</text>
    
    <text x="45" y="168" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#E53935">Step 2</text>
    <text x="45" y="186" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">학습률 0.001로 학습 (500회)</text>
    
    <text x="45" y="211" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#E53935">Step 3</text>
    <text x="45" y="229" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">학습률 0.01, 0.1로 반복</text>
    
    <text x="45" y="250" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#E53935">Step 4</text>
    <text x="45" y="260" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">손실 그래프 비교</text>
  </g>
  
  <!-- 학습률 0.001 -->
  <g filter="url(#shadow)">
    <rect x="250" y="70" width="160" height="170" rx="10" fill="white" stroke="#43A047" stroke-width="2"/>
    <rect x="250" y="70" width="160" height="30" rx="10" fill="#43A047"/>
    <rect x="250" y="90" width="160" height="10" fill="#43A047"/>
    <text x="330" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="white">LR = 0.001</text>
    <text x="330" y="115" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#43A047">🐢 매우 느림</text>
    
    <!-- 손실 그래프 미니 -->
    <rect x="265" y="125" width="130" height="60" rx="4" fill="#FAFAFA"/>
    <text x="275" y="138" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">손실</text>
    <path d="M 275 175 Q 320 160, 360 150 Q 380 145, 385 143" fill="none" stroke="#43A047" stroke-width="2"/>
    <text x="330" y="195" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">에포크 →</text>
    
    <!-- 결과: 박스 y=70, height=170, 하단=240, 결과박스 하단=230 → 간격 10px -->
    <rect x="265" y="202" width="130" height="28" rx="4" fill="#E8F5E9"/>
    <text x="330" y="221" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#2E7D32">✅ 안정적이지만 느림</text>
  </g>
  
  <!-- 학습률 0.01 -->
  <g filter="url(#shadow)">
    <rect x="420" y="70" width="160" height="170" rx="10" fill="white" stroke="#2196F3" stroke-width="2"/>
    <rect x="420" y="70" width="160" height="30" rx="10" fill="#2196F3"/>
    <rect x="420" y="90" width="160" height="10" fill="#2196F3"/>
    <text x="500" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="white">LR = 0.01</text>
    <text x="500" y="115" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#2196F3">⭐ 권장</text>
    
    <!-- 손실 그래프 미니 -->
    <rect x="435" y="125" width="130" height="60" rx="4" fill="#FAFAFA"/>
    <text x="445" y="138" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">손실</text>
    <path d="M 445 175 Q 480 135, 520 130 Q 540 128, 555 127" fill="none" stroke="#2196F3" stroke-width="2"/>
    <text x="500" y="195" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">에포크 →</text>
    
    <!-- 결과 -->
    <rect x="435" y="202" width="130" height="28" rx="4" fill="#E3F2FD"/>
    <text x="500" y="221" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#1976D2">⭐ 빠르고 안정적!</text>
  </g>
  
  <!-- 학습률 0.1 -->
  <g filter="url(#shadow)">
    <rect x="590" y="70" width="170" height="170" rx="10" fill="white" stroke="#E53935" stroke-width="2"/>
    <rect x="590" y="70" width="170" height="30" rx="10" fill="#E53935"/>
    <rect x="590" y="90" width="170" height="10" fill="#E53935"/>
    <text x="675" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="white">LR = 0.1</text>
    <text x="675" y="115" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#E53935">⚠️ 위험</text>
    
    <!-- 손실 그래프 미니 (불안정) -->
    <rect x="605" y="125" width="140" height="60" rx="4" fill="#FAFAFA"/>
    <text x="615" y="138" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">손실</text>
    <path d="M 615 155 Q 640 185, 665 140 Q 690 175, 720 155 Q 735 165, 740 160" fill="none" stroke="#E53935" stroke-width="2"/>
    <text x="675" y="195" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">에포크 →</text>
    
    <!-- 결과 -->
    <rect x="605" y="202" width="140" height="28" rx="4" fill="#FFEBEE"/>
    <text x="675" y="221" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#C62828">❌ 불안정/발산!</text>
  </g>
  
  <!-- 실험 결과 기록표 -->
  <g filter="url(#shadow)">
    <rect x="30" y="280" width="400" height="150" rx="12" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <text x="230" y="305" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">📝 실험 결과 기록표</text>
    
    <!-- 테이블 -->
    <rect x="45" y="315" width="370" height="100" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- 헤더 -->
    <rect x="45" y="315" width="370" height="25" fill="#FFF3E0"/>
    <line x1="135" y1="315" x2="135" y2="415" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="225" y1="315" x2="225" y2="415" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="315" y1="315" x2="315" y2="415" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="45" y1="340" x2="415" y2="340" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="45" y1="365" x2="415" y2="365" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="45" y1="390" x2="415" y2="390" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="90" y="332" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="500" fill="#5D4037">학습률</text>
    <text x="180" y="332" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="500" fill="#5D4037">최종 손실</text>
    <text x="270" y="332" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="500" fill="#5D4037">R² 점수</text>
    <text x="365" y="332" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="500" fill="#5D4037">관찰 결과</text>
    
    <!-- 데이터 행 -->
    <text x="90" y="357" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#43A047">0.001</text>
    <text x="180" y="357" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(기록)</text>
    <text x="270" y="357" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(기록)</text>
    <text x="365" y="357" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(관찰)</text>
    
    <text x="90" y="382" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#2196F3">0.01</text>
    <text x="180" y="382" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(기록)</text>
    <text x="270" y="382" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(기록)</text>
    <text x="365" y="382" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(관찰)</text>
    
    <text x="90" y="407" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#E53935">0.1</text>
    <text x="180" y="407" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(기록)</text>
    <text x="270" y="407" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(기록)</text>
    <text x="365" y="407" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">(관찰)</text>
  </g>
  
  <!-- 핵심 발견 -->
  <g filter="url(#shadow)">
    <rect x="450" y="280" width="320" height="150" rx="12" fill="white" stroke="#9C27B0" stroke-width="2"/>
    <rect x="450" y="280" width="320" height="35" rx="12" fill="#9C27B0"/>
    <rect x="450" y="305" width="320" height="10" fill="#9C27B0"/>
    <text x="610" y="305" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="white">💡 핵심 발견</text>
    
    <text x="470" y="340" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">1. 학습률이 <tspan fill="#43A047" font-weight="600">너무 작으면</tspan></text>
    <text x="485" y="358" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">→ 안전하지만 학습이 오래 걸림</text>
    
    <text x="470" y="383" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">2. 학습률이 <tspan fill="#E53935" font-weight="600">너무 크면</tspan></text>
    <text x="485" y="401" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">→ 손실이 튀거나 발산함</text>
    
    <text x="470" y="420" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#9C27B0" font-weight="600">⭐ 적절한 학습률이 중요!</text>
  </g>
</svg>
