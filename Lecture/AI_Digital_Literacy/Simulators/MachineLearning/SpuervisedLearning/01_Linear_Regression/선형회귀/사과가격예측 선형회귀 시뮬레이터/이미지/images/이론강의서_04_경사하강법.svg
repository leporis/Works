<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="hillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#43A047"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <text x="400" y="40" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="24" font-weight="700" fill="#E53935">⛰️ 경사 하강법 (Gradient Descent)</text>
  
  <!-- 비유 설명 박스 -->
  <rect x="50" y="60" width="200" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="150" y="90" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#3E2723">💡 비유로 이해하기</text>
  <text x="150" y="112" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">안개 낀 산에서</text>
  <text x="150" y="128" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">가장 낮은 곳 찾기!</text>
  
  <!-- 손실 곡선 (U자 모양) -->
  <g filter="url(#shadow)">
    <rect x="50" y="150" width="450" height="300" rx="16" fill="white"/>
    
    <!-- 축 -->
    <line x1="100" y1="400" x2="450" y2="400" stroke="#3E2723" stroke-width="2"/>
    <line x1="100" y1="400" x2="100" y2="180" stroke="#3E2723" stroke-width="2"/>
    
    <!-- 축 레이블 -->
    <text x="275" y="435" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" fill="#5D4037">가중치 (w)</text>
    <text x="60" y="290" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" fill="#5D4037" transform="rotate(-90 60 290)">손실 (MSE)</text>
    
    <!-- U자 손실 곡선 -->
    <path d="M 120 200 Q 180 380 275 390 Q 370 380 430 200" fill="none" stroke="#E53935" stroke-width="4"/>
    
    <!-- 경사면 표시 (왼쪽) -->
    <line x1="150" y1="280" x2="200" y2="350" stroke="#1976D2" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="155" y="305" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1976D2">기울기 ↘</text>
    
    <!-- 경사면 표시 (오른쪽) -->
    <line x1="400" y1="280" x2="350" y2="350" stroke="#1976D2" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="365" y="305" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1976D2">↙ 기울기</text>
    
    <!-- 공 (학습 과정) -->
    <circle cx="160" cy="260" r="12" fill="#FFC107" stroke="#FF9800" stroke-width="2"/>
    <text x="160" y="265" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="700" fill="#3E2723">1</text>
    
    <circle cx="210" cy="340" r="12" fill="#FFC107" stroke="#FF9800" stroke-width="2"/>
    <text x="210" y="345" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="700" fill="#3E2723">2</text>
    
    <circle cx="250" cy="375" r="12" fill="#FFC107" stroke="#FF9800" stroke-width="2"/>
    <text x="250" y="380" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="700" fill="#3E2723">3</text>
    
    <!-- 최저점 (최적해) -->
    <circle cx="275" cy="390" r="14" fill="#43A047" stroke="#2E7D32" stroke-width="3"/>
    <text x="275" y="395" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="700" fill="white">★</text>
    
    <!-- 화살표 (이동 경로) -->
    <path d="M 160 272 Q 180 300 205 335" fill="none" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 215 350 Q 230 365 245 372" fill="none" stroke="#FF9800" stroke-width="2"/>
    <path d="M 255 380 L 268 388" fill="none" stroke="#FF9800" stroke-width="2"/>
    
    <!-- 최적해 레이블 -->
    <rect x="220" y="420" width="110" height="25" rx="6" fill="#E8F5E9"/>
    <text x="275" y="438" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#2E7D32">최적의 w 값!</text>
  </g>
  
  <!-- 업데이트 공식 박스 -->
  <g filter="url(#shadow)">
    <rect x="530" y="150" width="240" height="130" rx="16" fill="white" stroke="#1976D2" stroke-width="2"/>
    <rect x="530" y="150" width="240" height="40" rx="16" fill="#1976D2"/>
    <text x="650" y="178" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="white">📐 가중치 업데이트 공식</text>
    
    <text x="650" y="215" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#3E2723">w_new = w_old - η × ∇</text>
    
    <line x1="550" y1="235" x2="750" y2="235" stroke="#BBDEFB" stroke-width="1"/>
    
    <text x="570" y="258" font-family="JetBrains Mono, monospace" font-size="12" fill="#1976D2">η</text>
    <text x="590" y="258" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">= 학습률 (보폭)</text>
    <text x="570" y="275" font-family="JetBrains Mono, monospace" font-size="12" fill="#1976D2">∇</text>
    <text x="590" y="275" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">= 기울기 (방향)</text>
  </g>
  
  <!-- 단계 설명 -->
  <g filter="url(#shadow)">
    <rect x="530" y="300" width="240" height="150" rx="16" fill="white" stroke="#FFCCBC" stroke-width="2"/>
    <text x="650" y="325" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="600" fill="#3E2723">🔄 학습 과정</text>
    
    <text x="555" y="355" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">① 현재 위치의 기울기 계산</text>
    <text x="555" y="380" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">② 기울기 반대 방향으로 이동</text>
    <text x="555" y="405" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#5D4037">③ 학습률만큼 이동 (보폭)</text>
    <text x="555" y="430" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#E53935" font-weight="600">④ 최저점 도달까지 반복!</text>
  </g>
  
  <!-- 하단 핵심 메시지 -->
  <rect x="50" y="460" width="700" height="30" rx="8" fill="#FCE4EC"/>
  <text x="400" y="481" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" fill="#C62828">💡 기울기(경사)를 따라 내려가서 → 손실이 가장 작은 지점을 찾는다!</text>
</svg>
