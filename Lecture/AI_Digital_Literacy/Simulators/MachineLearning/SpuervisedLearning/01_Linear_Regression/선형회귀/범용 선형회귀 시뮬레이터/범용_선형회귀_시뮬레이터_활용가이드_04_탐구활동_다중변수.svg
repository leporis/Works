<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; fill: #3E2723; }
      .subtitle { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 600; fill: #5D4037; }
      .label { font-family: 'Noto Sans KR', sans-serif; font-size: 10px; font-weight: 500; fill: #5D4037; }
      .small { font-family: 'Noto Sans KR', sans-serif; font-size: 9px; fill: #5D4037; }
      .hint { font-family: 'Noto Sans KR', sans-serif; font-size: 8px; fill: #8D6E63; }
      .value { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; }
      .white { fill: #FFFFFF; }
    </style>
  </defs>
  
  <rect width="800" height="380" fill="url(#bgGrad)"/>
  
  <text x="400" y="28" text-anchor="middle" class="title">🔬 탐구 활동 2: 다중 변수 선택 실험</text>
  
  <!-- 실험 절차 -->
  <rect x="30" y="45" width="740" height="80" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="400" y="68" text-anchor="middle" class="subtitle">📋 실험 절차 (🐧 펭귄 데이터셋)</text>
  
  <circle cx="70" cy="100" r="15" fill="#9C27B0"/>
  <text x="70" y="105" text-anchor="middle" class="small white">1</text>
  <text x="95" y="100" class="hint">🐧 펭귄</text>
  <text x="95" y="112" class="hint">데이터 로드</text>
  
  <line x1="135" y1="100" x2="165" y2="100" stroke="#BCAAA4" stroke-width="2"/>
  <polygon points="165,97 175,100 165,103" fill="#BCAAA4"/>
  
  <circle cx="205" cy="100" r="15" fill="#FFC107"/>
  <text x="205" y="105" text-anchor="middle" class="small" style="fill:#3E2723">2</text>
  <text x="230" y="100" class="hint">Y: 체중(g)</text>
  <text x="230" y="112" class="hint">선택</text>
  
  <line x1="280" y1="100" x2="310" y2="100" stroke="#BCAAA4" stroke-width="2"/>
  <polygon points="310,97 320,100 310,103" fill="#BCAAA4"/>
  
  <circle cx="360" cy="100" r="15" fill="#E53935"/>
  <text x="360" y="105" text-anchor="middle" class="small white">3</text>
  <text x="385" y="100" class="hint">X: 부리길이</text>
  <text x="385" y="112" class="hint">(1개) → R²</text>
  
  <line x1="450" y1="100" x2="480" y2="100" stroke="#BCAAA4" stroke-width="2"/>
  <polygon points="480,97 490,100 480,103" fill="#BCAAA4"/>
  
  <circle cx="530" cy="100" r="15" fill="#43A047"/>
  <text x="530" y="105" text-anchor="middle" class="small white">4</text>
  <text x="555" y="100" class="hint">X: 부리길이+부리깊이</text>
  <text x="555" y="112" class="hint">(2개) → R²</text>
  
  <line x1="650" y1="100" x2="680" y2="100" stroke="#BCAAA4" stroke-width="2"/>
  <polygon points="680,97 690,100 680,103" fill="#BCAAA4"/>
  
  <circle cx="730" cy="100" r="15" fill="#1565C0"/>
  <text x="730" y="105" text-anchor="middle" class="small white">5</text>
  <text x="758" y="100" text-anchor="end" class="hint">비교</text>
  <text x="758" y="112" text-anchor="end" class="hint">분석</text>
  
  <!-- 실험 케이스 -->
  <!-- 케이스 1: 1개 변수 -->
  <rect x="30" y="140" width="240" height="140" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="30" y="140" width="240" height="30" rx="10" fill="#E53935"/>
  <rect x="30" y="160" width="240" height="10" fill="#E53935"/>
  <text x="150" y="162" text-anchor="middle" class="label white">케이스 1: 변수 1개</text>
  
  <rect x="45" y="180" width="210" height="40" rx="5" fill="#FFEBEE"/>
  <text x="50" y="198" class="small">☑ 부리길이(mm)</text>
  <text x="50" y="214" class="hint" style="fill:#C62828">☐ 부리깊이, ☐ 날개길이</text>
  
  <text x="45" y="240" class="small" style="font-weight:600">예상 결과</text>
  <text x="45" y="255" class="hint">• 기본적인 예측 가능</text>
  <text x="45" y="268" class="hint">• R² 보통 수준</text>
  
  <!-- 케이스 2: 2개 변수 -->
  <rect x="280" y="140" width="240" height="140" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="280" y="140" width="240" height="30" rx="10" fill="#43A047"/>
  <rect x="280" y="160" width="240" height="10" fill="#43A047"/>
  <text x="400" y="162" text-anchor="middle" class="label white">케이스 2: 변수 2개 (A)</text>
  
  <rect x="295" y="180" width="210" height="40" rx="5" fill="#E8F5E9"/>
  <text x="300" y="198" class="small">☑ 부리길이(mm) + ☑ 부리깊이(mm)</text>
  <text x="300" y="214" class="hint" style="fill:#2E7D32">☐ 날개길이</text>
  
  <text x="295" y="240" class="small" style="font-weight:600">예상 결과</text>
  <text x="295" y="255" class="hint">• 정보량 증가</text>
  <text x="295" y="268" class="hint">• R² 향상 가능</text>
  
  <!-- 케이스 3: 2개 변수 (다른 조합) -->
  <rect x="530" y="140" width="240" height="140" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="530" y="140" width="240" height="30" rx="10" fill="#1565C0"/>
  <rect x="530" y="160" width="240" height="10" fill="#1565C0"/>
  <text x="650" y="162" text-anchor="middle" class="label white">케이스 3: 변수 2개 (B)</text>
  
  <rect x="545" y="180" width="210" height="40" rx="5" fill="#E3F2FD"/>
  <text x="550" y="198" class="small">☑ 부리길이(mm) + ☑ 날개길이(mm)</text>
  <text x="550" y="214" class="hint" style="fill:#1565C0">☐ 부리깊이</text>
  
  <text x="545" y="240" class="small" style="font-weight:600">예상 결과</text>
  <text x="545" y="255" class="hint">• 날개↔체중 상관 높음</text>
  <text x="545" y="268" class="hint">• R² 가장 높을 수 있음</text>
  
  <!-- 기록표 & 토론 -->
  <rect x="30" y="295" width="380" height="70" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="220" y="315" text-anchor="middle" class="subtitle">📝 기록표</text>
  
  <rect x="45" y="325" width="140" height="18" rx="3" fill="#E3F2FD"/>
  <text x="115" y="338" text-anchor="middle" class="hint">선택 변수</text>
  <rect x="185" y="325" width="60" height="18" rx="3" fill="#E3F2FD"/>
  <text x="215" y="338" text-anchor="middle" class="hint">R²</text>
  <rect x="245" y="325" width="150" height="18" rx="3" fill="#E3F2FD"/>
  <text x="320" y="338" text-anchor="middle" class="hint">관찰</text>
  
  <rect x="45" y="345" width="350" height="15" rx="3" fill="#FAFAFA" stroke="#FFCCBC"/>
  
  <rect x="420" y="295" width="350" height="70" rx="10" fill="#FFF3E0" filter="url(#shadow)"/>
  <text x="595" y="315" text-anchor="middle" class="subtitle">💬 토론 질문</text>
  <text x="430" y="335" class="hint">1. 변수를 많이 선택할수록 항상 좋은가요?</text>
  <text x="430" y="350" class="hint">2. 어떤 변수 조합이 가장 효과적이었나요?</text>
</svg>
