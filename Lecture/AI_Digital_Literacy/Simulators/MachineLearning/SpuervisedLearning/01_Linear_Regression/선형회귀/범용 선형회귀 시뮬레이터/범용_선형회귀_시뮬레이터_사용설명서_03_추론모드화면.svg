  <text x="750" y="248" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="600" fill="#E53935">1,012원</text>
  
  <text x="605" y="270" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">📈 기울기 기여</text>
  <text x="750" y="270" text-anchor="end" font-family="Noto Sans KR, sans-serif" font-size="9" font-weight="600" fill="#E53935">+1,830원</text>
  <text x="620" y="284" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#8D6E63">(30.5 × 60)</text>
  
