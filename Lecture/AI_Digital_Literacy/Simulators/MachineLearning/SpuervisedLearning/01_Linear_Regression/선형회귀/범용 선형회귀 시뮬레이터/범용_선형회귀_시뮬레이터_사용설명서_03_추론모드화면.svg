  <circle cx="450" cy="435" r="5" fill="#43A047" opacity="0.5"/>
  <text x="465" y="439" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">학습 데이터</text>
  
  <rect x="560" y="427" width="60" height="18" rx="4" fill="#9C27B0"/>
