  <!-- 모드 탭 (y:46) -->
  <rect x="300" y="46" width="90" height="26" rx="5" fill="#FFFFFF" stroke="#FFCCBC"/>
  <text x="345" y="64" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">🧠 학습 모드</text>
  
  <rect x="400" y="46" width="90" height="26" rx="5" fill="#9C27B0"/>
  <text x="445" y="64" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#FFFFFF">🔮 추론 모드</text>
  
