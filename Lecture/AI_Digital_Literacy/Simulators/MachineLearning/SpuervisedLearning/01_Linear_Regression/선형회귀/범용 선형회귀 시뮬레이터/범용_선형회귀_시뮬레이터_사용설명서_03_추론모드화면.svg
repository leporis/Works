  <!-- X값 슬라이더 (y:122) -->
  <text x="38" y="138" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="500" fill="#5D4037">X값 입력</text>
  <rect x="38" y="146" width="135" height="10" rx="5" fill="#F3E5F5"/>
