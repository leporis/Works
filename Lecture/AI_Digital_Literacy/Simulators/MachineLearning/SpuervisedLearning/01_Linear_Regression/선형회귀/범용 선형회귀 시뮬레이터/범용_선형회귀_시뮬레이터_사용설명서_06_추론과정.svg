<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font-family: 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700; fill: #3E2723; }
      .subtitle { font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; fill: #5D4037; }
      .label { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 500; fill: #5D4037; }
      .small { font-family: 'Noto Sans KR', sans-serif; font-size: 10px; fill: #5D4037; }
      .hint { font-family: 'Noto Sans KR', sans-serif; font-size: 9px; fill: #8D6E63; }
      .value { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 600; fill: #E53935; }
      .big { font-family: 'Noto Sans KR', sans-serif; font-size: 20px; font-weight: 700; fill: #FFFFFF; }
      .white { fill: #FFFFFF; }
      .formula { font-family: monospace; font-size: 11px; fill: #E53935; }
    </style>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <text x="400" y="30" text-anchor="middle" class="title">🔮 추론 과정: X값 입력 → Y값 예측</text>
  
  <!-- 단계 1: X값 입력 -->
  <rect x="30" y="55" width="180" height="160" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="55" cy="75" r="15" fill="#9C27B0"/>
  <text x="55" y="80" text-anchor="middle" class="label white">1</text>
  <text x="80" y="80" class="subtitle">X값 입력</text>
  
  <text x="45" y="105" class="small">슬라이더로 X값 조절</text>
  <rect x="45" y="115" width="150" height="10" rx="5" fill="#F3E5F5"/>
  <rect x="45" y="115" width="90" height="10" rx="5" fill="#9C27B0"/>
  <circle cx="135" cy="120" r="8" fill="#9C27B0" stroke="#FFFFFF" stroke-width="2"/>
  
  <text x="45" y="150" class="hint">0</text>
  <text x="120" y="150" text-anchor="middle" class="value" style="fill:#9C27B0;font-size:14px">X = 60</text>
  <text x="195" y="150" text-anchor="end" class="hint">100</text>
  
  <rect x="45" y="165" width="150" height="35" rx="6" fill="#F3E5F5"/>
  <text x="120" y="185" text-anchor="middle" class="hint" style="fill:#7B1FA2">💡 슬라이더 변경 시</text>
  <text x="120" y="197" text-anchor="middle" class="hint" style="fill:#7B1FA2;font-weight:600">자동으로 예측 실행!</text>
  
  <!-- 화살표 1 -->
  <polygon points="220,135 240,125 240,145" fill="#9C27B0"/>
  
  <!-- 단계 2: 회귀식 적용 -->
  <rect x="250" y="55" width="200" height="160" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="275" cy="75" r="15" fill="#E53935"/>
  <text x="275" y="80" text-anchor="middle" class="label white">2</text>
  <text x="300" y="80" class="subtitle">회귀식 적용</text>
  
  <rect x="265" y="95" width="170" height="35" rx="6" fill="#FFEBEE"/>
  <text x="350" y="118" text-anchor="middle" class="formula" style="font-size:13px">Y = 15.2 × X + 842</text>
  
  <text x="275" y="150" class="small">계산 과정:</text>
  <text x="285" y="170" class="hint">Y = 15.2 × 60 + 842</text>
  <text x="285" y="185" class="hint">Y = 912 + 842</text>
  <text x="285" y="202" class="value" style="font-size:13px">Y = 1,754</text>
  
  <!-- 화살표 2 -->
  <polygon points="460,135 480,125 480,145" fill="#E53935"/>
  
  <!-- 단계 3: 예측 결과 -->
  <rect x="490" y="55" width="180" height="160" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="515" cy="75" r="15" fill="#43A047"/>
  <text x="515" y="80" text-anchor="middle" class="label white">3</text>
  <text x="540" y="80" class="subtitle">예측 결과</text>
  
  <rect x="505" y="100" width="150" height="60" rx="10" fill="linear-gradient(135deg, #43A047 0%, #2E7D32 100%)"/>
  <text x="580" y="125" text-anchor="middle" class="small white">예측값 (Y)</text>
  <text x="580" y="150" text-anchor="middle" class="big">1,754</text>
  
  <rect x="505" y="170" width="150" height="30" rx="5" fill="#E8F5E9"/>
  <text x="580" y="190" text-anchor="middle" class="hint" style="fill:#2E7D32">✅ 예측 완료!</text>
  
  <!-- 하단: 시각화 설명 -->
  <rect x="30" y="230" width="740" height="155" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="400" y="255" text-anchor="middle" class="subtitle">📈 예측 시각화 (차트에서 표시되는 요소)</text>
  
  <!-- 미니 차트 -->
  <rect x="50" y="270" width="200" height="100" rx="8" fill="#FAFAFA"/>
  <line x1="75" y1="285" x2="75" y2="355" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="75" y1="355" x2="235" y2="355" stroke="#BCAAA4" stroke-width="1"/>
  
  <!-- 데이터 점 -->
  <circle cx="95" cy="345" r="3" fill="#43A047" opacity="0.5"/>
  <circle cx="115" cy="335" r="3" fill="#43A047" opacity="0.5"/>
  <circle cx="135" cy="320" r="3" fill="#FFC107" opacity="0.5"/>
  <circle cx="155" cy="310" r="3" fill="#FFC107" opacity="0.5"/>
  <circle cx="175" cy="300" r="3" fill="#E53935" opacity="0.5"/>
  <circle cx="195" cy="295" r="3" fill="#E53935" opacity="0.5"/>
  
  <!-- 회귀선 -->
  <line x1="85" y1="350" x2="220" y2="290" stroke="#E53935" stroke-width="2"/>
  
  <!-- 수직선 -->
  <line x1="155" y1="355" x2="155" y2="310" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- 수평선 -->
  <line x1="75" y1="310" x2="155" y2="310" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- 예측점 -->
  <circle cx="155" cy="310" r="8" fill="#FFC107" stroke="#FF9800" stroke-width="2"/>
  
  <!-- 범례 -->
  <rect x="270" y="275" width="230" height="95" rx="8" fill="#FAFAFA"/>
  <text x="385" y="295" text-anchor="middle" class="label">시각화 요소</text>
  
  <line x1="285" y1="315" x2="315" y2="315" stroke="#E53935" stroke-width="2"/>
  <text x="325" y="319" class="small">회귀선 (학습된 모델)</text>
  
  <line x1="285" y1="335" x2="315" y2="335" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="325" y="339" class="small">수직선 (X → 회귀선)</text>
  
  <line x1="285" y1="355" x2="315" y2="355" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="325" y="359" class="small">수평선 (회귀선 → Y)</text>
  
  <rect x="520" y="275" width="230" height="95" rx="8" fill="#FAFAFA"/>
  <text x="635" y="295" text-anchor="middle" class="label">점 요소</text>
  
  <circle cx="540" cy="315" r="5" fill="#43A047" opacity="0.5"/>
  <text x="555" y="319" class="small">학습 데이터 (희미하게)</text>
  
  <circle cx="540" cy="340" r="8" fill="#FFC107" stroke="#FF9800" stroke-width="2"/>
  <text x="555" y="344" class="small">예측점 (노란 원)</text>
  
  <text x="530" y="365" class="hint">예측점 위에 예측값 라벨 표시</text>
</svg>
