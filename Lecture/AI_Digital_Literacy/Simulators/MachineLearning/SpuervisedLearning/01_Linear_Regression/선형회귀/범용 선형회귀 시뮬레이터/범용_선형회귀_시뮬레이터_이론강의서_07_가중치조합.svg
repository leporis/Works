<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <rect x="150" y="8" width="500" height="32" rx="6" fill="#3E2723"/>
  <text x="400" y="30" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">⚖️ 가중치 조합: 여러 변수를 하나로 합치기</text>
  
  <!-- ===== 공식 박스 (y:50, h:50) ===== -->
  <rect x="90" y="50" width="620" height="50" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="400" y="82" text-anchor="middle" font-family="Noto Sans KR, monospace" font-size="13" font-weight="700" fill="#E53935">조합점수(X) = w₁×정규화(X₁) + w₂×정규화(X₂) + ... (단, w₁+w₂+...=100%)</text>
  
  <!-- ===== 입력 변수들 (x:25, w:235, h:175) ===== -->
  <rect x="25" y="115" width="235" height="175" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="142" y="140" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">📥 입력: 정규화된 변수들</text>
  
  <!-- 변수 1 -->
  <rect x="40" y="155" width="205" height="52" rx="8" fill="#E3F2FD"/>
  <text x="55" y="175" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#5D4037">부리길이</text>
  <text x="55" y="195" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">정규화 점수: 50점</text>
  <rect x="165" y="165" width="70" height="30" rx="5" fill="#1565C0"/>
  <text x="200" y="185" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">50점</text>
  
  <!-- 변수 2 -->
  <rect x="40" y="217" width="205" height="52" rx="8" fill="#E8F5E9"/>
  <text x="55" y="237" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#5D4037">부리깊이</text>
  <text x="55" y="257" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">정규화 점수: 60점</text>
  <rect x="165" y="227" width="70" height="30" rx="5" fill="#43A047"/>
  <text x="200" y="247" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">60점</text>
  
  <!-- ===== 가중치 설정 (x:280, w:235, h:175) ===== -->
  <rect x="280" y="115" width="235" height="175" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="397" y="140" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">⚖️ 가중치 설정</text>
  
  <!-- 시나리오 1: 동일 가중치 -->
  <rect x="295" y="155" width="205" height="52" rx="8" fill="#FFF3E0"/>
  <text x="310" y="178" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#5D4037">시나리오 1: 동일 비율</text>
  <text x="310" y="198" font-family="Noto Sans KR, monospace" font-size="13" font-weight="700" fill="#FF9800">50% : 50%</text>
  
  <!-- 시나리오 2: 차등 가중치 -->
  <rect x="295" y="217" width="205" height="52" rx="8" fill="#F3E5F5"/>
  <text x="310" y="240" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#5D4037">시나리오 2: 차등 비율</text>
  <text x="310" y="260" font-family="Noto Sans KR, monospace" font-size="13" font-weight="700" fill="#9C27B0">70% : 30%</text>
  
  <!-- 화살표 -->
  <polygon points="520,180 545,168 545,192" fill="#FFC107"/>
  <polygon points="520,242 545,230 545,254" fill="#FFC107"/>
  
  <!-- ===== 결과 (x:560, w:215, h:175) ===== -->
  <rect x="560" y="115" width="215" height="175" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="667" y="140" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#3E2723">📤 출력: 조합점수(X)</text>
  
  <!-- 결과 1 -->
  <rect x="575" y="155" width="185" height="52" rx="8" fill="#FFF3E0"/>
  <text x="667" y="178" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">50%×50 + 50%×60</text>
  <text x="667" y="200" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="20" font-weight="700" fill="#FF9800">= 55점</text>
  
  <!-- 결과 2 -->
  <rect x="575" y="217" width="185" height="52" rx="8" fill="#F3E5F5"/>
  <text x="667" y="240" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">70%×50 + 30%×60</text>
  <text x="667" y="262" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="20" font-weight="700" fill="#9C27B0">= 53점</text>
  
  <!-- ===== 설명 (y:305, h:100) ===== -->
  <rect x="25" y="305" width="750" height="100" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="400" y="330" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#5D4037">💡 가중치의 의미</text>
  
  <rect x="45" y="345" width="225" height="48" rx="6" fill="#E3F2FD"/>
  <text x="157" y="368" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#1565C0">가중치 ↑</text>
  <text x="157" y="385" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">해당 변수의 중요도 증가</text>
  
  <rect x="290" y="345" width="225" height="48" rx="6" fill="#FFEBEE"/>
  <text x="402" y="368" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#C62828">가중치 합 = 항상 100%</text>
  <text x="402" y="385" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">한 변수↑ → 나머지↓ 자동 조정</text>
  
  <rect x="535" y="345" width="225" height="48" rx="6" fill="#E8F5E9"/>
  <text x="647" y="368" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" font-weight="600" fill="#2E7D32">실험으로 최적값 탐색</text>
  <text x="647" y="385" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#5D4037">R² 점수가 높아지는 조합 찾기</text>
</svg>
