  <!-- 손실 그래프 (x:230, w:150, h:85) -->
  <rect x="230" y="146" width="150" height="80" rx="8" fill="#FFF3E0" stroke="#FFCCBC"/>
  <text x="305" y="165" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">📉 손실 그래프</text>
  <polyline points="250,210 280,195 310,185 340,180 360,178" fill="none" stroke="#E53935" stroke-width="2"/>
  
  <!-- 산점도 (x:390, w:150, h:85) -->
  <rect x="390" y="146" width="150" height="80" rx="8" fill="#FFF3E0" stroke="#FFCCBC"/>
  <text x="465" y="165" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">📈 산점도</text>
  <circle cx="410" cy="210" r="3" fill="#43A047"/>
  <circle cx="435" cy="200" r="3" fill="#FFC107"/>
  <circle cx="460" cy="190" r="3" fill="#FFC107"/>
  <circle cx="485" cy="180" r="3" fill="#E53935"/>
  <circle cx="510" cy="172" r="3" fill="#E53935"/>
  <line x1="405" y1="215" x2="520" y2="168" stroke="#E53935" stroke-width="2"/>
  
  <!-- 결과 패널 (y:236, h:60) -->
  <rect x="230" y="236" width="310" height="60" rx="8" fill="#FAFAFA" stroke="#FFCCBC" stroke-dasharray="4,2"/>
  <text x="385" y="254" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#8D6E63">↓ 학습 실행 후 표시 ↓</text>
  
  <!-- 결과 박스들 (y:262, h:26) -->
  <rect x="238" y="262" width="90" height="26" rx="5" fill="#E8F5E9"/>
  <text x="283" y="280" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#2E7D32">📊 학습결과</text>
  
  <rect x="338" y="262" width="90" height="26" rx="5" fill="#E3F2FD"/>
  <text x="383" y="280" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#1565C0">📏 오차분석</text>
  
  <rect x="438" y="262" width="90" height="26" rx="5" fill="#FFF3E0"/>
  <text x="483" y="280" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#E65100">📽️ 재생</text>
  
  <!-- ===== 오른쪽 패널 (x:560, w:190) ===== -->
  <rect x="560" y="136" width="190" height="210" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  
  <!-- 패널 헤더 -->
  <rect x="560" y="136" width="190" height="30" rx="12" fill="#43A047"/>
  <rect x="560" y="154" width="190" height="12" fill="#43A047"/>
  <text x="655" y="157" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">⚙️ 학습 설정</text>
  
  <!-- 학습률 (y:176) -->
  <text x="575" y="190" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">학습률 (Learning Rate)</text>
  <rect x="575" y="196" width="160" height="8" rx="4" fill="#E8F5E9"/>
  <rect x="575" y="196" width="80" height="8" rx="4" fill="#43A047"/>
  <circle cx="655" cy="200" r="6" fill="#43A047" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- 에포크 (y:220) -->
  <text x="575" y="230" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">에포크 (Epochs)</text>
  <rect x="575" y="236" width="160" height="8" rx="4" fill="#E8F5E9"/>
  <rect x="575" y="236" width="100" height="8" rx="4" fill="#43A047"/>
  <circle cx="675" cy="240" r="6" fill="#43A047" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- 학습 실행 버튼 (y:260, h:36) -->
  <rect x="575" y="260" width="160" height="36" rx="8" fill="#43A047"/>
  <text x="655" y="284" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">⚡ 학습 실행</text>
  
  <!-- 회귀식 (y:304, h:30) -->
  <rect x="575" y="304" width="160" height="30" rx="5" fill="#FFF3E0"/>
  <text x="655" y="324" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#E53935">Y = 15.2 × X + 842</text>
  
  <!-- ===== 크기 표시 (y:360~) ===== -->
  <line x1="50" y1="360" x2="210" y2="360" stroke="#E53935" stroke-width="1"/>
  <line x1="50" y1="355" x2="50" y2="365" stroke="#E53935"/>
  <line x1="210" y1="355" x2="210" y2="365" stroke="#E53935"/>
  <rect x="100" y="372" width="60" height="22" rx="4" fill="#FFEBEE"/>
  <text x="130" y="388" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#E53935">240px</text>
  
  <line x1="220" y1="360" x2="550" y2="360" stroke="#E53935" stroke-width="1"/>
  <line x1="220" y1="355" x2="220" y2="365" stroke="#E53935"/>
  <line x1="550" y1="355" x2="550" y2="365" stroke="#E53935"/>
  <rect x="340" y="372" width="90" height="22" rx="4" fill="#FFEBEE"/>
  <text x="385" y="388" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#E53935">가변 (중앙)</text>
  
  <line x1="560" y1="360" x2="750" y2="360" stroke="#E53935" stroke-width="1"/>
  <line x1="560" y1="355" x2="560" y2="365" stroke="#E53935"/>
  <line x1="750" y1="355" x2="750" y2="365" stroke="#E53935"/>
  <rect x="625" y="372" width="60" height="22" rx="4" fill="#FFEBEE"/>
  <text x="655" y="388" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#E53935">260px</text>
</svg>
