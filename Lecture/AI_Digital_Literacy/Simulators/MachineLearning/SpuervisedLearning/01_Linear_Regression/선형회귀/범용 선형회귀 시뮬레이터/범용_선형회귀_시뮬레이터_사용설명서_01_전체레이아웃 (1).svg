<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>
  
  <!-- 제목 영역: 박스(400×32), 폰트16, 패딩8 -->
  <rect x="200" y="10" width="400" height="32" rx="6" fill="#3E2723"/>
  <text x="400" y="32" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">📊 시뮬레이터 전체 레이아웃 (3열 구성)</text>
  
  <!-- 헤더 영역: 박스(700×36), 폰트13, 패딩10 -->
  <rect x="50" y="52" width="700" height="36" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="400" y="76" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#5D4037">📊 선형 회귀 학습 시뮬레이터</text>
  
  <!-- 모드 탭: 박스(100×28), 폰트11, 패딩8 -->
  <rect x="280" y="98" width="100" height="28" rx="6" fill="#E53935"/>
  <text x="330" y="117" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#FFFFFF">🧠 학습 모드</text>
  
  <rect x="390" y="98" width="100" height="28" rx="6" fill="#FFFFFF" stroke="#FFCCBC" stroke-width="2"/>
  <text x="440" y="117" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#5D4037">🔮 추론 모드</text>
  
  <!-- ===== 왼쪽 패널 (x:50, w:160) ===== -->
  <rect x="50" y="136" width="160" height="210" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  
  <!-- 패널 헤더: 폰트11, 패딩8 -->
  <rect x="50" y="136" width="160" height="30" rx="12" fill="#E53935"/>
  <rect x="50" y="154" width="160" height="12" fill="#E53935"/>
  <text x="130" y="157" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">📁 데이터 입력</text>
  
  <!-- 탭 버튼들 (y:176, h:24, 폰트10) -->
  <rect x="58" y="176" width="46" height="24" rx="4" fill="#E53935"/>
  <text x="81" y="193" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#FFFFFF">프리셋</text>
  
  <rect x="110" y="176" width="40" height="24" rx="4" fill="#FFFFFF" stroke="#FFCCBC"/>
  <text x="130" y="193" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">CSV</text>
  
  <rect x="156" y="176" width="46" height="24" rx="4" fill="#FFFFFF" stroke="#FFCCBC"/>
  <text x="179" y="193" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">직접</text>
  
  <!-- 설정 영역 (y:208, h:44) -->
  <rect x="58" y="208" width="144" height="44" rx="6" fill="#FFF3E0"/>
  <text x="130" y="235" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">데이터 설정 영역</text>
  
  <!-- 다중 변수 영역 (y:260, h:44) -->
  <rect x="58" y="260" width="144" height="44" rx="6" fill="#E8F5E9"/>
  <text x="130" y="280" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#2E7D32">다중 변수 선택</text>
