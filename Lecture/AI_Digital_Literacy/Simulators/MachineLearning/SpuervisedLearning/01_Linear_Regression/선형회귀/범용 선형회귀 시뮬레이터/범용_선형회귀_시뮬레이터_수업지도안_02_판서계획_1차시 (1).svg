<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#1B5E20"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; fill: #3E2723; }
      .board-title { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; fill: #FFFFFF; }
      .board-subtitle { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 600; fill: #FFEB3B; }
      .board-text { font-family: 'Noto Sans KR', sans-serif; font-size: 10px; fill: #FFFFFF; }
      .board-small { font-family: 'Noto Sans KR', sans-serif; font-size: 9px; fill: #C8E6C9; }
      .board-formula { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; fill: #FFEB3B; }
      .board-example { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #81C784; }
      .chalk { fill: #FFFFFF; }
      .yellow { fill: #FFEB3B; }
      .hint { font-family: 'Noto Sans KR', sans-serif; font-size: 8px; fill: #8D6E63; }
    </style>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <text x="400" y="28" text-anchor="middle" class="title">📋 1차시 판서 계획: 선형 회귀 기초</text>
  
  <!-- 칠판 프레임 -->
  <rect x="30" y="45" width="740" height="360" rx="8" fill="#5D4037" filter="url(#shadow)"/>
  <rect x="40" y="55" width="720" height="340" rx="4" fill="url(#boardGrad)"/>
  
  <!-- 제목 영역 -->
  <text x="400" y="85" text-anchor="middle" class="board-title">📊 선형 회귀 (Linear Regression)</text>
  <line x1="100" y1="95" x2="700" y2="95" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- 왼쪽: 회귀식 -->
  <text x="60" y="120" class="board-subtitle">【회귀식】</text>
  
  <text x="60" y="150" class="board-formula">Y = w × X + b</text>
  
  <text x="60" y="175" class="board-text">• Y: 예측값 (종속변수)</text>
  <text x="60" y="192" class="board-text">• X: 입력값 (독립변수)</text>
  <text x="60" y="209" class="board-text">• w: 기울기 (가중치)</text>
  <text x="60" y="226" class="board-text">• b: 절편 (편향)</text>
  
  <text x="60" y="255" class="board-subtitle">【예시: 주택 가격】</text>
  <text x="60" y="280" class="board-example">가격 = 15 × 면적 + 500</text>
  
  <text x="60" y="305" class="board-small">면적 50㎡일 때:</text>
  <text x="60" y="322" class="board-example">→ 15×50+500 = 1,250만원</text>
  
  <!-- 구분선 -->
  <line x1="380" y1="105" x2="380" y2="340" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- 오른쪽: 학습 과정 -->
  <text x="400" y="120" class="board-subtitle">【학습 과정】</text>
  
  <circle cx="420" cy="148" r="10" fill="none" stroke="#FFEB3B" stroke-width="2"/>
  <text x="420" y="152" text-anchor="middle" class="board-small" style="fill:#FFEB3B">1</text>
  <text x="440" y="152" class="board-text">데이터 준비</text>
  
  <circle cx="420" cy="175" r="10" fill="none" stroke="#FFEB3B" stroke-width="2"/>
  <text x="420" y="179" text-anchor="middle" class="board-small" style="fill:#FFEB3B">2</text>
  <text x="440" y="179" class="board-text">모델 초기화 (w, b)</text>
  
  <circle cx="420" cy="202" r="10" fill="none" stroke="#FFEB3B" stroke-width="2"/>
  <text x="420" y="206" text-anchor="middle" class="board-small" style="fill:#FFEB3B">3</text>
  <text x="440" y="206" class="board-text">예측 → 오차 계산</text>
  
  <circle cx="420" cy="229" r="10" fill="none" stroke="#FFEB3B" stroke-width="2"/>
  <text x="420" y="233" text-anchor="middle" class="board-small" style="fill:#FFEB3B">4</text>
  <text x="440" y="233" class="board-text">가중치 업데이트</text>
  
  <circle cx="420" cy="256" r="10" fill="none" stroke="#FFEB3B" stroke-width="2"/>
  <text x="420" y="260" text-anchor="middle" class="board-small" style="fill:#FFEB3B">5</text>
  <text x="440" y="260" class="board-text">반복 (에포크)</text>
  
  <text x="400" y="290" class="board-subtitle">【손실 함수 (MSE)】</text>
  <text x="400" y="315" class="board-text">오차 = 실제 - 예측</text>
  <text x="400" y="335" class="board-example">MSE = 평균(오차²)</text>
  <text x="400" y="358" class="board-small">손실↓ = 학습 진행 중</text>
  
  <!-- 하단 핵심 메시지 -->
  <rect x="60" y="365" width="680" height="25" rx="4" fill="#FFC107"/>
  <text x="400" y="382" text-anchor="middle" class="board-text" style="fill:#3E2723;font-weight:700">💡 오늘의 핵심: AI는 데이터에서 패턴(규칙)을 찾아 예측한다!</text>
  
  <!-- 분필 아이콘 -->
  <rect x="720" y="415" width="40" height="8" rx="2" fill="#FFFFFF"/>
  <rect x="670" y="415" width="40" height="8" rx="2" fill="#FFEB3B"/>
  <rect x="620" y="415" width="40" height="8" rx="2" fill="#81C784"/>
  
  <text x="700" y="440" text-anchor="middle" class="hint">분필 색상: 흰색(본문), 노랑(강조), 초록(예시)</text>
</svg>
