<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font-family: 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700; fill: #3E2723; }
      .subtitle { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 600; fill: #5D4037; }
      .label { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 500; fill: #5D4037; }
      .small { font-family: 'Noto Sans KR', sans-serif; font-size: 10px; fill: #5D4037; }
      .hint { font-family: 'Noto Sans KR', sans-serif; font-size: 9px; fill: #8D6E63; }
      .value { font-family: monospace; font-size: 11px; font-weight: 600; }
      .white { fill: #FFFFFF; }
    </style>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <text x="400" y="30" text-anchor="middle" class="title">📊 학습률(Learning Rate) 비교</text>
  
  <!-- 케이스 1: 너무 작음 -->
  <rect x="30" y="55" width="240" height="330" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="30" y="55" width="240" height="35" rx="12" fill="#1565C0"/>
  <rect x="30" y="78" width="240" height="12" fill="#1565C0"/>
  <text x="150" y="78" text-anchor="middle" class="label white">🐢 너무 작음 (α = 0.001)</text>
  
  <!-- 손실 그래프 1 -->
  <rect x="50" y="100" width="200" height="120" rx="6" fill="#E3F2FD"/>
  <line x1="70" y1="115" x2="70" y2="205" stroke="#5D4037" stroke-width="1"/>
  <line x1="70" y1="205" x2="235" y2="205" stroke="#5D4037" stroke-width="1"/>
  <text x="60" y="120" text-anchor="end" class="hint">손실</text>
  <text x="230" y="218" class="hint">에포크</text>
  
  <!-- 매우 천천히 감소하는 곡선 -->
  <path d="M 75 125 Q 100 130, 130 140 Q 160 150, 190 160 Q 220 170, 230 175" 
        fill="none" stroke="#1565C0" stroke-width="2"/>
  <text x="180" y="145" class="hint" style="fill:#1565C0">아직 멀었어...</text>
  
  <!-- 특징 -->
  <rect x="50" y="230" width="200" height="70" rx="6" fill="#E3F2FD"/>
  <text x="150" y="250" text-anchor="middle" class="small" style="fill:#1565C0;font-weight:600">특징</text>
  <text x="60" y="270" class="hint">• 매우 느린 학습 속도</text>
  <text x="60" y="285" class="hint">• 안정적이지만 비효율적</text>
  
  <rect x="50" y="310" width="200" height="60" rx="6" fill="#FFEBEE"/>
  <text x="150" y="330" text-anchor="middle" class="small" style="fill:#C62828;font-weight:600">⚠️ 위험</text>
  <text x="60" y="350" class="hint" style="fill:#C62828">• 학습이 끝나지 않을 수 있음</text>
  <text x="60" y="365" class="hint" style="fill:#C62828">• 시간 낭비</text>
  
  <!-- 케이스 2: 적절함 -->
  <rect x="280" y="55" width="240" height="330" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="280" y="55" width="240" height="35" rx="12" fill="#43A047"/>
  <rect x="280" y="78" width="240" height="12" fill="#43A047"/>
  <text x="400" y="78" text-anchor="middle" class="label white">✅ 적절함 (α = 0.01)</text>
  
  <!-- 손실 그래프 2 -->
  <rect x="300" y="100" width="200" height="120" rx="6" fill="#E8F5E9"/>
  <line x1="320" y1="115" x2="320" y2="205" stroke="#5D4037" stroke-width="1"/>
  <line x1="320" y1="205" x2="485" y2="205" stroke="#5D4037" stroke-width="1"/>
  <text x="310" y="120" text-anchor="end" class="hint">손실</text>
  <text x="480" y="218" class="hint">에포크</text>
  
  <!-- 적절히 감소하여 수렴하는 곡선 -->
  <path d="M 325 125 Q 350 160, 380 180 Q 410 195, 440 198 Q 470 200, 480 200" 
        fill="none" stroke="#43A047" stroke-width="2"/>
  <text x="440" y="185" class="hint" style="fill:#43A047">수렴! ✓</text>
  
  <!-- 특징 -->
  <rect x="300" y="230" width="200" height="70" rx="6" fill="#E8F5E9"/>
  <text x="400" y="250" text-anchor="middle" class="small" style="fill:#2E7D32;font-weight:600">특징</text>
  <text x="310" y="270" class="hint">• 빠르고 안정적인 학습</text>
  <text x="310" y="285" class="hint">• 최적점에 부드럽게 수렴</text>
  
  <rect x="300" y="310" width="200" height="60" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="400" y="330" text-anchor="middle" class="small" style="fill:#2E7D32;font-weight:600">💡 권장!</text>
  <text x="310" y="350" class="hint" style="fill:#2E7D32">• 대부분의 경우 이 범위 사용</text>
  <text x="310" y="365" class="hint" style="fill:#2E7D32">• 0.01이 일반적인 기본값</text>
  
  <!-- 케이스 3: 너무 큼 -->
  <rect x="530" y="55" width="240" height="330" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="530" y="55" width="240" height="35" rx="12" fill="#E53935"/>
  <rect x="530" y="78" width="240" height="12" fill="#E53935"/>
  <text x="650" y="78" text-anchor="middle" class="label white">💥 너무 큼 (α = 0.1+)</text>
  
  <!-- 손실 그래프 3 -->
  <rect x="550" y="100" width="200" height="120" rx="6" fill="#FFEBEE"/>
  <line x1="570" y1="115" x2="570" y2="205" stroke="#5D4037" stroke-width="1"/>
  <line x1="570" y1="205" x2="735" y2="205" stroke="#5D4037" stroke-width="1"/>
  <text x="560" y="120" text-anchor="end" class="hint">손실</text>
  <text x="730" y="218" class="hint">에포크</text>
  
  <!-- 진동하며 발산하는 곡선 -->
  <path d="M 575 180 Q 590 130, 610 190 Q 630 120, 650 200 Q 670 110, 690 210 Q 710 100, 730 120" 
        fill="none" stroke="#E53935" stroke-width="2"/>
  <text x="680" y="140" class="hint" style="fill:#E53935">발산!</text>
  
  <!-- 특징 -->
  <rect x="550" y="230" width="200" height="70" rx="6" fill="#FFEBEE"/>
  <text x="650" y="250" text-anchor="middle" class="small" style="fill:#C62828;font-weight:600">특징</text>
  <text x="560" y="270" class="hint">• 손실이 왔다갔다 진동</text>
  <text x="560" y="285" class="hint">• 최적점을 지나쳐 버림</text>
  
  <rect x="550" y="310" width="200" height="60" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="650" y="330" text-anchor="middle" class="small" style="fill:#C62828;font-weight:600">❌ 위험!</text>
  <text x="560" y="350" class="hint" style="fill:#C62828">• 학습 실패 (발산)</text>
  <text x="560" y="365" class="hint" style="fill:#C62828">• 모델이 이상해짐</text>
</svg>
