<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <rect x="250" y="8" width="300" height="32" rx="6" fill="#3E2723"/>
  <text x="400" y="30" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">📐 회귀식의 구성 요소</text>
  
  <!-- ===== 메인 공식 박스 (y:50, h:75) ===== -->
  <rect x="140" y="50" width="520" height="75" rx="15" fill="#FFFFFF" filter="url(#shadow)"/>
  
  <!-- Y = w × X + b -->
  <text x="220" y="100" font-family="Noto Sans KR, sans-serif" font-size="32" font-weight="700" fill="#1565C0">Y</text>
  <text x="265" y="100" font-family="Noto Sans KR, sans-serif" font-size="32" font-weight="700" fill="#5D4037">=</text>
  <text x="315" y="100" font-family="Noto Sans KR, sans-serif" font-size="32" font-weight="700" fill="#E53935">w</text>
  <text x="360" y="100" font-family="Noto Sans KR, sans-serif" font-size="32" font-weight="700" fill="#5D4037">×</text>
  <text x="405" y="100" font-family="Noto Sans KR, sans-serif" font-size="32" font-weight="700" fill="#43A047">X</text>
  <text x="450" y="100" font-family="Noto Sans KR, sans-serif" font-size="32" font-weight="700" fill="#5D4037">+</text>
  <text x="500" y="100" font-family="Noto Sans KR, sans-serif" font-size="32" font-weight="700" fill="#9C27B0">b</text>
  
  <!-- 밑줄 -->
  <line x1="207" y1="110" x2="247" y2="110" stroke="#1565C0" stroke-width="3"/>
  <line x1="300" y1="110" x2="340" y2="110" stroke="#E53935" stroke-width="3"/>
  <line x1="390" y1="110" x2="430" y2="110" stroke="#43A047" stroke-width="3"/>
  <line x1="485" y1="110" x2="525" y2="110" stroke="#9C27B0" stroke-width="3"/>
  
  <!-- ===== 4개 설명 박스 (y:140, h:125) ===== -->
  <!-- Y: 종속변수 -->
  <rect x="25" y="140" width="180" height="125" rx="12" fill="#E3F2FD" filter="url(#shadow)"/>
  <circle cx="55" cy="170" r="20" fill="#1565C0"/>
  <text x="55" y="178" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Y</text>
  <text x="88" y="175" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#1565C0">종속변수</text>
  <line x1="35" y1="195" x2="195" y2="195" stroke="#1565C0" stroke-width="1"/>
  <text x="115" y="218" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">예측하고자 하는 값</text>
  <text x="115" y="235" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">(결과, 출력)</text>
  <rect x="40" y="248" width="135" height="20" rx="4" fill="#FFFFFF"/>
  <text x="107" y="262" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#1565C0">예: 가격, 점수</text>
  
  <!-- w: 기울기 -->
  <rect x="220" y="140" width="180" height="125" rx="12" fill="#FFEBEE" filter="url(#shadow)"/>
  <circle cx="250" cy="170" r="20" fill="#E53935"/>
  <text x="250" y="178" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">w</text>
  <text x="283" y="175" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#E53935">기울기(가중치)</text>
  <line x1="230" y1="195" x2="390" y2="195" stroke="#E53935" stroke-width="1"/>
  <text x="310" y="218" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">X가 1 증가할 때</text>
  <text x="310" y="235" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">Y의 변화량</text>
  <rect x="235" y="248" width="135" height="20" rx="4" fill="#FFFFFF"/>
  <text x="302" y="262" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#E53935">예: 15 → 1㎡당 15만원</text>
  
  <!-- X: 독립변수 -->
  <rect x="415" y="140" width="180" height="125" rx="12" fill="#E8F5E9" filter="url(#shadow)"/>
  <circle cx="445" cy="170" r="20" fill="#43A047"/>
  <text x="445" y="178" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">X</text>
  <text x="478" y="175" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#43A047">독립변수</text>
  <line x1="425" y1="195" x2="585" y2="195" stroke="#43A047" stroke-width="1"/>
  <text x="505" y="218" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">알고 있는 입력값</text>
  <text x="505" y="235" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">(원인, 입력)</text>
  <rect x="430" y="248" width="135" height="20" rx="4" fill="#FFFFFF"/>
  <text x="497" y="262" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#43A047">예: 면적, 공부시간</text>
  
  <!-- b: 절편 -->
  <rect x="610" y="140" width="170" height="125" rx="12" fill="#F3E5F5" filter="url(#shadow)"/>
  <circle cx="640" cy="170" r="20" fill="#9C27B0"/>
  <text x="640" y="178" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">b</text>
  <text x="673" y="175" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="600" fill="#9C27B0">절편(편향)</text>
  <line x1="620" y1="195" x2="770" y2="195" stroke="#9C27B0" stroke-width="1"/>
  <text x="695" y="218" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">X가 0일 때 Y의 값</text>
  <text x="695" y="235" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#5D4037">(Y축과 만나는 점)</text>
  <rect x="625" y="248" width="135" height="20" rx="4" fill="#FFFFFF"/>
  <text x="692" y="262" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#9C27B0">예: 500 → 기본 500만원</text>
  
  <!-- ===== 예시 박스 (y:280, h:125) ===== -->
  <rect x="25" y="280" width="750" height="125" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="400" y="305" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#5D4037">💡 예시: 주택 가격 예측</text>
  
  <!-- 회귀식 -->
  <rect x="45" y="320" width="250" height="70" rx="8" fill="#FFF3E0"/>
  <text x="170" y="350" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#E53935">가격 = 15 × 면적 + 500</text>
  <text x="170" y="375" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#8D6E63">w=15 (기울기), b=500 (절편)</text>
  
  <!-- 예시 1 -->
  <rect x="320" y="320" width="195" height="70" rx="8" fill="#E8F5E9"/>
  <text x="417" y="348" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#5D4037">면적 50㎡ 일 때</text>
  <text x="417" y="375" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="#43A047">15×50+500 = 1,250만원</text>
  
  <!-- 예시 2 -->
  <rect x="540" y="320" width="195" height="70" rx="8" fill="#E3F2FD"/>
  <text x="637" y="348" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="500" fill="#5D4037">면적 80㎡ 일 때</text>
  <text x="637" y="375" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="700" fill="#1565C0">15×80+500 = 1,700만원</text>
</svg>
