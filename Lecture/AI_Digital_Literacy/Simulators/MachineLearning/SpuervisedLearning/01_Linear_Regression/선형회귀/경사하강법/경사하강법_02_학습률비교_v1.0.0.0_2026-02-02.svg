<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFBF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 배경 -->
  <rect width="900" height="550" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <rect x="250" y="15" width="400" height="50" rx="12" fill="#E53935" filter="url(#shadow)"/>
  <text x="450" y="48" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">📊 학습률(η)에 따른 수렴 패턴</text>
  
  <!-- ========== 그래프 1: 너무 작은 학습률 ========== -->
  <rect x="30" y="90" width="260" height="200" rx="10" fill="white" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- 제목 배지 -->
  <rect x="60" y="80" width="200" height="28" rx="6" fill="#2196F3"/>
  <text x="160" y="100" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">😴 너무 작은 학습률 (η=0.0001)</text>
  
  <!-- 축 -->
  <line x1="60" y1="260" x2="260" y2="260" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="60" y1="260" x2="60" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="160" y="282" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#666" text-anchor="middle">에포크</text>
  <text x="45" y="190" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#666" text-anchor="middle" transform="rotate(-90, 45, 190)">손실</text>
  
  <!-- 수렴 곡선 (매우 느림) -->
  <path d="M 70 130 Q 100 140 130 160 Q 160 185 200 210 Q 240 235 255 250" 
        stroke="#2196F3" stroke-width="3" fill="none"/>
  <circle cx="255" cy="250" r="4" fill="#2196F3"/>
  
  <!-- 목표선 -->
  <line x1="60" y1="255" x2="260" y2="255" stroke="#43A047" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="265" y="258" font-family="'Noto Sans KR', sans-serif" font-size="9" fill="#43A047">목표</text>
  
  <!-- 설명 -->
  <rect x="40" y="300" width="240" height="60" rx="6" fill="#E3F2FD"/>
  <text x="160" y="320" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">• 안정적이지만 매우 느림</text>
  <text x="160" y="340" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">• 수렴까지 오랜 시간 필요</text>
  
  <!-- ========== 그래프 2: 적절한 학습률 ========== -->
  <rect x="320" y="90" width="260" height="200" rx="10" fill="white" stroke="#43A047" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- 제목 배지 -->
  <rect x="350" y="80" width="200" height="28" rx="6" fill="#43A047"/>
  <text x="450" y="100" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">✅ 적절한 학습률 (η=0.01)</text>
  
  <!-- 축 -->
  <line x1="350" y1="260" x2="550" y2="260" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="260" x2="350" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="282" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#666" text-anchor="middle">에포크</text>
  <text x="335" y="190" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#666" text-anchor="middle" transform="rotate(-90, 335, 190)">손실</text>
  
  <!-- 수렴 곡선 (빠르고 안정적) -->
  <path d="M 360 130 Q 380 180 420 220 Q 450 245 480 252 Q 510 255 545 255" 
        stroke="#43A047" stroke-width="3" fill="none"/>
  <circle cx="545" cy="255" r="4" fill="#43A047"/>
  
  <!-- 목표선 -->
  <line x1="350" y1="255" x2="550" y2="255" stroke="#43A047" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- 별 표시 (최적!) -->
  <text x="545" y="240" font-family="'Noto Sans KR', sans-serif" font-size="16" fill="#FFD700" text-anchor="middle">⭐</text>
  
  <!-- 설명 -->
  <rect x="330" y="300" width="240" height="60" rx="6" fill="#E8F5E9"/>
  <text x="450" y="320" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">• 빠르고 안정적인 수렴</text>
  <text x="450" y="340" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">• 이상적인 학습률!</text>
  
  <!-- ========== 그래프 3: 너무 큰 학습률 ========== -->
  <rect x="610" y="90" width="260" height="200" rx="10" fill="white" stroke="#E53935" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- 제목 배지 -->
  <rect x="640" y="80" width="200" height="28" rx="6" fill="#E53935"/>
  <text x="740" y="100" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">💥 너무 큰 학습률 (η=1.0)</text>
  
  <!-- 축 -->
  <line x1="640" y1="260" x2="840" y2="260" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="260" x2="640" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="740" y="282" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#666" text-anchor="middle">에포크</text>
  <text x="625" y="190" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#666" text-anchor="middle" transform="rotate(-90, 625, 190)">손실</text>
  
  <!-- 발산 곡선 (불안정) -->
  <path d="M 650 200 L 680 140 L 710 220 L 740 130 L 770 240 L 800 125 L 830 180" 
        stroke="#E53935" stroke-width="3" fill="none"/>
  
  <!-- 경고 표시 -->
  <text x="770" y="115" font-family="'Noto Sans KR', sans-serif" font-size="20" fill="#E53935" text-anchor="middle">⚠️</text>
  
  <!-- 목표선 -->
  <line x1="640" y1="255" x2="840" y2="255" stroke="#43A047" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="845" y="258" font-family="'Noto Sans KR', sans-serif" font-size="9" fill="#43A047">목표</text>
  
  <!-- 설명 -->
  <rect x="620" y="300" width="240" height="60" rx="6" fill="#FFEBEE"/>
  <text x="740" y="320" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#C62828" text-anchor="middle">• 손실이 진동/발산</text>
  <text x="740" y="340" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#C62828" text-anchor="middle">• 학습 실패 위험!</text>
  
  <!-- ========== 하단 요약 ========== -->
  <rect x="100" y="390" width="700" height="140" rx="12" fill="white" stroke="#5D4037" stroke-width="2" filter="url(#shadow)"/>
  
  <text x="450" y="420" font-family="'Noto Sans KR', sans-serif" font-size="16" font-weight="bold" fill="#5D4037" text-anchor="middle">📋 학습률 선택 가이드</text>
  <line x1="150" y1="430" x2="750" y2="430" stroke="#5D4037" stroke-width="1"/>
  
  <!-- 표 -->
  <text x="200" y="460" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">학습률</text>
  <text x="400" y="460" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">특징</text>
  <text x="650" y="460" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">권장 상황</text>
  
  <line x1="120" y1="470" x2="780" y2="470" stroke="#DDD" stroke-width="1"/>
  
  <text x="200" y="495" font-family="'JetBrains Mono', monospace" font-size="12" fill="#2196F3" text-anchor="middle">0.0001 ~ 0.001</text>
  <text x="400" y="495" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333" text-anchor="middle">매우 안정, 느림</text>
  <text x="650" y="495" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333" text-anchor="middle">미세 조정, 신경망</text>
  
  <text x="200" y="518" font-family="'JetBrains Mono', monospace" font-size="12" fill="#43A047" text-anchor="middle" font-weight="bold">0.01 (권장)</text>
  <text x="400" y="518" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#43A047" text-anchor="middle" font-weight="bold">빠름, 안정</text>
  <text x="650" y="518" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#43A047" text-anchor="middle" font-weight="bold">일반적 시작점</text>
  
  <line x1="300" y1="445" x2="300" y2="525" stroke="#DDD" stroke-width="1"/>
  <line x1="530" y1="445" x2="530" y2="525" stroke="#DDD" stroke-width="1"/>
</svg>
