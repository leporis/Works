  <line x1="60" y1="465" x2="840" y2="465" stroke="#5D4037" stroke-width="1"/>
  
  <!-- 헤더 행 -->
  <text x="150" y="490" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#666" text-anchor="middle">방식</text>
  <text x="330" y="490" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#666" text-anchor="middle">1 에포크당 업데이트</text>
  <text x="500" y="490" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#666" text-anchor="middle">속도</text>
  <text x="630" y="490" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#666" text-anchor="middle">안정성</text>
  <text x="770" y="490" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#666" text-anchor="middle">메모리</text>
  
  <line x1="60" y1="500" x2="840" y2="500" stroke="#DDD" stroke-width="1"/>
  
  <!-- 배치 GD -->
  <circle cx="70" cy="520" r="8" fill="#2196F3"/>
  <text x="150" y="525" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333" text-anchor="middle">배치 GD</text>
  <text x="330" y="525" font-family="'JetBrains Mono', monospace" font-size="12" fill="#333" text-anchor="middle">1회</text>
  <text x="500" y="525" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#E53935" text-anchor="middle">느림 ⭐</text>
  <text x="630" y="525" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#43A047" text-anchor="middle">높음 ⭐⭐⭐</text>
  <text x="770" y="525" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#E53935" text-anchor="middle">많음</text>
  
  <!-- 미니배치 GD -->
  <circle cx="70" cy="550" r="8" fill="#43A047"/>
  <text x="150" y="555" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">미니배치 GD</text>
  <text x="330" y="555" font-family="'JetBrains Mono', monospace" font-size="12" fill="#333" text-anchor="middle">n/배치크기 회</text>
  <text x="500" y="555" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#43A047" text-anchor="middle" font-weight="bold">중간 ⭐⭐</text>
  <text x="630" y="555" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#43A047" text-anchor="middle" font-weight="bold">중간 ⭐⭐</text>
  <text x="770" y="555" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#FF9800" text-anchor="middle">중간</text>
  
  <!-- SGD -->
  <circle cx="70" cy="575" r="8" fill="#E53935"/>
  <text x="150" y="580" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333" text-anchor="middle">SGD</text>
  <text x="330" y="580" font-family="'JetBrains Mono', monospace" font-size="12" fill="#333" text-anchor="middle">n회</text>
  <text x="500" y="580" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#43A047" text-anchor="middle">빠름 ⭐⭐⭐</text>
  <text x="630" y="580" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#E53935" text-anchor="middle">낮음 ⭐</text>
  <text x="770" y="580" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#43A047" text-anchor="middle">적음</text>
  
  <!-- 세로 구분선 -->
  <line x1="240" y1="475" x2="240" y2="585" stroke="#DDD" stroke-width="1"/>
  <line x1="420" y1="475" x2="420" y2="585" stroke="#DDD" stroke-width="1"/>
  <line x1="560" y1="475" x2="560" y2="585" stroke="#DDD" stroke-width="1"/>
  <line x1="700" y1="475" x2="700" y2="585" stroke="#DDD" stroke-width="1"/>
</svg>
