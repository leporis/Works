  <text x="165" y="270" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333" text-anchor="middle">1회 업데이트</text>
  
  <!-- 수렴 패턴 -->
  <rect x="50" y="285" width="230" height="50" rx="6" fill="#E3F2FD"/>
  <path d="M 70 320 Q 100 300 150 310 Q 200 315 250 315" stroke="#2196F3" stroke-width="3" fill="none"/>
  <text x="260" y="320" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#2196F3">안정</text>
  
  <!-- 특징 -->
  <text x="55" y="360" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">✓ 가장 안정적인 수렴</text>
  <text x="55" y="380" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">✗ 대용량 데이터에서 느림</text>
  <text x="55" y="400" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#666">적합: 소규모 데이터셋</text>
  
  <!-- ========== 미니배치 경사하강법 ========== -->
