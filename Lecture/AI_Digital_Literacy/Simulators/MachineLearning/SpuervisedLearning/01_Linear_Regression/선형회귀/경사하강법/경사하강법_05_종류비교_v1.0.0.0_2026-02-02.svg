<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF3E0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 배경 -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>
  
  <!-- 제목 -->
  <rect x="200" y="15" width="500" height="50" rx="12" fill="#5D4037" filter="url(#shadow)"/>
  <text x="450" y="48" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">🔄 경사하강법 종류 비교</text>
  
  <!-- ========== 배치 경사하강법 ========== -->
  <rect x="30" y="85" width="270" height="320" rx="12" fill="white" stroke="#2196F3" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- 헤더 -->
  <rect x="30" y="85" width="270" height="45" rx="12" fill="#2196F3"/>
  <text x="165" y="115" font-family="'Noto Sans KR', sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">📦 배치 GD</text>
  
  <!-- 데이터 시각화 -->
  <rect x="50" y="145" width="230" height="80" rx="8" fill="#E3F2FD"/>
  <text x="165" y="165" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">전체 데이터셋 사용</text>
  
  <!-- 데이터 점들 (모두 사용) -->
  <circle cx="70" cy="195" r="8" fill="#2196F3"/>
  <circle cx="95" cy="195" r="8" fill="#2196F3"/>
  <circle cx="120" cy="195" r="8" fill="#2196F3"/>
  <circle cx="145" cy="195" r="8" fill="#2196F3"/>
  <circle cx="170" cy="195" r="8" fill="#2196F3"/>
  <circle cx="195" cy="195" r="8" fill="#2196F3"/>
  <circle cx="220" cy="195" r="8" fill="#2196F3"/>
  <circle cx="245" cy="195" r="8" fill="#2196F3"/>
  
  <!-- 화살표 -->
