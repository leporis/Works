  <circle cx="685" cy="197" r="8" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <circle cx="715" cy="197" r="8" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <circle cx="745" cy="197" r="8" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <circle cx="775" cy="197" r="8" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
