  <rect x="335" y="145" width="230" height="80" rx="8" fill="#E8F5E9"/>
  <text x="450" y="165" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">배치 단위로 분할 (32~256)</text>
  
  <!-- 데이터 점들 (배치별 구분) -->
  <!-- 배치 1 -->
  <rect x="345" y="180" width="65" height="35" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <circle cx="358" cy="197" r="6" fill="#43A047"/>
  <circle cx="378" cy="197" r="6" fill="#43A047"/>
  <circle cx="398" cy="197" r="6" fill="#43A047"/>
  
  <!-- 배치 2 -->
  <rect x="420" y="180" width="65" height="35" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <circle cx="433" cy="197" r="6" fill="#43A047"/>
  <circle cx="453" cy="197" r="6" fill="#43A047"/>
  <circle cx="473" cy="197" r="6" fill="#43A047"/>
  
  <!-- 배치 3 -->
  <rect x="495" y="180" width="55" height="35" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <circle cx="510" cy="197" r="6" fill="#43A047"/>
  <circle cx="530" cy="197" r="6" fill="#43A047"/>
  
  <!-- 화살표 -->
  <text x="450" y="245" font-family="'Noto Sans KR', sans-serif" font-size="20" fill="#43A047" text-anchor="middle">↓ ↓ ↓</text>
  <text x="450" y="270" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333" text-anchor="middle">n/배치 회 업데이트</text>
  
  <!-- 수렴 패턴 -->
  <rect x="335" y="285" width="230" height="50" rx="6" fill="#E8F5E9"/>
  <path d="M 355 325 Q 380 300 420 315 Q 460 305 500 310 Q 540 312 545 315" stroke="#43A047" stroke-width="3" fill="none"/>
  <text x="555" y="320" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#43A047">균형</text>
  
  <!-- 특징 -->
  <text x="340" y="360" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">✓ 속도와 안정성 균형</text>
  <text x="340" y="380" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">✓ GPU 병렬처리 효율적</text>
  <text x="340" y="400" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">★ 가장 많이 사용!</text>
  
