  <path d="M 640 310 L 670 330 L 700 300 L 730 325 L 760 305 L 790 320 L 820 308" stroke="#E53935" stroke-width="3" fill="none"/>
  <text x="830" y="315" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#E53935">진동</text>
  
  <!-- 특징 -->
  <text x="625" y="360" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">✓ 가장 빠른 업데이트</text>
  <text x="625" y="380" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#333">✗ 수렴이 불안정</text>
  <text x="625" y="400" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#666">적합: 온라인 학습</text>
  
  <!-- ========== 하단 비교 표 ========== -->
