  <circle cx="835" cy="197" r="8" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  
  <!-- 화살표 -->
  <text x="735" y="245" font-family="'Noto Sans KR', sans-serif" font-size="20" fill="#E53935" text-anchor="middle">↓↓↓↓↓↓↓</text>
  <text x="735" y="270" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#333" text-anchor="middle">n회 업데이트</text>
  
  <!-- 수렴 패턴 (불안정) -->
