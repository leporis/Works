  </defs>
  <rect width="800" height="450" fill="url(#bgGrad)" rx="12"/>

  <text x="400" y="26" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="700" fill="#3E2723">전체 구조 — 학습 모드 vs 분류 모드 비교</text>
  <text x="400" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#8D6E63">모드에 따라 표시되는 패널이 달라집니다</text>

  <!-- 공통 헤더 -->
