<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="360" fill="url(#bgGrad)" rx="12"/>

  <!-- 타이틀 -->
  <text x="400" y="26" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="700" fill="#3E2723">📋 45분 수업 흐름 — CNN 사과 분류 시뮬레이터</text>
  <text x="400" y="44" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#8D6E63">초등 예비교사를 위한 AI 교육 수업 시나리오</text>

  <!-- ===== 타임라인 바 ===== -->
  <rect x="40" y="62" width="720" height="8" rx="4" fill="#FFCCBC"/>
  <!-- 구간별 색상 채우기 -->
  <rect x="40" y="62" width="80" height="8" rx="4" fill="#E53935"/>       <!-- 도입 5분 -->
  <rect x="120" y="62" width="160" height="8" fill="#7B1FA2"/>            <!-- 개념 10분 -->
  <rect x="280" y="62" width="160" height="8" fill="#1976D2"/>            <!-- 탐색 10분 -->
  <rect x="440" y="62" width="240" height="8" fill="#43A047"/>            <!-- 실습 15분 -->
  <rect x="680" y="62" width="80" height="8" rx="4" fill="#F57C00"/>     <!-- 정리 5분 -->
  <!-- 시간 마커 -->
  <text x="40" y="58" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">0분</text>
  <text x="120" y="58" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">5분</text>
  <text x="280" y="58" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">15분</text>
  <text x="440" y="58" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">25분</text>
  <text x="680" y="58" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">40분</text>
  <text x="752" y="58" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">45분</text>

  <!-- ===== 1. 도입 (5분) ===== -->
  <rect x="20" y="82" width="136" height="232" rx="12" fill="white" filter="url(#cardShadow)"/>
  <rect x="20" y="82" width="136" height="36" rx="12" fill="#E53935"/>
  <rect x="20" y="106" width="136" height="12" fill="#E53935"/>
  <text x="88" y="98" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="white">🎬 도입</text>
  <text x="88" y="112" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="500" fill="white">5분</text>

  <text x="34" y="138" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#C62828">동기 유발</text>
  <text x="34" y="154" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">"사과 공장에서 AI가</text>
  <text x="34" y="166" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037"> 익은 사과를 골라낸다면?"</text>

  <rect x="32" y="176" width="112" height="24" rx="4" fill="#FFEBEE"/>
  <text x="88" y="192" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#C62828">💡 핵심 질문</text>

  <text x="34" y="216" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">"컴퓨터는 사과의</text>
  <text x="34" y="228" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037"> 어디를 보고 판단할까?"</text>

  <rect x="32" y="240" width="112" height="28" rx="4" fill="#FFF3E0"/>
  <text x="88" y="253" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#E65100">📱 교사 활동</text>
  <text x="88" y="264" text-anchor="middle" font-family="Noto Sans KR" font-size="6.5" fill="#8D6E63">시뮬레이터 시연</text>

  <rect x="32" y="276" width="112" height="26" rx="6" fill="#E8F5E9"/>
  <text x="88" y="293" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="#2E7D32">🎯 호기심 유발</text>

  <!-- ===== 2. 개념 (10분) ===== -->
  <rect x="164" y="82" width="136" height="232" rx="12" fill="white" filter="url(#cardShadow)"/>
  <rect x="164" y="82" width="136" height="36" rx="12" fill="#7B1FA2"/>
  <rect x="164" y="106" width="136" height="12" fill="#7B1FA2"/>
  <text x="232" y="98" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="white">📖 개념</text>
  <text x="232" y="112" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="500" fill="white">10분</text>

  <text x="178" y="138" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#7B1FA2">CNN 핵심 개념</text>
  <text x="178" y="156" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">① 합성곱 = "돋보기"</text>
  <text x="186" y="170" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">→ 이미지의 특징 찾기</text>
  <text x="178" y="188" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">② 풀링 = "요약하기"</text>
  <text x="186" y="202" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">→ 핵심만 남기기</text>
  <text x="178" y="220" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">③ 학습 = "연습하기"</text>
  <text x="186" y="234" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">→ 반복해서 잘하기</text>

  <rect x="176" y="248" width="112" height="24" rx="4" fill="#F3E5F5"/>
  <text x="232" y="262" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#7B1FA2">📖 레이어 설명 패널 활용</text>
  <text x="232" y="272" text-anchor="middle" font-family="Noto Sans KR" font-size="6.5" fill="#8D6E63">①~⑧ 순서대로 클릭</text>

  <rect x="176" y="280" width="112" height="26" rx="6" fill="#E8F5E9"/>
  <text x="232" y="297" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="#2E7D32">🎯 개념 이해</text>

  <!-- ===== 3. 탐색 (10분) ===== -->
  <rect x="308" y="82" width="136" height="232" rx="12" fill="white" filter="url(#cardShadow)"/>
  <rect x="308" y="82" width="136" height="36" rx="12" fill="#1976D2"/>
  <rect x="308" y="106" width="136" height="12" fill="#1976D2"/>
  <text x="376" y="98" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="white">🔍 탐색</text>
  <text x="376" y="112" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="500" fill="white">10분</text>

  <text x="322" y="138" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#1565C0">학습 과정 관찰</text>
  <text x="322" y="156" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">① 데이터 100개 생성</text>
  <text x="322" y="172" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">② 학습 시작 (기본값)</text>
  <text x="322" y="188" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">③ 손실 곡선 관찰</text>
  <text x="330" y="202" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">→ "왜 내려갈까?"</text>
  <text x="322" y="218" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">④ 정확도 곡선 관찰</text>
  <text x="330" y="232" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">→ "왜 올라갈까?"</text>

  <rect x="320" y="244" width="112" height="24" rx="4" fill="#E3F2FD"/>
  <text x="376" y="258" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#1565C0">📽️ 학습 재생으로 복습</text>
  <text x="376" y="268" text-anchor="middle" font-family="Noto Sans KR" font-size="6.5" fill="#8D6E63">느린 속도로 관찰</text>

  <rect x="320" y="280" width="112" height="26" rx="6" fill="#E8F5E9"/>
  <text x="376" y="297" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="#2E7D32">🎯 과정 이해</text>

  <!-- ===== 4. 실습 (15분) ===== -->
  <rect x="452" y="82" width="168" height="232" rx="12" fill="white" filter="url(#cardShadow)"/>
  <rect x="452" y="82" width="168" height="36" rx="12" fill="#43A047"/>
  <rect x="452" y="106" width="168" height="12" fill="#43A047"/>
  <text x="536" y="98" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="white">🧪 실습</text>
  <text x="536" y="112" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="500" fill="white">15분</text>

  <text x="466" y="138" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#2E7D32">파라미터 실험</text>
  <rect x="464" y="146" width="144" height="44" rx="6" fill="#E8F5E9"/>
  <text x="472" y="160" font-family="Noto Sans KR" font-size="7" font-weight="600" fill="#2E7D32">🔬 활동 1: 학습률 비교</text>
  <text x="472" y="174" font-family="Noto Sans KR" font-size="7" fill="#5D4037">0.001 vs 0.01 vs 0.1</text>
  <text x="472" y="186" font-family="Noto Sans KR" font-size="6.5" fill="#8D6E63">→ 손실 곡선 차이 기록</text>

  <rect x="464" y="196" width="144" height="44" rx="6" fill="#E8F5E9"/>
  <text x="472" y="210" font-family="Noto Sans KR" font-size="7" font-weight="600" fill="#2E7D32">🔬 활동 2: 노이즈 영향</text>
  <text x="472" y="224" font-family="Noto Sans KR" font-size="7" fill="#5D4037">0% vs 25% vs 50%</text>
  <text x="472" y="236" font-family="Noto Sans KR" font-size="6.5" fill="#8D6E63">→ 정확도 변화 기록</text>

  <rect x="464" y="246" width="144" height="28" rx="6" fill="#E8F5E9"/>
  <text x="472" y="260" font-family="Noto Sans KR" font-size="7" font-weight="600" fill="#2E7D32">🔬 활동 3: 분류 체험</text>
  <text x="472" y="270" font-family="Noto Sans KR" font-size="6.5" fill="#5D4037">🎲 랜덤 10회 분류 → 정답률</text>

  <rect x="464" y="282" width="144" height="26" rx="6" fill="#FFF3E0"/>
  <text x="536" y="299" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="#2E7D32">🎯 실험 + 기록</text>

  <!-- ===== 5. 정리 (5분) ===== -->
  <rect x="628" y="82" width="152" height="232" rx="12" fill="white" filter="url(#cardShadow)"/>
  <rect x="628" y="82" width="152" height="36" rx="12" fill="#F57C00"/>
  <rect x="628" y="106" width="152" height="12" fill="#F57C00"/>
  <text x="704" y="98" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="white">📝 정리</text>
  <text x="704" y="112" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="500" fill="white">5분</text>

  <text x="642" y="138" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#E65100">배운 내용 정리</text>
  <text x="642" y="158" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">① 오늘 배운 것 3줄 정리</text>
  <text x="642" y="178" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">② 가장 놀라웠던 점</text>
  <text x="642" y="198" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">③ 더 알고 싶은 것</text>

  <rect x="640" y="214" width="128" height="40" rx="6" fill="#FFF3E0"/>
  <text x="704" y="230" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="#E65100">💭 생각해보기</text>
  <text x="704" y="244" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#5D4037">"실생활에서 CNN은</text>
  <text x="704" y="254" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#5D4037"> 어디에 쓰일까?"</text>

  <rect x="640" y="264" width="128" height="24" rx="4" fill="#E8F5E9"/>
  <text x="704" y="280" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#2E7D32">📊 학습 결과 패널 캡처</text>

  <rect x="640" y="294" width="128" height="16" rx="6" fill="#E8F5E9"/>
  <text x="704" y="306" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="#2E7D32">🎯 내면화</text>

  <!-- ===== 하단 요약 ===== -->
  <rect x="40" y="324" width="720" height="28" rx="8" fill="white" filter="url(#shadow)" opacity="0.95"/>
  <text x="400" y="342" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#5D4037">
    <tspan fill="#E53935" font-weight="600">도입 5분</tspan><tspan> → </tspan>
    <tspan fill="#7B1FA2" font-weight="600">개념 10분</tspan><tspan> → </tspan>
    <tspan fill="#1976D2" font-weight="600">탐색 10분</tspan><tspan> → </tspan>
    <tspan fill="#43A047" font-weight="600">실습 15분</tspan><tspan> → </tspan>
    <tspan fill="#F57C00" font-weight="600">정리 5분</tspan>
    <tspan dx="16" fill="#8D6E63">| 핵심: 관찰 → 실험 → 기록 → 발표</tspan>
  </text>
</svg>
