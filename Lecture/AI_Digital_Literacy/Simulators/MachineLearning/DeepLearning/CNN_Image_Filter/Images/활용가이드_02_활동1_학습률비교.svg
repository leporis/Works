<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>

  <text x="400" y="26" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="700" fill="#3E2723">🔬 활동 1: 학습률에 따른 손실 곡선 비교</text>
  <text x="400" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#8D6E63">학습률을 바꾸면 AI가 배우는 속도가 어떻게 달라질까요?</text>

  <!-- ===== 3개 차트 ===== -->
  <!-- 차트 1: 학습률 0.001 (느림) -->
  <rect x="20" y="58" width="242" height="240" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="20" y="58" width="242" height="28" rx="10" fill="#2196F3"/>
  <rect x="20" y="78" width="242" height="8" fill="#2196F3"/>
  <text x="141" y="78" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">🐢 학습률 0.001 (느림)</text>

  <!-- 축 -->
  <line x1="50" y1="98" x2="50" y2="262" stroke="#FFCCBC" stroke-width="1"/>
  <line x1="50" y1="262" x2="240" y2="262" stroke="#FFCCBC" stroke-width="1"/>
  <text x="36" y="102" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">높음</text>
  <text x="36" y="262" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">낮음</text>
  <text x="240" y="274" text-anchor="end" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">에포크 →</text>

  <!-- 느린 하강 곡선 -->
  <polyline points="55,108 75,108 95,107 115,106 135,105 155,103 175,101 195,98 215,95 235,92"
    fill="none" stroke="#2196F3" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="55,108 75,108 95,107 115,106 135,105 155,103 175,101 195,98 215,95 235,92 235,262 55,262"
    fill="#2196F320"/>

  <!-- 결과 태그 -->
  <rect x="36" y="272" width="210" height="20" rx="4" fill="#E3F2FD"/>
  <text x="141" y="286" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#1565C0">📉 천천히 내려감 — 아직 높은 손실</text>

  <!-- 차트 2: 학습률 0.01 (보통) -->
  <rect x="276" y="58" width="242" height="240" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="276" y="58" width="242" height="28" rx="10" fill="#43A047"/>
  <rect x="276" y="78" width="242" height="8" fill="#43A047"/>
  <text x="397" y="78" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">🐇 학습률 0.01 (보통) ✅</text>

  <line x1="306" y1="98" x2="306" y2="262" stroke="#FFCCBC" stroke-width="1"/>
  <line x1="306" y1="262" x2="496" y2="262" stroke="#FFCCBC" stroke-width="1"/>
  <text x="292" y="102" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">높음</text>
  <text x="292" y="262" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">낮음</text>
  <text x="496" y="274" text-anchor="end" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">에포크 →</text>

  <!-- 적절한 하강 곡선 -->
  <polyline points="311,108 331,96 351,86 371,78 391,72 411,68 431,65 451,63 471,62 491,61"
    fill="none" stroke="#43A047" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="311,108 331,96 351,86 371,78 391,72 411,68 431,65 451,63 471,62 491,61 491,262 311,262"
    fill="#43A04720"/>

  <!-- 목표선 -->
  <line x1="306" y1="65" x2="496" y2="65" stroke="#43A047" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="496" y="62" text-anchor="end" font-family="Noto Sans KR" font-size="6" fill="#43A047">목표</text>

  <rect x="292" y="272" width="210" height="20" rx="4" fill="#E8F5E9"/>
  <text x="397" y="286" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#2E7D32">📉 안정적으로 수렴 — 권장! 🎉</text>

  <!-- 차트 3: 학습률 0.1 (빠름) -->
  <rect x="532" y="58" width="248" height="240" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="532" y="58" width="248" height="28" rx="10" fill="#E53935"/>
  <rect x="532" y="78" width="248" height="8" fill="#E53935"/>
  <text x="656" y="78" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">🏎️ 학습률 0.1 (빠름)</text>

  <line x1="562" y1="98" x2="562" y2="262" stroke="#FFCCBC" stroke-width="1"/>
  <line x1="562" y1="262" x2="758" y2="262" stroke="#FFCCBC" stroke-width="1"/>
  <text x="548" y="102" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">높음</text>
  <text x="548" y="262" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">낮음</text>
  <text x="758" y="274" text-anchor="end" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">에포크 →</text>

  <!-- 불안정한 곡선 -->
  <polyline points="567,108 587,78 607,92 627,68 647,85 667,62 687,76 707,58 727,72 747,64"
    fill="none" stroke="#E53935" stroke-width="2.5" stroke-linecap="round"/>

  <rect x="548" y="272" width="220" height="20" rx="4" fill="#FFEBEE"/>
  <text x="658" y="286" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#C62828">📈📉 들쭉날쭉! — 불안정한 학습</text>

  <!-- ===== 하단: 활동 안내 ===== -->
  <rect x="20" y="308" width="760" height="82" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="400" y="328" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="#3E2723">📝 활동 방법</text>

  <rect x="36" y="338" width="232" height="42" rx="6" fill="#E3F2FD"/>
  <text x="152" y="354" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#1565C0">1️⃣ 실험</text>
  <text x="152" y="370" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#5D4037">3가지 학습률로 각각 학습 실행</text>

  <rect x="280" y="338" width="232" height="42" rx="6" fill="#E8F5E9"/>
  <text x="396" y="354" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#2E7D32">2️⃣ 관찰</text>
  <text x="396" y="370" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#5D4037">손실 곡선의 모양 차이 기록</text>

  <rect x="524" y="338" width="242" height="42" rx="6" fill="#FFF3E0"/>
  <text x="645" y="354" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#E65100">3️⃣ 토론</text>
  <text x="645" y="370" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#5D4037">"왜 너무 빠르면 안 될까?" 발표</text>
</svg>
