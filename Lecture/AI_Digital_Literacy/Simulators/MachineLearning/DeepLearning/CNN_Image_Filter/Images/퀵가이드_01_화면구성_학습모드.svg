<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <filter id="numShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- 타이틀 -->
  <text x="400" y="28" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="#3E2723">🧠 학습 모드 — 화면 구성</text>
  <text x="400" y="44" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#8D6E63">CNN 사과 분류 시뮬레이터 v1.1.1</text>

  <!-- ===== 헤더 영역 ===== -->
  <rect x="30" y="56" width="740" height="36" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="400" y="78" text-anchor="middle" font-family="Noto Sans KR" font-size="12" font-weight="600" fill="#E53935">🍎 CNN 사과 분류 시뮬레이터</text>
  <!-- 번호 ① -->
  <circle cx="50" cy="60" r="11" fill="#E53935" filter="url(#numShadow)"/>
  <text x="50" y="64" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">①</text>

  <!-- ===== 모드 탭 ===== -->
  <rect x="290" y="98" width="100" height="26" rx="6" fill="#E53935"/>
  <text x="340" y="115" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="white">🧠 학습 모드</text>
  <rect x="396" y="98" width="100" height="26" rx="6" fill="white" stroke="#FFCCBC" stroke-width="1.5"/>
  <text x="446" y="115" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="500" fill="#5D4037">🔮 분류 모드</text>
  <!-- 번호 ② -->
  <circle cx="270" cy="111" r="11" fill="#E53935" filter="url(#numShadow)"/>
  <text x="270" y="115" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">②</text>

  <!-- ===== 3열 레이아웃 구분선 ===== -->
  <!-- 왼쪽 열 (30~200) -->
  <rect x="30" y="134" width="170" height="340" rx="10" fill="white" filter="url(#shadow)" opacity="0.6"/>
  <!-- 중앙 열 (210~570) -->
  <rect x="210" y="134" width="360" height="340" rx="10" fill="white" filter="url(#shadow)" opacity="0.6"/>
  <!-- 오른쪽 열 (580~770) -->
  <rect x="580" y="134" width="190" height="340" rx="10" fill="white" filter="url(#shadow)" opacity="0.6"/>

  <!-- ===== 왼쪽: 학습 데이터 패널 ===== -->
  <rect x="38" y="142" width="154" height="142" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="115" y="160" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">📦 학습 데이터</text>
  <line x1="50" y1="167" x2="180" y2="167" stroke="#FFF3E0" stroke-width="1.5"/>
  <!-- 슬라이더들 -->
  <text x="52" y="182" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">데이터 수</text>
  <rect x="52" y="186" width="120" height="4" rx="2" fill="#FFCCBC"/><rect x="52" y="186" width="60" height="4" rx="2" fill="#E53935"/>
  <text x="52" y="202" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">노이즈 강도</text>
  <rect x="52" y="206" width="120" height="4" rx="2" fill="#FFCCBC"/><rect x="52" y="206" width="36" height="4" rx="2" fill="#E53935"/>
  <text x="52" y="222" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">밝기 변동폭</text>
  <rect x="52" y="226" width="120" height="4" rx="2" fill="#FFCCBC"/><rect x="52" y="226" width="48" height="4" rx="2" fill="#E53935"/>
  <!-- 버튼 -->
  <rect x="52" y="240" width="130" height="24" rx="6" fill="#E53935"/>
  <text x="117" y="256" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="white">🎲 학습 데이터 생성</text>
  <text x="115" y="276" text-anchor="middle" font-family="Noto Sans KR" font-size="6.5" fill="#8D6E63">✅ 100개 생성 완료</text>
  <!-- 번호 ③ -->
  <circle cx="45" cy="142" r="11" fill="#1565C0" filter="url(#numShadow)"/>
  <text x="45" y="146" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">③</text>

  <!-- ===== 왼쪽: CNN 레이어 설명 ===== -->
  <rect x="38" y="292" width="154" height="174" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="115" y="310" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">📖 CNN 레이어 설명</text>
  <line x1="50" y1="317" x2="180" y2="317" stroke="#FFF3E0" stroke-width="1.5"/>
  <!-- 레이어 카드들 -->
  <rect x="50" y="322" width="130" height="18" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="56" y="334" font-family="Noto Sans KR" font-size="6.5" font-weight="600" fill="#1565C0">① 입력층 (Input)</text>
  <rect x="50" y="344" width="130" height="18" rx="4" fill="#F3E5F5"/>
  <text x="56" y="356" font-family="Noto Sans KR" font-size="6.5" fill="#7B1FA2">② 합성곱층 1 (Conv2D)</text>
  <rect x="50" y="366" width="130" height="18" rx="4" fill="#FFF3E0"/>
  <text x="56" y="378" font-family="Noto Sans KR" font-size="6.5" fill="#E65100">③ 풀링층 1 (MaxPool)</text>
  <text x="115" y="398" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">④~⑧ ...</text>
  <!-- 수식 박스 -->
  <rect x="50" y="408" width="130" height="30" rx="4" fill="#FFF3E0"/>
  <text x="115" y="421" text-anchor="middle" font-family="JetBrains Mono" font-size="6" fill="#3E2723">(W−F+2P)/S + 1</text>
  <text x="115" y="433" text-anchor="middle" font-family="JetBrains Mono" font-size="6" fill="#3E2723">Softmax: eᶻᵏ / Σeᶻʲ</text>
  <!-- 번호 ④ -->
  <circle cx="45" cy="292" r="11" fill="#7B1FA2" filter="url(#numShadow)"/>
  <text x="45" y="296" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">④</text>

  <!-- ===== 중앙: 손실/정확도 차트 ===== -->
  <rect x="218" y="142" width="170" height="100" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="303" y="160" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">📉 손실 함수</text>
  <!-- 손실 곡선 모사 -->
  <polyline points="235,228 255,218 275,205 295,195 315,190 335,188 355,187 375,186" fill="none" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
  <rect x="235" y="168" width="140" height="62" rx="4" fill="#FFFBF5" stroke="#FFCCBC" stroke-width="0.5"/>
  <polyline points="240,225 258,216 276,204 294,195 312,190 330,188 348,187 366,186" fill="none" stroke="#E53935" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 면적 채우기 -->
  <polygon points="240,225 258,216 276,204 294,195 312,190 330,188 348,187 366,186 366,228 240,228" fill="#E5393518"/>

  <rect x="396" y="142" width="170" height="100" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="481" y="160" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">📈 정확도</text>
  <rect x="413" y="168" width="140" height="62" rx="4" fill="#FFFBF5" stroke="#FFCCBC" stroke-width="0.5"/>
  <polyline points="418,224 436,218 454,210 472,200 490,192 508,186 526,182 544,180" fill="none" stroke="#43A047" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="418,224 436,218 454,210 472,200 490,192 508,186 526,182 544,180 544,228 418,228" fill="#43A04718"/>
  <!-- 번호 ⑤ -->
  <circle cx="225" cy="142" r="11" fill="#43A047" filter="url(#numShadow)"/>
  <text x="225" y="146" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">⑤</text>

  <!-- ===== 중앙: CNN 아키텍처 ===== -->
  <rect x="218" y="250" width="348" height="90" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="392" y="268" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">🏗️ CNN 아키텍처 — 현재 처리 단계 시각화</text>
  <!-- 레이어 블록들 -->
  <rect x="235" y="280" width="30" height="30" rx="3" fill="#E53935" stroke="#E53935" stroke-width="1.5"/>
  <text x="250" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="6" font-weight="600" fill="#3E2723">Input</text>
  <line x1="267" y1="295" x2="280" y2="295" stroke="#FFCCBC" stroke-width="1"/>
  <rect x="282" y="282" width="26" height="26" rx="3" fill="#7B1FA2BB"/>
  <text x="295" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="6" fill="#3E2723">Conv1</text>
  <line x1="310" y1="295" x2="322" y2="295" stroke="#FFCCBC" stroke-width="1"/>
  <rect x="324" y="285" width="20" height="20" rx="3" fill="#F57C00BB"/>
  <text x="334" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="6" fill="#3E2723">Pool1</text>
  <line x1="346" y1="295" x2="358" y2="295" stroke="#FFCCBC" stroke-width="1"/>
  <rect x="360" y="286" width="18" height="18" rx="3" fill="#7B1FA2BB"/>
  <text x="369" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="6" fill="#3E2723">Conv2</text>
  <line x1="380" y1="295" x2="392" y2="295" stroke="#FFCCBC" stroke-width="1"/>
  <rect x="394" y="289" width="14" height="14" rx="3" fill="#F57C00BB"/>
  <text x="401" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="6" fill="#3E2723">Pool2</text>
  <line x1="410" y1="295" x2="428" y2="295" stroke="#FFCCBC" stroke-width="1"/>
  <rect x="430" y="278" width="6" height="34" rx="2" fill="#1976D2BB"/>
  <text x="433" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#3E2723">Flat</text>
  <line x1="438" y1="295" x2="456" y2="295" stroke="#FFCCBC" stroke-width="1"/>
  <rect x="458" y="282" width="6" height="26" rx="2" fill="#00897BBB"/>
  <text x="461" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#3E2723">Dense</text>
  <line x1="466" y1="295" x2="484" y2="295" stroke="#FFCCBC" stroke-width="1"/>
  <rect x="486" y="288" width="6" height="14" rx="2" fill="#43A047"/>
  <text x="489" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#3E2723">Out</text>
  <!-- 번호 ⑥ -->
  <circle cx="225" cy="250" r="11" fill="#1976D2" filter="url(#numShadow)"/>
  <text x="225" y="254" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">⑥</text>

  <!-- ===== 중앙: 학습 결과 (하단) ===== -->
  <rect x="218" y="348" width="348" height="72" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="392" y="366" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#8D6E63">📊 학습 결과 (학습 완료 시 표시)</text>
  <rect x="232" y="376" width="102" height="34" rx="6" fill="#FFF3E0"/>
  <text x="283" y="396" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#5D4037">🎯 모델 성능</text>
  <rect x="340" y="376" width="110" height="34" rx="6" fill="#FFF3E0"/>
  <text x="395" y="396" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#5D4037">📐 학습된 가중치</text>
  <rect x="456" y="376" width="100" height="34" rx="6" fill="#FFF3E0"/>
  <text x="506" y="396" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#5D4037">⚙️ 학습 설정</text>
  <!-- 번호 ⑩ -->
  <circle cx="225" cy="348" r="11" fill="#F57C00" filter="url(#numShadow)"/>
  <text x="225" y="352" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">⑩</text>

  <!-- ===== 오른쪽: 학습 설정 ===== -->
  <rect x="588" y="142" width="174" height="200" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="675" y="160" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">⚙️ 학습 설정</text>
  <line x1="600" y1="167" x2="750" y2="167" stroke="#FFF3E0" stroke-width="1.5"/>
  <!-- 셀렉트 -->
  <text x="600" y="182" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">학습률 (Learning Rate)</text>
  <rect x="600" y="186" width="150" height="18" rx="4" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="608" y="198" font-family="Noto Sans KR" font-size="7" fill="#3E2723">0.01 (보통)</text>
  <text x="600" y="216" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">에포크 수</text>
  <rect x="600" y="220" width="150" height="18" rx="4" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="608" y="232" font-family="Noto Sans KR" font-size="7" fill="#3E2723">30 에포크</text>
  <!-- 컨트롤 버튼 -->
  <rect x="600" y="248" width="48" height="22" rx="5" fill="#43A047"/>
  <text x="624" y="263" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="white">▶ 시작</text>
  <rect x="652" y="248" width="46" height="22" rx="5" fill="#FFC107"/>
  <text x="675" y="263" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="#3E2723">⏸ 정지</text>
  <rect x="702" y="248" width="48" height="22" rx="5" fill="#2196F3"/>
  <text x="726" y="263" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" font-weight="600" fill="white">⏭ 단계</text>
  <!-- 진행률 바 -->
  <text x="600" y="286" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">학습 진행</text>
  <text x="750" y="286" text-anchor="end" font-family="JetBrains Mono" font-size="7" font-weight="600" fill="#E53935">15 / 30</text>
  <rect x="600" y="290" width="150" height="6" rx="3" fill="#FFF3E0"/>
  <rect x="600" y="290" width="75" height="6" rx="3" fill="url(#progressGrad)"/>
  <!-- 상태 배지 -->
  <rect x="620" y="304" width="110" height="20" rx="6" fill="#E8F5E9"/>
  <text x="675" y="318" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#2E7D32">▶ 학습 중...</text>
  <!-- 초기화 버튼 -->
  <rect x="600" y="328" width="150" height="6" rx="3" fill="transparent"/>
  <!-- 번호 ⑦ -->
  <circle cx="595" cy="142" r="11" fill="#43A047" filter="url(#numShadow)"/>
  <text x="595" y="146" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">⑦</text>

  <!-- 진행률 그라데이션 -->
  <defs>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43A047"/>
      <stop offset="100%" style="stop-color:#FFC107"/>
    </linearGradient>
  </defs>

  <!-- ===== 오른쪽: 학습 현황 ===== -->
  <rect x="588" y="350" width="174" height="124" rx="8" fill="white" stroke="#FFCCBC" stroke-width="1"/>
  <text x="675" y="368" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">📊 학습 현황</text>
  <line x1="600" y1="375" x2="750" y2="375" stroke="#FFF3E0" stroke-width="1.5"/>
  <!-- 통계 그리드 -->
  <rect x="600" y="382" width="70" height="34" rx="6" fill="#FFF3E0"/>
  <text x="635" y="398" text-anchor="middle" font-family="JetBrains Mono" font-size="12" font-weight="700" fill="#E53935">15</text>
  <text x="635" y="410" text-anchor="middle" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">에포크</text>
  <rect x="678" y="382" width="72" height="34" rx="6" fill="#FFF3E0"/>
  <text x="714" y="398" text-anchor="middle" font-family="JetBrains Mono" font-size="12" font-weight="700" fill="#E53935">1500</text>
  <text x="714" y="410" text-anchor="middle" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">학습 샘플</text>
  <rect x="600" y="422" width="70" height="34" rx="6" fill="#FFF3E0"/>
  <text x="635" y="438" text-anchor="middle" font-family="JetBrains Mono" font-size="10" font-weight="700" fill="#FFC107">0.12</text>
  <text x="635" y="450" text-anchor="middle" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">현재 손실</text>
  <rect x="678" y="422" width="72" height="34" rx="6" fill="#FFF3E0"/>
  <text x="714" y="438" text-anchor="middle" font-family="JetBrains Mono" font-size="10" font-weight="700" fill="#43A047">92.3%</text>
  <text x="714" y="450" text-anchor="middle" font-family="Noto Sans KR" font-size="6" fill="#8D6E63">정확도</text>
  <!-- 로그 영역 -->
  <rect x="600" y="460" width="150" height="8" rx="2" fill="#FFF3E0"/>
  <text x="608" y="467" font-family="JetBrains Mono" font-size="4.5" fill="#8D6E63">학습 로그...</text>
  <!-- 번호 ⑧ -->
  <circle cx="595" cy="350" r="11" fill="#F57C00" filter="url(#numShadow)"/>
  <text x="595" y="354" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">⑧</text>

  <!-- ===== 하단 범례 ===== -->
  <rect x="30" y="432" width="178" height="44" rx="8" fill="white" filter="url(#shadow)" opacity="0.95"/>
  <!-- 재생 패널 힌트 -->
  <text x="46" y="450" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#2196F3">📽️ 학습 과정 재생</text>
  <text x="46" y="464" font-family="Noto Sans KR" font-size="6.5" fill="#8D6E63">(학습 완료 후 표시됩니다)</text>
  <!-- 번호 ⑨ -->
  <circle cx="37" cy="432" r="11" fill="#2196F3" filter="url(#numShadow)"/>
  <text x="37" y="436" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">⑨</text>

  <!-- ===== 하단 번호 범례 ===== -->
  <rect x="30" y="486" width="740" height="28" rx="6" fill="white" filter="url(#shadow)" opacity="0.9"/>
  <text x="50" y="504" font-family="Noto Sans KR" font-size="7" fill="#3E2723">
    <tspan fill="#E53935" font-weight="700">① 헤더</tspan>
    <tspan dx="6" fill="#E53935" font-weight="700">② 모드탭</tspan>
    <tspan dx="6" fill="#1565C0" font-weight="700">③ 학습데이터</tspan>
    <tspan dx="6" fill="#7B1FA2" font-weight="700">④ 레이어설명</tspan>
    <tspan dx="6" fill="#43A047" font-weight="700">⑤ 차트</tspan>
    <tspan dx="6" fill="#1976D2" font-weight="700">⑥ 아키텍처</tspan>
    <tspan dx="6" fill="#43A047" font-weight="700">⑦ 학습설정</tspan>
