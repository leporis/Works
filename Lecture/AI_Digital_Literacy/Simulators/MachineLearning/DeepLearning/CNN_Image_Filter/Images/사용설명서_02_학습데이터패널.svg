<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <filter id="numShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>

  <text x="400" y="26" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="700" fill="#3E2723">📦 학습 데이터 패널 — 상세 구성</text>
  <text x="400" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#8D6E63">학습 모드 왼쪽 상단 | 데이터 생성 전 반드시 설정하세요</text>

  <!-- ===== 패널 확대도 (좌) ===== -->
  <rect x="30" y="58" width="300" height="330" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="30" y="58" width="300" height="32" rx="12" fill="#E53935"/>
  <rect x="30" y="78" width="300" height="12" fill="#E53935"/>
  <text x="180" y="79" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="white">📦 학습 데이터</text>

  <!-- 슬라이더 1: 데이터 수 -->
  <text x="50" y="112" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#3E2723">📊 데이터 수</text>
  <text x="290" y="112" text-anchor="end" font-family="JetBrains Mono" font-size="9" font-weight="600" fill="#E53935">100개</text>
  <rect x="50" y="118" width="260" height="8" rx="4" fill="#FFCCBC"/>
  <rect x="50" y="118" width="130" height="8" rx="4" fill="#E53935"/>
  <circle cx="180" cy="122" r="6" fill="white" stroke="#E53935" stroke-width="2"/>
  <text x="50" y="136" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">20</text>
  <text x="310" y="136" text-anchor="end" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">300</text>
  <!-- 번호 ① -->
  <circle cx="42" cy="106" r="9" fill="#1565C0" filter="url(#numShadow)"/>
  <text x="42" y="110" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="700" fill="white">①</text>

  <!-- 슬라이더 2: 노이즈 강도 -->
  <text x="50" y="162" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#3E2723">🔊 노이즈 강도</text>
  <text x="290" y="162" text-anchor="end" font-family="JetBrains Mono" font-size="9" font-weight="600" fill="#E53935">15%</text>
  <rect x="50" y="168" width="260" height="8" rx="4" fill="#FFCCBC"/>
  <rect x="50" y="168" width="78" height="8" rx="4" fill="#E53935"/>
  <circle cx="128" cy="172" r="6" fill="white" stroke="#E53935" stroke-width="2"/>
  <text x="50" y="186" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">0%</text>
  <text x="310" y="186" text-anchor="end" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">50%</text>
  <circle cx="42" cy="156" r="9" fill="#1565C0" filter="url(#numShadow)"/>
  <text x="42" y="160" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="700" fill="white">②</text>

  <!-- 슬라이더 3: 밝기 변동폭 -->
  <text x="50" y="212" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#3E2723">💡 밝기 변동폭</text>
  <text x="290" y="212" text-anchor="end" font-family="JetBrains Mono" font-size="9" font-weight="600" fill="#E53935">20%</text>
  <rect x="50" y="218" width="260" height="8" rx="4" fill="#FFCCBC"/>
  <rect x="50" y="218" width="104" height="8" rx="4" fill="#E53935"/>
  <circle cx="154" cy="222" r="6" fill="white" stroke="#E53935" stroke-width="2"/>
  <text x="50" y="236" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">0%</text>
  <text x="310" y="236" text-anchor="end" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">50%</text>
  <circle cx="42" cy="206" r="9" fill="#1565C0" filter="url(#numShadow)"/>
  <text x="42" y="210" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="700" fill="white">③</text>

  <!-- 생성 버튼 -->
  <rect x="50" y="252" width="260" height="42" rx="8" fill="#E53935"/>
  <text x="180" y="278" text-anchor="middle" font-family="Noto Sans KR" font-size="13" font-weight="700" fill="white">🎲 학습 데이터 생성</text>
  <circle cx="42" cy="268" r="9" fill="#E53935" filter="url(#numShadow)"/>
  <text x="42" y="272" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="700" fill="white">④</text>

  <!-- 상태 메시지 -->
  <rect x="50" y="302" width="260" height="30" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
  <text x="180" y="321" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="600" fill="#2E7D32">✅ 100개 데이터 생성 완료!</text>
  <circle cx="42" cy="312" r="9" fill="#43A047" filter="url(#numShadow)"/>
  <text x="42" y="316" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="700" fill="white">⑤</text>

  <!-- 주의사항 -->
  <rect x="50" y="340" width="260" height="36" rx="6" fill="#FFF3E0"/>
  <text x="180" y="356" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#E65100">⚠️ 학습 중에는 데이터를 다시</text>
  <text x="180" y="370" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#E65100">생성할 수 없습니다 (초기화 필요)</text>

  <!-- ===== 설명 (우) ===== -->
  <!-- 데이터 수 설명 -->
  <rect x="350" y="58" width="430" height="76" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="368" y="78" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#1565C0">① 데이터 수 (20~300개)</text>
  <text x="368" y="96" font-family="Noto Sans KR" font-size="9" fill="#5D4037">학습에 사용할 사과 이미지의 총 개수를 설정합니다.</text>
  <text x="368" y="112" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">• 적은 데이터(20~50): 학습 빠르지만 정확도 낮음</text>
  <text x="368" y="126" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">• 많은 데이터(200~300): 느리지만 정확도 높음 → 권장: 100개</text>

  <!-- 노이즈 설명 -->
  <rect x="350" y="142" width="430" height="76" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="368" y="162" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#1565C0">② 노이즈 강도 (0~50%)</text>
  <text x="368" y="180" font-family="Noto Sans KR" font-size="9" fill="#5D4037">사과 이미지에 무작위 잡음을 추가합니다.</text>
  <text x="368" y="196" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">• 0%: 깨끗한 이미지 → 쉬운 학습</text>
  <text x="368" y="210" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">• 50%: 매우 노이즈 → 어려운 학습 (현실 데이터 시뮬레이션)</text>

  <!-- 밝기 설명 -->
  <rect x="350" y="226" width="430" height="66" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="368" y="246" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#1565C0">③ 밝기 변동폭 (0~50%)</text>
  <text x="368" y="264" font-family="Noto Sans KR" font-size="9" fill="#5D4037">각 사과 이미지의 밝기를 무작위로 변화시킵니다.</text>
  <text x="368" y="280" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">• 조명 조건이 다양한 현실 환경을 모사합니다</text>

  <!-- 버튼 설명 -->
  <rect x="350" y="300" width="430" height="44" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="368" y="320" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#E53935">④ 생성 버튼</text>
  <text x="368" y="336" font-family="Noto Sans KR" font-size="9" fill="#5D4037">설정한 조건으로 익은 사과 / 덜 익은 사과 데이터를 각각 절반씩 생성</text>

  <!-- 상태 설명 -->
  <rect x="350" y="352" width="430" height="38" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="368" y="372" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#43A047">⑤ 상태 메시지</text>
  <text x="368" y="386" font-family="Noto Sans KR" font-size="9" fill="#5D4037">생성 완료 시 ✅ 표시, 미생성 시 ⚠️ 경고 표시</text>
</svg>
