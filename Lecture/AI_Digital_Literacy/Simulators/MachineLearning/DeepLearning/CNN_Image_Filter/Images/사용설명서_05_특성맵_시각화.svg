<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>

  <text x="400" y="26" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="700" fill="#3E2723">🔬 특성맵 시각화 — 4블록 구성</text>
  <text x="400" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#8D6E63">분류 모드 중앙 영역 | CNN 분류 실행 후 각 레이어의 출력을 시각적으로 확인합니다</text>

  <!-- ===== 블록 1: Conv1 ===== -->
  <rect x="20" y="58" width="378" height="150" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="20" y="58" width="378" height="24" rx="10" fill="#7B1FA2"/>
  <rect x="20" y="74" width="378" height="8" fill="#7B1FA2"/>
  <text x="209" y="76" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">Conv1 특성맵 — 에지/색상 검출 (8장)</text>

  <!-- 8개 미니맵 -->
  <g transform="translate(32, 90)">
    <rect x="0" y="0" width="38" height="38" rx="4" fill="#1a2a4a"/>
    <rect x="2" y="2" width="34" height="34" rx="3" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="6" y1="20" x2="32" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="19" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#7B1FA2">수평에지</text>

    <rect x="44" y="0" width="38" height="38" rx="4" fill="#2a1a4a"/>
    <line x1="24" y1="6" x2="24" y2="32" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="63" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#7B1FA2">수직에지</text>

    <rect x="88" y="0" width="38" height="38" rx="4" fill="#1a3a2a"/>
    <line x1="10" y1="30" x2="30" y2="8" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="107" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#7B1FA2">대각↗</text>

    <rect x="132" y="0" width="38" height="38" rx="4" fill="#3a1a2a"/>
    <line x1="10" y1="8" x2="30" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="151" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#7B1FA2">대각↘</text>

    <rect x="176" y="0" width="38" height="38" rx="4" fill="#4a3a1a"/>
    <rect x="12" y="12" width="16" height="16" rx="2" fill="rgba(255,255,255,0.25)"/>
    <text x="195" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#7B1FA2">밝기</text>

    <rect x="220" y="0" width="38" height="38" rx="4" fill="#1a4a3a"/>
    <rect x="8" y="8" width="24" height="24" rx="8" fill="rgba(255,255,255,0.2)"/>
    <text x="239" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#7B1FA2">블러</text>

    <rect x="264" y="0" width="38" height="38" rx="4" fill="#3a2a4a"/>
    <circle cx="283" cy="19" r="8" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="283" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#7B1FA2">반전</text>

    <rect x="308" y="0" width="38" height="38" rx="4" fill="#2a3a1a"/>
    <circle cx="327" cy="19" r="4" fill="rgba(255,255,255,0.5)"/>
    <text x="327" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="5.5" fill="#7B1FA2">샤프닝</text>
  </g>

  <text x="209" y="162" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">각 필터가 사과 이미지에서 서로 다른 특징을 추출 | 62×62 px × 8장</text>
  <rect x="32" y="170" width="354" height="28" rx="6" fill="#F3E5F5"/>
  <text x="209" y="188" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#7B1FA2">💡 밝은 부분 = 해당 특징이 강하게 감지된 영역</text>

  <!-- ===== 블록 2: Pool1 ===== -->
  <rect x="406" y="58" width="374" height="150" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="406" y="58" width="374" height="24" rx="10" fill="#F57C00"/>
  <rect x="406" y="74" width="374" height="8" fill="#F57C00"/>
  <text x="593" y="76" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">Pool1 특성맵 — 맥스풀링 결과 (8장)</text>

  <g transform="translate(418, 90)">
    <rect x="0" y="0" width="34" height="34" rx="4" fill="#4a2a1a"/>
    <rect x="44" y="0" width="34" height="34" rx="4" fill="#3a3a2a"/>
    <rect x="88" y="0" width="34" height="34" rx="4" fill="#2a4a1a"/>
    <rect x="132" y="0" width="34" height="34" rx="4" fill="#4a1a3a"/>
    <rect x="176" y="0" width="34" height="34" rx="4" fill="#1a4a4a"/>
    <rect x="220" y="0" width="34" height="34" rx="4" fill="#3a1a4a"/>
    <rect x="264" y="0" width="34" height="34" rx="4" fill="#4a3a2a"/>
    <rect x="308" y="0" width="34" height="34" rx="4" fill="#2a2a4a"/>
  </g>
  <text x="593" y="142" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">Conv1 결과를 2×2 영역에서 최댓값 선택 | 31×31 px × 8장</text>
  <text x="593" y="156" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">→ 크기는 절반이지만 중요한 특징은 보존</text>
  <rect x="418" y="166" width="350" height="28" rx="6" fill="#FFF3E0"/>
  <text x="593" y="184" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#F57C00">💡 Conv1보다 더 선명하고 압축된 모습</text>

  <!-- ===== 블록 3: Conv2 ===== -->
  <rect x="20" y="218" width="378" height="170" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="20" y="218" width="378" height="24" rx="10" fill="#7B1FA2"/>
  <rect x="20" y="234" width="378" height="8" fill="#7B1FA2"/>
  <text x="209" y="236" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">Conv2 특성맵 — 고수준 패턴 인식 (16장)</text>

  <!-- 16개 미니맵 (2행 8열) -->
  <g transform="translate(32, 250)">
    <rect x="0" y="0" width="30" height="30" rx="3" fill="#1a2a5a"/>
    <rect x="36" y="0" width="30" height="30" rx="3" fill="#2a4a3a"/>
    <rect x="72" y="0" width="30" height="30" rx="3" fill="#3a1a4a"/>
    <rect x="108" y="0" width="30" height="30" rx="3" fill="#1a5a2a"/>
    <rect x="144" y="0" width="30" height="30" rx="3" fill="#4a2a1a"/>
    <rect x="180" y="0" width="30" height="30" rx="3" fill="#2a3a5a"/>
    <rect x="216" y="0" width="30" height="30" rx="3" fill="#5a1a3a"/>
    <rect x="252" y="0" width="30" height="30" rx="3" fill="#1a4a4a"/>
    <rect x="0" y="36" width="30" height="30" rx="3" fill="#3a5a1a"/>
    <rect x="36" y="36" width="30" height="30" rx="3" fill="#4a1a5a"/>
    <rect x="72" y="36" width="30" height="30" rx="3" fill="#1a3a4a"/>
    <rect x="108" y="36" width="30" height="30" rx="3" fill="#5a3a2a"/>
    <rect x="144" y="36" width="30" height="30" rx="3" fill="#2a5a4a"/>
    <rect x="180" y="36" width="30" height="30" rx="3" fill="#4a4a1a"/>
    <rect x="216" y="36" width="30" height="30" rx="3" fill="#3a2a5a"/>
    <rect x="252" y="36" width="30" height="30" rx="3" fill="#5a2a4a"/>
  </g>
  <text x="209" y="332" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">더 복잡한 패턴 (사과 둥근 형태, 색상 분포) 인식 | 29×29 px × 16장</text>
  <rect x="32" y="340" width="354" height="38" rx="6" fill="#F3E5F5"/>
  <text x="209" y="358" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#7B1FA2">💡 Conv1은 단순 에지 → Conv2는 에지 조합으로 패턴 학습</text>
  <text x="209" y="372" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#8D6E63">필터 수 8→16으로 증가: 더 다양한 특징을 동시에 감지</text>

  <!-- ===== 블록 4: Pool2 ===== -->
  <rect x="406" y="218" width="374" height="170" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="406" y="218" width="374" height="24" rx="10" fill="#F57C00"/>
  <rect x="406" y="234" width="374" height="8" fill="#F57C00"/>
  <text x="593" y="236" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">Pool2 특성맵 — 최종 압축 (16장)</text>

  <g transform="translate(418, 250)">
    <rect x="0" y="0" width="28" height="28" rx="3" fill="#5a3a1a"/>
    <rect x="34" y="0" width="28" height="28" rx="3" fill="#3a5a2a"/>
    <rect x="68" y="0" width="28" height="28" rx="3" fill="#1a3a5a"/>
    <rect x="102" y="0" width="28" height="28" rx="3" fill="#5a1a4a"/>
    <rect x="136" y="0" width="28" height="28" rx="3" fill="#2a5a3a"/>
    <rect x="170" y="0" width="28" height="28" rx="3" fill="#4a2a5a"/>
    <rect x="204" y="0" width="28" height="28" rx="3" fill="#3a4a1a"/>
    <rect x="238" y="0" width="28" height="28" rx="3" fill="#5a2a3a"/>
    <rect x="0" y="34" width="28" height="28" rx="3" fill="#2a4a5a"/>
    <rect x="34" y="34" width="28" height="28" rx="3" fill="#4a5a1a"/>
    <rect x="68" y="34" width="28" height="28" rx="3" fill="#5a4a2a"/>
    <rect x="102" y="34" width="28" height="28" rx="3" fill="#1a5a4a"/>
    <rect x="136" y="34" width="28" height="28" rx="3" fill="#4a1a5a"/>
    <rect x="170" y="34" width="28" height="28" rx="3" fill="#3a5a4a"/>
    <rect x="204" y="34" width="28" height="28" rx="3" fill="#5a3a4a"/>
    <rect x="238" y="34" width="28" height="28" rx="3" fill="#2a3a5a"/>
  </g>
  <text x="593" y="332" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">Conv2 결과를 최종 압축 | 14×14 px × 16장</text>
  <text x="593" y="346" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">→ 이 3,136개 값이 Flatten → Dense로 전달</text>
  <rect x="418" y="354" width="350" height="28" rx="6" fill="#FFF3E0"/>
  <text x="593" y="372" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#F57C00">💡 가장 압축된 형태 — AI가 최종 판단에 사용하는 핵심 정보</text>
</svg>
