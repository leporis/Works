<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <linearGradient id="ripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E53935"/><stop offset="100%" style="stop-color:#FF7043"/>
    </linearGradient>
    <linearGradient id="unripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43A047"/><stop offset="100%" style="stop-color:#66BB6A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="800" height="350" fill="url(#bgGrad)" rx="12"/>

  <text x="400" y="26" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="700" fill="#3E2723">📋 분류 결과 — 확률 바 + 판정 표시</text>
  <text x="400" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#8D6E63">분류 모드 중앙 하단 | CNN 분류 실행 후 각 클래스의 확률과 최종 판정을 표시합니다</text>

  <!-- ===== 결과 패널 확대 ===== -->
  <rect x="30" y="58" width="500" height="250" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="30" y="58" width="500" height="28" rx="12" fill="#E53935"/>
  <rect x="30" y="78" width="500" height="8" fill="#E53935"/>
  <text x="280" y="78" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="white">📋 분류 결과</text>

  <!-- 익은 사과 바 -->
  <text x="50" y="110" font-family="Noto Sans KR" font-size="12" font-weight="700" fill="#3E2723">🍎 익은 사과</text>
  <text x="500" y="110" text-anchor="end" font-family="JetBrains Mono" font-size="14" font-weight="700" fill="#E53935">78.3%</text>
  <rect x="50" y="118" width="460" height="22" rx="6" fill="#FFF3E0"/>
  <rect x="50" y="118" width="360" height="22" rx="6" fill="url(#ripeGrad)"/>
  <!-- 퍼센트 마커 -->
  <text x="396" y="134" font-family="JetBrains Mono" font-size="9" font-weight="600" fill="white">78.3%</text>

  <!-- 덜 익은 사과 바 -->
  <text x="50" y="168" font-family="Noto Sans KR" font-size="12" font-weight="700" fill="#3E2723">🍏 덜 익은 사과</text>
  <text x="500" y="168" text-anchor="end" font-family="JetBrains Mono" font-size="14" font-weight="700" fill="#43A047">21.7%</text>
  <rect x="50" y="176" width="460" height="22" rx="6" fill="#FFF3E0"/>
  <rect x="50" y="176" width="100" height="22" rx="6" fill="url(#unripeGrad)"/>
  <text x="62" y="192" font-family="JetBrains Mono" font-size="9" font-weight="600" fill="white">21.7%</text>

  <!-- 판정 결과 -->
  <rect x="100" y="212" width="360" height="46" rx="12" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="280" y="241" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="#C62828">🍎 익은 사과  ✅ 정답!</text>

  <!-- 판정 기준 설명 -->
  <rect x="100" y="264" width="360" height="32" rx="6" fill="#FFF3E0"/>
  <text x="280" y="282" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#5D4037">확률이 높은 클래스가 판정 결과 | 입력과 일치 시 ✅, 불일치 시 ❌</text>

  <!-- ===== 설명 카드들 (우) ===== -->
  <rect x="546" y="58" width="234" height="72" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="560" y="78" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#E53935">📊 확률 바</text>
  <text x="560" y="96" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">Softmax 출력값을 %로 표시</text>
  <text x="560" y="112" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">두 값의 합은 항상 100%</text>
  <text x="560" y="124" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">78.3% + 21.7% = 100%</text>

  <rect x="546" y="138" width="234" height="72" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="560" y="158" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#43A047">🎯 판정 로직</text>
  <text x="560" y="176" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">확률이 높은 쪽이 최종 판정</text>
  <text x="560" y="192" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">ripeProb > 50% → 🍎 익은 사과</text>
  <text x="560" y="204" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">ripeProb ≤ 50% → 🍏 덜 익은 사과</text>

  <rect x="546" y="218" width="234" height="60" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="560" y="238" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#1565C0">✅❌ 정답 여부</text>
  <text x="560" y="256" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">입력에서 선택한 사과 종류와</text>
  <text x="560" y="270" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">CNN 판정을 비교하여 표시</text>

  <rect x="546" y="286" width="234" height="54" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="560" y="306" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#F57C00">💡 교육 포인트</text>
  <text x="560" y="322" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">노이즈 높으면 확률 차이 줄어듦</text>
  <text x="560" y="334" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">→ AI도 헷갈린다는 것을 체험!</text>
</svg>
