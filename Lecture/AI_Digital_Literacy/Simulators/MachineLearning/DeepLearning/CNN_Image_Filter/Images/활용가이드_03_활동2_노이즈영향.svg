<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="800" height="350" fill="url(#bgGrad)" rx="12"/>

  <text x="400" y="26" text-anchor="middle" font-family="Noto Sans KR" font-size="15" font-weight="700" fill="#3E2723">🔬 활동 2: 노이즈가 AI 정확도에 미치는 영향</text>
  <text x="400" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#8D6E63">사과 사진에 잡음이 많으면 AI도 헷갈릴까요?</text>

  <!-- ===== 3개 사과 카드 ===== -->
  <!-- 노이즈 0% -->
  <rect x="20" y="56" width="242" height="186" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="20" y="56" width="242" height="28" rx="10" fill="#43A047"/>
  <rect x="20" y="76" width="242" height="8" fill="#43A047"/>
  <text x="141" y="76" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">😊 노이즈 0% (깨끗)</text>

  <!-- 깨끗한 사과 -->
  <rect x="70" y="94" width="80" height="80" rx="8" fill="#FFF3E0" stroke="#43A047" stroke-width="1.5"/>
  <ellipse cx="110" cy="140" rx="26" ry="25" fill="#E53935"/>
  <ellipse cx="104" cy="132" rx="7" ry="5" fill="rgba(255,255,255,0.35)"/>
  <line x1="109" y1="118" x2="111" y2="108" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <path d="M111,110 Q119,104 122,112 Q118,112 111,110" fill="#4CAF50"/>
  <text x="168" y="118" font-family="Noto Sans KR" font-size="8" fill="#2E7D32">선명한</text>
  <text x="168" y="132" font-family="Noto Sans KR" font-size="8" fill="#2E7D32">사과 이미지</text>
  <text x="168" y="150" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">잡음 없음</text>

  <!-- 정확도 바 -->
  <text x="36" y="196" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">정확도</text>
  <text x="240" y="196" text-anchor="end" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#43A047">97%</text>
  <rect x="36" y="202" width="210" height="14" rx="4" fill="#FFF3E0"/>
  <rect x="36" y="202" width="204" height="14" rx="4" fill="#43A047"/>
  <text x="225" y="213" font-family="JetBrains Mono" font-size="7" font-weight="600" fill="white">97%</text>
  <rect x="36" y="222" width="210" height="14" rx="4" fill="#E8F5E9"/>
  <text x="141" y="233" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#2E7D32">🎉 거의 다 맞춤!</text>

  <!-- 노이즈 25% -->
  <rect x="276" y="56" width="242" height="186" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="276" y="56" width="242" height="28" rx="10" fill="#FFC107"/>
  <rect x="276" y="76" width="242" height="8" fill="#FFC107"/>
  <text x="397" y="76" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#3E2723">😐 노이즈 25% (보통)</text>

  <!-- 약간 노이즈 사과 -->
  <rect x="326" y="94" width="80" height="80" rx="8" fill="#FFF3E0" stroke="#FFC107" stroke-width="1.5"/>
  <ellipse cx="366" cy="140" rx="26" ry="25" fill="#E53935"/>
  <ellipse cx="360" cy="132" rx="7" ry="5" fill="rgba(255,255,255,0.25)"/>
  <line x1="365" y1="118" x2="367" y2="108" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <!-- 노이즈 점들 -->
  <circle cx="350" cy="126" r="1.5" fill="rgba(0,0,0,0.3)"/>
  <circle cx="376" cy="148" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="358" cy="150" r="1.5" fill="rgba(0,0,0,0.25)"/>
  <circle cx="380" cy="130" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="344" cy="142" r="1.5" fill="rgba(0,0,0,0.2)"/>
  <circle cx="370" cy="120" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <text x="424" y="118" font-family="Noto Sans KR" font-size="8" fill="#F57C00">약간 흐릿한</text>
  <text x="424" y="132" font-family="Noto Sans KR" font-size="8" fill="#F57C00">사과 이미지</text>
  <text x="424" y="150" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">잡음 소량</text>

  <text x="292" y="196" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">정확도</text>
  <text x="496" y="196" text-anchor="end" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#FFC107">82%</text>
  <rect x="292" y="202" width="210" height="14" rx="4" fill="#FFF3E0"/>
  <rect x="292" y="202" width="172" height="14" rx="4" fill="#FFC107"/>
  <text x="450" y="213" font-family="JetBrains Mono" font-size="7" font-weight="600" fill="#3E2723">82%</text>
  <rect x="292" y="222" width="210" height="14" rx="4" fill="#FFF8E1"/>
  <text x="397" y="233" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#F57C00">🤔 가끔 틀림</text>

  <!-- 노이즈 50% -->
  <rect x="532" y="56" width="248" height="186" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="532" y="56" width="248" height="28" rx="10" fill="#E53935"/>
  <rect x="532" y="76" width="248" height="8" fill="#E53935"/>
  <text x="656" y="76" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">😵 노이즈 50% (심함)</text>

  <!-- 심한 노이즈 사과 -->
  <rect x="582" y="94" width="80" height="80" rx="8" fill="#FFF3E0" stroke="#E53935" stroke-width="1.5"/>
  <ellipse cx="622" cy="140" rx="26" ry="25" fill="#E5393588"/>
  <!-- 많은 노이즈 -->
  <circle cx="604" cy="120" r="2" fill="rgba(0,0,0,0.4)"/>
  <circle cx="635" cy="148" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="612" cy="152" r="2" fill="rgba(0,0,0,0.35)"/>
  <circle cx="640" cy="126" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="598" cy="142" r="2" fill="rgba(0,0,0,0.3)"/>
  <circle cx="628" cy="116" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="614" cy="134" r="2.5" fill="rgba(0,0,0,0.3)"/>
  <circle cx="632" cy="138" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="606" cy="148" r="2" fill="rgba(0,0,0,0.25)"/>
  <circle cx="640" cy="120" r="2" fill="rgba(255,255,255,0.45)"/>
  <text x="680" y="118" font-family="Noto Sans KR" font-size="8" fill="#C62828">매우 노이즈</text>
  <text x="680" y="132" font-family="Noto Sans KR" font-size="8" fill="#C62828">심한 이미지</text>
  <text x="680" y="150" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">잡음 대량</text>

  <text x="548" y="196" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#3E2723">정확도</text>
  <text x="758" y="196" text-anchor="end" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#E53935">63%</text>
  <rect x="548" y="202" width="218" height="14" rx="4" fill="#FFF3E0"/>
  <rect x="548" y="202" width="137" height="14" rx="4" fill="#E53935"/>
  <text x="672" y="213" font-family="JetBrains Mono" font-size="7" font-weight="600" fill="white">63%</text>
  <rect x="548" y="222" width="218" height="14" rx="4" fill="#FFEBEE"/>
  <text x="657" y="233" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#C62828">😵 많이 틀림!</text>

  <!-- ===== 하단: 핵심 관찰 + 활동 ===== -->
  <rect x="20" y="254" width="380" height="86" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="210" y="274" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="#3E2723">💡 핵심 관찰 포인트</text>
  <rect x="36" y="282" width="348" height="48" rx="6" fill="#FFF3E0"/>
  <text x="210" y="300" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#5D4037">노이즈가 높아질수록 정확도가 떨어진다!</text>
  <text x="210" y="316" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#5D4037">→ <tspan font-weight="600" fill="#E53935">데이터의 품질</tspan>이 AI 성능에 큰 영향을 준다</text>
  <text x="210" y="332" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#8D6E63">현실에서도 깨끗한 데이터 수집이 중요한 이유!</text>

  <rect x="414" y="254" width="366" height="86" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="597" y="274" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="#3E2723">📝 기록 활동</text>
  <rect x="430" y="282" width="334" height="48" rx="6" fill="#E8F5E9"/>
  <text x="440" y="300" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">① 노이즈 0%, 25%, 50%로 각각 학습 후 정확도 기록</text>
  <text x="440" y="316" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">② 분류 모드에서 🎲 랜덤 10회씩 → 정답률 비교</text>
  <text x="440" y="332" font-family="Noto Sans KR" font-size="8.5" fill="#5D4037">③ "어느 수준까지 AI가 잘 맞출까?" 토론</text>
</svg>
