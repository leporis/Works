<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBig" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#E53935"/>
    </marker>
  </defs>

  <rect width="800" height="440" fill="url(#bgGrad)" rx="12"/>

  <!-- 타이틀 -->
  <text x="400" y="28" text-anchor="middle" font-family="Noto Sans KR" font-size="16" font-weight="700" fill="#3E2723">🧠 CNN이 사과를 분류하는 과정 — 쉽게 이해하기!</text>
  <text x="400" y="46" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#8D6E63">사과 사진이 들어가서 "익었어요!" 답이 나오기까지</text>

  <!-- ===== 메인 흐름: 5단계 카드 ===== -->

  <!-- 1단계: 사과 사진 -->
  <rect x="20" y="66" width="130" height="200" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="20" y="66" width="130" height="38" rx="14" fill="#E53935"/>
  <rect x="20" y="90" width="130" height="14" fill="#E53935"/>
  <text x="85" y="85" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">📷 1단계</text>
  <text x="85" y="100" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="white">사진 찍기</text>
  <!-- 사과 이모지 영역 -->
  <rect x="38" y="114" width="94" height="72" rx="8" fill="#FFF3E0" stroke="#FFCCBC" stroke-width="1"/>
  <text x="85" y="155" text-anchor="middle" font-size="36">🍎</text>
  <!-- 비유 -->
  <rect x="30" y="196" width="110" height="38" rx="6" fill="#FFEBEE"/>
  <text x="85" y="211" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#C62828">📸 비유</text>
  <text x="85" y="225" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">"사과 사진을 찍어서</text>
  <text x="85" y="236" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037"> 컴퓨터에 보여줘요"</text>
  <!-- 기술 라벨 -->
  <text x="85" y="260" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">Input: 64×64×3</text>

  <!-- 화살표 1→2 -->
  <line x1="154" y1="160" x2="174" y2="160" stroke="#E53935" stroke-width="3" marker-end="url(#arrowBig)"/>

  <!-- 2단계: 돋보기로 찾기 -->
  <rect x="178" y="66" width="130" height="200" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="178" y="66" width="130" height="38" rx="14" fill="#7B1FA2"/>
  <rect x="178" y="90" width="130" height="14" fill="#7B1FA2"/>
  <text x="243" y="85" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">🔍 2단계</text>
  <text x="243" y="100" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="white">특징 찾기</text>
  <!-- 필터 시각화 -->
  <rect x="196" y="114" width="94" height="72" rx="8" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <rect x="204" y="122" width="20" height="20" rx="3" fill="#7B1FA2" opacity="0.6"/>
  <rect x="228" y="122" width="20" height="20" rx="3" fill="#7B1FA2" opacity="0.4"/>
  <rect x="252" y="122" width="20" height="20" rx="3" fill="#7B1FA2" opacity="0.8"/>
  <rect x="204" y="146" width="20" height="20" rx="3" fill="#7B1FA2" opacity="0.5"/>
  <rect x="228" y="146" width="20" height="20" rx="3" fill="#7B1FA2" opacity="0.7"/>
  <rect x="252" y="146" width="20" height="20" rx="3" fill="#7B1FA2" opacity="0.3"/>
  <text x="243" y="178" text-anchor="middle" font-family="Noto Sans KR" font-size="6.5" fill="#7B1FA2">8개 필터가 특징 추출</text>
  <!-- 비유 -->
  <rect x="188" y="196" width="110" height="38" rx="6" fill="#F3E5F5"/>
  <text x="243" y="211" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#7B1FA2">🔍 비유</text>
  <text x="243" y="225" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">"돋보기 8개로 모양,</text>
  <text x="243" y="236" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037"> 색깔, 무늬를 찾아요"</text>
  <text x="243" y="260" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">Conv: 3×3 filter ×8</text>

  <!-- 화살표 2→3 -->
  <line x1="312" y1="160" x2="332" y2="160" stroke="#E53935" stroke-width="3" marker-end="url(#arrowBig)"/>

  <!-- 3단계: 요약하기 -->
  <rect x="336" y="66" width="130" height="200" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="336" y="66" width="130" height="38" rx="14" fill="#F57C00"/>
  <rect x="336" y="90" width="130" height="14" fill="#F57C00"/>
  <text x="401" y="85" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">📊 3단계</text>
  <text x="401" y="100" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="white">요약하기</text>
  <!-- 풀링 시각화: 큰 → 작은 -->
  <rect x="354" y="114" width="94" height="72" rx="8" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
  <!-- 큰 격자 (before) -->
  <rect x="360" y="122" width="32" height="32" rx="2" fill="#F57C00" opacity="0.3"/>
  <rect x="360" y="122" width="15" height="15" fill="#F57C00" opacity="0.5" rx="1"/>
  <rect x="377" y="122" width="15" height="15" fill="#F57C00" opacity="0.8" rx="1"/>
  <rect x="360" y="139" width="15" height="15" fill="#F57C00" opacity="0.6" rx="1"/>
  <rect x="377" y="139" width="15" height="15" fill="#F57C00" opacity="0.4" rx="1"/>
  <!-- 화살표 -->
  <text x="400" y="142" font-family="Noto Sans KR" font-size="12" fill="#F57C00">→</text>
  <!-- 작은 결과 -->
  <rect x="414" y="128" width="18" height="18" rx="2" fill="#F57C00" opacity="0.8"/>
  <text x="401" y="170" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#F57C00">2×2 → 최댓값 1개!</text>
  <text x="401" y="182" text-anchor="middle" font-family="Noto Sans KR" font-size="6.5" fill="#8D6E63">크기 절반으로 줄어요</text>
  <!-- 비유 -->
  <rect x="346" y="196" width="110" height="38" rx="6" fill="#FFF3E0"/>
  <text x="401" y="211" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#E65100">📝 비유</text>
  <text x="401" y="225" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">"중요한 것만 골라서</text>
  <text x="401" y="236" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037"> 메모장에 정리해요"</text>
  <text x="401" y="260" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">MaxPool: 2×2 stride 2</text>

  <!-- 화살표 3→4 -->
  <line x1="470" y1="160" x2="490" y2="160" stroke="#E53935" stroke-width="3" marker-end="url(#arrowBig)"/>

  <!-- 4단계: 판단하기 -->
  <rect x="494" y="66" width="130" height="200" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="494" y="66" width="130" height="38" rx="14" fill="#1976D2"/>
  <rect x="494" y="90" width="130" height="14" fill="#1976D2"/>
  <text x="559" y="85" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">🧠 4단계</text>
  <text x="559" y="100" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="white">판단하기</text>
  <!-- 뉴런 연결 시각화 -->
  <rect x="512" y="114" width="94" height="72" rx="8" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <!-- 뉴런들 -->
  <circle cx="530" cy="132" r="5" fill="#1976D2" opacity="0.6"/>
  <circle cx="530" cy="148" r="5" fill="#1976D2" opacity="0.8"/>
  <circle cx="530" cy="164" r="5" fill="#1976D2" opacity="0.5"/>
  <circle cx="560" cy="140" r="6" fill="#1976D2" opacity="0.9"/>
  <circle cx="560" cy="158" r="6" fill="#1976D2" opacity="0.7"/>
  <circle cx="588" cy="149" r="7" fill="#1976D2"/>
  <!-- 연결선 -->
  <line x1="536" y1="132" x2="554" y2="140" stroke="#1976D2" stroke-width="0.8" opacity="0.4"/>
  <line x1="536" y1="148" x2="554" y2="140" stroke="#1976D2" stroke-width="0.8" opacity="0.4"/>
  <line x1="536" y1="148" x2="554" y2="158" stroke="#1976D2" stroke-width="0.8" opacity="0.4"/>
  <line x1="536" y1="164" x2="554" y2="158" stroke="#1976D2" stroke-width="0.8" opacity="0.4"/>
  <line x1="566" y1="140" x2="581" y2="149" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
  <line x1="566" y1="158" x2="581" y2="149" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
  <text x="559" y="182" text-anchor="middle" font-family="Noto Sans KR" font-size="6.5" fill="#1565C0">모든 특징을 종합!</text>
  <!-- 비유 -->
  <rect x="504" y="196" width="110" height="38" rx="6" fill="#E3F2FD"/>
  <text x="559" y="211" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#1565C0">🧠 비유</text>
  <text x="559" y="225" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">"정리한 메모를 보고</text>
  <text x="559" y="236" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037"> 최종 결론을 내려요"</text>
  <text x="559" y="260" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">Dense: 3136→64→2</text>

  <!-- 화살표 4→5 -->
  <line x1="628" y1="160" x2="648" y2="160" stroke="#E53935" stroke-width="3" marker-end="url(#arrowBig)"/>

  <!-- 5단계: 결과! -->
  <rect x="652" y="66" width="130" height="200" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="652" y="66" width="130" height="38" rx="14" fill="#43A047"/>
  <rect x="652" y="90" width="130" height="14" fill="#43A047"/>
  <text x="717" y="85" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="white">📋 5단계</text>
  <text x="717" y="100" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="white">결과 발표!</text>
  <!-- 결과 바 -->
  <rect x="666" y="114" width="102" height="72" rx="8" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  <text x="717" y="132" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#2E7D32">🍎 익은 사과</text>
  <rect x="674" y="138" width="86" height="10" rx="3" fill="#FFF3E0"/>
  <rect x="674" y="138" width="68" height="10" rx="3" fill="#E53935"/>
  <text x="748" y="147" font-family="JetBrains Mono" font-size="6.5" font-weight="600" fill="#E53935">78%</text>
  <text x="717" y="164" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#5D4037">🍏 덜 익은 사과</text>
  <rect x="674" y="168" width="86" height="10" rx="3" fill="#FFF3E0"/>
  <rect x="674" y="168" width="19" height="10" rx="3" fill="#43A047"/>
  <text x="748" y="177" font-family="JetBrains Mono" font-size="6.5" font-weight="600" fill="#43A047">22%</text>
  <!-- 비유 -->
  <rect x="662" y="196" width="110" height="38" rx="6" fill="#E8F5E9"/>
  <text x="717" y="211" text-anchor="middle" font-family="Noto Sans KR" font-size="8" font-weight="600" fill="#2E7D32">🎉 비유</text>
  <text x="717" y="225" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037">"78% 확신해요!</text>
  <text x="717" y="236" text-anchor="middle" font-family="Noto Sans KR" font-size="7.5" fill="#5D4037"> 이건 익은 사과!"</text>
  <text x="717" y="260" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8D6E63">Softmax → 확률</text>

  <!-- ===== 하단: 전체 요약 ===== -->
  <rect x="20" y="280" width="760" height="48" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="400" y="298" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="#3E2723">🔄 한 줄 요약</text>
  <text x="400" y="316" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#5D4037">
    <tspan fill="#E53935" font-weight="600">사진 찍기</tspan> →
    <tspan fill="#7B1FA2" font-weight="600">돋보기로 특징 찾기</tspan> →
    <tspan fill="#F57C00" font-weight="600">핵심만 정리</tspan> →
    <tspan fill="#1976D2" font-weight="600">종합해서 판단</tspan> →
    <tspan fill="#43A047" font-weight="600">결과 발표!</tspan>
  </text>

  <!-- ===== 하단: 학습 과정 설명 ===== -->
  <rect x="20" y="340" width="760" height="90" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="400" y="360" text-anchor="middle" font-family="Noto Sans KR" font-size="11" font-weight="700" fill="#E53935">📚 그럼 "학습"은 뭘까?</text>

  <!-- 3개 포인트 -->
  <rect x="40" y="372" width="230" height="48" rx="8" fill="#FFEBEE"/>
  <text x="155" y="390" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#C62828">🔁 반복 연습</text>
  <text x="155" y="406" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#5D4037">많은 사과 사진으로 연습해요</text>
  <text x="155" y="416" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">(에포크 = 연습 횟수)</text>

  <rect x="285" y="372" width="230" height="48" rx="8" fill="#FFF3E0"/>
  <text x="400" y="390" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#E65100">📉 실수 줄이기</text>
  <text x="400" y="406" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#5D4037">틀릴수록 더 열심히 고쳐요</text>
  <text x="400" y="416" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">(손실 = 틀린 정도)</text>

  <rect x="530" y="372" width="230" height="48" rx="8" fill="#E8F5E9"/>
  <text x="645" y="390" text-anchor="middle" font-family="Noto Sans KR" font-size="9" font-weight="600" fill="#2E7D32">📈 실력 향상</text>
  <text x="645" y="406" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#5D4037">연습할수록 점점 잘 맞춰요</text>
  <text x="645" y="416" text-anchor="middle" font-family="Noto Sans KR" font-size="7" fill="#8D6E63">(정확도 = 맞힌 비율)</text>
</svg>
