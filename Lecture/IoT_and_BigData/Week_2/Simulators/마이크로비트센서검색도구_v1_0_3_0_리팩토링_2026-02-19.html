<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이크로비트 센서 검색 도구</title>
  <style>
    :root {
      /* ===== 1단계: 기본 팔레트 ===== */
      --color-bg-900:     #1a1a2e;
      --color-bg-800:     #16213e;
      --color-bg-surface: #0f0f23;
      --color-bg-card:    #2a2a4a;
      --color-accent-500: #00d4ff;
      --color-accent-600: #0099cc;
      --color-success-500: #4caf50;
      --color-success-300: #81c784;
      --color-info-500:    #2196f3;
      --color-info-300:    #64b5f6;
      --color-warning-500: #ff9800;
      --color-danger-500:  #e53935;
      --color-danger-700:  #c62828;
      --color-border:      #333;
      --color-text-primary:#fff;
      --color-text-muted:  #888;
      --color-text-dim:    #aaa;
      --color-text-light:  #ccc;
      --color-text-footer: #666;

      /* ===== 2단계: 의미적 별칭 ===== */
      --primary:       var(--color-accent-500);
      --primary-dark:  var(--color-accent-600);
      --success:       var(--color-success-500);
      --success-light: var(--color-success-300);
      --info:          var(--color-info-500);
      --info-light:    var(--color-info-300);
      --warning:       var(--color-warning-500);
      --danger:        var(--color-danger-500);
      --danger-dark:   var(--color-danger-700);
      --bg-body:       var(--color-bg-900);
      --bg-body-end:   var(--color-bg-800);
      --bg-surface:    var(--color-bg-surface);
      --bg-card:       var(--color-bg-card);
      --border:        var(--color-border);
      --text:          var(--color-text-primary);
      --text-muted:    var(--color-text-muted);
      --text-dim:      var(--color-text-dim);
      --text-light:    var(--color-text-light);

      /* ===== gradient 의미적 배경색 ===== */
      --grad-success-start: #1a2a1a;
      --grad-success-end:   #0f1a0f;
      --color-hover-bg:     #3a3a5a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg-body) 0%, var(--bg-body-end) 100%);
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.8em;
      color: var(--primary);
    }
    
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 25px;
      font-size: 0.95em;
    }
    
    /* 검색 모드 탭 */
    .search-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .tab-btn {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
      background: var(--bg-card);
      color: var(--text-muted);
    }
    
    .tab-btn.active {
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      color: var(--text);
      font-weight: bold;
    }
    
    .tab-btn:hover:not(.active) {
      background: var(--color-hover-bg);
    }
    
    /* 검색 패널 */
    .search-panel {
      background: var(--bg-surface);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
    }
    
    .search-section {
      display: none;
    }
    
    .search-section.active {
      display: block;
    }
    
    .section-title {
      font-size: 1.1em;
      color: var(--primary);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* 텍스트 검색 */
    .text-search {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .text-search input {
      flex: 1;
      padding: 15px 20px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg-body);
      color: var(--text);
      font-size: 1em;
    }
    
    .text-search input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .text-search input::placeholder {
      color: var(--color-text-footer);
    }
    
    .search-btn {
      padding: 15px 30px;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 10px;
      color: var(--text);
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
    }
    
    /* 키워드 힌트 */
    .keyword-hints {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    
    .hint-tag {
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 0.85em;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .hint-tag:hover {
      background: rgba(0, 212, 255, 0.2);
      color: var(--primary);
    }
    
    /* 데이터 선택 그리드 */
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    
    .data-item {
      padding: 12px;
      background: var(--bg-body);
      border: 2px solid var(--border);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .data-item:hover {
      border-color: var(--border);
      transform: translateY(-2px);
    }
    
    .data-item.selected {
      border-color: var(--primary);
      background: rgba(0, 212, 255, 0.1);
    }
    
    .data-item.builtin {
      border-color: var(--success);
    }
    
    .data-item.builtin.selected {
      background: rgba(76, 175, 80, 0.2);
    }
    
    .data-item-icon {
      font-size: 1.5em;
      margin-bottom: 5px;
    }
    
    .data-item-name {
      font-size: 0.85em;
      color: var(--text-light);
    }
    
    .data-item-source {
      font-size: 0.7em;
      color: var(--color-text-footer);
      margin-top: 3px;
    }
    
    .data-item.builtin .data-item-source {
      color: var(--success);
    }
    
    /* 선택된 데이터 표시 */
    .selected-display {
      margin-top: 15px;
      padding: 10px 15px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 10px;
      font-size: 0.9em;
    }
    
    .selected-display span {
      color: var(--primary);
      font-weight: bold;
    }
    
    /* 결과 패널 */
    .result-panel {
      background: var(--bg-surface);
      border-radius: 20px;
      padding: 25px;
      display: none;
    }
    
    .result-panel.show {
      display: block;
    }
    
    .result-title {
      font-size: 1.2em;
      color: var(--primary);
      margin-bottom: 20px;
      text-align: center;
    }
    
    /* 센서 추천 카드 */
    .sensor-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .sensor-card {
      background: var(--bg-body);
      border-radius: 15px;
      padding: 20px;
      border: 2px solid transparent;
    }
    
    .sensor-card.builtin {
      border-color: var(--success);
    }
    
    .sensor-card.datalogger {
      border-color: var(--warning);
    }
    
    .sensor-card.external {
      border-color: var(--info);
    }
    
    .sensor-card.essential {
      background: linear-gradient(145deg, var(--grad-success-start), var(--grad-success-end));
    }
    
    .sensor-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .sensor-card-icon {
      font-size: 2em;
    }
    
    .sensor-card-title {
      font-size: 1.1em;
      font-weight: bold;
    }
    
    .sensor-card.builtin .sensor-card-title {
      color: var(--success);
    }
    
    .sensor-card.datalogger .sensor-card-title {
      color: var(--warning);
    }
    
    .sensor-card.external .sensor-card-title {
      color: var(--info);
    }
    
    .sensor-card-badge {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 0.7em;
      margin-left: auto;
    }
    
    .badge-required {
      background: rgba(76, 175, 80, 0.3);
      color: var(--success-light);
    }
    
    .badge-recommended {
      background: rgba(33, 150, 243, 0.3);
      color: var(--info-light);
    }
    
    .badge-optional {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
    }
    
    .sensor-card-data {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .data-tag {
      padding: 4px 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      font-size: 0.8em;
      color: var(--text-light);
    }
    
    .data-tag.matched {
      background: rgba(0, 212, 255, 0.3);
      color: var(--primary);
      font-weight: bold;
    }
    
    .sensor-card-note {
      margin-top: 10px;
      font-size: 0.85em;
      color: var(--text-muted);
      font-style: italic;
    }
    
    /* 요약 */
    .summary-box {
      background: linear-gradient(145deg, var(--bg-card), var(--bg-body));
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }
    
    .summary-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 15px;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-number {
      font-size: 2em;
      font-weight: bold;
      background: linear-gradient(90deg, var(--success), var(--info));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .stat-label {
      font-size: 0.85em;
      color: var(--text-muted);
    }
    
    .summary-note {
      font-size: 0.9em;
      color: var(--text-dim);
    }
    
    /* 범례 */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85em;
      color: var(--text-muted);
    }
    
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
    
    .legend-color.green {
      background: var(--success);
    }
    
    .legend-color.orange {
      background: var(--warning);
    }
    
    .legend-color.blue {
      background: var(--info);
    }
    
    /* 리셋 버튼 */
    .reset-btn {
      display: block;
      margin: 20px auto 0;
      padding: 12px 30px;
      background: linear-gradient(145deg, var(--danger), var(--danger-dark));
      border: none;
      border-radius: 10px;
      color: var(--text);
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(229, 57, 53, 0.4);
    }
    
    /* 반응형 */
    @media (max-width: 600px) {
      .search-tabs {
        flex-direction: column;
      }
      
      .text-search {
        flex-direction: column;
      }
      
      .summary-stats {
        flex-direction: column;
        gap: 15px;
      }
      
      .legend {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 마이크로비트 센서 검색 도구</h1>
    <p class="subtitle">필요한 데이터나 하고 싶은 것을 입력하면 센서를 추천해드려요!</p>
    
    <!-- 검색 모드 탭 -->
    <div class="search-tabs">
      <button class="tab-btn active" onclick="switchTab('text')">💬 텍스트로 검색</button>
      <button class="tab-btn" onclick="switchTab('data')">📊 데이터로 검색</button>
    </div>
    
    <!-- 검색 패널 -->
    <div class="search-panel">
      <!-- 텍스트 검색 -->
      <div id="text-section" class="search-section active">
        <div class="section-title">💬 하고 싶은 것을 입력하세요</div>
        <div class="text-search">
          <input type="text" id="searchInput" placeholder="예: 교실 공기가 탁한지 알고 싶어요" onkeypress="handleKeyPress(event)">
          <button class="search-btn" onclick="searchByText()">검색</button>
        </div>
        <div class="keyword-hints">
          <span class="hint-tag" onclick="setSearchText('얼마나 걸었는지 알고 싶어요')">🚶 걸음</span>
          <span class="hint-tag" onclick="setSearchText('교실 공기가 탁한지 알고 싶어요')">🌬️ 공기질</span>
          <span class="hint-tag" onclick="setSearchText('사과가 익었는지 알고 싶어요')">🍎 색깔</span>
          <span class="hint-tag" onclick="setSearchText('방이 충분히 밝은지 알고 싶어요')">💡 밝기</span>
          <span class="hint-tag" onclick="setSearchText('손동작으로 조작하고 싶어요')">🖐️ 제스처</span>
          <span class="hint-tag" onclick="setSearchText('온도와 습도를 기록하고 싶어요')">🌡️ 온습도</span>
          <span class="hint-tag" onclick="setSearchText('과일 피아노를 만들고 싶어요')">🎹 터치</span>
          <span class="hint-tag" onclick="setSearchText('물체까지 거리를 측정하고 싶어요')">📏 거리</span>
        </div>
      </div>
      
      <!-- 데이터 선택 검색 -->
      <div id="data-section" class="search-section">
        <div class="section-title">📊 필요한 데이터를 선택하세요 (여러 개 선택 가능)</div>
        <div class="data-grid" id="dataGrid">
          <!-- JavaScript로 생성 -->
        </div>
        <div class="selected-display" id="selectedDisplay">
          선택된 데이터: <span id="selectedList">없음</span>
        </div>
        <button class="search-btn" style="margin-top: 15px; width: 100%;" onclick="searchByData()">🔍 센서 찾기</button>
      </div>
    </div>
    
    <!-- 결과 패널 -->
    <div class="result-panel" id="resultPanel">
      <div class="result-title" id="resultTitle">🎯 추천 센서 구성</div>
      
      <div class="sensor-cards" id="sensorCards">
        <!-- JavaScript로 생성 -->
      </div>
      
      <div class="summary-box">
        <div class="summary-stats">
          <div class="stat">
            <div class="stat-number" id="totalSensors">7</div>
            <div class="stat-label">총 센서 수</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="externalCount">0</div>
            <div class="stat-label">외장 센서</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="totalData">10</div>
            <div class="stat-label">총 데이터</div>
          </div>
        </div>
        <div class="summary-note" id="summaryNote">
          내장 센서만으로 가능합니다!
        </div>
      </div>
      
      <div class="legend">
        <div class="legend-item">
          <div class="legend-color green"></div>
          <span>내장 센서 (고정)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color orange"></div>
          <span>데이터로거 (고정)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color blue"></div>
          <span>외장 센서 (추천)</span>
        </div>
      </div>
      
      <button class="reset-btn" onclick="resetSearch()">🔄 다시 검색</button>
    </div>
  </div>

  <script>
    // 센서 데이터베이스
    const sensors = {
      builtin: {
        name: '내장 센서 (6개)',
        icon: '📟',
        data: ['X축', 'Y축', 'Z축', '방위각', '온도(대략)', '밝기', '소리크기'],
        note: '마이크로비트에 기본 포함'
      },
      datalogger: {
        name: '데이터로거',
        icon: '💾',
        data: ['날짜', '시간', 'SD저장'],
        note: '데이터 기록에 필수'
      },
      external: [
        { id: 'sht40', name: 'SHT40 온습도', icon: '🌡️', data: ['정밀온도', '습도'], keywords: ['온도', '습도', '덥다', '춥다', '건조', '축축', '날씨'] },
        { id: 'bmp280', name: 'BMP280 기압', icon: '🌤️', data: ['기압', '고도'], keywords: ['기압', '날씨', '고도', '산', '비', '맑음'] },
        { id: 'oled', name: 'OLED 디스플레이', icon: '📺', data: ['화면출력'], keywords: ['화면', '표시', '보여주다', '디스플레이'] },
        { id: 'lis3dh', name: 'LIS3DHTR 가속도', icon: '📐', data: ['정밀X', '정밀Y', '정밀Z'], keywords: ['걷다', '걸음', '만보기', '운동', '흔들림', '정밀', '가속도'] },
        { id: 'tcs34725', name: 'TCS34725 컬러', icon: '🎨', data: ['R값', 'G값', 'B값', '색상밝기'], keywords: ['색깔', '색상', '빨강', '파랑', '초록', '익다', '분류'] },
        { id: 'tsl2561', name: 'TSL2561 조도', icon: '☀️', data: ['럭스'], keywords: ['밝기', '어둡다', '밝다', '조도', '럭스', '빛'] },
        { id: 'sgp30', name: 'SGP30 공기질', icon: '🌬️', data: ['CO2', 'TVOC'], keywords: ['공기', '환기', '탁하다', 'CO2', '이산화탄소', '냄새'] },
        { id: 'vl53l0x', name: 'VL53L0X 거리', icon: '📏', data: ['거리mm'], keywords: ['거리', '가깝다', '멀다', '측정', '레이저'] },
        { id: 'mpr121', name: 'MPR121 터치', icon: '✋', data: ['12채널터치'], keywords: ['터치', '피아노', '과일', '누르다', '버튼'] },
        { id: 'paj7620', name: 'PAJ7620 제스처', icon: '🖐️', data: ['제스처'], keywords: ['손동작', '제스처', '손', '흔들기', '조작'] },
      ]
    };
    
    // 내장 센서 키워드 매핑
    const builtinKeywords = {
      '가속도': ['걷다', '걸음', '운동', '흔들림', '기울기'],
      '나침반': ['방향', '북쪽', '나침반', '동서남북'],
      '온도': ['온도', '덥다', '춥다'],
      '빛': ['밝기', '어둡다', '밝다'],
      '마이크': ['소리', '박수', '시끄럽다', '조용'],
      '터치': ['터치', '누르다']
    };
    
    let selectedData = [];
    
    // 초기화
    function init() {
      renderDataGrid();
    }
    
    // 탭 전환
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.search-section').forEach(sec => sec.classList.remove('active'));
      
      if (tab === 'text') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('text-section').classList.add('active');
      } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('data-section').classList.add('active');
      }
    }
    
    // 데이터 그리드 렌더링
    function renderDataGrid() {
      const grid = document.getElementById('dataGrid');
      
      // 모든 데이터 항목
      const allData = [
        // 내장
        { name: '가속도 (X,Y,Z)', icon: '📐', source: '내장', builtin: true, keywords: ['걷다', '걸음', '운동'] },
        { name: '방위각', icon: '🧭', source: '내장', builtin: true, keywords: ['방향', '북쪽'] },
        { name: '온도 (대략)', icon: '🌡️', source: '내장', builtin: true, keywords: ['온도'] },
        { name: '밝기 (대략)', icon: '💡', source: '내장', builtin: true, keywords: ['밝기'] },
        { name: '소리크기', icon: '🎤', source: '내장', builtin: true, keywords: ['소리', '박수'] },
        // 외장
        { name: '정밀 온도', icon: '🌡️', source: 'SHT40', sensor: 'sht40' },
        { name: '습도', icon: '💧', source: 'SHT40', sensor: 'sht40' },
        { name: '기압', icon: '🌤️', source: 'BMP280', sensor: 'bmp280' },
        { name: '고도', icon: '⛰️', source: 'BMP280', sensor: 'bmp280' },
        { name: 'RGB 색상', icon: '🎨', source: 'TCS34725', sensor: 'tcs34725' },
        { name: '정밀 밝기(럭스)', icon: '☀️', source: 'TSL2561', sensor: 'tsl2561' },
        { name: 'CO2 농도', icon: '🌬️', source: 'SGP30', sensor: 'sgp30' },
        { name: '공기질(TVOC)', icon: '💨', source: 'SGP30', sensor: 'sgp30' },
        { name: '정밀 거리', icon: '📏', source: 'VL53L0X', sensor: 'vl53l0x' },
        { name: '12채널 터치', icon: '✋', source: 'MPR121', sensor: 'mpr121' },
        { name: '제스처 인식', icon: '🖐️', source: 'PAJ7620', sensor: 'paj7620' },
        { name: '화면 표시', icon: '📺', source: 'OLED', sensor: 'oled' },
      ];
      
      grid.innerHTML = allData.map((item, idx) => `
        <div class="data-item ${item.builtin ? 'builtin' : ''}" data-idx="${idx}" onclick="toggleData(${idx}, '${item.name}', '${item.sensor || ''}')">
          <div class="data-item-icon">${item.icon}</div>
          <div class="data-item-name">${item.name}</div>
          <div class="data-item-source">${item.source}</div>
        </div>
      `).join('');
    }
    
    // 데이터 선택 토글
    function toggleData(idx, name, sensor) {
      const item = document.querySelector(`.data-item[data-idx="${idx}"]`);
      
      if (item.classList.contains('selected')) {
        item.classList.remove('selected');
        selectedData = selectedData.filter(d => d.name !== name);
      } else {
        item.classList.add('selected');
        selectedData.push({ name, sensor });
      }
      
      // 선택 표시 업데이트
      const list = document.getElementById('selectedList');
      if (selectedData.length === 0) {
        list.textContent = '없음';
      } else {
        list.textContent = selectedData.map(d => d.name).join(', ');
      }
    }
    
    // 텍스트 검색어 설정
    function setSearchText(text) {
      document.getElementById('searchInput').value = text;
      searchByText();
    }
    
    // 엔터키 처리
    function handleKeyPress(e) {
      if (e.key === 'Enter') {
        searchByText();
      }
    }
    
    // 텍스트로 검색
    function searchByText() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      if (!query.trim()) return;
      
      const recommendedSensors = [];
      const matchedData = [];
      
      // 외장 센서 키워드 매칭
      sensors.external.forEach(sensor => {
        const matched = sensor.keywords.some(kw => query.includes(kw));
        if (matched) {
          recommendedSensors.push(sensor);
          matchedData.push(...sensor.data);
        }
      });
      
      // 내장 센서로 가능한지 체크
      let builtinSufficient = false;
      const builtinMatches = [];
      
      Object.entries(builtinKeywords).forEach(([sensor, keywords]) => {
        if (keywords.some(kw => query.includes(kw))) {
          builtinMatches.push(sensor);
        }
      });
      
      // 내장으로만 가능하고 외장 추천이 없으면
      if (builtinMatches.length > 0 && recommendedSensors.length === 0) {
        builtinSufficient = true;
      }
      
      // 기록/저장 관련 키워드
      const needsLogging = ['기록', '저장', '분석', '모니터링', '관찰'].some(kw => query.includes(kw));
      
      // 화면 표시 필요 여부
      const needsDisplay = ['표시', '보여', '화면', '실시간'].some(kw => query.includes(kw));
      if (needsDisplay && !recommendedSensors.find(s => s.id === 'oled')) {
        const oled = sensors.external.find(s => s.id === 'oled');
        recommendedSensors.push(oled);
      }
      
      showResults(recommendedSensors, matchedData, builtinSufficient, query);
    }
    
    // 데이터로 검색
    function searchByData() {
      if (selectedData.length === 0) return;
      
      const recommendedSensors = [];
      const matchedData = selectedData.map(d => d.name);
      
      // 선택된 센서 찾기
      const sensorIds = [...new Set(selectedData.filter(d => d.sensor).map(d => d.sensor))];
      
      sensorIds.forEach(id => {
        const sensor = sensors.external.find(s => s.id === id);
        if (sensor) {
          recommendedSensors.push(sensor);
        }
      });
      
      // 내장만 선택된 경우
      const builtinSufficient = sensorIds.length === 0 && selectedData.some(d => !d.sensor);
      
      showResults(recommendedSensors, matchedData, builtinSufficient, '선택한 데이터');
    }
    
    // 결과 표시
    function showResults(recommendedSensors, matchedData, builtinSufficient, query) {
      const panel = document.getElementById('resultPanel');
      const cards = document.getElementById('sensorCards');
      
      let html = '';
      
      // 내장 센서 카드
      html += `
        <div class="sensor-card builtin essential">
          <div class="sensor-card-header">
            <div class="sensor-card-icon">${sensors.builtin.icon}</div>
            <div class="sensor-card-title">${sensors.builtin.name}</div>
            <span class="sensor-card-badge badge-required">필수</span>
          </div>
          <div class="sensor-card-data">
            ${sensors.builtin.data.map(d => `<span class="data-tag ${matchedData.includes(d) || builtinSufficient ? 'matched' : ''}">${d}</span>`).join('')}
          </div>
          <div class="sensor-card-note">${sensors.builtin.note}</div>
        </div>
      `;
      
      // 데이터로거 카드
      html += `
        <div class="sensor-card datalogger essential">
          <div class="sensor-card-header">
            <div class="sensor-card-icon">${sensors.datalogger.icon}</div>
            <div class="sensor-card-title">${sensors.datalogger.name}</div>
            <span class="sensor-card-badge badge-required">필수</span>
          </div>
          <div class="sensor-card-data">
            ${sensors.datalogger.data.map(d => `<span class="data-tag">${d}</span>`).join('')}
          </div>
          <div class="sensor-card-note">${sensors.datalogger.note}</div>
        </div>
      `;
      
      // 추천 외장 센서 카드
      recommendedSensors.forEach(sensor => {
        html += `
          <div class="sensor-card external">
            <div class="sensor-card-header">
              <div class="sensor-card-icon">${sensor.icon}</div>
              <div class="sensor-card-title">${sensor.name}</div>
              <span class="sensor-card-badge badge-recommended">추천</span>
            </div>
            <div class="sensor-card-data">
              ${sensor.data.map(d => `<span class="data-tag matched">${d}</span>`).join('')}
            </div>
          </div>
        `;
      });
      
      cards.innerHTML = html;
      
      // 통계 업데이트
      const externalCount = recommendedSensors.length;
      const totalSensors = 7 + externalCount; // 내장6 + 로거1 + 외장
      const externalDataCount = recommendedSensors.reduce((sum, s) => sum + s.data.length, 0);
      const totalData = 10 + externalDataCount; // 기본10 + 외장
      
      document.getElementById('totalSensors').textContent = totalSensors;
      document.getElementById('externalCount').textContent = externalCount;
      document.getElementById('totalData').textContent = totalData;
      
      // 요약 메시지
      let note = '';
      if (externalCount === 0) {
        note = '✅ 내장 센서만으로 가능합니다!';
      } else if (externalCount <= 2) {
        note = `✅ 외장 센서 ${externalCount}개만 추가하면 됩니다!`;
      } else {
        note = `📦 외장 센서 ${externalCount}개가 필요합니다.`;
      }
      document.getElementById('summaryNote').textContent = note;
      
      // 결과 제목
      document.getElementById('resultTitle').textContent = `🎯 "${query}" 추천 센서 구성`;
      
      // 결과 패널 표시
      panel.classList.add('show');
      panel.scrollIntoView({ behavior: 'smooth' });
    }
    
    // 검색 리셋
    function resetSearch() {
      document.getElementById('resultPanel').classList.remove('show');
      document.getElementById('searchInput').value = '';
      selectedData = [];
      document.querySelectorAll('.data-item').forEach(item => item.classList.remove('selected'));
      document.getElementById('selectedList').textContent = '없음';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // 초기화 실행
    init();
  </script>
</body>
</html>
