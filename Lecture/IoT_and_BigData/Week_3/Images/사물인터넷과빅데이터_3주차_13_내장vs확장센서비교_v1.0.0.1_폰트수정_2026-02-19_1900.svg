<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Noto Sans CJK KR', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="400" rx="16" fill="#FAFAFA"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">⚖️ 내장 센서 vs Grove 확장 센서 비교</text>

  <!-- 좌측: 내장 센서 -->
  <rect x="15" y="45" width="375" height="300" rx="14" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="15" y="45" width="375" height="36" rx="14" fill="#1976D2"/>
  <rect x="15" y="65" width="375" height="16" fill="#1976D2"/>
  <text x="202" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🔧 내장 센서 (5종) — 추가 비용 없음</text>

  <!-- 내장 센서 테이블 -->
  <text x="35" y="105" font-size="12" fill="#555">🌡️ 온도</text>
  <text x="150" y="105" font-size="11" fill="#888">0~50℃ (상대값)</text>
  <text x="300" y="105" font-size="10" fill="#E65100">⚠️ CPU 영향</text>

  <line x1="30" y1="113" x2="375" y2="113" stroke="#BBDEFB" stroke-width="0.5"/>

  <text x="35" y="131" font-size="12" fill="#555">💡 빛 센서</text>
  <text x="150" y="131" font-size="11" fill="#888">0~255 (상대값)</text>
  <text x="300" y="131" font-size="10" fill="#999">LED 매트릭스</text>

  <line x1="30" y1="139" x2="375" y2="139" stroke="#BBDEFB" stroke-width="0.5"/>

  <text x="35" y="157" font-size="12" fill="#555">🔊 마이크</text>
  <text x="150" y="157" font-size="11" fill="#888">0~255 (상대값)</text>
  <text x="300" y="157" font-size="10" fill="#1976D2">V2 전용</text>

  <line x1="30" y1="165" x2="375" y2="165" stroke="#BBDEFB" stroke-width="0.5"/>

  <text x="35" y="183" font-size="12" fill="#555">📐 가속도계</text>
  <text x="150" y="183" font-size="11" fill="#888">±2g (3축)</text>
  <text x="300" y="183" font-size="10" fill="#999">중간 정밀도</text>

  <line x1="30" y1="191" x2="375" y2="191" stroke="#BBDEFB" stroke-width="0.5"/>

  <text x="35" y="209" font-size="12" fill="#555">🧭 나침반</text>
  <text x="150" y="209" font-size="11" fill="#888">0~360° (방위각)</text>
  <text x="300" y="209" font-size="10" fill="#999">중간 정밀도</text>

  <!-- 내장 장단점 -->
  <line x1="30" y1="225" x2="375" y2="225" stroke="#1976D2" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="35" y="245" font-size="11" fill="#388E3C">✅ 추가 비용 없음</text>
  <text x="35" y="263" font-size="11" fill="#388E3C">✅ 연결 작업 불필요</text>
  <text x="35" y="281" font-size="11" fill="#E53935">❌ 정밀도 낮음 (상대값)</text>
  <text x="35" y="299" font-size="11" fill="#E53935">❌ 측정 항목 제한적</text>
  <text x="35" y="325" font-size="12" font-weight="bold" fill="#1565C0">난이도: ⭐</text>

  <!-- 우측: 확장 센서 -->
  <rect x="410" y="45" width="375" height="300" rx="14" fill="#E0F2F1" stroke="#00897B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="45" width="375" height="36" rx="14" fill="#00897B"/>
  <rect x="410" y="65" width="375" height="16" fill="#00897B"/>
  <text x="597" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🔌 Grove 확장 센서 (5종) — I2C 연결</text>

  <!-- 확장 센서 테이블 -->
  <text x="430" y="105" font-size="12" fill="#555">🌡️ SHT40</text>
  <text x="545" y="105" font-size="11" fill="#888">±0.2℃, ±1.8%</text>
  <rect x="690" y="93" width="50" height="16" rx="8" fill="#00897B"/>
  <text x="715" y="105" text-anchor="middle" font-size="9" fill="white">0x44</text>

  <line x1="425" y1="113" x2="770" y2="113" stroke="#B2DFDB" stroke-width="0.5"/>

  <text x="430" y="131" font-size="12" fill="#555">🌫️ SGP30</text>
  <text x="545" y="131" font-size="11" fill="#888">CO₂, TVOC</text>
  <rect x="690" y="119" width="50" height="16" rx="8" fill="#00897B"/>
  <text x="715" y="131" text-anchor="middle" font-size="9" fill="white">0x58</text>

  <line x1="425" y1="139" x2="770" y2="139" stroke="#B2DFDB" stroke-width="0.5"/>

  <text x="430" y="157" font-size="12" fill="#555">📏 VL53L0X</text>
  <text x="545" y="157" font-size="11" fill="#888">30~2,000mm</text>
  <rect x="690" y="145" width="50" height="16" rx="8" fill="#00897B"/>
  <text x="715" y="157" text-anchor="middle" font-size="9" fill="white">0x29</text>

  <line x1="425" y1="165" x2="770" y2="165" stroke="#B2DFDB" stroke-width="0.5"/>

  <text x="430" y="183" font-size="12" fill="#555">☀️ TSL2561</text>
  <text x="545" y="183" font-size="11" fill="#888">0.1~40,000 lux</text>
  <rect x="690" y="171" width="50" height="16" rx="8" fill="#00897B"/>
  <text x="715" y="183" text-anchor="middle" font-size="9" fill="white">0x39</text>

  <line x1="425" y1="191" x2="770" y2="191" stroke="#B2DFDB" stroke-width="0.5"/>

  <text x="430" y="209" font-size="12" fill="#555">🌤️ BMP280</text>
  <text x="545" y="209" font-size="11" fill="#888">300~1,100 hPa</text>
  <rect x="690" y="197" width="50" height="16" rx="8" fill="#00897B"/>
  <text x="715" y="209" text-anchor="middle" font-size="9" fill="white">0x76</text>

  <!-- 확장 장단점 -->
  <line x1="425" y1="225" x2="770" y2="225" stroke="#00897B" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="430" y="245" font-size="11" fill="#388E3C">✅ 높은 정밀도 (절대값)</text>
  <text x="430" y="263" font-size="11" fill="#388E3C">✅ 다양한 측정 항목</text>
  <text x="430" y="281" font-size="11" fill="#E53935">❌ 추가 부품·비용 필요</text>
  <text x="430" y="299" font-size="11" fill="#E53935">❌ 쉴드+케이블 연결 필요</text>
  <text x="430" y="325" font-size="12" font-weight="bold" fill="#00695C">난이도: ⭐⭐ ~ ⭐⭐⭐</text>

  <!-- VS 마크 -->
  <circle cx="400" cy="195" r="22" fill="white" stroke="#BDBDBD" stroke-width="2"/>
  <text x="400" y="201" text-anchor="middle" font-size="14" font-weight="bold" fill="#F57F17">VS</text>

  <!-- 하단 안내 -->
  <rect x="120" y="360" width="560" height="28" rx="14" fill="#FFF8E1" stroke="#FFD54F" stroke-width="1"/>
  <text x="400" y="379" text-anchor="middle" font-size="11" font-weight="bold" fill="#F57F17">💡 원칙: 내장 센서로 충분하면 내장을 선택! 정밀도가 필요할 때만 Grove 확장</text>
</svg>
