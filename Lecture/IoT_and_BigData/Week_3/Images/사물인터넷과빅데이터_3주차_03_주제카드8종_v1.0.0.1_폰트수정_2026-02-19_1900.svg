<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Noto Sans CJK KR', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="420" rx="16" fill="#FAFAFA"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">🎯 프로젝트 주제 예시 카드 (8종)</text>

  <!-- Row 1 -->
  <!-- 카드 1: 교실 쾌적도 -->
  <rect x="15" y="50" width="185" height="160" rx="12" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="107" y="78" text-anchor="middle" font-size="28">🌡️</text>
  <text x="107" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">교실 쾌적도 측정</text>
  <rect x="35" y="110" width="52" height="18" rx="9" fill="#1976D2"/>
  <text x="61" y="123" text-anchor="middle" font-size="9" fill="white">SHT40</text>
  <rect x="92" y="110" width="52" height="18" rx="9" fill="#00897B"/>
  <text x="118" y="123" text-anchor="middle" font-size="9" fill="white">SGP30</text>
  <text x="107" y="150" text-anchor="middle" font-size="11" fill="#555">"언제 가장 쾌적할까?"</text>
  <text x="35" y="175" font-size="12" fill="#FFA000">⭐⭐</text>
  <rect x="105" y="164" width="72" height="18" rx="9" fill="#E8F5E9"/>
  <text x="141" y="177" text-anchor="middle" font-size="9" fill="#388E3C">과학-날씨</text>

  <!-- 카드 2: 복도 소음 -->
  <rect x="210" y="50" width="185" height="160" rx="12" fill="#FFF8E1" stroke="#FFE082" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="302" y="78" text-anchor="middle" font-size="28">🔊</text>
  <text x="302" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#F57F17">복도 소음 패턴</text>
  <rect x="250" y="110" width="65" height="18" rx="9" fill="#795548"/>
  <text x="282" y="123" text-anchor="middle" font-size="9" fill="white">내장 마이크</text>
  <text x="302" y="150" text-anchor="middle" font-size="11" fill="#555">"소음이 얼마나 클까?"</text>
  <text x="230" y="175" font-size="12" fill="#FFA000">⭐</text>
  <rect x="290" y="164" width="72" height="18" rx="9" fill="#FFF3E0"/>
  <text x="326" y="177" text-anchor="middle" font-size="9" fill="#E65100">생활-소음</text>

  <!-- 카드 3: 급식실 대기 -->
  <rect x="405" y="50" width="185" height="160" rx="12" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="497" y="78" text-anchor="middle" font-size="28">🍽️</text>
  <text x="497" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#C2185B">급식실 대기 환경</text>
  <rect x="430" y="110" width="55" height="18" rx="9" fill="#7B1FA2"/>
  <text x="457" y="123" text-anchor="middle" font-size="9" fill="white">VL53L0X</text>
  <rect x="490" y="110" width="52" height="18" rx="9" fill="#1976D2"/>
  <text x="516" y="123" text-anchor="middle" font-size="9" fill="white">SHT40</text>
  <text x="497" y="150" text-anchor="middle" font-size="11" fill="#555">"온도는 어떻게 변할까?"</text>
  <text x="425" y="175" font-size="12" fill="#FFA000">⭐⭐</text>
  <rect x="490" y="164" width="72" height="18" rx="9" fill="#F3E5F5"/>
  <text x="526" y="177" text-anchor="middle" font-size="9" fill="#7B1FA2">수학-측정</text>

  <!-- 카드 4: 운동장 환경 -->
  <rect x="600" y="50" width="185" height="160" rx="12" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="692" y="78" text-anchor="middle" font-size="28">☀️</text>
  <text x="692" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">운동장 활동 환경</text>
  <rect x="625" y="110" width="52" height="18" rx="9" fill="#1976D2"/>
  <text x="651" y="123" text-anchor="middle" font-size="9" fill="white">SHT40</text>
  <rect x="682" y="110" width="58" height="18" rx="9" fill="#E91E63"/>
  <text x="711" y="123" text-anchor="middle" font-size="9" fill="white">TSL2561</text>
  <text x="692" y="150" text-anchor="middle" font-size="11" fill="#555">"좋은 날씨 조건은?"</text>
  <text x="620" y="175" font-size="12" fill="#FFA000">⭐⭐</text>
  <rect x="685" y="164" width="72" height="18" rx="9" fill="#E8F5E9"/>
  <text x="721" y="177" text-anchor="middle" font-size="9" fill="#388E3C">체육-안전</text>

  <!-- Row 2 -->
  <!-- 카드 5: 도서관 -->
  <rect x="15" y="230" width="185" height="160" rx="12" fill="#EDE7F6" stroke="#CE93D8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="107" y="258" text-anchor="middle" font-size="28">📚</text>
  <text x="107" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">도서관 조용함</text>
  <rect x="35" y="290" width="65" height="18" rx="9" fill="#795548"/>
  <text x="67" y="303" text-anchor="middle" font-size="9" fill="white">내장 마이크</text>
  <rect x="105" y="290" width="65" height="18" rx="9" fill="#795548"/>
  <text x="137" y="303" text-anchor="middle" font-size="9" fill="white">내장 빛센서</text>
  <text x="107" y="330" text-anchor="middle" font-size="11" fill="#555">"가장 집중하기 좋은?"</text>
  <text x="35" y="355" font-size="12" fill="#FFA000">⭐</text>
  <rect x="105" y="344" width="72" height="18" rx="9" fill="#EDE7F6"/>
  <text x="141" y="357" text-anchor="middle" font-size="9" fill="#6A1B9A">국어-독서</text>

  <!-- 카드 6: 화장실 -->
  <rect x="210" y="230" width="185" height="160" rx="12" fill="#E0F7FA" stroke="#80DEEA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="302" y="258" text-anchor="middle" font-size="28">🚻</text>
  <text x="302" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">화장실 사용 패턴</text>
  <rect x="252" y="290" width="55" height="18" rx="9" fill="#7B1FA2"/>
  <text x="279" y="303" text-anchor="middle" font-size="9" fill="white">VL53L0X</text>
  <text x="302" y="330" text-anchor="middle" font-size="11" fill="#555">"사용 빈도 변화는?"</text>
  <text x="230" y="355" font-size="12" fill="#FFA000">⭐⭐</text>
  <rect x="290" y="344" width="72" height="18" rx="9" fill="#E0F7FA"/>
  <text x="326" y="357" text-anchor="middle" font-size="9" fill="#00695C">수학-통계</text>

  <!-- 카드 7: 환기 -->
  <rect x="405" y="230" width="185" height="160" rx="12" fill="#E0F2F1" stroke="#80CBC4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="497" y="258" text-anchor="middle" font-size="28">🌬️</text>
  <text x="497" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">교실 환기 알림</text>
  <rect x="430" y="290" width="52" height="18" rx="9" fill="#00897B"/>
  <text x="456" y="303" text-anchor="middle" font-size="9" fill="white">SGP30</text>
  <rect x="487" y="290" width="52" height="18" rx="9" fill="#1976D2"/>
  <text x="513" y="303" text-anchor="middle" font-size="9" fill="white">SHT40</text>
  <text x="497" y="330" text-anchor="middle" font-size="11" fill="#555">"언제 창문을 열까?"</text>
  <text x="425" y="355" font-size="12" fill="#FFA000">⭐⭐⭐</text>
  <rect x="490" y="344" width="80" height="18" rx="9" fill="#E0F2F1"/>
  <text x="530" y="357" text-anchor="middle" font-size="9" fill="#00695C">과학/보건</text>

  <!-- 카드 8: 자연광 -->
  <rect x="600" y="230" width="185" height="160" rx="12" fill="#FFFDE7" stroke="#FFF176" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="692" y="258" text-anchor="middle" font-size="28">💡</text>
  <text x="692" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#F57F17">자연광 변화 관찰</text>
  <rect x="650" y="290" width="58" height="18" rx="9" fill="#E91E63"/>
  <text x="679" y="303" text-anchor="middle" font-size="9" fill="white">TSL2561</text>
  <text x="692" y="330" text-anchor="middle" font-size="11" fill="#555">"밝기가 어떻게 변할까?"</text>
  <text x="620" y="355" font-size="12" fill="#FFA000">⭐</text>
  <rect x="685" y="344" width="80" height="18" rx="9" fill="#FFFDE7"/>
  <text x="725" y="357" text-anchor="middle" font-size="9" fill="#F57F17">과학-빛</text>

  <!-- 하단 안내 -->
  <text x="400" y="410" text-anchor="middle" font-size="11" fill="#999">💡 예시에서 골라도 되고, 변형하거나 새로운 주제를 만들어도 됩니다</text>
</svg>
