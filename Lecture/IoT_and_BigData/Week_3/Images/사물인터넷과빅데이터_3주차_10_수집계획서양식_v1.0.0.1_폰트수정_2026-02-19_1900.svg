<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" font-family="'Noto Sans CJK KR', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="600" height="540" rx="16" fill="#FAFAFA"/>

  <!-- 헤더 -->
  <rect x="20" y="15" width="560" height="50" rx="12" fill="#1976D2" filter="url(#shadow)"/>
  <text x="300" y="46" text-anchor="middle" font-size="18" font-weight="bold" fill="white">📋 데이터 수집 계획서</text>

  <!-- 이름/학번 행 -->
  <rect x="20" y="75" width="270" height="32" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="35" y="96" font-size="12" font-weight="bold" fill="#555">이름:</text>
  <line x1="75" y1="96" x2="270" y2="96" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="310" y="75" width="270" height="32" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="325" y="96" font-size="12" font-weight="bold" fill="#555">학번:</text>
  <line x1="365" y1="96" x2="560" y2="96" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 항목 1: 프로젝트 제목 -->
  <circle cx="38" cy="128" r="12" fill="#1976D2"/>
  <text x="38" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1</text>
  <text x="58" y="133" font-size="12" font-weight="bold" fill="#333">프로젝트 제목</text>
  <rect x="20" y="140" width="560" height="30" rx="6" fill="white" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 항목 2: 연구 질문 -->
  <circle cx="38" cy="192" r="12" fill="#1976D2"/>
  <text x="38" y="197" text-anchor="middle" font-size="11" font-weight="bold" fill="white">2</text>
  <text x="58" y="197" font-size="12" font-weight="bold" fill="#333">연구 질문</text>
  <text x="155" y="197" font-size="10" fill="#999">("~할까?", "~일까?" 형태로 작성)</text>
  <rect x="20" y="204" width="560" height="30" rx="6" fill="white" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 항목 3+4: 측정 항목 + 사용 센서 -->
  <circle cx="38" cy="256" r="12" fill="#1976D2"/>
  <text x="38" y="261" text-anchor="middle" font-size="11" font-weight="bold" fill="white">3</text>
  <text x="58" y="261" font-size="12" font-weight="bold" fill="#333">측정 항목</text>
  <rect x="20" y="268" width="260" height="30" rx="6" fill="white" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="4,2"/>

  <circle cx="328" cy="256" r="12" fill="#388E3C"/>
  <text x="328" y="261" text-anchor="middle" font-size="11" font-weight="bold" fill="white">4</text>
  <text x="348" y="261" font-size="12" font-weight="bold" fill="#333">사용 센서</text>
  <rect x="310" y="268" width="270" height="30" rx="6" fill="white" stroke="#A5D6A7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="325" y="288" font-size="10" fill="#999">□ 내장:          □ Grove:</text>

  <!-- 항목 5+6: 수집 장소 + 수집 간격 -->
  <circle cx="38" cy="320" r="12" fill="#1976D2"/>
  <text x="38" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="white">5</text>
  <text x="58" y="325" font-size="12" font-weight="bold" fill="#333">수집 장소</text>
  <rect x="20" y="332" width="260" height="30" rx="6" fill="white" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="4,2"/>

  <circle cx="328" cy="320" r="12" fill="#FFA000"/>
  <text x="328" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="white">6</text>
  <text x="348" y="325" font-size="12" font-weight="bold" fill="#333">수집 간격</text>
  <rect x="310" y="332" width="270" height="30" rx="6" fill="white" stroke="#FFD54F" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="325" y="352" font-size="10" fill="#999">___초 / ___분 마다</text>

  <!-- 항목 7+8: 수집 기간 + 예상 데이터 양 -->
  <circle cx="38" cy="384" r="12" fill="#FFA000"/>
  <text x="38" y="389" text-anchor="middle" font-size="11" font-weight="bold" fill="white">7</text>
  <text x="58" y="389" font-size="12" font-weight="bold" fill="#333">수집 기간</text>
  <rect x="20" y="396" width="260" height="30" rx="6" fill="white" stroke="#FFD54F" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="35" y="416" font-size="10" fill="#999">___일 × 하루 ___시간</text>

  <circle cx="328" cy="384" r="12" fill="#E91E63"/>
  <text x="328" y="389" text-anchor="middle" font-size="11" font-weight="bold" fill="white">8</text>
  <text x="348" y="389" font-size="12" font-weight="bold" fill="#333">예상 데이터 양</text>
  <rect x="310" y="396" width="270" height="30" rx="6" fill="white" stroke="#F48FB1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="325" y="416" font-size="10" fill="#999">간격×시간×일수 = ___개</text>

  <!-- 항목 9: 예상 결과 -->
  <circle cx="38" cy="448" r="12" fill="#7B1FA2"/>
  <text x="38" y="453" text-anchor="middle" font-size="11" font-weight="bold" fill="white">9</text>
  <text x="58" y="453" font-size="12" font-weight="bold" fill="#333">예상 결과 (가설)</text>
  <rect x="20" y="460" width="560" height="30" rx="6" fill="white" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 항목 10: 주의 사항 -->
  <circle cx="38" cy="510" r="12" fill="#78909C"/>
  <text x="38" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="white">10</text>
  <text x="58" y="515" font-size="12" font-weight="bold" fill="#333">주의할 점</text>
  <rect x="20" y="522" width="560" height="10" rx="5" fill="white" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4,2"/>
</svg>
