<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" font-family="Noto Sans CJK KR">
  <rect width="760" height="250" fill="white" rx="4"/>

  <!-- 등간격: box=110, gap=12, margin=15 → x: 15, 137, 259, 381, 503, 625 -->

  <!-- 도입 -->
  <rect x="15" y="30" width="110" height="70" rx="8" fill="#3498db"/>
  <text x="70" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">도입</text>
  <text x="70" y="75" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">10분</text>
  <rect x="15" y="105" width="110" height="60" rx="0 0 8 8" fill="#e8f4fc" stroke="#3498db" stroke-width="1.5"/>
  <text x="70" y="126" text-anchor="middle" fill="#2c3e50" font-size="10">micro:bit 소개</text>
  <text x="70" y="142" text-anchor="middle" fill="#2c3e50" font-size="10">동기 유발</text>
  <text x="70" y="158" text-anchor="middle" fill="#7f8c8d" font-size="9">실물/영상 시연</text>

  <!-- 화살표 1 (125→137, 중앙 131) -->
  <line x1="126" y1="65" x2="136" y2="65" stroke="#bdc3c7" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 시연 -->
  <rect x="137" y="30" width="110" height="70" rx="8" fill="#2ecc71"/>
  <text x="192" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">시연</text>
  <text x="192" y="75" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">10분</text>
  <rect x="137" y="105" width="110" height="60" rx="0 0 8 8" fill="#eafaf1" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="192" y="126" text-anchor="middle" fill="#2c3e50" font-size="10">"Hello!" 표시</text>
  <text x="192" y="142" text-anchor="middle" fill="#2c3e50" font-size="10">단계별 시연</text>
  <text x="192" y="158" text-anchor="middle" fill="#7f8c8d" font-size="9">화면 공유</text>

  <line x1="248" y1="65" x2="258" y2="65" stroke="#bdc3c7" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 탐색 -->
  <rect x="259" y="30" width="110" height="70" rx="8" fill="#f39c12"/>
  <text x="314" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">탐색</text>
  <text x="314" y="75" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">15분</text>
  <rect x="259" y="105" width="110" height="60" rx="0 0 8 8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="314" y="126" text-anchor="middle" fill="#2c3e50" font-size="10">자율 탐색</text>
  <text x="314" y="142" text-anchor="middle" fill="#2c3e50" font-size="10">블록 드래그 체험</text>
  <text x="314" y="158" text-anchor="middle" fill="#7f8c8d" font-size="9">순회 지도</text>

  <line x1="370" y1="65" x2="380" y2="65" stroke="#bdc3c7" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 실습 -->
  <rect x="381" y="30" width="110" height="70" rx="8" fill="#e74c3c"/>
  <text x="436" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">실습</text>
  <text x="436" y="75" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">25분</text>
  <rect x="381" y="105" width="110" height="60" rx="0 0 8 8" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="436" y="126" text-anchor="middle" fill="#2c3e50" font-size="10">이름 LED 표시</text>
  <text x="436" y="142" text-anchor="middle" fill="#2c3e50" font-size="10">활동지 작성</text>
  <text x="436" y="158" text-anchor="middle" fill="#7f8c8d" font-size="9">관찰 포인트 안내</text>

  <line x1="492" y1="65" x2="502" y2="65" stroke="#bdc3c7" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 심화 -->
  <rect x="503" y="30" width="110" height="70" rx="8" fill="#9b59b6"/>
  <text x="558" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">심화</text>
  <text x="558" y="75" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">10분</text>
  <rect x="503" y="105" width="110" height="60" rx="0 0 8 8" fill="#f4ecf7" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="558" y="126" text-anchor="middle" fill="#2c3e50" font-size="10">복합 블록</text>
  <text x="558" y="142" text-anchor="middle" fill="#2c3e50" font-size="10">인사 메시지</text>
  <text x="558" y="158" text-anchor="middle" fill="#7f8c8d" font-size="9">도전 과제</text>

  <line x1="614" y1="65" x2="624" y2="65" stroke="#bdc3c7" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- 정리 -->
  <rect x="625" y="30" width="110" height="70" rx="8" fill="#7f8c8d"/>
  <text x="680" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">정리</text>
  <text x="680" y="75" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">5분</text>
  <rect x="625" y="105" width="110" height="60" rx="0 0 8 8" fill="#f2f3f4" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="680" y="126" text-anchor="middle" fill="#2c3e50" font-size="10">요약</text>
  <text x="680" y="142" text-anchor="middle" fill="#2c3e50" font-size="10">Q&amp;A</text>

  <!-- 하단 제목 -->
  <text x="380" y="195" text-anchor="middle" fill="#555" font-size="11" font-weight="bold">1주차 수업 흐름 (총 75분)</text>

  <!-- 시간 바 -->
  <rect x="15" y="210" width="720" height="12" rx="3" fill="#ecf0f1"/>
  <rect x="15" y="210" width="96" height="12" rx="3" fill="#3498db" opacity="0.7"/>
  <rect x="111" y="210" width="96" height="12" fill="#2ecc71" opacity="0.7"/>
  <rect x="207" y="210" width="144" height="12" fill="#f39c12" opacity="0.7"/>
  <rect x="351" y="210" width="240" height="12" fill="#e74c3c" opacity="0.7"/>
  <rect x="591" y="210" width="96" height="12" fill="#9b59b6" opacity="0.7"/>
  <rect x="687" y="210" width="48" height="12" rx="0 3 3 0" fill="#7f8c8d" opacity="0.7"/>

  <text x="63" y="238" text-anchor="middle" fill="#666" font-size="8">13%</text>
  <text x="159" y="238" text-anchor="middle" fill="#666" font-size="8">13%</text>
  <text x="279" y="238" text-anchor="middle" fill="#666" font-size="8">20%</text>
  <text x="471" y="238" text-anchor="middle" fill="#666" font-size="8">33%</text>
  <text x="639" y="238" text-anchor="middle" fill="#666" font-size="8">13%</text>
  <text x="711" y="238" text-anchor="middle" fill="#666" font-size="8">7%</text>

  <!-- 작은 화살표 마커 -->
  <defs>
    <marker id="ar" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#bdc3c7"/>
    </marker>
  </defs>
</svg>
