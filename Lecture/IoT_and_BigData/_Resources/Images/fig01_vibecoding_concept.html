<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브코딩 개념 비교</title>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: white;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 30px;
      max-width: 900px;
    }
    .section {
      margin-bottom: 40px;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #0066cc;
      margin-bottom: 20px;
      text-align: center;
    }
    .flow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .box {
      background: #f5f5f5;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 15px 10px;
      text-align: center;
      min-width: 100px;
      font-size: 13px;
      line-height: 1.4;
    }
    .highlight {
      background: #e8f5e9;
      border-color: #28a745;
      font-weight: bold;
    }
    .arrow {
      font-size: 24px;
      color: #0066cc;
      font-weight: bold;
    }
    .warning-arrow {
      font-size: 20px;
      color: #ff9800;
    }
    .note {
      font-size: 11px;
      color: #666;
      margin-top: 5px;
    }
    .emoji {
      font-size: 18px;
      display: block;
      margin-bottom: 5px;
    }
    .loop-arrow {
      text-align: center;
      color: #ff9800;
      font-size: 12px;
      margin: -10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 전통적 프로그래밍 -->
    <div class="section">
      <div class="title">전통적 프로그래밍</div>
      <div class="flow">
        <div class="box">
          <span class="emoji">👨‍💻</span>
          사람
        </div>
        <div class="arrow">→</div>
        <div class="box">
          <span class="emoji">📚</span>
          문법 학습
          <div class="note">시간 +++</div>
        </div>
        <div class="arrow">→</div>
        <div class="box">
          <span class="emoji">⌨️</span>
          코드 작성
        </div>
        <div class="arrow">→</div>
        <div class="box">
          <span class="emoji">🐛</span>
          디버깅
          <div class="note">난이도 ↑</div>
        </div>
        <div class="arrow">→</div>
        <div class="box highlight">
          <span class="emoji">✅</span>
          프로그램
        </div>
      </div>
      <div class="loop-arrow">
        <span class="warning-arrow">↺</span> 오류 발생 시 반복
      </div>
    </div>

    <!-- 바이브코딩 -->
    <div class="section">
      <div class="title">바이브코딩 (AI 협업)</div>
      <div class="flow">
        <div class="box">
          <span class="emoji">👨‍💻</span>
          사람
        </div>
        <div class="arrow">→</div>
        <div class="box">
          <span class="emoji">💬</span>
          문제 정의
          <div class="note">시간 +</div>
        </div>
        <div class="arrow">→</div>
        <div class="box highlight">
          <span class="emoji">🤖</span>
          AI 대화
        </div>
        <div class="arrow">→</div>
        <div class="box">
          <span class="emoji">🔍</span>
          결과 검증
          <div class="note">난이도 ↓</div>
        </div>
        <div class="arrow">→</div>
        <div class="box highlight">
          <span class="emoji">✅</span>
          프로그램
        </div>
      </div>
      <div class="loop-arrow" style="color: #28a745;">
        <span class="warning-arrow" style="color: #28a745;">↺</span> 수정 요청
      </div>
    </div>
  </div>
</body>
</html>
