<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="'Noto Sans CJK KR', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrFlow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78909C"/>
    </marker>
  </defs>

  <rect width="800" height="220" rx="16" fill="#FAFAFA"/>
  <text x="400" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">🔗 센서 선택 도구 활용 흐름</text>

  <!-- 도구 1: 검색 도구 -->
  <rect x="15" y="45" width="170" height="120" rx="12" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="72" text-anchor="middle" font-size="22">🔍</text>
  <text x="100" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">센서 검색 도구</text>
  <line x1="30" y1="102" x2="170" y2="102" stroke="#CE93D8" stroke-width="0.5"/>
  <text x="100" y="120" text-anchor="middle" font-size="11" fill="#555">키워드 입력</text>
  <text x="100" y="136" text-anchor="middle" font-size="11" fill="#555">→ 센서 추천</text>
  <rect x="35" y="145" width="130" height="16" rx="8" fill="#EDE7F6"/>
  <text x="100" y="157" text-anchor="middle" font-size="9" fill="#7B1FA2">예: "교실 환경" → SHT40</text>

  <!-- 화살표 1→2 -->
  <line x1="190" y1="105" x2="215" y2="105" stroke="#78909C" stroke-width="2" marker-end="url(#arrFlow)"/>

  <!-- 도구 2: 카탈로그 -->
  <rect x="220" y="45" width="170" height="120" rx="12" fill="#FFF8E1" stroke="#FFA000" stroke-width="2" filter="url(#shadow)"/>
  <text x="305" y="72" text-anchor="middle" font-size="22">📋</text>
  <text x="305" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">센서 조합 카탈로그</text>
  <line x1="235" y1="102" x2="375" y2="102" stroke="#FFE082" stroke-width="0.5"/>
  <text x="305" y="120" text-anchor="middle" font-size="11" fill="#555">848개 조합</text>
  <text x="305" y="136" text-anchor="middle" font-size="11" fill="#555">필터링 검색</text>
  <rect x="240" y="145" width="130" height="16" rx="8" fill="#FFF8E1"/>
  <text x="305" y="157" text-anchor="middle" font-size="9" fill="#E65100">SHT40+SGP30 → ⭐⭐</text>

  <!-- 화살표 2→3 -->
  <line x1="395" y1="105" x2="420" y2="105" stroke="#78909C" stroke-width="2" marker-end="url(#arrFlow)"/>

  <!-- 도구 3: 시뮬레이터 -->
  <rect x="425" y="45" width="170" height="120" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
  <text x="510" y="72" text-anchor="middle" font-size="22">🎮</text>
  <text x="510" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">센서 시뮬레이터</text>
  <line x1="440" y1="102" x2="580" y2="102" stroke="#90CAF9" stroke-width="0.5"/>
  <text x="510" y="120" text-anchor="middle" font-size="11" fill="#555">드래그앤드롭</text>
  <text x="510" y="136" text-anchor="middle" font-size="11" fill="#555">연결 체험</text>
  <rect x="445" y="145" width="130" height="16" rx="8" fill="#E3F2FD"/>
  <text x="510" y="157" text-anchor="middle" font-size="9" fill="#1565C0">포트에 연결 확인 ✅</text>

  <!-- 화살표 3→4 -->
  <line x1="600" y1="105" x2="625" y2="105" stroke="#78909C" stroke-width="2" marker-end="url(#arrFlow)"/>

  <!-- 도구 4: 계획서 -->
  <rect x="630" y="45" width="155" height="120" rx="12" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="707" y="72" text-anchor="middle" font-size="22">📝</text>
  <text x="707" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">수집 계획서</text>
  <line x1="645" y1="102" x2="770" y2="102" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="707" y="120" text-anchor="middle" font-size="11" fill="#555">"사용 센서"</text>
  <text x="707" y="136" text-anchor="middle" font-size="11" fill="#555">항목에 기록</text>
  <rect x="650" y="145" width="115" height="16" rx="8" fill="#E8F5E9"/>
  <text x="707" y="157" text-anchor="middle" font-size="9" fill="#388E3C">계획서 완성! 🎉</text>

  <!-- 하단 단계 라벨 -->
  <text x="100" y="190" text-anchor="middle" font-size="10" font-weight="bold" fill="#7B1FA2">STEP 1</text>
  <text x="100" y="204" text-anchor="middle" font-size="9" fill="#999">뭘 써야 할지 모를 때</text>

  <text x="305" y="190" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">STEP 2</text>
  <text x="305" y="204" text-anchor="middle" font-size="9" fill="#999">조합과 난이도 확인</text>

  <text x="510" y="190" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">STEP 3</text>
  <text x="510" y="204" text-anchor="middle" font-size="9" fill="#999">가상으로 연결 테스트</text>

  <text x="707" y="190" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">STEP 4</text>
  <text x="707" y="204" text-anchor="middle" font-size="9" fill="#999">결과를 계획서에 기록</text>
</svg>
