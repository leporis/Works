<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="'Noto Sans CJK KR', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78909C"/>
    </marker>
  </defs>

  <rect width="800" height="260" rx="16" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">📌 핵심: 센서 → 데이터 → 기준 → AI 계산 → 사람 판단</text>

  <!-- 역할 구분 바 (하단) -->
  <rect x="20" y="200" width="310" height="24" rx="4" fill="#E0F2F1"/>
  <text x="175" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#00796B">🔌 센서의 역할 (측정)</text>

  <rect x="335" y="200" width="155" height="24" rx="4" fill="#FFF8E1"/>
  <text x="412" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#F57F17">👤 사람의 역할 (기준 설정)</text>

  <rect x="495" y="200" width="130" height="24" rx="4" fill="#F3E5F5"/>
  <text x="560" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B1FA2">🤖 AI (계산)</text>

  <rect x="630" y="200" width="150" height="24" rx="4" fill="#E3F2FD"/>
  <text x="705" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">👤 사람 (판단)</text>

  <!-- 박스 1: 센서 -->
  <rect x="20" y="50" width="130" height="130" rx="12" fill="#E0F2F1" stroke="#00897B" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="75" text-anchor="middle" font-size="22">🔌</text>
  <text x="85" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">센서</text>
  <text x="85" y="118" text-anchor="middle" font-size="11" fill="#555">온도 30℃</text>
  <text x="85" y="134" text-anchor="middle" font-size="11" fill="#555">습도 65%</text>
  <text x="85" y="150" text-anchor="middle" font-size="11" fill="#555">CO₂ 800ppm</text>
  <text x="85" y="170" text-anchor="middle" font-size="10" fill="#999">(현재 상태)</text>

  <!-- 화살표 1→2 -->
  <line x1="155" y1="115" x2="175" y2="115" stroke="#78909C" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 박스 2: 데이터 -->
  <rect x="180" y="50" width="130" height="130" rx="12" fill="#E0F2F1" stroke="#00897B" stroke-width="2" filter="url(#shadow)"/>
  <text x="245" y="75" text-anchor="middle" font-size="22">📊</text>
  <text x="245" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">데이터</text>
  <text x="245" y="118" text-anchor="middle" font-size="11" fill="#555">30, 31, 29,</text>
  <text x="245" y="134" text-anchor="middle" font-size="11" fill="#555">32, 28, 30...</text>
  <text x="245" y="170" text-anchor="middle" font-size="10" fill="#999">(숫자들의 모음)</text>

  <!-- 화살표 2→3 -->
  <line x1="315" y1="115" x2="335" y2="115" stroke="#78909C" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 박스 3: 기준 -->
  <rect x="340" y="50" width="145" height="130" rx="12" fill="#FFF8E1" stroke="#FFA000" stroke-width="2" filter="url(#shadow)"/>
  <text x="412" y="75" text-anchor="middle" font-size="22">📏</text>
  <text x="412" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">기준 (사람)</text>
  <text x="412" y="118" text-anchor="middle" font-size="11" fill="#555">"28℃ 이상이면</text>
  <text x="412" y="134" text-anchor="middle" font-size="11" fill="#555">덥다"</text>
  <text x="412" y="170" text-anchor="middle" font-size="10" fill="#E65100">⭐ 사람이 정한 규칙</text>

  <!-- 화살표 3→4 -->
  <line x1="490" y1="115" x2="510" y2="115" stroke="#78909C" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 박스 4: AI 계산 -->
  <rect x="515" y="50" width="120" height="130" rx="12" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" filter="url(#shadow)"/>
  <text x="575" y="75" text-anchor="middle" font-size="22">🤖</text>
  <text x="575" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">AI 계산</text>
  <text x="575" y="118" text-anchor="middle" font-size="11" fill="#555">기준에 따라</text>
  <text x="575" y="134" text-anchor="middle" font-size="11" fill="#555">분류·계산</text>
  <text x="575" y="170" text-anchor="middle" font-size="10" fill="#6A1B9A">판단 ❌ 계산 ⭕</text>

  <!-- 화살표 4→5 -->
  <line x1="640" y1="115" x2="660" y2="115" stroke="#78909C" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 박스 5: 사람 판단 -->
  <rect x="665" y="50" width="120" height="130" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
  <text x="725" y="75" text-anchor="middle" font-size="22">👤</text>
  <text x="725" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">최종 판단</text>
  <text x="725" y="118" text-anchor="middle" font-size="11" fill="#555">"환기가</text>
  <text x="725" y="134" text-anchor="middle" font-size="11" fill="#555">필요하다"</text>
  <text x="725" y="170" text-anchor="middle" font-size="10" fill="#1565C0">⭐ 사람이 판단</text>

  <!-- 핵심 메시지 -->
  <rect x="100" y="235" width="600" height="22" rx="11" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="400" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">⚠️ AI는 집중도를 판단하지 않는다. 우리가 만든 기준을 계산할 뿐이다.</text>
</svg>
