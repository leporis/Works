<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="Noto Sans CJK KR, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="240" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">순차 실행 흐름</text>

  <!-- Block 1: 문자열 보여주기 -->
  <rect x="60" y="55" width="260" height="50" rx="8" fill="#4C97FF" stroke="#3373CC" stroke-width="1.5"/>
  <text x="80" y="77" font-size="13" fill="white" font-weight="bold">문자열 보여주기</text>
  <rect x="210" y="63" width="90" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="255" y="83" text-anchor="middle" font-size="13" fill="#333">Hi!</text>
  <!-- Step number -->
  <circle cx="45" cy="80" r="14" fill="#FF8C1A" stroke="white" stroke-width="2"/>
  <text x="45" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">1</text>
  <!-- Annotation -->
  <text x="340" y="77" font-size="11" fill="#666">← 첫 번째 실행</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="105" x2="190" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Block 2: 일시정지 -->
  <rect x="60" y="130" width="260" height="50" rx="8" fill="#4C97FF" stroke="#3373CC" stroke-width="1.5"/>
  <text x="80" y="152" font-size="13" fill="white" font-weight="bold">일시정지</text>
  <rect x="170" y="138" width="130" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="235" y="158" text-anchor="middle" font-size="13" fill="#333">1000 ms</text>
  <!-- Step number -->
  <circle cx="45" cy="155" r="14" fill="#FF8C1A" stroke="white" stroke-width="2"/>
  <text x="45" y="160" text-anchor="middle" font-size="12" fill="white" font-weight="bold">2</text>
  <!-- Annotation -->
  <text x="340" y="152" font-size="11" fill="#666">← 두 번째 실행</text>

  <!-- Arrow 2→3 -->
  <line x1="190" y1="180" x2="190" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Block 3: 아이콘 보여주기 -->
  <rect x="60" y="205" width="260" height="50" rx="8" fill="#4C97FF" stroke="#3373CC" stroke-width="1.5"/>
  <text x="80" y="227" font-size="13" fill="white" font-weight="bold">아이콘 보여주기</text>
  <rect x="210" y="213" width="90" height="30" rx="5" fill="white" opacity="0.9"/>
  <!-- Heart icon using simple shapes -->
  <text x="255" y="234" text-anchor="middle" font-size="16" fill="#E53935">♥</text>
  <!-- Step number -->
  <circle cx="45" cy="230" r="14" fill="#FF8C1A" stroke="white" stroke-width="2"/>
  <text x="45" y="235" text-anchor="middle" font-size="12" fill="white" font-weight="bold">3</text>
  <!-- Annotation -->
  <text x="340" y="227" font-size="11" fill="#666">← 세 번째 실행</text>

  <!-- Bottom note -->
  <rect x="60" y="275" width="360" height="35" rx="6" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="240" y="296" text-anchor="middle" font-size="12" fill="#E65100">반드시 1 → 2 → 3 순서로 실행. 순서를 바꾸면 결과도 바뀐다.</text>
</svg>
