<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 720" font-family="'Noto Sans CJK KR', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <!-- 단일 화살표 마커: orient="auto"로 선 방향에 자동 정렬 -->
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#AAAAAA"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="620" height="720" rx="16" fill="#F8F9FA"/>

  <!-- ========== 시작 ========== -->
  <rect x="255" y="20" width="110" height="40" rx="20" fill="#5B9BD5" filter="url(#shadow)"/>
  <text x="310" y="45" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🚀 시작</text>

  <!-- 화살표: 시작 → 분기1 -->
  <line x1="310" y1="60" x2="310" y2="88" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ========== 분기 1: 내장 센서만 충분? ========== -->
  <polygon points="310,90 435,140 310,190 185,140" fill="#E8F5E9" stroke="#81C784" stroke-width="2"/>
  <text x="310" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">내장 센서만으로</text>
  <text x="310" y="153" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">충분한가?</text>

  <!-- YES → 왼쪽: 내장 센서 조합 -->
  <line x1="185" y1="140" x2="130" y2="140" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="162" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#4CAF50">YES</text>
  <text x="162" y="155" text-anchor="middle" font-size="9" fill="#999">(왼쪽)</text>

  <rect x="10" y="113" width="115" height="55" rx="12" fill="#C8E6C9" stroke="#81C784" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="67" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">내장 센서 조합 ⭐</text>
  <text x="67" y="153" text-anchor="middle" font-size="11" fill="#555">(비용 없음)</text>

  <!-- NO → 아래 -->
  <line x1="310" y1="190" x2="310" y2="218" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="340" y="200" font-size="11" font-weight="bold" fill="#E53935">NO</text>
  <text x="340" y="215" font-size="9" fill="#999">(아래)</text>

  <!-- ========== 질문: 어떤 측정값? ========== -->
  <rect x="155" y="220" width="310" height="40" rx="10" fill="#FFF9C4" stroke="#FDD835" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#F57F17">어떤 측정값이 추가로 필요한가?</text>

  <!-- 화살표 → 센서 영역 -->
  <line x1="310" y1="260" x2="310" y2="288" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ========== 센서 5종 영역 박스 ========== -->
  <rect x="25" y="290" width="570" height="215" rx="14" fill="white" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- 센서 행1: SHT40, SGP30, VL53L0X -->
  <!-- SHT40 -->
  <rect x="40" y="305" width="165" height="80" rx="12" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="163" y="300" width="36" height="18" rx="9" fill="#66BB6A"/>
  <text x="181" y="312" text-anchor="middle" font-size="9" font-weight="bold" fill="white">I2C</text>
  <text x="122" y="335" text-anchor="middle" font-size="15" font-weight="bold" fill="#2E7D32">🌡️ SHT40</text>
  <text x="122" y="357" text-anchor="middle" font-size="12" fill="#555">정밀 온습도 (0x44)</text>

  <!-- SGP30 -->
  <rect x="225" y="305" width="165" height="80" rx="12" fill="#E0F7FA" stroke="#80DEEA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="348" y="300" width="36" height="18" rx="9" fill="#26C6DA"/>
  <text x="366" y="312" text-anchor="middle" font-size="9" font-weight="bold" fill="white">I2C</text>
  <text x="307" y="335" text-anchor="middle" font-size="15" font-weight="bold" fill="#00838F">🌫️ SGP30</text>
  <text x="307" y="357" text-anchor="middle" font-size="12" fill="#555">공기질 (0x58)</text>

  <!-- VL53L0X -->
  <rect x="410" y="305" width="165" height="80" rx="12" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="533" y="300" width="36" height="18" rx="9" fill="#AB47BC"/>
  <text x="551" y="312" text-anchor="middle" font-size="9" font-weight="bold" fill="white">I2C</text>
  <text x="492" y="335" text-anchor="middle" font-size="15" font-weight="bold" fill="#7B1FA2">📏 VL53L0X</text>
  <text x="492" y="357" text-anchor="middle" font-size="12" fill="#555">거리 (0x29)</text>

  <!-- 센서 행2: TSL2561, BMP280 -->
  <!-- TSL2561 -->
  <rect x="120" y="405" width="165" height="80" rx="12" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="243" y="400" width="36" height="18" rx="9" fill="#EC407A"/>
  <text x="261" y="412" text-anchor="middle" font-size="9" font-weight="bold" fill="white">I2C</text>
  <text x="202" y="435" text-anchor="middle" font-size="15" font-weight="bold" fill="#C2185B">☀️ TSL2561</text>
  <text x="202" y="457" text-anchor="middle" font-size="12" fill="#555">조도 (0x39*)</text>

  <!-- BMP280 -->
  <rect x="330" y="405" width="165" height="80" rx="12" fill="#FFF8E1" stroke="#FFD54F" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="453" y="400" width="36" height="18" rx="9" fill="#FFA726"/>
  <text x="471" y="412" text-anchor="middle" font-size="9" font-weight="bold" fill="white">I2C</text>
  <text x="412" y="435" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">🌤️ BMP280</text>
  <text x="412" y="457" text-anchor="middle" font-size="12" fill="#555">기압 (0x76)</text>

  <!-- ========== 화살표: 센서 영역 → 분기2 ========== -->
  <line x1="310" y1="505" x2="310" y2="538" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ========== 분기 2: I2C 주소 충돌? ========== -->
  <polygon points="310,540 430,585 310,630 190,585" fill="#FFF9C4" stroke="#FDD835" stroke-width="2"/>
  <text x="310" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#F57F17">I2C 주소</text>
  <text x="310" y="598" text-anchor="middle" font-size="12" font-weight="bold" fill="#F57F17">충돌 없는가?</text>

  <!-- YES → 왼쪽: 조합 확정 -->
  <line x1="190" y1="585" x2="125" y2="585" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="162" y="575" text-anchor="middle" font-size="11" font-weight="bold" fill="#4CAF50">YES</text>
  <text x="162" y="601" text-anchor="middle" font-size="9" fill="#999">(왼쪽)</text>

  <rect x="10" y="563" width="110" height="44" rx="22" fill="#C8E6C9" stroke="#81C784" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="65" y="590" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">✅ 조합 확정</text>

  <!-- NO → 오른쪽: 주소 변경 -->
  <line x1="430" y1="585" x2="495" y2="585" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="575" text-anchor="middle" font-size="11" font-weight="bold" fill="#E53935">NO</text>
  <text x="460" y="601" text-anchor="middle" font-size="9" fill="#999">(오른쪽)</text>

  <rect x="500" y="563" width="110" height="44" rx="12" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="555" y="581" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">주소 변경 또는</text>
  <text x="555" y="598" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">대체 센서 선택</text>

  <!-- ========== 하단 주석 배너 ========== -->
  <rect x="30" y="655" width="560" height="40" rx="10" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="310" y="673" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">❗ VL53L0X(0x29)와 TSL2561(기본 0x29) 동시 사용 시</text>
  <text x="310" y="690" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">→ TSL2561을 0x39로 변경</text>
</svg>
