<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 560" font-family="'Noto Sans CJK KR', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 다크 배경 -->
  <rect width="540" height="560" rx="16" fill="#0f0f23"/>

  <!-- 제목 -->
  <text x="270" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#00d4ff">🔌 Grove I2C 센서 연결 구성</text>
  <text x="270" y="48" text-anchor="middle" font-size="11" fill="#888">마이크로비트 V2 + Grove Shield + I2C 센서 5종</text>

  <!-- micro:bit -->
  <rect x="190" y="65" width="160" height="100" rx="12" fill="#2d2d2d" stroke="#444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="210" y="78" width="120" height="50" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <!-- LED 간략 -->
  <g fill="#FF4444">
    <circle cx="235" cy="96" r="3" opacity="0.8"/><circle cx="250" cy="96" r="3" opacity="0.3"/><circle cx="265" cy="96" r="3" opacity="0.8"/><circle cx="280" cy="96" r="3" opacity="0.3"/><circle cx="295" cy="96" r="3" opacity="0.8"/>
    <circle cx="235" cy="111" r="3" opacity="0.3"/><circle cx="250" cy="111" r="3" opacity="0.8"/><circle cx="265" cy="111" r="3" opacity="0.3"/><circle cx="280" cy="111" r="3" opacity="0.8"/><circle cx="295" cy="111" r="3" opacity="0.3"/>
  </g>
  <text x="270" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#00d4ff">micro:bit V2</text>

  <!-- 연결 화살표 -->
  <text x="270" y="180" text-anchor="middle" font-size="18" fill="#ffeb3b">⬇</text>

  <!-- Grove Shield -->
  <rect x="145" y="190" width="250" height="70" rx="12" fill="#1e5128" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="270" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#81c784">Grove Shield for micro:bit</text>
  <rect x="175" y="228" width="80" height="18" rx="4" fill="white"/>
  <text x="215" y="241" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">I2C (P19/P20)</text>
  <rect x="275" y="228" width="80" height="18" rx="4" fill="white"/>
  <text x="315" y="241" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">I2C Hub</text>

  <!-- I2C 버스 -->
  <rect x="60" y="280" width="420" height="8" rx="4" fill="url(#busGrad)"/>
  <linearGradient id="busGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#2196f3"/>
    <stop offset="100%" stop-color="#00bcd4"/>
  </linearGradient>

  <rect x="190" y="270" width="160" height="22" rx="11" fill="#0f0f23" stroke="#00bcd4" stroke-width="1"/>
  <text x="270" y="286" text-anchor="middle" font-size="10" fill="#00bcd4">I2C 버스 (공유 배선)</text>

  <text x="170" y="305" text-anchor="middle" font-size="9" fill="#2196f3">● SDA (데이터)</text>
  <text x="370" y="305" text-anchor="middle" font-size="9" fill="#00bcd4">● SCL (클럭)</text>

  <!-- 수직 연결선 -->
  <line x1="80" y1="288" x2="80" y2="330" stroke="#2196f3" stroke-width="2" opacity="0.6"/>
  <line x1="195" y1="288" x2="195" y2="330" stroke="#2196f3" stroke-width="2" opacity="0.6"/>
  <line x1="310" y1="288" x2="310" y2="330" stroke="#2196f3" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="288" x2="420" y2="330" stroke="#2196f3" stroke-width="2" opacity="0.6"/>
  <line x1="270" y1="288" x2="270" y2="418" stroke="#2196f3" stroke-width="2" opacity="0.6"/>

  <!-- 센서 카드 1: SHT40 -->
  <rect x="20" y="330" width="120" height="80" rx="10" fill="#2a2a4a" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="350" text-anchor="middle" font-size="16">🌡️</text>
  <rect x="75" y="356" width="40" height="14" rx="7" fill="#333"/>
  <text x="95" y="367" text-anchor="middle" font-size="8" fill="#aaa">0x44</text>
  <text x="80" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">SHT40</text>
  <text x="80" y="400" text-anchor="middle" font-size="9" fill="#81c784">온도 · 습도</text>

  <!-- 센서 카드 2: SGP30 -->
  <rect x="148" y="330" width="120" height="80" rx="10" fill="#2a2a4a" stroke="#00bcd4" stroke-width="2" filter="url(#shadow)"/>
  <text x="208" y="350" text-anchor="middle" font-size="16">🌫️</text>
  <rect x="203" y="356" width="40" height="14" rx="7" fill="#333"/>
  <text x="223" y="367" text-anchor="middle" font-size="8" fill="#aaa">0x58</text>
  <text x="208" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">SGP30</text>
  <text x="208" y="400" text-anchor="middle" font-size="9" fill="#80deea">CO₂ · TVOC</text>

  <!-- 센서 카드 3: VL53L0X -->
  <rect x="276" y="330" width="120" height="80" rx="10" fill="#2a2a4a" stroke="#9c27b0" stroke-width="2" filter="url(#shadow)"/>
  <text x="336" y="350" text-anchor="middle" font-size="16">📏</text>
  <rect x="331" y="356" width="40" height="14" rx="7" fill="#333"/>
  <text x="351" y="367" text-anchor="middle" font-size="8" fill="#aaa">0x29</text>
  <text x="336" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">VL53L0X</text>
  <text x="336" y="400" text-anchor="middle" font-size="9" fill="#ce93d8">거리 (mm)</text>

  <!-- 센서 카드 4: TSL2561 -->
  <rect x="404" y="330" width="120" height="80" rx="10" fill="#2a2a4a" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
  <text x="464" y="350" text-anchor="middle" font-size="16">☀️</text>
  <rect x="455" y="356" width="48" height="14" rx="7" fill="#333"/>
  <text x="479" y="367" text-anchor="middle" font-size="8" fill="#aaa">0x39*</text>
  <text x="464" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">TSL2561</text>
  <text x="464" y="400" text-anchor="middle" font-size="9" fill="#f48fb1">조도 (lux)</text>

  <!-- 센서 카드 5: BMP280 (하단 중앙) -->
  <rect x="210" y="425" width="120" height="80" rx="10" fill="#2a2a4a" stroke="#ff9800" stroke-width="2" filter="url(#shadow)"/>
  <text x="270" y="445" text-anchor="middle" font-size="16">🌤️</text>
  <rect x="265" y="451" width="40" height="14" rx="7" fill="#333"/>
  <text x="285" y="462" text-anchor="middle" font-size="8" fill="#aaa">0x76</text>
  <text x="270" y="480" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">BMP280</text>
  <text x="270" y="495" text-anchor="middle" font-size="9" fill="#ffcc80">기압 (hPa)</text>

  <!-- 하단 주석 -->
  <rect x="30" y="520" width="480" height="30" rx="8" fill="rgba(255,193,7,0.1)" stroke="none"/>
  <text x="40" y="535" font-size="9" fill="#ffc107" font-weight="bold">💡</text>
  <text x="55" y="535" font-size="9" fill="#ccc">5개 센서가 모두 같은 2개 선(SDA, SCL)을 공유합니다.</text>
  <text x="55" y="547" font-size="9" fill="#ccc">*TSL2561 기본 0x29 → VL53L0X와 동시 사용 시 0x39로 변경</text>
</svg>
