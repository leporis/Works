<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Noto Sans CJK KR', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="700" height="380" rx="16" fill="#FAFAFA"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">📊 수집 간격에 따른 하루 데이터 양 (6시간 기준)</text>

  <!-- Y축 -->
  <line x1="100" y1="50" x2="100" y2="290" stroke="#BDBDBD" stroke-width="1"/>
  <text x="90" y="295" text-anchor="end" font-size="10" fill="#999">0</text>
  <text x="90" y="255" text-anchor="end" font-size="10" fill="#999">5,000</text>
  <line x1="95" y1="251" x2="100" y2="251" stroke="#BDBDBD" stroke-width="1"/>
  <text x="90" y="215" text-anchor="end" font-size="10" fill="#999">10,000</text>
  <line x1="95" y1="211" x2="100" y2="211" stroke="#BDBDBD" stroke-width="1"/>
  <text x="90" y="175" text-anchor="end" font-size="10" fill="#999">15,000</text>
  <line x1="95" y1="171" x2="100" y2="171" stroke="#BDBDBD" stroke-width="1"/>
  <text x="90" y="135" text-anchor="end" font-size="10" fill="#999">20,000</text>
  <line x1="95" y1="131" x2="100" y2="131" stroke="#BDBDBD" stroke-width="1"/>
  <text x="50" y="170" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90,50,170)">데이터 개수</text>

  <!-- X축 -->
  <line x1="100" y1="290" x2="620" y2="290" stroke="#BDBDBD" stroke-width="1"/>
  <text x="360" y="335" text-anchor="middle" font-size="11" fill="#666">수집 간격</text>

  <!-- 한계선: ~10,000개 -->
  <line x1="100" y1="211" x2="620" y2="211" stroke="#FF6F00" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="530" y="198" width="90" height="18" rx="9" fill="#FFF3E0" stroke="#FF6F00" stroke-width="1"/>
  <text x="575" y="211" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100">⚠️ 64KB 한계</text>

  <!-- 막대 1: 1초 = 21,600 → 높이 = 21600/25000 * 240 ≈ 207 → y = 290 - 207 = 83 -->
  <rect x="145" y="83" width="80" height="207" rx="4" fill="#E53935" opacity="0.85" filter="url(#shadow)"/>
  <text x="185" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">21,600</text>
  <text x="185" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">1초</text>

  <!-- 막대 2: 10초 = 2,160 → 높이 = 2160/25000 * 240 ≈ 21 → y = 290 - 21 = 269... too small, scale differently -->
  <!-- 재계산: 비율 맞추기 위해 log 대신 선형 스케일 유지, 하단에 작은 막대도 보이게 최소 높이 보장 -->
  <!-- 2160 → 2160/21600 * 207 = 20.7 → y=269.3 -->
  <rect x="275" y="269" width="80" height="21" rx="4" fill="#FFA000" opacity="0.85" filter="url(#shadow)"/>
  <text x="315" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">2,160</text>
  <text x="315" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">10초</text>

  <!-- 막대 3: 1분 = 360 → 360/21600*207 ≈ 3.4 → 최소 높이 8로 -->
  <rect x="405" y="282" width="80" height="8" rx="4" fill="#43A047" opacity="0.85" filter="url(#shadow)"/>
  <text x="445" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">360</text>
  <text x="445" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">1분</text>

  <!-- 막대 4: 5분 = 72 → 최소 높이 5 -->
  <rect x="535" y="285" width="80" height="5" rx="2" fill="#388E3C" opacity="0.85" filter="url(#shadow)"/>
  <text x="575" y="279" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">72</text>
  <text x="575" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">5분</text>

  <!-- 범례 -->
  <rect x="120" y="345" width="14" height="14" rx="3" fill="#E53935"/>
  <text x="140" y="357" font-size="10" fill="#333">1초: 🔴 1일 만에 초과</text>

  <rect x="280" y="345" width="14" height="14" rx="3" fill="#FFA000"/>
  <text x="300" y="357" font-size="10" fill="#333">10초: 🟡 5일 내 초과</text>

  <rect x="430" y="345" width="14" height="14" rx="3" fill="#43A047"/>
  <text x="450" y="357" font-size="10" fill="#333">1분: 🟢 28일 가능</text>

  <rect x="555" y="345" width="14" height="14" rx="3" fill="#388E3C"/>
  <text x="575" y="357" font-size="10" fill="#333">5분: 🟢 139일</text>
</svg>
