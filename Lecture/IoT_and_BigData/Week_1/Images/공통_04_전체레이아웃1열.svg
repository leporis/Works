<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" font-family="Noto Sans CJK KR">
  <defs>
    <filter id="ledGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="400" height="600" fill="#1a1a2e" rx="8"/>

  <!-- 헤더 -->
  <rect x="0" y="0" width="400" height="44" fill="#16213e" rx="8"/>
  <rect x="0" y="36" width="400" height="8" fill="#16213e"/>
  <circle cx="22" cy="22" r="12" fill="#8b5cf6" opacity="0.8"/>
  <text x="22" y="26" text-anchor="middle" fill="white" font-size="10">🔮</text>
  <text x="42" y="18" fill="white" font-size="10" font-weight="bold">1주차 강의자료</text>
  <text x="42" y="34" fill="#aaa" font-size="8">LED에 이름 표시하기</text>
  <rect x="280" y="10" width="50" height="24" rx="4" fill="#2a2a4a" stroke="#444" stroke-width="1"/>
  <text x="305" y="26" text-anchor="middle" fill="#aaa" font-size="7">🔄 새로만들기</text>
  <rect x="338" y="10" width="50" height="24" rx="4" fill="#2a2a4a" stroke="#444" stroke-width="1"/>
  <text x="363" y="26" text-anchor="middle" fill="#aaa" font-size="8">❓ 도움말</text>

  <!-- ≤1100px 라벨 -->
  <rect x="140" y="48" width="120" height="20" rx="3" fill="#e74c3c" opacity="0.8"/>
  <text x="200" y="62" text-anchor="middle" fill="white" font-size="9" font-weight="bold">≤ 1100px 모바일 뷰</text>

  <!-- ① 블록 팔레트 (상단, 수평 배치) -->
  <rect x="10" y="76" width="380" height="80" rx="6" fill="rgba(107,79,187,0.15)" stroke="#6b4fbb" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="15" y="82" width="55" height="22" rx="4" fill="#6b4fbb"/>
  <text x="23" y="97" fill="white" font-size="8" font-weight="600">🔲 기본</text>

  <rect x="15" y="108" width="85" height="22" rx="5" fill="#7c5fd6"/>
  <text x="22" y="123" fill="white" font-size="7.5">문자열 보여주기</text>

  <rect x="106" y="108" width="70" height="22" rx="5" fill="#7c5fd6"/>
  <text x="113" y="123" fill="white" font-size="7.5">숫자 보여주기</text>

  <rect x="182" y="108" width="85" height="22" rx="5" fill="#7c5fd6"/>
  <text x="189" y="123" fill="white" font-size="7.5">아이콘 보여주기 ❤️</text>

  <rect x="273" y="108" width="55" height="22" rx="5" fill="#7c5fd6"/>
  <text x="280" y="123" fill="white" font-size="7.5">일시정지</text>

  <rect x="334" y="108" width="50" height="22" rx="5" fill="#6d4bc5"/>
  <text x="341" y="123" fill="white" font-size="7.5">화면 지우기</text>

  <!-- 라벨 ① -->
  <text x="200" y="148" text-anchor="middle" fill="#8b5cf6" font-size="9" font-weight="bold">↑ ① 블록 팔레트 (수평 배치, max-height: 350px)</text>

  <!-- ② 코딩 영역 (중앙) -->
  <rect x="10" y="162" width="380" height="175" rx="6" fill="rgba(40,40,60,0.5)" stroke="#3a3a4a" stroke-width="1"/>

  <!-- 시작하면 실행 -->
  <rect x="20" y="170" width="170" height="24" rx="5" fill="#4a8b4a"/>
  <text x="32" y="186" fill="white" font-size="9" font-weight="600">🚀 시작하면 실행</text>

  <rect x="20" y="198" width="360" height="50" rx="5" fill="rgba(74,139,74,0.15)" stroke="#4a8b4a" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="28" y="206" width="340" height="22" rx="4" fill="#7c5fd6" stroke="#f5c518" stroke-width="1.5"/>
  <text x="38" y="221" fill="white" font-size="8.5">문자열 보여주기</text>
  <rect x="140" y="209" width="50" height="16" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text x="153" y="221" fill="white" font-size="8">Hello!</text>
  <text x="228" y="221" fill="white" font-size="8">→ 이름으로 변경</text>

  <!-- 무한반복 실행 -->
  <rect x="20" y="260" width="170" height="24" rx="5" fill="#4a6b8b"/>
  <text x="32" y="276" fill="white" font-size="9" font-weight="600">🔄 무한반복 실행</text>

  <rect x="20" y="288" width="360" height="40" rx="5" fill="rgba(74,107,139,0.15)" stroke="#4a6b8b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="200" y="312" text-anchor="middle" fill="#666" font-size="9">(블록을 여기에 드래그하세요)</text>

  <!-- 라벨 ② -->
  <text x="200" y="345" text-anchor="middle" fill="#4a8b4a" font-size="9" font-weight="bold">↑ ② 코딩 영역 (min-height: 250px)</text>

  <!-- ③ 시뮬레이터 패널 (하단) -->
  <rect x="10" y="358" width="380" height="210" rx="6" fill="rgba(40,40,60,0.5)" stroke="#3a3a4a" stroke-width="1"/>
  <line x1="10" y1="358" x2="390" y2="358" stroke="#3498db" stroke-width="2"/>

  <text x="200" y="376" text-anchor="middle" fill="#aaa" font-size="9">마이크로비트 시뮬레이터</text>

  <!-- LED 매트릭스 (소형) -->
  <rect x="140" y="385" width="120" height="120" rx="6" fill="#111"/>
  <g transform="translate(150, 395)">
    <!-- Row 0: H -->
    <circle cx="5" cy="5" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <circle cx="28" cy="5" r="7" fill="#333"/>
    <circle cx="51" cy="5" r="7" fill="#333"/>
    <circle cx="74" cy="5" r="7" fill="#333"/>
    <circle cx="97" cy="5" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <!-- Row 1 -->
    <circle cx="5" cy="25" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <circle cx="28" cy="25" r="7" fill="#333"/>
    <circle cx="51" cy="25" r="7" fill="#333"/>
    <circle cx="74" cy="25" r="7" fill="#333"/>
    <circle cx="97" cy="25" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <!-- Row 2 -->
    <circle cx="5" cy="45" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <circle cx="28" cy="45" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <circle cx="51" cy="45" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <circle cx="74" cy="45" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <circle cx="97" cy="45" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <!-- Row 3 -->
    <circle cx="5" cy="65" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <circle cx="28" cy="65" r="7" fill="#333"/>
    <circle cx="51" cy="65" r="7" fill="#333"/>
    <circle cx="74" cy="65" r="7" fill="#333"/>
    <circle cx="97" cy="65" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <!-- Row 4 -->
    <circle cx="5" cy="85" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
    <circle cx="28" cy="85" r="7" fill="#333"/>
    <circle cx="51" cy="85" r="7" fill="#333"/>
    <circle cx="74" cy="85" r="7" fill="#333"/>
    <circle cx="97" cy="85" r="7" fill="#ff0000" filter="url(#ledGlow)"/>
  </g>

  <!-- 제어 버튼 -->
  <rect x="60" y="515" width="80" height="24" rx="4" fill="#00d4aa"/>
  <text x="100" y="531" text-anchor="middle" fill="white" font-size="9" font-weight="bold">▶ 실행</text>
  <rect x="155" y="515" width="80" height="24" rx="4" fill="#e74c3c"/>
  <text x="195" y="531" text-anchor="middle" fill="white" font-size="9" font-weight="bold">⏹ 정지</text>
  <rect x="250" y="515" width="80" height="24" rx="4" fill="#3498db"/>
  <text x="290" y="531" text-anchor="middle" fill="white" font-size="9" font-weight="bold">🔄 리셋</text>

  <!-- 상태 표시줄 -->
  <rect x="60" y="546" width="270" height="18" rx="3" fill="#2a2a4a"/>
  <text x="195" y="559" text-anchor="middle" fill="#00d4aa" font-size="8">✅ 실행 중...</text>

  <!-- 라벨 ③ -->
  <text x="200" y="580" text-anchor="middle" fill="#3498db" font-size="9" font-weight="bold">↑ ③ 시뮬레이터 패널 (상단 테두리로 변경)</text>

  <!-- 전체 세로 화살표 (왼쪽) -->
  <line x1="5" y1="76" x2="5" y2="568" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="6" y="320" fill="#888" font-size="7" transform="rotate(-90, 6, 320)">세로 스크롤 ↕</text>
</svg>
