<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" font-family="Noto Sans CJK KR">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="500" height="500" fill="white"/>
  <text x="250" y="28" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">시뮬레이터 실행 순서</text>

  <!-- 1. 실행 버튼 -->
  <rect x="175" y="45" width="150" height="36" rx="18" fill="#00d4aa"/>
  <text x="250" y="68" text-anchor="middle" fill="white" font-size="12" font-weight="bold">▶ 실행 클릭</text>
  <line x1="250" y1="81" x2="250" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 2. isRunning = true -->
  <rect x="160" y="100" width="180" height="32" rx="5" fill="#3498db"/>
  <text x="250" y="121" text-anchor="middle" fill="white" font-size="11">isRunning = true</text>
  <line x1="250" y1="132" x2="250" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 3. LED 초기화 -->
  <rect x="160" y="150" width="180" height="32" rx="5" fill="#3498db"/>
  <text x="250" y="171" text-anchor="middle" fill="white" font-size="11">LED 매트릭스 초기화</text>
  <line x1="250" y1="182" x2="250" y2="205" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 4. 시작하면 실행 -->
  <rect x="130" y="205" width="240" height="40" rx="6" fill="#4a8b4a" stroke="#3d7a3d" stroke-width="1.5"/>
  <text x="250" y="222" text-anchor="middle" fill="white" font-size="11" font-weight="bold">🚀 "시작하면 실행" 영역</text>
  <text x="250" y="238" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="9">블록 위→아래 순서로 1회 실행</text>
  <line x1="250" y1="245" x2="250" y2="270" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 5. 무한반복 실행 -->
  <rect x="130" y="270" width="240" height="40" rx="6" fill="#4a6b8b" stroke="#3d5a7a" stroke-width="1.5"/>
  <text x="250" y="287" text-anchor="middle" fill="white" font-size="11" font-weight="bold">🔄 "무한반복 실행" 영역</text>
  <text x="250" y="303" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="9">블록 위→아래 순서로 반복 실행</text>
  <line x1="250" y1="310" x2="250" y2="340" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 6. 조건 분기: isRunning? -->
  <polygon points="250,340 340,375 250,410 160,375" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="250" y="378" text-anchor="middle" fill="white" font-size="11" font-weight="bold">isRunning?</text>

  <!-- Yes 경로: 직각 화살표 (오른쪽 → 위 → 왼쪽) -->
  <polyline points="340,375 420,375 420,290 370,290" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="380" y="368" fill="#27ae60" font-size="10" font-weight="bold">Yes</text>

  <!-- No 경로: 아래로 -->
  <line x1="250" y1="410" x2="250" y2="435" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrR)"/>
  <text x="265" y="428" fill="#e74c3c" font-size="10" font-weight="bold">No</text>

  <!-- 정지 상태 -->
  <rect x="185" y="435" width="130" height="32" rx="5" fill="#e74c3c"/>
  <text x="250" y="456" text-anchor="middle" fill="white" font-size="11" font-weight="bold">⏹ 실행 종료</text>

  <!-- 정지 버튼 주석 -->
  <rect x="60" y="365" width="90" height="22" rx="4" fill="#fef3cd" stroke="#f39c12" stroke-width="1"/>
  <text x="105" y="380" text-anchor="middle" fill="#856404" font-size="8">⏹ 정지 클릭 시</text>
  <line x1="150" y1="376" x2="160" y2="376" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 단계 번호 -->
  <g font-size="9">
    <circle cx="145" cy="63" r="10" fill="#eee" stroke="#ccc"/><text x="145" y="67" text-anchor="middle" fill="#666">1</text>
    <circle cx="145" cy="116" r="10" fill="#eee" stroke="#ccc"/><text x="145" y="120" text-anchor="middle" fill="#666">2</text>
    <circle cx="145" cy="166" r="10" fill="#eee" stroke="#ccc"/><text x="145" y="170" text-anchor="middle" fill="#666">3</text>
    <circle cx="115" cy="225" r="10" fill="#eee" stroke="#ccc"/><text x="115" y="229" text-anchor="middle" fill="#666">4</text>
    <circle cx="115" cy="290" r="10" fill="#eee" stroke="#ccc"/><text x="115" y="294" text-anchor="middle" fill="#666">5</text>
  </g>
</svg>
