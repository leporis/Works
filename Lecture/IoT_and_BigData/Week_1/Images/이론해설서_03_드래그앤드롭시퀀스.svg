<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Noto Sans CJK KR">
  <defs>
    <marker id="tipP" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="tipB" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3498db"/>
    </marker>
    <marker id="tipR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
    <marker id="tipG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#95a5a6"/>
    </marker>
  </defs>

  <rect width="600" height="400" fill="white"/>
  <text x="300" y="28" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">HTML5 드래그 앤 드롭 이벤트 시퀀스</text>

  <!-- 라이프라인 헤더 -->
  <rect x="80" y="45" width="130" height="36" rx="6" fill="#8b5cf6"/>
  <text x="145" y="62" text-anchor="middle" fill="white" font-size="11" font-weight="bold">블록 팔레트</text>
  <text x="145" y="76" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="8">(source)</text>

  <rect x="380" y="45" width="130" height="36" rx="6" fill="#3498db"/>
  <text x="445" y="62" text-anchor="middle" fill="white" font-size="11" font-weight="bold">코딩 영역</text>
  <text x="445" y="76" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="8">(drop target)</text>

  <!-- 라이프라인 점선 -->
  <line x1="145" y1="81" x2="145" y2="370" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="445" y1="81" x2="445" y2="370" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- 1. dragstart: source에서 발생 (→) -->
  <line x1="155" y1="110" x2="435" y2="110" stroke="#8b5cf6" stroke-width="2" marker-end="url(#tipP)"/>
  <rect x="220" y="95" width="100" height="20" rx="3" fill="#f3f0ff"/>
  <text x="270" y="109" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="bold">dragstart</text>
  <text x="475" y="114" fill="#666" font-size="9">데이터 저장</text>

  <!-- 2. dragenter: target에서 발생 (←) — 영역 진입 시 1회 -->
  <line x1="435" y1="155" x2="155" y2="155" stroke="#3498db" stroke-width="2" marker-end="url(#tipB)"/>
  <rect x="216" y="140" width="108" height="20" rx="3" fill="#ebf5fb"/>
  <text x="270" y="154" text-anchor="middle" fill="#3498db" font-size="10" font-weight="bold">dragenter</text>
  <text x="475" y="159" fill="#666" font-size="9">영역 진입 (1회)</text>

  <!-- 하이라이트 표시 -->
  <rect x="430" y="143" width="30" height="24" rx="3" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- 3. dragover: target에서 발생 (←) — 반복 발생 -->
  <line x1="435" y1="195" x2="155" y2="195" stroke="#3498db" stroke-width="2" marker-end="url(#tipB)"/>
  <rect x="220" y="180" width="100" height="20" rx="3" fill="#ebf5fb"/>
  <text x="270" y="194" text-anchor="middle" fill="#3498db" font-size="10" font-weight="bold">dragover</text>
  <text x="475" y="199" fill="#666" font-size="9">드롭 허용 (반복)</text>

  <!-- 4. dragleave: target에서 발생 (←) — 영역 이탈 시 -->
  <line x1="435" y1="235" x2="155" y2="235" stroke="#95a5a6" stroke-width="1.5" marker-end="url(#tipG)"/>
  <rect x="216" y="220" width="108" height="20" rx="3" fill="#f5f5f5"/>
  <text x="270" y="234" text-anchor="middle" fill="#95a5a6" font-size="10">dragleave</text>
  <text x="475" y="239" fill="#999" font-size="9">영역 이탈 시</text>

  <!-- 5. drop: target에서 발생 (←) 핵심 이벤트 -->
  <rect x="130" y="260" width="330" height="40" rx="5" fill="#fef3cd" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="435" y1="280" x2="155" y2="280" stroke="#e74c3c" stroke-width="3" marker-end="url(#tipR)"/>
  <rect x="240" y="265" width="60" height="22" rx="4" fill="#e74c3c"/>
  <text x="270" y="280" text-anchor="middle" fill="white" font-size="11" font-weight="bold">drop</text>
  <text x="475" y="284" fill="#e74c3c" font-size="9" font-weight="bold">블록 복사 생성!</text>

  <!-- 6. dragend: source에서 발생 (→) -->
  <line x1="155" y1="325" x2="435" y2="325" stroke="#8b5cf6" stroke-width="2" marker-end="url(#tipP)"/>
  <rect x="224" y="310" width="92" height="20" rx="3" fill="#f3f0ff"/>
  <text x="270" y="324" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="bold">dragend</text>
  <text x="475" y="329" fill="#666" font-size="9">원본 블록 복원</text>

  <!-- 단계 번호 -->
  <g font-size="9">
    <circle cx="60" cy="110" r="10" fill="#f8f8f8" stroke="#ddd"/><text x="60" y="114" text-anchor="middle" fill="#666" font-weight="bold">1</text>
    <circle cx="60" cy="155" r="10" fill="#f8f8f8" stroke="#ddd"/><text x="60" y="159" text-anchor="middle" fill="#666" font-weight="bold">2</text>
    <circle cx="60" cy="195" r="10" fill="#f8f8f8" stroke="#ddd"/><text x="60" y="199" text-anchor="middle" fill="#666" font-weight="bold">3</text>
    <circle cx="60" cy="235" r="10" fill="#f8f8f8" stroke="#ddd"/><text x="60" y="239" text-anchor="middle" fill="#666" font-weight="bold">4</text>
    <circle cx="60" cy="280" r="10" fill="#fff3cd" stroke="#f39c12"/><text x="60" y="284" text-anchor="middle" fill="#e67e22" font-weight="bold">5</text>
    <circle cx="60" cy="325" r="10" fill="#f8f8f8" stroke="#ddd"/><text x="60" y="329" text-anchor="middle" fill="#666" font-weight="bold">6</text>
  </g>

  <!-- 범례 -->
  <line x1="100" y1="365" x2="140" y2="365" stroke="#8b5cf6" stroke-width="2" marker-end="url(#tipP)"/>
  <text x="150" y="369" fill="#555" font-size="9">source 이벤트</text>
  <line x1="340" y1="365" x2="300" y2="365" stroke="#3498db" stroke-width="2" marker-end="url(#tipB)"/>
  <text x="350" y="369" fill="#555" font-size="9">target 이벤트</text>
  <line x1="510" y1="365" x2="470" y2="365" stroke="#e74c3c" stroke-width="3" marker-end="url(#tipR)"/>
  <text x="520" y="369" fill="#555" font-size="9">핵심 이벤트</text>
</svg>
