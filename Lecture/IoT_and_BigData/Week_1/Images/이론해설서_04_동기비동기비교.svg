<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="Noto Sans CJK KR">
  <defs>
    <marker id="da" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="700" height="350" fill="white"/>
  <text x="350" y="28" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">"일시정지 1000ms" — 동기 vs 비동기 실행</text>

  <!-- === 왼쪽: 동기 실행 === -->
  <rect x="25" y="45" width="290" height="295" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
  <rect x="25" y="45" width="290" height="34" rx="10" fill="#e74c3c"/>
  <rect x="25" y="69" width="290" height="10" fill="#e74c3c"/>
  <text x="170" y="68" text-anchor="middle" fill="white" font-size="12" font-weight="bold">동기 실행 (가상)</text>

  <!-- 일시정지 블록 -->
  <rect x="95" y="92" width="150" height="30" rx="6" fill="#7c5fd6"/>
  <text x="170" y="112" text-anchor="middle" fill="white" font-size="10">일시정지 1000 ms</text>

  <!-- 타임라인 바 -->
  <rect x="140" y="132" width="60" height="120" rx="3" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="170" y="155" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="bold">전체</text>
  <text x="170" y="172" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="bold">멈춤</text>
  <text x="170" y="195" text-anchor="middle" fill="#c0392b" font-size="9">1초 대기</text>

  <!-- 경고 아이콘 -->
  <text x="170" y="222" text-anchor="middle" fill="#e74c3c" font-size="18">✕</text>
  <text x="170" y="242" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="bold">버튼 반응 불가</text>

  <line x1="170" y1="252" x2="170" y2="275" stroke="#555" stroke-width="2" marker-end="url(#da)"/>

  <!-- 다음 블록 -->
  <rect x="95" y="278" width="150" height="28" rx="6" fill="#7c5fd6"/>
  <text x="170" y="297" text-anchor="middle" fill="white" font-size="10">다음 블록 실행</text>

  <!-- 시간 라벨 -->
  <text x="50" y="110" fill="#999" font-size="9">t=0</text>
  <text x="50" y="192" fill="#999" font-size="9">1초간</text>
  <text x="50" y="295" fill="#999" font-size="9">t=1s</text>

  <!-- === 오른쪽: 비동기 실행 === -->
  <rect x="385" y="45" width="290" height="295" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="385" y="45" width="290" height="34" rx="10" fill="#27ae60"/>
  <rect x="385" y="69" width="290" height="10" fill="#27ae60"/>
  <text x="530" y="68" text-anchor="middle" fill="white" font-size="12" font-weight="bold">비동기 실행 (실제)</text>

  <!-- 일시정지 블록 -->
  <rect x="455" y="92" width="150" height="30" rx="6" fill="#7c5fd6"/>
  <text x="530" y="112" text-anchor="middle" fill="white" font-size="10">일시정지 1000 ms</text>

  <!-- 예약 메시지 -->
  <rect x="435" y="132" width="190" height="28" rx="5" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="530" y="151" text-anchor="middle" fill="#1e8449" font-size="10" font-weight="bold">"1초 후 나를 깨워줘" 예약</text>

  <!-- 자유 시간 영역 -->
  <rect x="470" y="170" width="120" height="70" rx="5" fill="rgba(39,174,96,0.1)" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="530" y="195" text-anchor="middle" fill="#27ae60" font-size="10">브라우저 자유</text>
  <text x="530" y="215" text-anchor="middle" fill="#27ae60" font-size="18">✓</text>
  <text x="530" y="235" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="bold">버튼 즉시 반응</text>

  <!-- 콜백 화살표 -->
  <line x1="530" y1="245" x2="530" y2="275" stroke="#555" stroke-width="2" marker-end="url(#da)"/>
  <text x="560" y="265" fill="#1e8449" font-size="8">콜백 실행</text>

  <!-- 다음 블록 -->
  <rect x="455" y="278" width="150" height="28" rx="6" fill="#7c5fd6"/>
  <text x="530" y="297" text-anchor="middle" fill="white" font-size="10">다음 블록 실행</text>

  <!-- 시간 라벨 -->
  <text x="410" y="110" fill="#999" font-size="9">t=0</text>
  <text x="410" y="200" fill="#999" font-size="9">자유</text>
  <text x="410" y="295" fill="#999" font-size="9">t=1s</text>

  <!-- VS -->
  <circle cx="350" cy="195" r="22" fill="#2c3e50"/>
  <text x="350" y="201" text-anchor="middle" fill="white" font-size="12" font-weight="bold">VS</text>
</svg>
