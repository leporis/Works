name: Deploy public to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site directory
        run: |
          mkdir -p _site
          # public 폴더 안 모든 내용 복사 (폴더 구조 유지, 숨김파일 포함)
          rsync -av --exclude='.git*' public/ _site/
          # 디버깅: _site 내용 확인 (로그에 출력됨)
          tree _site || ls -R _site
          # 루트에 .nojekyll 추가 (Jekyll 빌드 방지)
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4