name: Deploy public to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # ← 브라우저에서 수동 테스트 가능하게 추가 (Actions 탭 → Run workflow)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3   # 또는 v4 (v3가 안정적일 수 있음)
        with:
          path: public   # ← public 폴더 안 내용이 사이트의 루트(/)가 됩니다. (폴더 이름 public은 URL에 안 보임)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4