name: Generate Public Index

on:
  push:
    paths:
      - 'Lecture/IoT_and_BigData/public/**'
      - '!Lecture/IoT_and_BigData/public/index.html'
      - '!Lecture/IoT_and_BigData/public/README.md'
      - '!Lecture/IoT_and_BigData/public/**/index.html'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index files
        run: python3 .github/scripts/generate_public_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-generate index.html and README.md"
          git push
