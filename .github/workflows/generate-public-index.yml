name: Generate Public Index

on:
  push:
    paths:
      - 'public/**'
      - '!public/index.html'
      - '!public/**/index.html'
      - '!public/**/README.md'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index files
        run: python3 .github/scripts/generate_public_index.py

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public        # 빌드 결과물이 있는 폴더명 (현재 유지)
          branch: gh-pages      # 중요: 결과물을 보낼 새로운 브랜치 이름
          clean: true           # 배포 시 이전 파일을 정리함